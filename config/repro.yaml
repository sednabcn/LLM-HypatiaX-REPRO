# =============================================================================
# HypatiaX JMLR — PAPER-QUALITY REPRODUCIBILITY CONFIGURATION
# =============================================================================

run_id:       "paper_v3"
run_version:  "3.0"
date:         "2026-04"

paths:
  root:       "${HYPATIAX_ROOT}"
  results:    "hypatiax/data/results"
  patched:    "hypatiax/data/patched"
  paper:      "paper"
  figures:    "paper/figures"
  tables:     "paper/tables"
  patches:    "patches/generated"
  logs:       "logs"

seeds:
  default:    42
  pysr_seed:  42
  validation: [123]
  portfolio_variance: [42, 99, 123, 777, 2024]

llm_model:     "claude-sonnet-4-20250514"
llm_retries:   3
llm_k_runs:    30

n_tasks_defi:       74
n_tasks_instability: 70
pca_train_frac:     0.40
nn_time_limit:      120

timeouts:
  # Julia-internal timeout: passed as timeout_in_seconds to PySRRegressor.
  # Julia honours this between iterations only — not during hall-of-fame refinement.
  pysr_attempt_seconds:      1100   # → env PYSR_TIMEOUT        → DiscoveryConfig.pysr_timeout
  feynman_pysr_seconds:      1100   # → env PYSR_TIMEOUT (feynman jobs)
  instability_pysr_seconds:   300   # → env PYSR_TIMEOUT (instability jobs)

  # Hard wall-clock cap on the entire model.fit() call (thread guard).
  # fit_wall_timeout > 0 overrides pysr_attempt_seconds + fit_grace_secs.
  # equation_wall_clock was the original intent for this; now wired via
  # PYSR_FIT_WALL_TIMEOUT → DiscoveryConfig.fit_wall_timeout.
  equation_wall_clock:       1200   # kept for reference / paper notation
  fit_wall_timeout:          1200   # → env PYSR_FIT_WALL_TIMEOUT → DiscoveryConfig.fit_wall_timeout
  fit_grace_secs:             120   # → env PYSR_FIT_GRACE_SECS  → DiscoveryConfig.fit_grace_secs
                                    #   (used only when fit_wall_timeout=0)
  kill_grace_seconds:         300   # → --kill-grace in run_all_checkpoint.py exp2 runner  [NEW]

  # Outer per-method runner budget (enforced by experiment protocol callers).
  method_seconds:             900   # → env METHOD_TIMEOUT

pysr:
  niterations: 1000
  populations: 30
  population_size: 33
  parsimony: 0.01
  maxsize: 30
  binary_operators: ["+", "-", "*", "/"]
  unary_operators: ["exp", "log", "sin", "cos", "sqrt"]
  use_transcendental_compositions: true
  deterministic: true
  parallelism: "multithreading"
  # Wall-clock guard — mirrors DiscoveryConfig.fit_wall_timeout / fit_grace_secs.
  # fit_wall_timeout: 0 means derive from pysr_attempt_seconds + fit_grace_secs.
  # Set to timeouts.fit_wall_timeout above so both stay in sync.
  fit_wall_timeout: 1200   # → DiscoveryConfig.fit_wall_timeout
  fit_grace_secs:    120   # → DiscoveryConfig.fit_grace_secs

engine:
  name: "hybrid_system_v50_2"
  version: "v5.1"
  max_retries: 3
  allow_nondeterministic: false

benchmarks:
  defi:
    enabled: true
    script: "hypatiax/experiments/benchmarks/hypatiax_defi_benchmark_v3c.py"
    output_subdir: "defi"
    split: "pca_40_60"
    train_frac: 0.40
    expected:
      accuracy: 0.892
      total_cases: 74
      catastrophic: 0
  core15:
    enabled: true
    script: "hypatiax/experiments/benchmarks/run_dual_condition_benchmark.py"
    output_subdir: "exp1_ablation"
    expected:
      mw_u: 126.0
      mw_p: 0.295
      speedup: 1.73
  feynman:
    enabled: true
    script: "hypatiax/experiments/benchmarks/run_comparative_suite_benchmark_v2.py"
    output_subdir: "feynman"
    split: "random_80_20"
    extrap_mult: 2.0
    expected:
      successes: 9
      total: 30
  nguyen12:
    enabled: true
    output_subdir: "nguyen12"
    expected:
      hypatia_success: 11
      pysr_success: 10
      nn_success: 0
      mw_u: 113
      mw_p: 0.0097
  noise_sweep:
    enabled: true
    script: "hypatiax/experiments/benchmarks/run_noise_sweep_benchmark.py"
    output_subdir: "noise"
    fast_skip: true
    expected:
      ehd_rate: 1.0
      plateau_n: 500
  routing:
    enabled: true
    script: "hypatiax/experiments/benchmarks/run_hybrid_system_benchmark.py"
    output_subdir: "routing"
    expected:
      fix1_improvement: 0.06
      fix2_improvement: 0.05
      fix3_improvement: 0.01
  instability:
    enabled: true
    script: "hypatiax/experiments/benchmarks/run_dual_sweep_benchmarks.py"
    output_subdir: "instability"
    fast_skip: true
    k_runs: 30
    total_tasks: 70
    expected:
      spearman_rho: -0.70
      p_value: 0.001
  extrapolation:
    enabled: true
    output_subdir: "extrapolation"
    regimes: ["near", "medium", "far"]
    extrap_mults: [1.2, 2.0, 5.0]


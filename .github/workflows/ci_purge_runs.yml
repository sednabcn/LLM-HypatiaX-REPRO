name: "HypatiaX - purge old runs"
run-name: "HypatiaX - purge runs older than ${{ inputs.older_than_hours }}h"

# Manual-only.  Never triggered automatically.
on:
  workflow_dispatch:
    inputs:

      older_than_hours:
        description: "Delete runs completed more than this many hours ago (e.g. 24, 48, 168)"
        required: true
        default: "48"

      workflows:
        description: "Which workflows to purge"
        required: true
        type: choice
        options:
          - "all HypatiaX workflows"
          - "experiment runner only"
          - "scheduler only"
          - "analysis only"
          - "pipeline only"
        default: "all HypatiaX workflows"

      dry_run:
        description: "Dry-run: list what would be deleted without actually deleting (true/false)"
        required: false
        default: "false"

permissions:
  actions: write

jobs:
  purge:
    name: "Purge runs older than ${{ inputs.older_than_hours }}h"
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Purge old HypatiaX workflow runs
        env:
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          REPO:              ${{ github.repository }}
          THIS_RUN:          ${{ github.run_id }}
          OLDER_THAN_HOURS:  ${{ inputs.older_than_hours }}
          WORKFLOWS_FILTER:  ${{ inputs.workflows }}
          DRY_RUN:           ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          # Resolve the cutoff timestamp (UTC epoch seconds).
          CUTOFF=$(( $(date +%s) - OLDER_THAN_HOURS * 3600 ))
          CUTOFF_ISO=$(date -u -d "@${CUTOFF}" +%Y-%m-%dT%H:%M:%SZ 2>/dev/null \
                       || date -u -r  "${CUTOFF}" +%Y-%m-%dT%H:%M:%SZ)
          echo "Cutoff: runs completed before ${CUTOFF_ISO} (${OLDER_THAN_HOURS}h ago)"
          echo "Dry-run: ${DRY_RUN}"
          echo "Filter: ${WORKFLOWS_FILTER}"
          echo ""

          # Build the list of workflow display names to target.
          declare -A ALL_WF_NAMES=(
            ["experiment runner"]="HypatiaX - experiment runner . run_all.sh"
            ["scheduler"]="HypatiaX - scheduled full run"
            ["analysis"]="HypatiaX - analysis"
            ["pipeline"]="HypatiaX - pipeline"
          )

          TARGET_KEYS=()
          case "${WORKFLOWS_FILTER}" in
            "all HypatiaX workflows")
              TARGET_KEYS=(experiment\ runner scheduler analysis pipeline) ;;
            "experiment runner only")
              TARGET_KEYS=(experiment\ runner) ;;
            "scheduler only")
              TARGET_KEYS=(scheduler) ;;
            "analysis only")
              TARGET_KEYS=(analysis) ;;
            "pipeline only")
              TARGET_KEYS=(pipeline) ;;
          esac

          TOTAL_DELETED=0
          TOTAL_SKIPPED=0

          purge_workflow() {
            local WF_NAME="$1"
            echo "══════════════════════════════════════════"
            echo "Workflow: ${WF_NAME}"

            WF_ID=$(gh api \
              "repos/${REPO}/actions/workflows?per_page=100" \
              --jq ".workflows[] | select(.name == \"${WF_NAME}\") | .id" \
              2>/dev/null | head -1 || true)

            if [[ -z "${WF_ID}" ]]; then
              echo "  ⚠  Not found — skipping."
              return 0
            fi
            echo "  Workflow ID: ${WF_ID}"

            # Protect: in_progress, queued, and the current run.
            mapfile -t LIVE_IDS < <(gh api \
              "repos/${REPO}/actions/workflows/${WF_ID}/runs?per_page=100" \
              --jq '.workflow_runs[]
                    | select(.status == "in_progress" or .status == "queued")
                    | .id | tostring' \
              2>/dev/null || true)
            LIVE_IDS+=("${THIS_RUN}")

            declare -A PROTECTED
            for ID in "${LIVE_IDS[@]}"; do
              PROTECTED["${ID}"]=1
            done

            DELETED=0
            SKIPPED=0
            PAGE=1

            while true; do
              RUNS=$(gh api \
                "repos/${REPO}/actions/workflows/${WF_ID}/runs?per_page=100&page=${PAGE}" \
                --jq '.workflow_runs[]
                      | select(.status == "completed")
                      | "\(.id) \(.conclusion) \(.updated_at)"' \
                2>/dev/null || true)

              [[ -z "$RUNS" ]] && break

              while IFS=' ' read -r RUN_ID CONCLUSION UPDATED_AT; do
                [[ -z "$RUN_ID" ]] && continue

                # Parse updated_at to epoch for age comparison.
                RUN_EPOCH=$(date -u -d "${UPDATED_AT}" +%s 2>/dev/null \
                            || date -u -j -f "%Y-%m-%dT%H:%M:%SZ" "${UPDATED_AT}" +%s 2>/dev/null \
                            || echo 0)

                if [[ "${RUN_EPOCH}" -gt "${CUTOFF}" ]]; then
                  echo "  ✔  Keeping recent run ${RUN_ID} (${CONCLUSION}, ${UPDATED_AT})"
                  SKIPPED=$(( SKIPPED + 1 ))
                  continue
                fi

                if [[ -n "${PROTECTED[${RUN_ID}]+_}" ]]; then
                  echo "  ✔  Keeping protected run ${RUN_ID} (${CONCLUSION}, ${UPDATED_AT})"
                  SKIPPED=$(( SKIPPED + 1 ))
                  continue
                fi

                if [[ "${DRY_RUN}" == "true" ]]; then
                  echo "  🔍 [DRY-RUN] Would delete run ${RUN_ID} — ${CONCLUSION} (${UPDATED_AT})"
                  DELETED=$(( DELETED + 1 ))
                elif gh api --method DELETE \
                       "repos/${REPO}/actions/runs/${RUN_ID}" \
                       2>/dev/null; then
                  echo "  🗑  Deleted run ${RUN_ID} — ${CONCLUSION} (${UPDATED_AT})"
                  DELETED=$(( DELETED + 1 ))
                else
                  echo "  ⚠  Could not delete run ${RUN_ID} — skipping."
                  SKIPPED=$(( SKIPPED + 1 ))
                fi
              done <<< "$RUNS"

              PAGE=$(( PAGE + 1 ))
              ROW_COUNT=$(echo "$RUNS" | wc -l)
              [[ "${ROW_COUNT}" -lt 100 ]] && break
            done

            ACTION_LABEL="Deleted"
            [[ "${DRY_RUN}" == "true" ]] && ACTION_LABEL="Would delete"
            echo "  ${ACTION_LABEL}: ${DELETED}  kept: ${SKIPPED}"
            TOTAL_DELETED=$(( TOTAL_DELETED + DELETED ))
            TOTAL_SKIPPED=$(( TOTAL_SKIPPED + SKIPPED ))
          }

          for KEY in "${TARGET_KEYS[@]}"; do
            WF_NAME="${ALL_WF_NAMES[${KEY}]}"
            purge_workflow "${WF_NAME}" || {
              echo "::warning::purge_workflow failed for '${WF_NAME}' — continuing."
            }
          done

          echo ""
          echo "══════════════════════════════════════════"
          if [[ "${DRY_RUN}" == "true" ]]; then
            echo "DRY-RUN COMPLETE — no runs were deleted."
            echo "  Would have deleted : ${TOTAL_DELETED}"
            echo "  Would have kept    : ${TOTAL_SKIPPED}"
          else
            echo "PURGE COMPLETE"
            echo "  Deleted : ${TOTAL_DELETED}"
            echo "  Kept    : ${TOTAL_SKIPPED}"
          fi

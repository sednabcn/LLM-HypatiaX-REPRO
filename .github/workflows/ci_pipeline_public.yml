# ==============================================================================
#  ci_pipeline_public.yml  —  HypatiaX pipeline (PUBLIC / SUBMISSION VERSION)
#
#  This file is a submission-stage-safe version of ci_pipeline.yml for use in
#  a public GitHub repository while the paper is under review.
#
#  WHAT WAS REMOVED vs. the full private pipeline:
#  ─────────────────────────────────────────────────
#  C4  ci_paper_audit.yml      — cross-experiment numerical verify + paper claim
#                                 audit. Contains paper-specific numerical claims
#                                 that should not be public before acceptance.
#  C5  ci_paper_notebooks.yml  — NB-01…NB-06 notebook audit chain. Encodes
#                                 internal paper claim assertions. Mandatory gate
#                                 in the private pipeline; omitted here.
#  C5c ci_runner_disclosure.yml— FIX-C3 split-protocol gates A/B/C. Reveals
#                                 unpublished methodological design choices.
#  C5b ci_report.yml           — Builds and deploys the combined audit report to
#                                 GitHub Pages. Publishing an audit report of a
#                                 paper under review is inappropriate.
#
#  WHAT IS KEPT (standard reproducibility infrastructure):
#  ────────────────────────────────────────────────────────
#  resolve     — parses slot index input
#  diagnose    — reads repo state (read-only, no paper logic)
#  C0  ci_runner.yml           — experiment workers (sharded)
#  C1  ci_analysis.yml         — statistical analysis / reports
#  C2  ci_postprocess.yml      — figures + tables
#  C3  ci_pipeline_check.yml   — qualification + completeness gate
#  C6  self-dispatch            — advance to next experiment slot
#
#  After paper acceptance, restore the full ci_pipeline.yml which re-enables
#  C4, C5, C5b, C5c, and the GitHub Pages report deployment.
#
# ──────────────────────────────────────────────────────────────────────────────
#  SECRETS — WHAT USERS MUST CONFIGURE
# ──────────────────────────────────────────────────────────────────────────────
#
#  This pipeline uses ONE repository secret:
#
#    PAT_TOKEN
#    ─────────
#    A GitHub Personal Access Token (classic) with the following scopes:
#      • repo          — full repository access (read + write + dispatch)
#      • workflow      — trigger and inspect workflow runs via the gh CLI
#
#    WHY a PAT instead of the built-in GITHUB_TOKEN?
#    The built-in GITHUB_TOKEN cannot trigger workflow_dispatch events on OTHER
#    workflows in the same repository (GitHub security restriction). This
#    pipeline dispatches ci_runner.yml, ci_analysis.yml, ci_postprocess.yml, and
#    ci_pipeline_check.yml from inside a running workflow, so a PAT is required.
#
#    HOW TO CREATE AND REGISTER IT:
#    1. Go to https://github.com/settings/tokens → "Generate new token (classic)"
#    2. Select scopes: [✓] repo   [✓] workflow
#    3. Set expiration to at least the duration of your review period (e.g. 90 days).
#    4. Copy the generated token (it is shown only once).
#    5. In your repository: Settings → Secrets and variables → Actions
#       → "New repository secret"
#       Name:  PAT_TOKEN
#       Value: <paste the token>
#    6. Click "Add secret".
#
#    TOKEN SCOPE ADVICE FOR PUBLIC REPOS:
#    • Do NOT grant admin:org, delete_repo, or any scope beyond repo + workflow.
#    • If your repo is a fork or organisation repo, use a token from an account
#      that has write access to the target repository only.
#    • Rotate the token after the paper is accepted and the full pipeline is
#      restored, or immediately if you suspect it has been exposed.
#    • Never hard-code the token in any workflow file or script. Always reference
#      it as ${{ secrets.PAT_TOKEN }}.
#
#    WHAT GITHUB_TOKEN IS STILL USED FOR:
#    The built-in ${{ secrets.GITHUB_TOKEN }} is used only for the repo checkout
#    step in the diagnose job (read-only). No special configuration needed for it.
#
# ──────────────────────────────────────────────────────────────────────────────
#  Pipeline stages (submission version):
#    C0 → ci_runner.yml           — experiment workers (sharded)
#    C1 → ci_analysis.yml         — statistical analysis / reports
#    C2 → ci_postprocess.yml      — figures + tables
#    C3 → ci_pipeline_check.yml   — qualification + completeness gate
#    C6 → self-dispatch            — next experiment slot
#
#  Manual modes (experiment_index suffix):
#    N    — full pipeline for slot N  (C0 → C1 → C2 → C3)
#    Na   — analysis only for slot N  (C1 only)
#    Nf   — figures+tables only       (C2 only)
#    Nc   — checkpoint/audit only     (C3 only)
#    Np   — postprocess+checkpoint    (C2 → C3, skip C0+C1)
# ==============================================================================

name: "HypatiaX - pipeline (public)"
run-name: >-
  HypatiaX pipeline —
  ${{ github.event.inputs.experiment_index || '0' }}

on:
  workflow_dispatch:
    inputs:
      experiment_index:
        description: >
          Slot index (N) or phase suffix (Na / Nf / Nc / Np).
          E.g. "0" = full pipeline for slot 0;
               "0a" = analysis-only;  "0f" = figures+tables only;
               "0c" = checkpoint/audit only;
               "0p" = postprocess+checkpoint (C2+C3, skip C0+C1).
        required: false
        default: "0"

      n_shards:
        description: "Parallel worker shards for ci_runner.yml (1-4)"
        required: false
        default: "1"

      seeds:
        description: "Comma-separated seeds (overrides per-experiment default)"
        required: false
        default: ""

      n_samples:
        description: "Samples per equation (Feynman / suppB)"
        required: false
        default: "200"

      noise_levels:
        description: "Noise levels for suppB"
        required: false
        default: "0.0,0.05,0.1,0.5,1.0"

      dry_run:
        description: "Dry-run — print commands without executing (true/false)"
        required: false
        default: "false"

      fail_on_incomplete:
        description: "Fail pipeline if checkpoint finds missing tasks (true/false)"
        required: false
        default: "false"

      force_rerun:
        description: >
          Skip the already-done guard and re-run all stages even if they
          completed successfully in a prior run (true/false).
        required: false
        default: "false"

permissions:
  contents: write
  actions:  write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:

  # ============================================================================
  #  JOB: resolve — determine experiment ID and phase from experiment_index input
  # ============================================================================
  resolve:
    name: "Resolve experiment slot"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      experiment:      ${{ steps.parse.outputs.experiment }}
      phase:           ${{ steps.parse.outputs.phase }}
      slot:            ${{ steps.parse.outputs.slot }}
      run_full:        ${{ steps.parse.outputs.run_full }}
      run_analysis:    ${{ steps.parse.outputs.run_analysis }}
      run_postprocess: ${{ steps.parse.outputs.run_postprocess }}
      run_checkpoint:  ${{ steps.parse.outputs.run_checkpoint }}
      started_at:      ${{ steps.parse.outputs.started_at }}

    steps:
      - name: Parse experiment index and phase
        id: parse
        env:
          INDEX_RAW:    ${{ github.event.inputs.experiment_index || '0' }}
          FORCE_RERUN:  ${{ github.event.inputs.force_rerun || 'false' }}
        run: |
          python3 - <<'PYEOF'
          import os, re, sys
          from datetime import datetime, timezone

          QUEUE = [
              "exp1",
              "exp1b",
              "exp2_feynman",
              "exp2_feynman_pca",
              "exp2_feynman_extrap",
              "exp2",
              "exp3",
              "exp3b",
              "suppA",
              "suppB",
              "suppB_sc",
              "hybrid_all_domains",
              "instability",
              "extrap",
          ]

          raw = os.environ["INDEX_RAW"].strip()

          m = re.fullmatch(r"(\d+)([afcp]?)", raw)
          if not m:
              print(f"ERROR: cannot parse experiment_index '{raw}' — expected N, Na, Nf, Nc, or Np")
              sys.exit(1)

          slot   = int(m.group(1))
          suffix = m.group(2)

          if slot >= len(QUEUE):
              print(f"ERROR: slot {slot} out of range (queue has {len(QUEUE)} entries)")
              sys.exit(1)

          experiment = QUEUE[slot]

          run_full        = suffix == ""
          run_analysis    = suffix in ("", "a")
          run_postprocess = suffix in ("", "f", "p")
          run_checkpoint  = suffix in ("", "c", "p")

          started_at = datetime.now(timezone.utc).strftime("%Y-%m-%dT%H:%M:%SZ")

          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as fh:
              fh.write(f"experiment={experiment}\n")
              fh.write(f"phase={'full' if run_full else suffix}\n")
              fh.write(f"slot={slot}\n")
              fh.write(f"run_full={'true' if run_full else 'false'}\n")
              fh.write(f"run_analysis={'true' if run_analysis else 'false'}\n")
              fh.write(f"run_postprocess={'true' if run_postprocess else 'false'}\n")
              fh.write(f"run_checkpoint={'true' if run_checkpoint else 'false'}\n")
              fh.write(f"started_at={started_at}\n")

          print(f"Resolved: slot={slot}  experiment={experiment}  phase={suffix or 'full'}")
          print(f"  run_full={run_full}  run_analysis={run_analysis}")
          print(f"  run_postprocess={run_postprocess}  run_checkpoint={run_checkpoint}")
          print(f"  started_at={started_at}")
          PYEOF

  # ============================================================================
  #  JOB: diagnose  —  C0-pre: inspect repo state before running anything
  # ============================================================================
  diagnose:
    name: "Diagnose repo state (${{ needs.resolve.outputs.experiment }})"
    needs: resolve
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      runner_state:      ${{ steps.diagnose.outputs.runner_state }}
      analysis_state:    ${{ steps.diagnose.outputs.analysis_state }}
      postprocess_state: ${{ steps.diagnose.outputs.postprocess_state }}
      diagnosis_report:  ${{ steps.diagnose.outputs.diagnosis_report }}
      skip_runner:       ${{ steps.diagnose.outputs.skip_runner }}
      rerun_analysis:    ${{ steps.diagnose.outputs.rerun_analysis }}
      result_subdir:     ${{ steps.diagnose.outputs.result_subdir }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # built-in token — read-only checkout, no PAT needed
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"

      - name: Inspect repository state
        id: diagnose
        env:
          EXP:          ${{ needs.resolve.outputs.experiment }}
          PHASE:        ${{ needs.resolve.outputs.phase }}
          FORCE_RERUN:  ${{ github.event.inputs.force_rerun || 'false' }}
          SEEDS:        ${{ github.event.inputs.seeds || '42,99,123,777,2024' }}
          NOISE_LEVELS: ${{ github.event.inputs.noise_levels || '0.0,0.05,0.1,0.5,1.0' }}
          OUT_BASE:     hypatiax/data/results
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, sys
          from pathlib import Path

          EXP          = os.environ["EXP"]
          PHASE        = os.environ["PHASE"]
          FORCE_RERUN  = os.environ["FORCE_RERUN"].lower() == "true"
          OUT_BASE     = Path(os.environ["OUT_BASE"])
          SEEDS        = [s.strip() for s in os.environ["SEEDS"].split(",") if s.strip()]
          NOISE_LEVELS = [l.strip() for l in os.environ["NOISE_LEVELS"].split(",") if l.strip()]

          SEP = "=" * 70

          SUBDIR = {
              "exp1":               "comparison_results/noise-noiseless/noiseless/defi",
              "exp1b":              "comparison_results/noise-noiseless/15",
              "exp1_ablation":      "ablation/exp1_ablation",
              "exp2_feynman":       "comparison_results/feynman-tests/exp2",
              "exp2_feynman_pca":   "comparison_results/feynman-tests/exp2_pca_4060",
              "exp2_feynman_extrap":"comparison_results/feynman-tests/exp2_extrap",
              "exp2":               "comparison_results/feynman-tests/exp2_multi",
              "exp3":               "extrapolation",
              "exp3b":              "extrapolation/multi_seed",
              "suppA":              "hybrid_pysr/defi",
              "suppB":              "comparison_results/feynman-tests/noise-sweep/noise-sweep",
              "suppB_sc":           "comparison_results/feynman-tests/sample-complexity",
              "hybrid_all_domains": "hybrid_llm_nn/all_domains",
              "instability":        "figures",
              "extrap":             "comparison_results/extrapolation",
          }

          def find_result_files(exp_id):
              subdir = OUT_BASE / SUBDIR.get(exp_id, exp_id)
              if not subdir.exists():
                  return []
              return list(subdir.rglob("*.json")) + list(subdir.rglob("*.csv"))

          def json_valid(path):
              try:
                  json.loads(path.read_text())
                  return True
              except Exception:
                  return False

          def is_git_tracked(path):
              r = subprocess.run(["git", "ls-files", "--error-unmatch", str(path)],
                                 capture_output=True)
              return r.returncode == 0

          def check_analysis_outputs(exp_id):
              subdir = OUT_BASE / SUBDIR.get(exp_id, exp_id)
              report = list(subdir.rglob("*_report.md")) if subdir.exists() else []
              analysis = list(subdir.rglob("*_analysis.json")) if subdir.exists() else []
              present = bool(report and analysis)
              valid = True
              if analysis:
                  try:
                      data = json.loads(analysis[0].read_text())
                      valid = isinstance(data, dict) and len(data) > 0
                  except Exception:
                      valid = False
              return present, valid

          def check_postprocess_outputs(exp_id):
              subdir = OUT_BASE / SUBDIR.get(exp_id, exp_id)
              figs = list(subdir.rglob("*.png")) + list(subdir.rglob("*.pdf")) if subdir.exists() else []
              tabs = list(subdir.rglob("*.tex")) + list(subdir.rglob("*_table*")) if subdir.exists() else []
              return figs, tabs

          MIN_TASKS = {
              "exp1": 1, "exp1b": 5, "exp2_feynman": 10, "exp2_feynman_pca": 5,
              "exp2_feynman_extrap": 5, "exp2": 5, "exp3": 5, "exp3b": 5,
              "suppA": 1, "suppB": 5, "suppB_sc": 5, "hybrid_all_domains": 1,
              "instability": 1, "extrap": 5,
          }

          def classify_runner(exp_id):
              files = find_result_files(exp_id)
              min_t = MIN_TASKS.get(exp_id, 1)
              if not files:
                  return "missing", {"result_files": 0, "min_tasks": min_t, "reason": "no result files found"}
              json_files = [f for f in files if f.suffix == ".json"]
              first_valid = json_valid(json_files[0]) if json_files else True
              tracked = is_git_tracked(files[0])
              n = len(files)
              if n >= min_t and first_valid and tracked:
                  return "done", {"result_files": n, "min_tasks": min_t, "json_valid": first_valid, "git_tracked": tracked}
              elif n > 0 and not tracked:
                  return "partial", {"result_files": n, "min_tasks": min_t, "reason": "files exist but not git-tracked"}
              elif n > 0 and n < min_t:
                  return "partial", {"result_files": n, "min_tasks": min_t, "reason": f"only {n}/{min_t} expected result files"}
              elif not first_valid:
                  return "partial", {"result_files": n, "reason": "result JSON is not valid JSON"}
              return "done", {"result_files": n, "min_tasks": min_t}

          def classify_analysis(exp_id):
              present, valid = check_analysis_outputs(exp_id)
              if not present:
                  return "missing", {"reason": "_report.md or _analysis.json not found"}
              if not valid:
                  return "partial", {"reason": "_analysis.json exists but missing required keys"}
              return "done", {"_report.md": True, "_analysis.json": True}

          def classify_postprocess(exp_id):
              figs, tabs = check_postprocess_outputs(exp_id)
              if not figs and not tabs:
                  return "missing", {"reason": "no figures and no tables found"}
              if not figs:
                  return "partial", {"reason": "tables present but no figures"}
              if not tabs:
                  return "partial", {"reason": "figures present but no tables"}
              return "done", {"figures": True, "tables": True}

          print(f"\n{SEP}")
          print(f"  HypatiaX Self-Diagnosis — {EXP}  (phase={PHASE})")
          print(SEP)

          if FORCE_RERUN:
              print("  force_rerun=true — all stages will re-run regardless of repo state.")
              runner_state = analysis_state = postprocess_state = "missing"
              runner_detail = analysis_detail = postprocess_detail = {"forced": True}
          else:
              runner_state,      runner_detail      = classify_runner(EXP)
              analysis_state,    analysis_detail     = classify_analysis(EXP)
              postprocess_state, postprocess_detail  = classify_postprocess(EXP)

          rerun_analysis = (runner_state != "done" and analysis_state == "done" and not FORCE_RERUN)
          skip_runner    = runner_state == "done" and not FORCE_RERUN

          def state_icon(s):
              return {"done": "✅ done", "partial": "⚠  partial", "missing": "❌ missing"}.get(s, s)

          rows = [
              ("C0 runner",      runner_state,      runner_detail),
              ("C1 analysis",    analysis_state,    analysis_detail),
              ("C2 postprocess", postprocess_state, postprocess_detail),
          ]
          print()
          print(f"  {'Stage':<20}  {'State':<14}  Detail")
          print(f"  {'-'*20}  {'-'*14}  {'-'*30}")
          for label, state, detail in rows:
              print(f"  {label:<20}  {state_icon(state):<14}  {json.dumps(detail)}")

          report = {
              "experiment": EXP, "phase": PHASE, "force_rerun": FORCE_RERUN,
              "runner":      {"state": runner_state,      "detail": runner_detail},
              "analysis":    {"state": analysis_state,    "detail": analysis_detail},
              "postprocess": {"state": postprocess_state, "detail": postprocess_detail},
              "skip_runner": skip_runner, "rerun_analysis": rerun_analysis,
          }

          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as fh:
              fh.write(f"runner_state={runner_state}\n")
              fh.write(f"analysis_state={analysis_state}\n")
              fh.write(f"postprocess_state={postprocess_state}\n")
              fh.write(f"skip_runner={'true' if skip_runner else 'false'}\n")
              fh.write(f"rerun_analysis={'true' if rerun_analysis else 'false'}\n")
              fh.write(f"diagnosis_report={json.dumps(report)}\n")
              fh.write(f"result_subdir={SUBDIR.get(EXP, EXP)}\n")
          PYEOF

  # ============================================================================
  #  JOB: run-experiment  —  C0: dispatch ci_runner.yml and wait
  #
  #  REQUIRES SECRET: PAT_TOKEN (repo + workflow scopes)
  #  See the secrets guidance at the top of this file.
  # ============================================================================
  run-experiment:
    name: "C0 · Runner (${{ needs.resolve.outputs.experiment }})"
    needs: [resolve, diagnose]
    runs-on: ubuntu-latest
    timeout-minutes: 400
    if: |
      needs.resolve.outputs.run_full == 'true' &&
      needs.diagnose.outputs.skip_runner != 'true'

    outputs:
      runner_run_id: ${{ steps.dispatch_runner.outputs.runner_run_id }}

    steps:
      - name: Check if ci_runner.yml already completed for this experiment
        id: check_runner
        env:
          GH_TOKEN:     ${{ secrets.PAT_TOKEN }}
          EXP:          ${{ needs.resolve.outputs.experiment }}
          STARTED_AT:   ${{ needs.resolve.outputs.started_at }}
          FORCE_RERUN:  ${{ github.event.inputs.force_rerun || 'false' }}
          REPO:         ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ "${FORCE_RERUN}" == "true" ]]; then
            echo "already_done=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          PRIOR=$(gh run list \
            --repo "${REPO}" --workflow ci_runner.yml --status success \
            --limit 20 --json databaseId,displayTitle,createdAt,headBranch \
            --jq --arg exp "${EXP}" --arg branch "${{ github.ref_name }}" --arg ts "${STARTED_AT}" \
              '[.[] | select(.headBranch == $branch and .createdAt >= $ts and (.displayTitle | test($exp; "i")))] | first // empty' \
            2>/dev/null || echo "")
          if [[ -z "$PRIOR" ]]; then
            echo "No prior successful run found — proceeding with dispatch."
            echo "already_done=false" >> "$GITHUB_OUTPUT"
          else
            PRIOR_ID=$(echo "$PRIOR" | python3 -c "import json,sys; print(json.load(sys.stdin)['databaseId'])" 2>/dev/null || echo "unknown")
            echo "::notice::ci_runner.yml already completed for '${EXP}' (run ${PRIOR_ID})."
            echo "already_done=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch and wait for ci_runner.yml
        if: steps.check_runner.outputs.already_done != 'true'
        id: dispatch_runner
        env:
          GH_TOKEN:  ${{ secrets.PAT_TOKEN }}
          EXP:       ${{ needs.resolve.outputs.experiment }}
          N_SHARDS:  ${{ github.event.inputs.n_shards || '1' }}
          SEEDS:     ${{ github.event.inputs.seeds || '' }}
          SAMPLES:   ${{ github.event.inputs.n_samples || '200' }}
          NOISE:     ${{ github.event.inputs.noise_levels || '0.0,0.5,1.0,5.0,10.0' }}
          DRY_RUN:   ${{ github.event.inputs.dry_run || 'false' }}
          REPO:      ${{ github.repository }}
        run: |
          set -euo pipefail
          BEFORE_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "Dispatching ci_runner.yml for experiment=${EXP} at ${BEFORE_TS}"
          gh workflow run ci_runner.yml \
            --repo "${REPO}" --ref "${{ github.ref_name }}" \
            --field experiment="${EXP}" --field n_shards="${N_SHARDS}" \
            --field seeds="${SEEDS}" --field n_samples="${SAMPLES}" \
            --field noise_levels="${NOISE}" --field dry_run="${DRY_RUN}"
          sleep 8
          DISPATCHED_ID=""
          SLEEP=5
          for attempt in $(seq 1 14); do
            DISPATCHED_ID=$(gh run list \
              --repo "${REPO}" --workflow ci_runner.yml --event workflow_dispatch \
              --limit 10 --json databaseId,createdAt,headBranch,displayTitle \
              --jq --arg ts "${BEFORE_TS}" --arg branch "${{ github.ref_name }}" \
                '[.[] | select(.headBranch == $branch and .createdAt >= $ts)] | first | .databaseId // empty' \
              2>/dev/null || echo "")
            [[ -n "${DISPATCHED_ID}" ]] && break
            echo "  Attempt ${attempt}/14: run not yet visible — waiting ${SLEEP}s..."
            sleep ${SLEEP}
            SLEEP=$(( SLEEP < 30 ? SLEEP + 5 : 30 ))
          done
          if [[ -z "${DISPATCHED_ID}" ]]; then
            echo "::error::Could not determine dispatched run ID after extended polling. Aborting."; exit 1
          fi
          echo "Polling run ${DISPATCHED_ID} (ci_runner.yml) ..."
          DEADLINE=$(( $(date +%s) + 22800 ))
          SLEEP=30
          while true; do
            RUN_JSON=$(gh run view "${DISPATCHED_ID}" --repo "${REPO}" --json status,conclusion 2>/dev/null \
              || echo '{"status":"unknown","conclusion":"none"}')
            READ_STATUS=$(echo "${RUN_JSON}" | python3 -c "import json,sys; print(json.load(sys.stdin)['status'])")
            CONCLUSION=$(echo "${RUN_JSON}"  | python3 -c "import json,sys; print(json.load(sys.stdin).get('conclusion') or 'none')")
            echo "  [$(date -u +%H:%M:%SZ)] runner run=${DISPATCHED_ID} status=${READ_STATUS} conclusion=${CONCLUSION}"
            if [[ "${READ_STATUS}" == "completed" ]]; then
              [[ "${CONCLUSION}" != "success" ]] && {
                echo "::error::ci_runner.yml run ${DISPATCHED_ID} failed: ${CONCLUSION}"; exit 1; }
              echo "ci_runner.yml completed successfully (run ${DISPATCHED_ID})."
              echo "runner_run_id=${DISPATCHED_ID}" >> "$GITHUB_OUTPUT"
              break
            fi
            [[ $(date +%s) -ge ${DEADLINE} ]] && {
              echo "::error::Timed out after 380 min waiting for ci_runner.yml."; exit 1; }
            sleep ${SLEEP}
            SLEEP=$(( SLEEP < 120 ? SLEEP + 10 : 120 ))
          done

  # ============================================================================
  #  JOB: run-analysis  —  C1: dispatch ci_analysis.yml and wait
  #
  #  REQUIRES SECRET: PAT_TOKEN (repo + workflow scopes)
  # ============================================================================
  run-analysis:
    name: "C1 · Analysis (${{ needs.resolve.outputs.experiment }})"
    needs: [resolve, diagnose, run-experiment]
    runs-on: ubuntu-latest
    timeout-minutes: 35
    if: |
      always() &&
      needs.resolve.outputs.run_analysis == 'true' &&
      (needs.run-experiment.result == 'success' || needs.run-experiment.result == 'skipped') &&
      (
        needs.diagnose.outputs.analysis_state != 'done' ||
        needs.diagnose.outputs.rerun_analysis == 'true'
      )

    steps:
      - name: Check if ci_analysis.yml already completed for this experiment
        id: check_analysis
        env:
          GH_TOKEN:     ${{ secrets.PAT_TOKEN }}
          EXP:          ${{ needs.resolve.outputs.experiment }}
          STARTED_AT:   ${{ needs.resolve.outputs.started_at }}
          FORCE_RERUN:  ${{ github.event.inputs.force_rerun || 'false' }}
          REPO:         ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ "${FORCE_RERUN}" == "true" ]]; then
            echo "already_done=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          PRIOR=$(gh run list \
            --repo "${REPO}" --workflow ci_analysis.yml --status success \
            --limit 20 --json databaseId,displayTitle,createdAt,headBranch \
            --jq --arg exp "${EXP}" --arg branch "${{ github.ref_name }}" --arg ts "${STARTED_AT}" \
              '[.[] | select(.headBranch == $branch and .createdAt >= $ts and (.displayTitle | test($exp; "i")))] | first // empty' \
            2>/dev/null || echo "")
          if [[ -z "$PRIOR" ]]; then
            echo "already_done=false" >> "$GITHUB_OUTPUT"
          else
            PRIOR_ID=$(echo "$PRIOR" | python3 -c "import json,sys; print(json.load(sys.stdin)['databaseId'])" 2>/dev/null || echo "?")
            echo "::notice::ci_analysis.yml already succeeded for '${EXP}' (run ${PRIOR_ID}). Skipping."
            echo "already_done=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch and wait for ci_analysis.yml
        if: steps.check_analysis.outputs.already_done != 'true'
        env:
          GH_TOKEN:      ${{ secrets.PAT_TOKEN }}
          EXP:           ${{ needs.resolve.outputs.experiment }}
          SOURCE_RUN_ID: ${{ needs.run-experiment.outputs.runner_run_id || '' }}
          RESULT_SUBDIR: ${{ needs.diagnose.outputs.result_subdir }}
          REPO:          ${{ github.repository }}
        run: |
          set -euo pipefail
          BEFORE_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "Dispatching ci_analysis.yml for experiment=${EXP}"
          gh workflow run ci_analysis.yml \
            --repo "${REPO}" --ref "${{ github.ref_name }}" \
            --field experiment="${EXP}" \
            --field source_run_id="${SOURCE_RUN_ID}" \
            --field result_subdir="${RESULT_SUBDIR}"
          sleep 8
          DISPATCHED_ID=""
          SLEEP=5
          for attempt in $(seq 1 14); do
            DISPATCHED_ID=$(gh run list \
              --repo "${REPO}" --workflow ci_analysis.yml --event workflow_dispatch \
              --limit 10 --json databaseId,createdAt,headBranch,displayTitle \
              --jq --arg ts "${BEFORE_TS}" --arg branch "${{ github.ref_name }}" \
                '[.[] | select(.headBranch == $branch and .createdAt >= $ts)] | first | .databaseId // empty' \
              2>/dev/null || echo "")
            [[ -n "${DISPATCHED_ID}" ]] && break
            echo "  Attempt ${attempt}/14: run not yet visible — waiting ${SLEEP}s..."
            sleep ${SLEEP}
            SLEEP=$(( SLEEP < 30 ? SLEEP + 5 : 30 ))
          done
          [[ -z "${DISPATCHED_ID}" ]] && { echo "::error::No run ID found after extended polling."; exit 1; }
          echo "Polling run ${DISPATCHED_ID} (ci_analysis.yml) ..."
          DEADLINE=$(( $(date +%s) + 1800 ))
          SLEEP=20
          while true; do
            RUN_JSON=$(gh run view "${DISPATCHED_ID}" --repo "${REPO}" --json status,conclusion 2>/dev/null \
              || echo '{"status":"unknown","conclusion":"none"}')
            READ_STATUS=$(echo "${RUN_JSON}" | python3 -c "import json,sys; print(json.load(sys.stdin)['status'])")
            CONCLUSION=$(echo "${RUN_JSON}"  | python3 -c "import json,sys; print(json.load(sys.stdin).get('conclusion') or 'none')")
            echo "  [$(date -u +%H:%M:%SZ)] analysis run=${DISPATCHED_ID} status=${READ_STATUS} conclusion=${CONCLUSION}"
            if [[ "${READ_STATUS}" == "completed" ]]; then
              [[ "${CONCLUSION}" != "success" ]] && {
                echo "::error::ci_analysis.yml run ${DISPATCHED_ID} failed: ${CONCLUSION}"; exit 1; }
              echo "ci_analysis.yml completed successfully."; break
            fi
            [[ $(date +%s) -ge ${DEADLINE} ]] && {
              echo "::error::Timed out waiting for ci_analysis.yml."; exit 1; }
            sleep ${SLEEP}
          done

  # ============================================================================
  #  JOB: run-postprocess  —  C2: dispatch ci_postprocess.yml and wait
  #
  #  REQUIRES SECRET: PAT_TOKEN (repo + workflow scopes)
  # ============================================================================
  run-postprocess:
    name: "C2 · Postprocess (${{ needs.resolve.outputs.experiment }})"
    needs: [resolve, diagnose, run-analysis]
    runs-on: ubuntu-latest
    timeout-minutes: 35
    if: |
      always() &&
      needs.resolve.outputs.run_postprocess == 'true' &&
      (needs.run-analysis.result == 'success' || needs.run-analysis.result == 'skipped') &&
      needs.diagnose.outputs.postprocess_state != 'done'

    steps:
      - name: Check if ci_postprocess.yml already completed for this experiment
        id: check_postprocess
        env:
          GH_TOKEN:     ${{ secrets.PAT_TOKEN }}
          EXP:          ${{ needs.resolve.outputs.experiment }}
          FORCE_RERUN:  ${{ github.event.inputs.force_rerun || 'false' }}
          REPO:         ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ "${FORCE_RERUN}" == "true" ]]; then
            echo "already_done=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          PRIOR=$(gh run list \
            --repo "${REPO}" --workflow ci_postprocess.yml --status success \
            --limit 20 --json databaseId,displayTitle,createdAt,headBranch \
            --jq --arg exp "${EXP}" --arg branch "${{ github.ref_name }}" \
              '[.[] | select(.headBranch == $branch and (.displayTitle | test($exp; "i")))] | first // empty' \
            2>/dev/null || echo "")
          if [[ -z "$PRIOR" ]]; then
            echo "already_done=false" >> "$GITHUB_OUTPUT"
          else
            PRIOR_ID=$(echo "$PRIOR" | python3 -c "import json,sys; print(json.load(sys.stdin)['databaseId'])" 2>/dev/null || echo "?")
            echo "::notice::ci_postprocess.yml already succeeded for '${EXP}' (run ${PRIOR_ID}). Skipping."
            echo "already_done=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch and wait for ci_postprocess.yml
        if: steps.check_postprocess.outputs.already_done != 'true'
        env:
          GH_TOKEN:      ${{ secrets.PAT_TOKEN }}
          EXP:           ${{ needs.resolve.outputs.experiment }}
          RESULT_SUBDIR: ${{ needs.diagnose.outputs.result_subdir }}
          REPO:          ${{ github.repository }}
        run: |
          set -euo pipefail
          BEFORE_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "Dispatching ci_postprocess.yml for experiment=${EXP}"
          gh workflow run ci_postprocess.yml \
            --repo "${REPO}" --ref "${{ github.ref_name }}" \
            --field experiment="${EXP}" \
            --field result_subdir="${RESULT_SUBDIR}"
          sleep 8
          DISPATCHED_ID=""
          SLEEP=5
          for attempt in $(seq 1 14); do
            DISPATCHED_ID=$(gh run list \
              --repo "${REPO}" --workflow ci_postprocess.yml --event workflow_dispatch \
              --limit 10 --json databaseId,createdAt,headBranch,displayTitle \
              --jq --arg ts "${BEFORE_TS}" --arg branch "${{ github.ref_name }}" \
                '[.[] | select(.headBranch == $branch and .createdAt >= $ts)] | first | .databaseId // empty' \
              2>/dev/null || echo "")
            [[ -n "${DISPATCHED_ID}" ]] && break
            echo "  Attempt ${attempt}/14: run not yet visible — waiting ${SLEEP}s..."
            sleep ${SLEEP}
            SLEEP=$(( SLEEP < 30 ? SLEEP + 5 : 30 ))
          done
          [[ -z "${DISPATCHED_ID}" ]] && { echo "::error::No run ID found after extended polling."; exit 1; }
          echo "Polling run ${DISPATCHED_ID} (ci_postprocess.yml) ..."
          DEADLINE=$(( $(date +%s) + 1800 ))
          SLEEP=20
          while true; do
            RUN_JSON=$(gh run view "${DISPATCHED_ID}" --repo "${REPO}" --json status,conclusion 2>/dev/null \
              || echo '{"status":"unknown","conclusion":"none"}')
            READ_STATUS=$(echo "${RUN_JSON}" | python3 -c "import json,sys; print(json.load(sys.stdin)['status'])")
            CONCLUSION=$(echo "${RUN_JSON}"  | python3 -c "import json,sys; print(json.load(sys.stdin).get('conclusion') or 'none')")
            echo "  [$(date -u +%H:%M:%SZ)] postprocess run=${DISPATCHED_ID} status=${READ_STATUS} conclusion=${CONCLUSION}"
            if [[ "${READ_STATUS}" == "completed" ]]; then
              [[ "${CONCLUSION}" != "success" ]] && {
                echo "::error::ci_postprocess.yml run ${DISPATCHED_ID} failed: ${CONCLUSION}"; exit 1; }
              echo "ci_postprocess.yml completed successfully."; break
            fi
            [[ $(date +%s) -ge ${DEADLINE} ]] && {
              echo "::error::Timed out waiting for ci_postprocess.yml."; exit 1; }
            sleep ${SLEEP}
          done

  # ============================================================================
  #  JOB: run-checkpoint  —  C3: qualification + completeness gate
  #
  #  REQUIRES SECRET: PAT_TOKEN (repo + workflow scopes)
  # ============================================================================
  run-checkpoint:
    name: "C3 · Checkpoint gate (${{ needs.resolve.outputs.experiment }})"
    needs: [resolve, diagnose, run-postprocess]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: |
      always() &&
      needs.resolve.outputs.run_checkpoint == 'true' &&
      (needs.run-postprocess.result == 'success' || needs.run-postprocess.result == 'skipped')

    steps:
      - name: Check if ci_pipeline_check.yml already passed for this experiment
        id: check_checkpoint
        env:
          GH_TOKEN:     ${{ secrets.PAT_TOKEN }}
          EXP:          ${{ needs.resolve.outputs.experiment }}
          FORCE_RERUN:  ${{ github.event.inputs.force_rerun || 'false' }}
          REPO:         ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ "${FORCE_RERUN}" == "true" ]]; then
            echo "already_done=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          PRIOR=$(gh run list \
            --repo "${REPO}" --workflow ci_pipeline_check.yml --status success \
            --limit 20 --json databaseId,displayTitle,createdAt,headBranch \
            --jq --arg exp "${EXP}" --arg branch "${{ github.ref_name }}" \
              '[.[] | select(.headBranch == $branch and (.displayTitle | test($exp; "i")))] | first // empty' \
            2>/dev/null || echo "")
          if [[ -z "$PRIOR" ]]; then
            echo "No prior passing checkpoint found — will run gate."
            echo "already_done=false" >> "$GITHUB_OUTPUT"
          else
            PRIOR_ID=$(echo "$PRIOR" | python3 -c "import json,sys; print(json.load(sys.stdin)['databaseId'])" 2>/dev/null || echo "?")
            echo "::notice::ci_pipeline_check.yml already passed for '${EXP}' (run ${PRIOR_ID}). Gate will re-run."
            echo "already_done=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch and wait for ci_pipeline_check.yml
        env:
          GH_TOKEN:           ${{ secrets.PAT_TOKEN }}
          EXP:                ${{ needs.resolve.outputs.experiment }}
          FAIL_ON_INCOMPLETE: ${{ github.event.inputs.fail_on_incomplete || 'false' }}
          SEEDS:              ${{ github.event.inputs.seeds || '42,99,123,777,2024' }}
          NOISE_LEVELS:       ${{ github.event.inputs.noise_levels || '0.0,0.5,1.0,5.0,10.0' }}
          REPO:               ${{ github.repository }}
        run: |
          set -euo pipefail
          BEFORE_TS=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          echo "Dispatching ci_pipeline_check.yml for experiment=${EXP}"
          gh workflow run ci_pipeline_check.yml \
            --repo "${REPO}" --ref "${{ github.ref_name }}" \
            --field experiment="${EXP}" \
            --field fail_on_incomplete="${FAIL_ON_INCOMPLETE}" \
            --field seeds="${SEEDS}" \
            --field noise_levels="${NOISE_LEVELS}"
          sleep 8
          DISPATCHED_ID=""
          SLEEP=5
          for attempt in $(seq 1 14); do
            DISPATCHED_ID=$(gh run list \
              --repo "${REPO}" --workflow ci_pipeline_check.yml --event workflow_dispatch \
              --limit 10 --json databaseId,createdAt,headBranch,displayTitle \
              --jq --arg ts "${BEFORE_TS}" --arg branch "${{ github.ref_name }}" \
                '[.[] | select(.headBranch == $branch and .createdAt >= $ts)] | first | .databaseId // empty' \
              2>/dev/null || echo "")
            [[ -n "${DISPATCHED_ID}" ]] && break
            echo "  Attempt ${attempt}/14: run not yet visible — waiting ${SLEEP}s..."
            sleep ${SLEEP}
            SLEEP=$(( SLEEP < 30 ? SLEEP + 5 : 30 ))
          done
          [[ -z "${DISPATCHED_ID}" ]] && { echo "::error::No run ID found after extended polling."; exit 1; }
          echo "Polling run ${DISPATCHED_ID} (ci_pipeline_check.yml) ..."
          DEADLINE=$(( $(date +%s) + 1200 ))
          SLEEP=15
          while true; do
            RUN_JSON=$(gh run view "${DISPATCHED_ID}" --repo "${REPO}" --json status,conclusion 2>/dev/null \
              || echo '{"status":"unknown","conclusion":"none"}')
            READ_STATUS=$(echo "${RUN_JSON}" | python3 -c "import json,sys; print(json.load(sys.stdin)['status'])")
            CONCLUSION=$(echo "${RUN_JSON}"  | python3 -c "import json,sys; print(json.load(sys.stdin).get('conclusion') or 'none')")
            echo "  [$(date -u +%H:%M:%SZ)] checkpoint run=${DISPATCHED_ID} status=${READ_STATUS} conclusion=${CONCLUSION}"
            if [[ "${READ_STATUS}" == "completed" ]]; then
              if [[ "${CONCLUSION}" != "success" ]]; then
                echo "::error::ci_pipeline_check.yml FAILED — pipeline halted."
                echo "  Fix the experiment then re-trigger ci_pipeline_public.yml."
                exit 1
              fi
              echo "ci_pipeline_check.yml passed — pipeline qualified (run ${DISPATCHED_ID})."; break
            fi
            [[ $(date +%s) -ge ${DEADLINE} ]] && {
              echo "::error::Timed out waiting for ci_pipeline_check.yml."; exit 1; }
            sleep ${SLEEP}
          done

  # ============================================================================
  #  JOB: next-slot  —  C6: self-dispatch next experiment in the queue
  #
  #  NOTE: In the public pipeline, next-slot depends only on run-checkpoint
  #  (C4/C5/C5b/C5c are removed). The slot 13 special-case waits are also
  #  removed since the paper-audit gate no longer exists.
  #
  #  REQUIRES SECRET: PAT_TOKEN (repo + workflow scopes)
  # ============================================================================
  next-slot:
    name: "C6 · Advance to next slot"
    needs: [resolve, run-checkpoint]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      always() &&
      needs.resolve.outputs.run_full == 'true' &&
      needs.run-checkpoint.result == 'success'

    steps:
      - name: Dispatch next pipeline slot
        env:
          GH_TOKEN:     ${{ secrets.PAT_TOKEN }}
          CURRENT_SLOT: ${{ needs.resolve.outputs.slot }}
          N_SHARDS:     ${{ github.event.inputs.n_shards || '1' }}
          SEEDS:        ${{ github.event.inputs.seeds || '' }}
          SAMPLES:      ${{ github.event.inputs.n_samples || '200' }}
          NOISE:        ${{ github.event.inputs.noise_levels || '0.0,0.5,1.0,5.0,10.0' }}
          REPO:         ${{ github.repository }}
        run: |
          set -euo pipefail
          NEXT_SLOT=$(( CURRENT_SLOT + 1 ))
          QUEUE_SIZE=14
          if [[ "${NEXT_SLOT}" -ge "${QUEUE_SIZE}" ]]; then
            echo "All ${QUEUE_SIZE} experiment slots completed — pipeline finished."
            exit 0
          fi
          echo "Dispatching ci_pipeline_public.yml for next slot=${NEXT_SLOT}"
          gh workflow run ci_pipeline_public.yml \
            --repo "${REPO}" \
            --ref "${{ github.ref_name }}" \
            --field experiment_index="${NEXT_SLOT}" \
            --field n_shards="${N_SHARDS}" \
            --field seeds="${SEEDS}" \
            --field n_samples="${SAMPLES}" \
            --field noise_levels="${NOISE}" \
            --field fail_on_incomplete="${{ github.event.inputs.fail_on_incomplete || 'false' }}" \
            --field dry_run="${{ github.event.inputs.dry_run || 'false' }}"
          echo "Self-dispatch succeeded — slot ${NEXT_SLOT} queued."

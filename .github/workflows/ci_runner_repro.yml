# ==============================================================================
#  ci_runner_repro.yml - HypatiaX unified experiment runner (repro variant)
#                               (was: ci_experiment.yml / ci_experiment_instability.yml)
#
#  Covers: exp1 . exp1b . exp2_feynman . exp2 . exp3 . exp3b
#          suppA . suppB . suppB_sc . extrap
#          hybrid_all_domains (STEP 4 - one-shot LLM+NN, 10 domains)
#          instability        (STEP 4a - Instability Index S10.9, run_instability_suite.py)
#          exp1_pca           (C5c-1 - DeFi all-74 with PCA 40/60 split)
#          exp1b_pca          (C5c-2 - DeFi portfolio seed sweep with PCA 40/60)
#          exp2_feynman_pca   (C5c-0 - Feynman PCA 40/60, was ci_runner_disclosure.yml)
#
#  PCA experiments (exp1_pca, exp1b_pca, exp2_feynman_pca):
#    Formerly in ci_runner_disclosure.yml (now removed from pipeline).
#    These experiments run via run_all.sh (matching all other experiments)
#    then validate via three integrity gates:
#      Gate A: split_protocol_test    — verifies pca_directed_split is applied
#      Gate B: protocol_parity_test   — verifies Feynman and DeFi use same split family
#      Gate C: baseline_lock_test     — locks pre-fix 9/30 baseline before any rerun
#    Gate jobs depend on all three run jobs and fire on every trigger (if: always()).
#
#  Architecture (fixes B1-B4 from shard_architecture_audit.svg):
#    plan  -> workers (matrix) -> upload-per-shard artifacts
#    B1 fixed: plan outputs are wired into worker env via needs.plan.outputs
#    B2 fixed: worker cache key includes shard index (${{ matrix.shard }})
#    B3 fixed: seed-on-miss filters by plan-computed pending IDs, not positional slice
#    B4 fixed: plan cache key includes run_id; restore-keys scoped by branch only
#
#  Hard deadline: 6 hours wall-clock.
#    - Each worker job has timeout-minutes: 330 (5 h 30 m).
#    - run_all.sh is invoked with JOB_DEADLINE=19800 (330 min ? 60 s).
#    - The plan job and consolidate job run in <10 min each, fitting the envelope.
#
#  Fixes backported from ci_exp2_hypatiax_v53_feynman_sh.yml (generic diffs only):
#    FIX-G1: ANTHROPIC_API_KEY validated via live round-trip (test_key_status.py)
#            before the 6-hour run starts; shell-level non-empty guard enforced
#            inside the run step so os.environ is populated before Python starts.
#    FIX-G2: config/repro.yaml read at worker startup; REPRO_CFG env var injected
#            so experiment scripts can load paper-quality hyperparameters at
#            runtime.  print_repro.py logged during env check for auditability.
#            FEYNMAN_TIMEOUT corrected to 1100 s (paper value from repro.yaml).
#    FIX-G4: Per-shard checkpoint seeded from committed master checkpoint on cache
#            miss, filtered to shard-assigned task IDs via jq.  Prevents full
#            re-runs when the Actions cache is evicted (7-day TTL).
#    FIX-G5: Safety-net extraction (if: always()) rescues computed results from
#            the per-shard checkpoint into RESULTS_DIR when the script crashes
#            after compute but before writing its final JSON/CSV outputs.
#    FIX-G6: Checkpoint stub {"_meta":{"stub":true}} written before cache save
#            so actions/cache/save never fails on a missing path.
#    FIX-G10: PYTHON_JULIACALL_HANDLE_SIGNALS=yes set before any juliacall import
#             so Julia segfaults produce traceable Python exceptions.
#             Julia upgraded to 1.11 via julia-actions/setup-julia@v2.
#
#  FIX applied in this revision:
#    FIX-TOY-EXP1: exp1 branch was a TOY stub that wrote a fake JSON then called
#                  "exit 1" to simulate a post-save crash.  With set -euo pipefail
#                  active in the run step, this unconditionally failed every exp1
#                  run (exit code 1, "Process completed with exit code 1").
#                  Fix: replaced TOY stub with the real run_all.sh --step exp1
#                  invocation (matching ci_experiment.yml), passing RESULTS_DIR as
#                  an absolute path so the script resolves outputs from workspace
#                  root regardless of any cd inside run_all.sh.
#
#  ── REPRO VARIANT (ci_runner_repro.yml) ──────────────────────────────────────
#  This file is a copy of ci_runner.yml for use with ci_pipeline_repro.yml
#  (numerical-results-only pipeline; no ci_analysis.yml / ci_postprocess.yml
#  downstream). NOTE ON SCOPE: ci_runner.yml itself has no dedicated
#  "generate figures" / "generate tables" STEPS — those live entirely in
#  ci_postprocess.yml (generate_figures.py / generate_tables.py), which this
#  repro pipeline never dispatches.
#  FIX NO-TABLES-FIGURES: two experiment scripts still write .tex/.png/.pdf as
#  raw side effects that this workflow doesn't control directly:
#    1. exp1_ablation.py writes exp1_ablation_table.tex, exp1_rf01_significant.tex,
#       and exp1_rf01_subdomain.tex alongside its JSON results.
#    2. run_instability_suite.py writes 46 .png/.pdf figure files as part of its
#       raw output.
#  These are now purged at the source in run_all.sh itself (see FIX
#  NO-TABLES-FIGURES there) immediately after each script runs, and this
#  workflow's "Commit and push shard results" step additionally deletes any
#  stray .tex/.png/.pdf under the shard's result dir as a backstop before
#  staging — so no table or figure artifact can reach the committed repo.
# ==============================================================================

name: "HypatiaX - runner (repro)"
run-name: "HypatiaX - runner (repro) · ${{ inputs.experiment }}"

# -- Triggers ------------------------------------------------------------------
on:
  workflow_dispatch:
    inputs:

      # -- Which experiment to run --------------------------------------------
      experiment:
        description: "Experiment ID (see run_all.sh --step)"
        required: true
        type: choice
        options:
          - exp1
          - exp1b
          - exp1_ablation
          - exp1_pca
          - exp1b_pca
          - exp2_feynman_pca
          - exp2_feynman
          - exp2_feynman_extrap
          - exp2
          - exp3
          - exp3b
          - suppA
          - suppB
          - suppB_sc
          - hybrid_all_domains
          - instability
          - extrap
        default: exp2_feynman

      # -- Sharding ----------------------------------------------------------
      n_shards:
        description: "Number of parallel worker shards (user input). exp1b: IGNORED — always forced to len(seeds) (one shard per seed; see the seeds input). exp1_ablation/exp3b: floored to 4 (table minimum). suppB: forced to 5 regardless of input (one shard per noise level — divmod(55,5)=11 tasks each, preserving one-noise-level-per-shard alignment required by run_all.sh STEP 10). suppB_sc: forced to 6 regardless of input (one shard per sample size — divmod(66,6)=11 tasks each). All other experiments: forced to 1 regardless of input. Input is accepted and logged but may be overridden by the per-experiment shard table."
        required: false
        default: "1"

      # -- Seeds / samples ---------------------------------------------------
      seeds:
        description: "Comma-separated seed list (e.g. 42,99,123,777,2024) - overrides per-experiment default"
        required: false
        default: ""

      n_samples:
        description: "Samples per equation (Feynman / suppB noise experiments)"
        required: false
        default: "200"

      # -- Noise levels (suppB) ----------------------------------------------
      noise_levels:
        description: "Comma-separated noise levels for suppB (e.g. 0.0,0.5,1.0,5.0,10.0)"
        required: false
        default: "0.0,0.5,1.0,5.0,10.0"

      # -- PySR hyperparameters -----------------------------------------------
      pysr_generations:
        description: "PySR generations (PYSR_GENERATIONS)"
        required: false
        default: "10000"

      pysr_populations:
        description: "PySR parallel populations (PYSR_POPULATIONS) — repro.yaml uses 30"
        required: false
        default: "30"

      # -- Task-ID override --------------------------------------------------
      task_ids_override:
        description: "Space-separated task IDs to run (blank = full experiment set)"
        required: false
        default: ""

      # -- Resume / dry-run -------------------------------------------------
      resume:
        description: "Resume from checkpoint - skip task IDs already recorded as done (true/false)"
        required: false
        default: "true"

      dry_run:
        description: "Dry-run - print commands without executing (true/false)"
        required: false
        default: "false"

      # -- Force clean rerun ---------------------------------------------------
      # FIX (Bug #2, §10.7 investigation, 2026-06-30): the skip-guard below
      # ("Check if exp2_feynman_pca results already exist") treats ANY .json
      # file present in exp2_pca_4060/ as "already done" and silently skips
      # the job. This previously made it impossible to regenerate a clean
      # exp2_pca_4060_summary.json after fixing the aggregation bug in
      # run_all.sh (method-name filter + cross-file double counting) without
      # a manual local `git rm`/`mv` of the output directory first. Setting
      # force_rerun=true clears stale exp2_pca_4060/*.json before the
      # skip-guard check, for exp2_feynman_pca runs specifically.
      force_rerun:
        description: "exp2_feynman_pca only: clear stale exp2_pca_4060/*.json before running, bypassing the already-done skip-guard (true/false). Use after pipeline/aggregation fixes to force a clean regeneration."
        required: false
        default: "false"

# FIX-RACE-CONCURRENT-RUNS: exp1b/exp1_ablation/exp3b/suppB/suppB_sc write to a
# fixed canonical path with no run-id scoping. Without a concurrency guard,
# two overlapping workflow_dispatch runs of the same experiment on the same
# branch can both check out, compute, and try to push to that same path —
# the second push's "git stash pop" then fails because its own result
# collides path-for-path with what the first run already committed
# (see "Commit and push shard results to repo" step below).
# Scoping the group by workflow+experiment+branch means a second dispatch of
# the same experiment queues behind the first instead of running in parallel.
# cancel-in-progress is false on purpose: these jobs can run up to 5h30m and
# cancelling an in-flight run to start a new one would waste that compute —
# queueing (wait) is strictly better than racing (silent data loss) or
# cancelling (wasted compute) here.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.inputs.experiment }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  actions:  write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  JOB_DEADLINE:        "19800"
  PYSR_GENERATIONS:    "${{ github.event.inputs.pysr_generations || '10000' }}"
  PYSR_POPULATION:     "100"
  PYSR_TOURNAMENT_SIZE: "3"
  PYSR_CROSSOVER:      "0.9"
  PYSR_MUTATION:       "0.1"
  PYSR_PARETO_PRESSURE: "0.001"
  PYSR_SEED:           "42"
  PYSR_POPULATIONS:    "${{ github.event.inputs.pysr_populations || '30' }}"  # repro.yaml pysr.populations
  FEYNMAN_SAMPLES:     "${{ github.event.inputs.n_samples || '200' }}"
  FEYNMAN_TIMEOUT:     "1100"  # repro.yaml timeouts.feynman_pysr_seconds
  METHOD_TIMEOUT:      "900"   # repro.yaml timeouts.method_seconds → --method-timeout (PySR methods 5/6)
  LLM_METHOD_TIMEOUT:  "120"   # tight timeout for LLM/NN-only runs (methods 1-4, no PySR)
  PYSR_FIT_WALL_TIMEOUT: "1200" # repro.yaml timeouts.fit_wall_timeout → DiscoveryConfig
  PYSR_FIT_GRACE_SECS: "120"   # repro.yaml timeouts.fit_grace_secs → DiscoveryConfig
  FEYNMAN_NOISELESS_THRESHOLD: "0.999999"  # matches run_noise_sweep_benchmark.py --threshold-noiseless default
  OUT_BASE:            "hypatiax/data/results"
  REPRO_CFG:           "${{ github.workspace }}/config/repro.yaml"
  PYTHON_JULIACALL_HANDLE_SIGNALS: "yes"
  JULIA_NUM_THREADS:   "4"
  JULIA_EXCLUSIVE:     "0"

# ==============================================================================
#  JOB 1 - plan
# ==============================================================================
jobs:

  # ============================================================================
  #  JOB 0 - pca_runner
  #
  #  Handles exp1_pca, exp1b_pca, exp2_feynman_pca — formerly in
  #  ci_runner_disclosure.yml (now removed from the pipeline).
  #
  #  For PCA experiments this job:
  #    1. Detects that a PCA experiment was dispatched (is_pca=true).
  #    2. Sets skip_plan=true so plan and worker jobs below are bypassed.
  #  The three pca_run_* jobs (further below) do the actual work; they gate
  #  on is_pca=true and run in parallel (exp1b_pca depends on exp1_pca).
  #
  #  For non-PCA experiments: is_pca=false; plan and worker run normally.
  # ============================================================================
  pca_runner:
    name: "PCA gate - ${{ github.event.inputs.experiment }}"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      is_pca:    ${{ steps.check.outputs.is_pca }}
      skip_plan: ${{ steps.check.outputs.skip_plan }}

    steps:
      - name: Detect PCA experiment
        id: check
        env:
          EXP: ${{ github.event.inputs.experiment }}
        run: |
          set -euo pipefail
          if [[ "$EXP" == "exp1_pca" || "$EXP" == "exp1b_pca" || "$EXP" == "exp2_feynman_pca" ]]; then
            echo "is_pca=true"    >> "$GITHUB_OUTPUT"
            echo "skip_plan=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${EXP} is a PCA experiment — pca_run_* jobs will handle it."
          else
            echo "is_pca=false"    >> "$GITHUB_OUTPUT"
            echo "skip_plan=false" >> "$GITHUB_OUTPUT"
            echo "${EXP} is a standard experiment — plan/worker will handle it."
          fi

  plan:
    name: "Plan - ${{ github.event.inputs.experiment }}"
    needs: pca_runner
    if: needs.pca_runner.outputs.skip_plan == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    outputs:
      shard_matrix:    ${{ steps.split.outputs.shard_matrix }}
      all_pending:     ${{ steps.split.outputs.all_pending }}
      n_shards:        ${{ steps.split.outputs.n_shards }}
      exp_id:          ${{ steps.meta.outputs.exp_id }}
      script_path:     ${{ steps.meta.outputs.script_path }}
      needs_julia:     ${{ steps.meta.outputs.needs_julia }}
      result_subdir:   ${{ steps.meta.outputs.result_subdir }}
      effective_seeds: ${{ steps.meta.outputs.effective_seeds }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: Restore shared checkpoint (plan)
        id: restore_plan
        uses: actions/cache/restore@v4.2.3
        with:
          path: checkpoint_plan.json
          key:  checkpoint-plan-${{ github.event.inputs.experiment }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            checkpoint-plan-${{ github.event.inputs.experiment }}-${{ github.ref_name }}-

      - name: Emit experiment metadata
        id: meta
        run: |
          EXP="${{ github.event.inputs.experiment }}"
          SEEDS_IN="${{ github.event.inputs.seeds }}"

          case "$EXP" in

            exp1)
              SCRIPT="hypatiax/experiments/benchmarks/hypatiax_defi_benchmark_v3c.py"
              NEEDS_JULIA=false
              RESULT_SUBDIR="comparison_results/noise-noiseless/noiseless/defi"
              DEFAULT_SEEDS="42"
              ;;

            exp1b)
              SCRIPT="hypatiax/experiments/benchmarks/hypatiax_defi_benchmark_v3c.py"
              NEEDS_JULIA=false
              RESULT_SUBDIR="comparison_results/noise-noiseless/15"
              DEFAULT_SEEDS="${SEEDS_IN:-42,99,123,777,2024}"
              ;;

            # -- STEP 2a: Core-15 ablation (§10.6) ------------------------------------
            # exp1_ablation.py benchmarks PySR-only vs HypatiaX on the Core-15 suite.
            # Primary output: exp1_ablation_results.json (the numerical result this
            # repro pipeline cares about).
            # Also writes (byproducts of the script itself, not this workflow —
            # unused/uncommitted in this repro variant): exp1_ablation_table.tex,
            #              exp1_rf01_mannwhitney.json, exp1_rf01_significant.tex,
            #              exp1_rf01_subdomain.tex, exp1_instability_stats.json,
            #              instability_extrapolation_v2.csv, provenance_map_exp1.json
            # RESULT_SUBDIR mirrors the path RESULTS_DIR is set to inside run_all.sh.
            exp1_ablation)
              SCRIPT="hypatiax/experiments/benchmarks/exp1_ablation.py"
              NEEDS_JULIA=false
              RESULT_SUBDIR="ablation/exp1_ablation"
              DEFAULT_SEEDS="42"
              ;;

            exp2_feynman)
              SCRIPT="hypatiax/experiments/benchmarks/run_comparative_suite_benchmark_v2.py"
              NEEDS_JULIA=true
              RESULT_SUBDIR="comparison_results/feynman-tests/exp2"
              DEFAULT_SEEDS="42"
              ;;

            # exp2_feynman_extrap: writes protocol_core_extrap_*.json into its
            # own feynman-tests/exp2_extrap dir (distinct from exp2_feynman's
            # feynman-tests/exp2).  Must run AFTER exp2_feynman (dep declared in catalogue).
            exp2_feynman_extrap)
              SCRIPT="hypatiax/experiments/benchmarks/run_comparative_suite_benchmark_v2.py"
              NEEDS_JULIA=true
              RESULT_SUBDIR="comparison_results/feynman-tests/exp2_extrap"
              DEFAULT_SEEDS="42"
              ;;

            exp2)
              SCRIPT="hypatiax/experiments/benchmarks/run_comparative_suite_benchmark_v2.py"
              NEEDS_JULIA=true
              RESULT_SUBDIR="comparison_results/feynman-tests/exp2_multi"
              DEFAULT_SEEDS="42"
              ;;

            exp3)
              SCRIPT="hypatiax/experiments/benchmarks/exp3_nguyen12_hybrid50v_02.py"
              NEEDS_JULIA=true
              RESULT_SUBDIR="extrapolation"
              DEFAULT_SEEDS="42"
              ;;

            # BUG 2 FIX: exp3b previously shared RESULT_SUBDIR="extrapolation" with exp3.
            # Both experiments write *_merged.json / *_stats.json to the same directory;
            # the consolidate job's git-add staged both simultaneously, causing exp3 results
            # to be overwritten when exp3b committed.  Distinct subdirectory prevents the
            # collision.  Update ci_consolidate_experiment.yml's case statement to match.
            exp3b)
              SCRIPT="hypatiax/experiments/benchmarks/exp3_nguyen12_hybrid50v_02.py"
              NEEDS_JULIA=true
              RESULT_SUBDIR="extrapolation/multi_seed"
              DEFAULT_SEEDS="${SEEDS_IN:-99,123,777,2024}"
              ;;

            suppA)
              SCRIPT="hypatiax/experiments/benchmarks/run_hybrid_system_benchmark.py"
              NEEDS_JULIA=true
              RESULT_SUBDIR="hybrid_pysr/defi"
              DEFAULT_SEEDS="42"
              ;;

            suppB)
              SCRIPT="hypatiax/experiments/benchmarks/run_noise_sweep_benchmark.py"
              # TASK-6 FIX: resolve NEEDS_JULIA at runtime by inspecting the script
              # rather than assuming false.  If juliacall/PySR is imported, the worker
              # must have Julia installed or methods 5/6 will crash silently with N/A.
              if grep -qE 'juliacall|import pysr|from pysr|PySR' "${{ github.workspace }}/${SCRIPT}" 2>/dev/null; then
                NEEDS_JULIA=true
                echo "::notice::suppB: detected juliacall/PySR import in ${SCRIPT} — NEEDS_JULIA set to true."
              else
                NEEDS_JULIA=false
                echo "suppB: no juliacall/PySR import detected in ${SCRIPT} — NEEDS_JULIA=false."
              fi
              # FIX-suppB-DOUBLED-PATH — CONFIRMED 2026-06-23 by reading
              # run_noise_sweep_benchmark.py's actual source directly (user
              # uploaded it):
              #   _RESULTS_DIR = _OUT_BASE / "comparison_results/feynman-tests/noise-sweep"   (line 106)
              # This is the ONLY suffix appended — single level, no further
              # nesting. The subprocess (run_comparative_suite_benchmark_v2.py)
              # receives this exact path via --output-dir and writes
              # protocol_core_*.json / noise_sweep_*.json directly into it
              # (its own _OUTPUT_DIR = Path(args.output_dir).resolve(), no
              # extra suffix). Checkpoints go to that script's separate
              # _FLAT_OUTPUT_DIR (bare comparison_results/ root, deliberately
              # NOT nested under noise-sweep at all — see that script's
              # _checkpoint_path()).
              #
              # So with OUT_BASE = plain results root (confirmed at job env
              # level: OUT_BASE: "hypatiax/data/results"), the script's real
              # output directory is the SINGLE-level path below. The doubled
              # ".../noise-sweep/noise-sweep" path observed on disk in a prior
              # run was traced to a DIFFERENT bug: the "Move results to
              # RESULTS_DIR" step does TARGET="${RESULTS_DIR}/${RESULT_SUBDIR}"
              # and then moves any matching files it finds under the workspace
              # into TARGET — if RESULT_SUBDIR is ever set to the doubled path
              # (as it was, mistakenly, in an earlier pass at this exact line),
              # that move step relocates the script's correctly-written
              # single-level output one level deeper, manufacturing the
              # doubled structure after the fact. The fix belongs HERE
              # (RESULT_SUBDIR must match the script's real single-level
              # output), not by accepting the doubled path as canonical.
              # ci_postprocess.yml's SUPPB_SUBDIR and ci_analysis.yml's
              # MAPPING entry for suppB must be corrected to match this same
              # single-level value — they currently still have the doubled
              # path and need the same fix.
              RESULT_SUBDIR="comparison_results/feynman-tests/noise-sweep"
              DEFAULT_SEEDS="42"
              ;;

            # -- STEP 4a: Instability Index S10.9 -------------------------------------
            # Runs run_instability_suite.py against K-run DeFi benchmark results.
            # Stage 1: reads hypatiax_defi_variance_results.json (or multi-run JSONs).
            # Stage 2: merges extrapolation R2 when benchmark JSON is present.
            # Stage 3: writes all 12 instability figures (Groups A-C + EX).
            # RESULT_SUBDIR=figures so shard artifacts contain the CSVs + pngs/pdfs.
            instability)
              SCRIPT="hypatiax/experiments/benchmarks/run_instability_suite.py"
              NEEDS_JULIA=false
              RESULT_SUBDIR="figures"
              DEFAULT_SEEDS="42"
              ;;

            # <- FIX CRITICAL 1: renamed from "instability"; RESULT_SUBDIR fixed (CRITICAL 3)
            hybrid_all_domains)
              SCRIPT="hypatiax/core/generation/hybrid_all_domains_llm_nn/hybrid_system_llm_nn_all_domains.py"
              NEEDS_JULIA=false
              RESULT_SUBDIR="hybrid_llm_nn/all_domains"
              DEFAULT_SEEDS="42"
              ;;

            # <- FIX CRITICAL 2: new experiment entry for sample-complexity sweep
            suppB_sc)
              SCRIPT="hypatiax/experiments/benchmarks/run_sample_complexity_benchmark.py"
              # TASK-6 FIX: resolve NEEDS_JULIA at runtime (same guard as suppB).
              if grep -qE 'juliacall|import pysr|from pysr|PySR' "${{ github.workspace }}/${SCRIPT}" 2>/dev/null; then
                NEEDS_JULIA=true
                echo "::notice::suppB_sc: detected juliacall/PySR import in ${SCRIPT} — NEEDS_JULIA set to true."
              else
                NEEDS_JULIA=false
                echo "suppB_sc: no juliacall/PySR import detected in ${SCRIPT} — NEEDS_JULIA=false."
              fi
              RESULT_SUBDIR="comparison_results/feynman-tests/sample-complexity"
              DEFAULT_SEEDS="42"
              ;;

            # -- STEP 3: all-domains OOD extrapolation comparative -----------------
            # Produces Tab 9 OOD columns.
            # Script : run_comparative_suite_benchmark_v2.py --extrap
            # Output : comparison_results/extrapolation/all_domains_extrap_v4_*.json
            # Keys   : extrap_r2 per method per equation (merged by consolidate job)
            # Julia  : true - methods 5/6 (SymbolicEngine, HybridV40) use PySR
            extrap)
              SCRIPT="hypatiax/experiments/benchmarks/run_comparative_suite_benchmark_v2.py"
              NEEDS_JULIA=true
              RESULT_SUBDIR="comparison_results/extrapolation"
              DEFAULT_SEEDS="42"
              ;;

            *)
              echo "ERROR: unknown experiment '$EXP'"; exit 1 ;;
          esac

          EFFECTIVE_SEEDS="${SEEDS_IN:-$DEFAULT_SEEDS}"

          echo "exp_id=$EXP"                        >> "$GITHUB_OUTPUT"
          echo "script_path=$SCRIPT"                >> "$GITHUB_OUTPUT"
          echo "needs_julia=$NEEDS_JULIA"           >> "$GITHUB_OUTPUT"
          echo "result_subdir=$RESULT_SUBDIR"       >> "$GITHUB_OUTPUT"
          echo "effective_seeds=$EFFECTIVE_SEEDS"   >> "$GITHUB_OUTPUT"

      - name: Compute pending task list and shard split
        id: split
        env:
          N_SHARDS:       "${{ github.event.inputs.n_shards || '1' }}"
          OVERRIDE:       "${{ github.event.inputs.task_ids_override }}"
          NOISE_LEVELS:   "${{ github.event.inputs.noise_levels || '0.0,0.5,1.0,5.0,10.0' }}"
          EFFECTIVE_SEEDS: ${{ steps.meta.outputs.effective_seeds }}
          EXP:            ${{ steps.meta.outputs.exp_id }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys

          EXP          = os.environ["EXP"]
          N_SHARDS_RAW = int(os.environ["N_SHARDS"])

          # Per-experiment shard table — authoritative source.
          # Most experiments run with exactly 1 worker shard to avoid
          # checkpoint collisions, concurrent-push races, and wasted runner
          # quota. exp1_ablation, exp3b use 4 shards (multi-task runs
          # over DEFI_TASKS / multi-seed runs respectively). exp1b is NOT in
          # this fixed group — see FIX-exp1b-DYNAMIC-SHARDS further down,
          # where its shard count is derived from len(SEEDS) instead.
          #
          # suppB uses 5 shards — NOT 4 — because its task list is built as
          # [f"noise{nl}__{eq}" for nl in NOISE_LEVELS for eq in
          # FEYNMAN_DOMAINS] (5 noise levels x 11 domains = 55 tasks,
          # ordered as 5 contiguous blocks of 11). run_all.sh STEP 10 reads
          # the FIRST task ID in each shard to pin a single NOISE_LEVEL for
          # the whole shard (see run_noise_sweep_benchmark.py NOISE_LEVEL
          # env var handling) — it assumes every task in a shard shares one
          # noise level. The block-partition splitter below (_block_shards)
          # divides 55 tasks evenly by COUNT, not by noise-level boundary:
          # at N_SHARDS=4, divmod(55,4)=(13,3) gives shard sizes
          # [14,14,14,13], and 14 does not divide evenly into blocks of 11,
          # so every shard would straddle two noise levels and silently mis-
          # pin (or fail to pin) NOISE_LEVEL for the tail tasks. N_SHARDS=5
          # gives shard sizes [11,11,11,11,11] — exactly one noise level per
          # shard, matching what STEP 10's pinning logic actually assumes.
          # If NOISE_LEVELS or FEYNMAN_DOMAINS ever change, re-verify this
          # alignment (shard count must equal len(NOISE_LEVELS) for the
          # one-level-per-shard property to hold).
          # FIX-suppB_sc-SHARD-6 (cost rationale, supersedes the old table=1):
          # suppB_sc previously ran as a single shard covering all 66 tasks
          # (6 sample sizes x 11 feynman domains) inside one 330-minute job.
          # Per-task cost is NOT uniform across sample sizes — larger n means
          # slower fits, especially for the two PySR-backed methods (5, 6),
          # whose --pysr-timeout/--method-timeout bound per-fit time but not
          # the job's total wall-clock. Six methods x 11 domains x worst-case
          # PySR timeouts already triples the wall-clock estimate that
          # justified --methods 3 4 as suppB_sc's own historical default (see
          # FIX-suppB_sc-ALL-METHODS below) — at six methods, a single shard
          # for the full sweep is no longer reliably within the job timeout,
          # which is exactly the failure mode that silently truncated method
          # coverage to begin with (a timed-out/killed shard can still leave
          # a partial sample_complexity_*.json on disk from whichever
          # methods finished first).
          #   SHARD COUNT = 6 = len(SC_SAMPLE_COUNTS), one sample size n per
          #   shard, mirroring suppB's one-noise-level-per-shard design.
          #   SUPPB_SC_IDS below is built as an outer loop over n and an
          #   inner loop over FEYNMAN_DOMAINS (11), so it is laid out in 6
          #   contiguous blocks of 11 — divmod(66, 6) = (11, 0), so
          #   _block_shards() partitions it into exactly 6 even shards of 11
          #   tasks, each shard landing entirely within one sample size n.
          #   This mirrors suppB's NOISE_LEVELS/FEYNMAN_DOMAINS alignment
          #   requirement: if SUPPB_SC_SAMPLE_COUNTS or FEYNMAN_DOMAINS ever
          #   change, re-verify that shard count still equals len(sample
          #   sizes) for the one-n-per-shard property to hold.
          #   PER-SHARD COST: 11 domains x 6 methods, methods 5/6 PySR-backed
          #   at up to (pysr-timeout=1100s + method-timeout=900s) worst-case
          #   each. Largest-n shard (n=1000) is the long pole; if it
          #   approaches the 330-minute job timeout, the run_all.sh
          #   FIX-suppB_sc-ALL-METHODS comment's options (b) and (c) — finer
          #   sharding or dropping back to fewer methods for the largest n —
          #   are the next things to try, NOT reverting to table=1.
          # UPDATE (2026-07-11): exp1b bumped 4 -> 5 = len(DEFAULT_SEEDS) so every
          # seed gets its own shard (one-seed-per-shard, mirroring suppB's
          # one-noise-level-per-shard and suppB_sc's one-n-per-shard design).
          # Previously, at table=4, _block_shards() split 5 seeds into
          # [2,1,1,1] — shard 0 owned BOTH seed42 and seed99, so a single
          # crashed/timed-out shard-0 worker could take out two seeds' worth
          # of progress at once. At table=5, divmod(5,5)=(1,0) gives 5 even
          # shards of 1 seed each, so a worker failure only ever costs one
          # seed. This is a resilience/isolation change, NOT a bug fix — the
          # actual bug (shard 0's real output being discarded due to a glob
          # mismatch against the script's true "*_results_seed{S}.json"
          # filename) is fixed separately above in the exp1b combined_globs
          # block. Cost: exp1b dispatch now spins up 5 concurrent workers
          # instead of 4.
          # -- Seeds / overrides parsed early ------------------------------------
          # Moved ahead of EXP_SHARD_TABLE resolution because exp1b's shard
          # count is now derived from len(SEEDS) (see FIX-exp1b-DYNAMIC-SHARDS
          # below) rather than a static table entry, so SEEDS must exist before
          # N_SHARDS is resolved.
          OVERRIDE     = os.environ["OVERRIDE"].split() if os.environ["OVERRIDE"].strip() else []
          SEEDS        = [s.strip() for s in os.environ["EFFECTIVE_SEEDS"].split(",") if s.strip()]
          NOISE_LEVELS = [l.strip() for l in os.environ["NOISE_LEVELS"].split(",") if l.strip()]

          EXP_SHARD_TABLE = {
              "exp1":               1,
              # exp1b: deliberately NOT a fixed table entry — see
              # FIX-exp1b-DYNAMIC-SHARDS below. Shard count = len(SEEDS),
              # so a custom `seeds` dispatch input always gets exact
              # one-seed-per-shard isolation, not just the 5-seed default.
              "exp1_ablation":      4,
              # exp1_pca / exp1b_pca intentionally NOT listed here yet — see the
              # matching gap (and hard-fail) in the `registry` dict below for why.
              # Once that's resolved, add their confirmed shard counts here too
              # instead of relying on the table.get(EXP, 1) fallback.
              "exp2_feynman":        1,
              "exp2_feynman_extrap": 1,
              "exp2_feynman_pca":    1,  # mirrors exp2_feynman (same FEYNMAN_DOMAINS registry, single shard)
              "exp2":               1,
              "exp3":               1,
              "exp3b":              4,
              "suppA":              1,
              "suppB":              5,
              "suppB_sc":           6,
              "instability":        1,
              "hybrid_all_domains": 1,
              "extrap":             1,
          }
          N_SHARDS_DEFAULT = EXP_SHARD_TABLE.get(EXP, 1)
          # Most experiments use exactly 1 shard to avoid concurrent-push races
          # and checkpoint collisions.  exp1_ablation and exp3b use 4 shards
          # (multi-task runs over DEFI_TASKS / multi-seed runs respectively).
          # exp1b is handled separately below — its shard count is derived
          # dynamically from len(SEEDS), not this table.
          # suppB uses 5 shards (one per noise level — see EXP_SHARD_TABLE comment
          # above for why 4 would silently mis-pin NOISE_LEVEL on some tasks).
          # suppB_sc uses 6 shards (one per sample size n — see EXP_SHARD_TABLE
          # comment above for the one-n-per-shard alignment requirement, and
          # the FIX-suppB_sc-SHARD-6 block below for the cost rationale).
          # Any dispatch input is ignored for single-shard experiments.
          #
          # FIX-exp1b-DYNAMIC-SHARDS: exp1b must always get exactly
          # len(SEEDS) shards (one-seed-per-shard — see the UPDATE
          # 2026-07-11 comment elsewhere in this file for why). A static
          # table value (formerly 5) silently mismatched _block_shards()
          # into uneven per-shard seed counts whenever a custom `seeds`
          # dispatch input changed the seed count away from 5 (e.g. 3
          # seeds -> some shards get 0 tasks and are dropped; 7 seeds ->
          # some shards get 2 seeds, re-introducing the exact
          # multi-seed-per-shard blast radius the 2026-07-11 fix removed
          # for the default case). This branch takes over from the
          # EXP_SHARD_TABLE lookup entirely for exp1b, before the
          # generic ==1 / >4 / else dispatch below, so exp1b can never
          # fall into the wrong one of those branches regardless of how
          # many seeds are passed.
          if EXP == "exp1b":
              N_SHARDS = len(SEEDS)
              if N_SHARDS_RAW != N_SHARDS:
                  print(f"::warning::n_shards={N_SHARDS_RAW} dispatch input IGNORED for 'exp1b' "
                        f"— shard count is derived from len(seeds)={N_SHARDS} for exact "
                        f"one-seed-per-shard alignment. Using N_SHARDS={N_SHARDS}.")
          elif N_SHARDS_DEFAULT == 1:
              N_SHARDS = 1
              if N_SHARDS_RAW not in (1,):
                  print(f"::warning::n_shards={N_SHARDS_RAW} dispatch input IGNORED for '{EXP}' "
                        f"— this experiment is single-shard only (table=1). "
                        f"Using N_SHARDS=1.")
          elif N_SHARDS_DEFAULT > 4:
              # suppB (table=5) and suppB_sc (table=6) require an EXACT shard
              # count for the one-noise-level-per-shard / one-n-per-shard
              # alignment documented above — NOT just a floor. The dispatch
              # input is therefore fully ignored here, the same way it is for
              # table=1 above. (The old `max(N_SHARDS_DEFAULT, min(4,
              # N_SHARDS_RAW))` formula below this branch can never produce
              # anything but N_SHARDS_DEFAULT when N_SHARDS_DEFAULT > 4 — the
              # min(4, ...) term tops out at 4 — so it silently discarded the
              # input while *looking* like it respected it whenever
              # N_SHARDS_RAW happened to equal the table value. Make that
              # explicit instead of implicit.)
              N_SHARDS = N_SHARDS_DEFAULT
              if N_SHARDS_RAW != N_SHARDS_DEFAULT:
                  print(f"::warning::n_shards={N_SHARDS_RAW} dispatch input IGNORED for '{EXP}' "
                        f"— this experiment requires an exact shard count "
                        f"(table={N_SHARDS_DEFAULT}) for correct noise-level/"
                        f"sample-size alignment. Using N_SHARDS={N_SHARDS_DEFAULT}.")
          else:
              # Table default is the minimum — user input cannot go below it.
              # exp1_ablation/exp3b (table=4) always get at least 4
              # shards; the dispatch input can raise that up to a cap of 4
              # (i.e. it has no effect for this group in practice, since the
              # table value already equals the cap — left in place in case a
              # table value < 4 is ever added to this branch).
              N_SHARDS = max(N_SHARDS_DEFAULT, min(4, N_SHARDS_RAW))
              if N_SHARDS != N_SHARDS_RAW:
                  print(f"::notice::n_shards: input={N_SHARDS_RAW} "
                        f"table={N_SHARDS_DEFAULT} using={N_SHARDS} "
                        f"(table default enforced as minimum)")
          # -- exp2_feynman shard IDs --------------------------------------------
          # BenchmarkProtocol._apply_shard_ids() filters at DOMAIN level, not
          # individual equation level.  Domain keys are "feynman_<sub-domain>"
          # (the _FEYNMAN_PREFIX + eq.domain from each FeynmanEquation).
          # Derived from experiment_protocol_benchmark_v2.py._build_domain_map():
          #   feynman_biology        (3 eqs: FEY_BIO_MM, FEY_BIO_LOG, FEY_BIO_ALLO)
          #   feynman_chemistry      (2 eqs: FEY_CHEM_ARR, FEY_CHEM_HH)
          #   feynman_electrochemistry (1 eq: FEY_CHEM_NERNST)
          #   feynman_electromagnetism (5 eqs: II.6.15a, II_11_3_simplified, II.34.2, II_11_27_ohm, II_11_28_capacitor)
          #   feynman_electrostatics (2 eqs: I.9.18_1d, I.12.2)
          #   feynman_magnetism      (1 eq:  II_11_17_curie)
          #   feynman_mechanics      (4 eqs: I.12.1, FEY_MECH_KE, I.18.4, I.24.6)
          #   feynman_optics         (2 eqs: I.26.2, I.37.4)
          #   feynman_probability    (1 eq:  I.6.20)
          #   feynman_quantum        (5 eqs: I.34.27, II_36_38, III.4.33, III.4.32, III.7.38)
          #   feynman_thermodynamics (4 eqs: I_41_16_simplified, II.2.42, FEY_THERMO_SB, FEY_THERMO_IG)
          # 11 domain keys total covering all 30 equations.
          FEYNMAN_DOMAINS = [
              "feynman_biology",
              "feynman_chemistry",
              "feynman_electrochemistry",
              "feynman_electromagnetism",
              "feynman_electrostatics",
              "feynman_magnetism",
              "feynman_mechanics",
              "feynman_optics",
              "feynman_probability",
              "feynman_quantum",
              "feynman_thermodynamics",
          ]

          # -- exp2 shard IDs ----------------------------------------------------
          # ExperimentProtocolAll._apply_shard_ids() also filters at DOMAIN level.
          # Domain keys are bare strings from get_all_domains():
          #   mechanics, thermodynamics, electromagnetism, fluid_dynamics,
          #   optics, quantum, chemistry, biology, mathematics, economics
          # M.01-M.30 are equation-level IDs used only for task_ids_override /
          # checkpoint tracking - they are NOT what SHARD_IDS matches against.
          EXP2_DOMAINS = [
              "mechanics", "thermodynamics", "electromagnetism", "fluid_dynamics",
              "optics", "quantum", "chemistry", "biology", "mathematics", "economics",
          ]

          # M.XX IDs - used for checkpoint tracking and task_ids_override only.
          MULTI30 = [f"M.{i:02d}" for i in range(1, 31)]

          NGUYEN12 = [f"N{i}" for i in range(1, 13)]
          DEFI_TASKS = [
              "amm", "risk_var", "liquidity", "expected_shortfall",
              "liquidation", "risk", "lending", "staking", "trading", "derivatives",
          ]
          SUPP_A_IDS = [
              "amm", "risk_var", "liquidity", "expected_shortfall",
              "liquidation", "risk", "lending", "staking", "trading", "derivatives",
          ]

          # -- hybrid_all_domains shard IDs --------------------------------------
          # Matches ExperimentProtocolAll.get_all_domains() exactly.
          # FIX: removed "statistics", "finance", "other" (don't exist in protocol);
          #      added "fluid_dynamics" and "mathematics" (present in protocol).
          HYBRID_ALL_DOMAINS_IDS = [
              "mechanics", "thermodynamics", "electromagnetism", "fluid_dynamics",
              "optics", "quantum", "chemistry", "biology", "mathematics", "economics",
          ]

          # -- suppB / suppB_sc use feynman domain keys for shard splitting ------
          # suppB shards by feynman domain (same as exp2_feynman), not equation ID.
          SUPPB_SC_SAMPLE_COUNTS = ["50", "100", "200", "500", "750", "1000"]
          SUPPB_SC_IDS = [f"sc_n{n}__{eq}" for n in SUPPB_SC_SAMPLE_COUNTS
                          for eq in FEYNMAN_DOMAINS]

          registry = {
              "exp1":              DEFI_TASKS,
              "exp1b":             [f"portfolio_seed{s}" for s in SEEDS],
              # exp1_ablation: Core-15 LLM ablation (PySR-only vs HypatiaX, §10.6).
              # 5 domain slugs split 2/1/1/1 across 4 shards (block-partition):
              #   shard 0: chemistry + defi_risk  → 6 equations  (~2.5 h)
              #   shard 1: biology               → 3 equations  (~1.25 h)
              #   shard 2: physics               → 3 equations  (~1.25 h)
              #   shard 3: defi_amm              → 3 equations  (~1.25 h)
              # exp1_ablation.py reads DOMAIN_FILTER to select its subset.
              # Slug→equation mapping is defined in _SLUG_TO_EQ_KEYWORDS inside
              # exp1_ablation.py.
              "exp1_ablation":     ["chemistry", "defi_risk", "biology", "physics", "defi_amm"],
              # exp2_feynman: shard by feynman domain keys (BenchmarkProtocol, benchmark=feynman)
              "exp2_feynman":       FEYNMAN_DOMAINS,
              # exp2_feynman_extrap: same 11-domain split, generates extrap_r2_far for Mann-Whitney
              "exp2_feynman_extrap": FEYNMAN_DOMAINS,
              # exp2_feynman_pca: PCA variant of exp2_feynman — same 11-domain split
              # (confirmed consistent with ci_pipeline_check.yml's own REGISTRY,
              # which already assumed FEYNMAN_DOMAINS for this experiment).
              "exp2_feynman_pca":   FEYNMAN_DOMAINS,
              # exp1_pca / exp1b_pca: DELIBERATELY NOT REGISTERED YET.
              # Both appear in this workflow's own workflow_dispatch experiment
              # choice list, and both already have committed result files in the
              # repo (hypatiax/data/results/comparison_results/noise-noiseless/
              # noiseless/defi_pca and .../15_pca) — but neither has a confirmed
              # task-ID scheme here, so a real dispatch with experiment=exp1_pca
              # or exp1b_pca will hit the "no task IDs" exit(1) below instead of
              # silently running with a guessed (possibly wrong) task list.
              # This means whatever produced the currently-committed exp1_pca /
              # exp1b_pca results did NOT go through a normal ci_runner.yml
              # dispatch — confirm the actual task-ID scheme (likely DEFI_TASKS
              # for exp1_pca, mirroring exp1; and [f"portfolio_seed{s}" for s in
              # SEEDS] for exp1b_pca, mirroring exp1b — but NOT verified) before
              # adding real entries here.
              # exp2: shard by ExperimentProtocolAll domain keys (--protocol all_domains)
              "exp2":              EXP2_DOMAINS,
              "exp3":              [f"{eq}_seed{s}" for eq in NGUYEN12 for s in SEEDS],
              "exp3b":             [f"{eq}_seed{s}" for s in SEEDS for eq in NGUYEN12],
              "suppA":             SUPP_A_IDS,
              "suppB":             [f"noise{nl}__{eq}" for nl in NOISE_LEVELS
                                    for eq in FEYNMAN_DOMAINS],
              "suppB_sc":          SUPPB_SC_IDS,
              "instability":        DEFI_TASKS,
              "hybrid_all_domains": HYBRID_ALL_DOMAINS_IDS,
              # extrap: same domain split as exp2_feynman (BenchmarkProtocol, feynman domains)
              "extrap":            FEYNMAN_DOMAINS,
          }

          all_ids = OVERRIDE if OVERRIDE else registry.get(EXP, [])
          if not all_ids:
              if EXP in ("exp1_pca", "exp1b_pca"):
                  print(f"ERROR: no task IDs for experiment '{EXP}' — this experiment's "
                        f"task-ID scheme is not yet confirmed in the `registry` dict above "
                        f"(see the comment there). Either confirm and add a real registry "
                        f"entry, or dispatch with task_ids_override set explicitly.",
                        file=sys.stderr)
              else:
                  print(f"ERROR: no task IDs for experiment '{EXP}'", file=sys.stderr)
              sys.exit(1)

          done = set()
          ckpt_path = "checkpoint_plan.json"
          if os.path.exists(ckpt_path):
              try:
                  with open(ckpt_path) as f:
                      done = set(json.load(f).get("completed", []))
                  print(f"Checkpoint: {len(done)} already completed")
              except Exception as e:
                  print(f"Warning: could not read checkpoint: {e}")

          pending = [t for t in all_ids if t not in done]
          print(f"Total={len(all_ids)}  Done={len(done)}  Pending={len(pending)}")

          if not pending:
              print("Nothing pending - all tasks already complete.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
                  fh.write("shard_matrix=[]\n")
                  fh.write("all_pending=[]\n")
              sys.exit(0)

          # -- Block-partition shard assignment (replaces round-robin) --------
          # divmod(N, W) = (chunk, r)
          #   Workers 0 .. r-1  get chunk+1 tasks each ("fat" shards).
          #   Workers r .. W-1  get chunk   tasks each ("thin" shards).
          # This produces contiguous, deterministic ranges so run_ids are stable
          # between re-runs as long as all_ids order is stable.
          def _block_shards(all_ids, n_shards):
              N = len(all_ids)
              chunk, r = divmod(N, n_shards)
              shards, start = [], 0
              for j in range(n_shards):
                  size = chunk + (1 if j < r else 0)
                  shards.append(all_ids[start : start + size])
                  start += size
              return shards

          # FIX-SHARD-ALIGN: always partition all_ids (not pending) so that the
          # shard boundaries are stable across resumes.  For suppB/suppB_sc/exp1b
          # this preserves the one-noise-level-per-shard / one-sample-size-per-
          # shard / one-seed-per-shard alignment even when some tasks are already
          # done and pending is shorter than all_ids.  Partitioning pending
          # directly (the old code) re-slices the remaining tasks into N_SHARDS
          # equal chunks that no longer respect noise-level boundaries, causing
          # run_all.sh to mis-pin NOISE_LEVEL for tasks in the tail of a shard.
          pending_set        = set(pending)
          raw_shards_all     = _block_shards(all_ids, N_SHARDS)
          raw_shards         = [[t for t in s if t in pending_set]
                                for s in raw_shards_all]
          # Drop shards that became empty after filtering (all tasks already done
          # in that position) so the matrix doesn't spawn zero-work runners.
          # Re-assign shard indices to 0-based contiguous so matrix.shard is
          # always the original global shard index (stable for cache keys).
          # Keep original index paired with the filtered list.
          raw_shards_indexed = [(orig_j, s)
                                for orig_j, s in enumerate(raw_shards)
                                if s]

          # Stable global index: position of each task in the FULL all_ids list
          # (not just pending), so IDs survive checkpoint restarts.
          global_index = {task: i for i, task in enumerate(all_ids)}

          matrix = [
              {
                  "shard":    orig_j,
                  "shard_id": orig_j + 1,
                  "ids":      json.dumps(s),
                  # run_ids: "{exp}-{global_index}" — unique, stable, cross-ref-safe.
                  # consolidate uses these to match shard results to all_pending.
                  "run_ids":  json.dumps([f"{EXP}-{global_index[t]}" for t in s]),
              }
              for orig_j, s in raw_shards_indexed
          ]
          N_SHARDS = len(matrix)  # actual number of non-empty shards dispatched

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"shard_matrix={json.dumps(matrix)}\n")
              fh.write(f"all_pending={json.dumps(pending)}\n")
              # FEATURE-NSHARDS-SUFFIX: expose the FINAL resolved shard count
              # (post table-forcing / cap logic above) as its own output, zero-
              # padded to 2 digits, so worker steps can tag every output
              # filename with _nshards{NN} — lets test runs at different shard
              # counts for the same experiment coexist on disk without
              # collisions or overwrites. This is the resolved N_SHARDS, NOT
              # the raw dispatch input — for suppB/suppB_sc it will always be
              # 5/6 respectively, matching what actually ran, not what was
              # requested.
              fh.write(f"n_shards={N_SHARDS}\n")

          print("Shard assignment (block-partition):")
          for s in matrix:
              ids = json.loads(s["ids"])
              rids = json.loads(s["run_ids"])
              print(f"  shard {s['shard']}: {len(ids)} tasks"
                    f" | IDs: {ids[:3]}{'...' if len(ids)>3 else ''}"
                    f" | run_ids: {rids[:2]}{'...' if len(rids)>2 else ''}")
          PYEOF

      - name: Save plan checkpoint cache
        if: always()
        uses: actions/cache/save@v4.2.3
        with:
          path: checkpoint_plan.json
          key: checkpoint-plan-${{ github.event.inputs.experiment }}-${{ github.ref_name }}-${{ github.run_id }}


# ==============================================================================
#  JOB 2 - worker
# ==============================================================================
  worker:
    name: "Worker - ${{ github.event.inputs.experiment }} shard ${{ matrix.shard }}"
    needs: [pca_runner, plan]
    runs-on: ubuntu-latest
    timeout-minutes: 330

    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.plan.outputs.shard_matrix) }}

    if: ${{ needs.pca_runner.outputs.skip_plan == 'false' && needs.plan.outputs.shard_matrix != '[]' && needs.plan.outputs.shard_matrix != '' }}

    env:
      EXP:            ${{ needs.plan.outputs.exp_id }}
      SCRIPT_PATH:    ${{ needs.plan.outputs.script_path }}
      NEEDS_JULIA:    ${{ needs.plan.outputs.needs_julia }}
      RESULT_SUBDIR:  ${{ needs.plan.outputs.result_subdir }}
      SHARD_IDS:      ${{ matrix.ids }}
      SHARD_INDEX:    ${{ matrix.shard }}
      SHARD_ID:       ${{ matrix.shard_id }}
      # Stable unique run_id per task: "{exp}-{global_index}" (from plan matrix).
      # Workers write this into result JSON so consolidate can cross-reference.
      SHARD_RUN_IDS:  ${{ matrix.run_ids }}
      EFFECTIVE_SEEDS: ${{ needs.plan.outputs.effective_seeds }}
      # N_SHARDS: the FINAL resolved total shard count (zero-padded to 2
      # digits, e.g. "05"), forwarded for logging/diagnostics. NOT used to
      # build the per-file _nshardsNN suffix -- that was tried initially but
      # corrected in run_all.sh's suppB step: N_SHARDS is the same constant
      # value across all concurrently-running matrix shards, so it would tag
      # every shard's output identically (_nshards05 on all 5 shards) and
      # could still collide on same-second-timestamped filenames. The suffix
      # is instead derived from SHARD_INDEX (above, 0-based, +1 -> 01..05),
      # which is unique per shard. See run_all.sh's suppB step,
      # FEATURE-NSHARDS-SUFFIX comment, for the corrected derivation.
      N_SHARDS:       ${{ needs.plan.outputs.n_shards }}
      # FIX-NOISE_LEVELS: forward from dispatch input so suppB worker receives the
      # correct sweep range.  Previously NOISE_LEVELS was only set inside the plan
      # job's Python step and never exported to worker jobs, so run_noise_sweep_benchmark.py
      # silently fell back to its own internal default (noiseless only -> noise_levels:[0.0]).
      NOISE_LEVELS:   "${{ github.event.inputs.noise_levels || '0.0,0.5,1.0,5.0,10.0' }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"

      - name: Set up Julia 1.11
        if: ${{ needs.plan.outputs.needs_julia == 'true' }}
        uses: julia-actions/setup-julia@v2.6.1
        with:
          version: "1.11"

      - name: Cache Julia depot
        if: ${{ needs.plan.outputs.needs_julia == 'true' }}
        uses: actions/cache@v4
        with:
          path: ~/.julia
          key: julia-depot-${{ runner.os }}-${{ hashFiles('**/Project.toml', '**/Manifest.toml') }}
          restore-keys: |
            julia-depot-${{ runner.os }}-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install "pandas==2.2.3"
          pip install \
            numpy scipy sympy \
            anthropic \
            pysr \
            scikit-learn \
            pyyaml \
            python-dotenv \
            matplotlib \
            seaborn \
            pmlb \
            pint \
            psutil

      - name: Install Julia / SymbolicRegression (if needed)
        if: ${{ needs.plan.outputs.needs_julia == 'true' }}
        run: |
          python3 -c "import pysr; pysr.install()"

      # -- FIX: methods 5 & 6 (SymbolicEngineWithLLM, HybridDiscoverySystem v50_2) --
      # _probe() in run_comparative_suite_benchmark_v2.py imports symbolic_engine.py
      # and hybrid_system_v50_2.py at module load time.  Both transitively import pysr,
      # which calls juliacall to load SymbolicRegression.jl.  If the Julia depot is not
      # fully precompiled before the probe runs, juliacall raises a precompilation error
      # that _probe() silently swallows -> SYM_ENGINE_AVAILABLE = False permanently,
      # and every test reports "SymbolicEngineWithLLM not available" for the whole run.
      #
      # Fix: run a short Julia precompile warmup AFTER pysr.install() so that
      # SymbolicRegression.jl is fully cached in the Julia depot before any Python
      # script is invoked.  The warmup is cheap (~30s on a warm runner) and pays
      # for itself by unblocking both tools methods for every test in the run.
      #
      # For experiments where PySR tools are deliberately excluded (exp2_feynman,
      # exp2, exp3, exp3b) we additionally pass --skip-pysr to prevent the
      # subprocess worker pool from being consumed by Julia startup overhead.
      - name: Precompile Julia / SymbolicRegression (if needed)
        if: ${{ needs.plan.outputs.needs_julia == 'true' }}
        run: |
          python3 - <<'PYEOF'
          import subprocess, sys, os

          # Warm up juliacall + SymbolicRegression.jl so that _probe() succeeds.
          # Uses a minimal PySR fit (5 iterations, 1 population) just to force
          # full precompilation - the result is discarded.
          warmup = """
          import numpy as np
          import pysr
          X = np.random.randn(20, 1)
          y = X[:, 0] * 2.0 + 1.0
          model = pysr.PySRRegressor(
              niterations=5,
              populations=1,
              verbosity=0,
              progress=False,
              tempdir="/tmp/pysr_warmup",
          )
          model.fit(X, y)
          print("Julia/PySR precompile warmup OK")
          """
          result = subprocess.run(
              [sys.executable, "-c", warmup],
              timeout=300,
              capture_output=True,
              text=True,
          )
          print(result.stdout or "")
          if result.returncode != 0:
              # Warmup failure is non-fatal - methods 5/6 will still show N/A,
              # but we surface the error so it's visible in the step log.
              print("WARNING: Julia precompile warmup failed (methods 5+6 may be N/A):")
              print(result.stderr[-3000:] if result.stderr else "(no stderr)")
          PYEOF

      - name: Verify Julia threads
        if: ${{ needs.plan.outputs.needs_julia == 'true' }}
        run: |
          julia -e 'println("Julia threads: ", Threads.nthreads())'

      - name: Restore shard checkpoint
        id: restore_worker
        uses: actions/cache/restore@v4.2.3
        with:
          path: checkpoint_worker_shard${{ matrix.shard }}.json
          key:  checkpoint-worker-${{ github.event.inputs.experiment }}-shard${{ matrix.shard }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            checkpoint-worker-${{ github.event.inputs.experiment }}-shard${{ matrix.shard }}-${{ github.ref_name }}-

      - name: Environment check and repro.yaml audit
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "Python: $(python3 --version)"
          python3 -c "import pysr;        print('PySR:         ', pysr.__version__)"
          python3 -c "import torch;       print('PyTorch:      ', torch.__version__)"
          python3 -c "import anthropic;   print('anthropic SDK: ok')"
          python3 -c "import sympy;       print('SymPy:        ', sympy.__version__)"
          python3 -c "import scipy;       print('SciPy:        ', scipy.__version__)"
          python3 -c "import sklearn;     print('scikit-learn: ', sklearn.__version__)"
          [[ -n "${ANTHROPIC_API_KEY:-}" ]] || { echo "ERROR: ANTHROPIC_API_KEY not set"; exit 1; }
          echo "ANTHROPIC_API_KEY: set (${#ANTHROPIC_API_KEY} chars)"
          echo "JULIA_NUM_THREADS: ${JULIA_NUM_THREADS}"
          echo "FEYNMAN_SAMPLES:   ${FEYNMAN_SAMPLES}"
          echo "FEYNMAN_TIMEOUT:   ${FEYNMAN_TIMEOUT}"
          echo "REPRO_CFG:         ${REPRO_CFG}"
          echo "RESULTS_DIR:       ${OUT_BASE}"
          echo "=== repro.yaml (paper-quality values) ==="
          if [ -f "${REPRO_CFG}" ]; then
            python3 "${{ github.workspace }}/.github/scripts/print_repro.py"
          else
            echo "WARNING: repro.yaml not found at ${REPRO_CFG} - using workflow env defaults"
          fi

      - name: Validate ANTHROPIC_API_KEY (live round-trip)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          KEY_LEN=${#ANTHROPIC_API_KEY}
          echo "ANTHROPIC_API_KEY present: $([ $KEY_LEN -gt 0 ] && echo YES || echo NO)"
          echo "ANTHROPIC_API_KEY length : ${KEY_LEN} chars"
          echo "ANTHROPIC_API_KEY prefix : ${ANTHROPIC_API_KEY:0:7}..."
          if [[ $KEY_LEN -eq 0 ]]; then
            echo "::error::ANTHROPIC_API_KEY secret is empty or unset."
            exit 1
          fi
          python3 "${{ github.workspace }}/config/test_key_status.py"

      - name: Create results directory structure
        run: |
          mkdir -p \
            "${OUT_BASE}/comparison_results/feynman-tests/exp2" \
            "${OUT_BASE}/comparison_results/feynman-tests/exp2_extrap" \
            "${OUT_BASE}/comparison_results/feynman-tests/exp2_multi" \
            "${OUT_BASE}/comparison_results/feynman-tests/noise-sweep" \
            "${OUT_BASE}/comparison_results/feynman-tests/sample-complexity" \
            "${OUT_BASE}/comparison_results/noise-noiseless/noiseless/defi" \
            "${OUT_BASE}/comparison_results/noise-noiseless/15" \
            "${OUT_BASE}/comparison_results/extrapolation" \
            "${OUT_BASE}/extrapolation" \
            "${OUT_BASE}/extrapolation/multi_seed" \
            "${OUT_BASE}/hybrid_llm_nn/all_domains" \
            "${OUT_BASE}/hybrid_llm_nn/defi" \
            "${OUT_BASE}/hybrid_pysr/all_domains" \
            "${OUT_BASE}/hybrid_pysr/defi" \
            "${OUT_BASE}/llm_guided/all_domains" \
            "${OUT_BASE}/llm_guided/defi" \
            "${OUT_BASE}/standalone_llm_nn" \
            "${OUT_BASE}/figures" \
            "${OUT_BASE}/tables" \
            "${{ github.workspace }}/logs"

      - name: Seed shard checkpoint from committed results (cache miss only)
        if: steps.restore_worker.outputs.cache-hit != 'true'
        env:
          SHARD_IDS_JSON: ${{ matrix.ids }}
          RESULT_SUBDIR:  ${{ needs.plan.outputs.result_subdir }}
          EXP:            ${{ needs.plan.outputs.exp_id }}
        run: |
          CKPT_PATH="checkpoint_worker_shard${{ matrix.shard }}.json"
          COMMITTED="${OUT_BASE}/${RESULT_SUBDIR}/${EXP}_checkpoint.json"
          if [ -f "$COMMITTED" ]; then
            jq --argjson keys "$SHARD_IDS_JSON" \
              'with_entries(select(.key as $k | ($keys | index($k)) != null))' \
              "$COMMITTED" > "$CKPT_PATH" 2>/dev/null || echo '{"completed":[]}' > "$CKPT_PATH"
            N=$(python3 -c "import json; d=json.load(open('$CKPT_PATH')); print(len(d.get('completed', d)))" 2>/dev/null || echo "?")
            echo "Seeded shard ${{ matrix.shard }} checkpoint (${N} tasks) from committed master"
          else
            echo '{"completed":[]}' > "$CKPT_PATH"
            echo "No committed checkpoint found - shard ${{ matrix.shard }} starts fresh"
          fi

      - name: Resolve this shard's pending IDs
        id: resolve_ids
        run: |
          python3 - <<'PYEOF'
          import json, os

          shard_ids = json.loads(os.environ.get("SHARD_IDS") or "[]")
          ckpt_path = f"checkpoint_worker_shard{os.environ['SHARD_INDEX']}.json"

          done = set()
          if os.path.exists(ckpt_path):
              try:
                  with open(ckpt_path) as f:
                      done = set(json.load(f).get("completed", []))
              except Exception as e:
                  print(f"Warning: could not read shard checkpoint: {e}")

          pending = [t for t in shard_ids if t not in done]
          print(f"Shard {os.environ['SHARD_INDEX']}: {len(shard_ids)} assigned, "
                f"{len(done)} done, {len(pending)} pending")

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"pending_ids={json.dumps(pending)}\n")
              fh.write(f"has_work={'true' if pending else 'false'}\n")
          PYEOF

      # -- FIX TASK 7: domain-list validation for hybrid_all_domains / exp2 ---
      # Reads the plan-step domain registry (HYBRID_ALL_DOMAINS_IDS / EXP2_DOMAINS,
      # both defined from the same 10-domain list in the Plan job) and cross-checks
      # it against what the *runtime* protocol for each exp_id actually resolves.
      # The worker exits 1 if the lists diverge, surfacing the mismatch before the
      # multi-hour experiment run starts instead of ~15 min into a doomed shard.
      #
      # GENERALIZED (was hybrid_all_domains only): exp2 shards off EXP2_DOMAINS,
      # the same 10-domain list as HYBRID_ALL_DOMAINS_IDS (see plan step above),
      # but is driven by a different script/protocol path, so it needs its own
      # resolution branch below rather than reusing hybrid's module import.
      #
      # NOTE: this used to be EXPECTED to fail. The root cause was NOT in
      # run_comparative_suite_benchmark_v2.py — that script already had a
      # correct, working --protocol all_domains branch that properly loads
      # ExperimentProtocolAll (see its own "NOTE ON ROOT CAUSE" comment above
      # that branch). The bug was in the CALLERS: both run_all.sh's exp2 step
      # and this check's own resolve_exp2() probe were invoking the script
      # with `--benchmark both`, on the mistaken assumption that "both" routes
      # to ExperimentProtocolAll. It doesn't — --benchmark only selects
      # BenchmarkProtocol's Feynman/SRBench sub-benchmark and is ignored
      # unless --protocol benchmark (the default) is active, so the runtime
      # domain set was BenchmarkProtocol's own (Feynman + SRBench raw domain
      # keys), never ExperimentProtocolAll's canonical 10. FIX-EXP2-PROTOCOL
      # switched both call sites to --protocol all_domains. This check exists
      # so any future regression of that routing fails fast in the Plan job
      # (~seconds) instead of silently during the run (~15 min/shard x 7
      # broken shards, partly masked by stale committed outputs from gate 1's
      # "outputs committed" check).
      # FIX TASK 7
      - name: Validate domain-list (hybrid_all_domains / exp2)
        if: ${{ needs.plan.outputs.exp_id == 'hybrid_all_domains' || needs.plan.outputs.exp_id == 'exp2' }}
        run: |
          python3 - <<'PYEOF'
          import importlib.util, sys, pathlib, subprocess, os

          EXP_ID = "${{ needs.plan.outputs.exp_id }}"

          EXPECTED = {
              # Exact keys ExperimentProtocolAll.get_all_domains() SHOULD return
              # (experiment_protocol_all_30.py, v4.1). Shared by HYBRID_ALL_DOMAINS_IDS
              # and EXP2_DOMAINS in the plan step — keep both in sync with this set.
              "mechanics", "thermodynamics", "electromagnetism", "fluid_dynamics",
              "optics", "quantum", "chemistry", "biology", "mathematics", "economics",
          }

          def resolve_hybrid():
              script = pathlib.Path(
                  "hypatiax/core/generation/hybrid_all_domains_llm_nn/"
                  "hybrid_system_llm_nn_all_domains.py"
              )
              spec = importlib.util.spec_from_file_location("hybrid_mod", script)
              mod  = importlib.util.module_from_spec(spec)
              try:
                  spec.loader.exec_module(mod)
              except SystemExit:
                  pass  # script may call sys.exit() at module level - tolerate

              actual = getattr(mod, "DOMAINS",
                       getattr(mod, "ALL_DOMAINS",
                       getattr(mod, "DOMAIN_KEYS", None)))
              if actual is None:
                  from hypatiax.core.generation.hybrid_all_domains_llm_nn \
                      .hybrid_system_llm_nn_all_domains import ExperimentProtocolAll
                  _domains = ExperimentProtocolAll().get_all_domains()
                  actual = _domains.keys() if hasattr(_domains, "keys") else _domains
              return set(str(d) for d in actual)

          def resolve_exp2():
              # exp2 is invoked per-domain via CLI (run_comparative_suite_benchmark_v2.py
              # --protocol all_domains --domain <id> --resume ...), so probe the actual
              # runtime protocol resolution the same way: pass a domain we know is
              # NOT in the broken 3-domain set and read back the "Available:" list
              # from the script's own error message, rather than reimplementing its
              # protocol-selection logic here (which is precisely what's suspected broken).
              #
              # FIX-EXP2-PROTOCOL: previously probed with --benchmark both, which
              # (per run_comparative_suite_benchmark_v2.py's own argparse help text
              # and protocol-selection code) never routes to ExperimentProtocolAll —
              # --benchmark only selects BenchmarkProtocol's Feynman/SRBench
              # sub-benchmark and is ignored unless --protocol benchmark (the
              # default) is active. That's exactly the mismatch this check was
              # catching. run_all.sh's exp2 step now passes --protocol all_domains;
              # the probe must match it or this check will keep failing (or worse,
              # silently validate the wrong call) independently of that fix.
              script = "hypatiax/experiments/benchmarks/run_comparative_suite_benchmark_v2.py"
              probe = subprocess.run(
                  ["python3", script, "--protocol", "all_domains", "--domain", "__ci_probe__"],
                  capture_output=True, text=True, timeout=120,
              )
              out = probe.stdout + probe.stderr
              marker = "Available:"
              if marker not in out:
                  print("ERROR: could not resolve exp2's runtime domain list "
                        "(script did not emit the expected 'Available:' line).")
                  print(out[-2000:])
                  sys.exit(1)
              tail = out.split(marker, 1)[1].splitlines()[0]
              return set(d.strip() for d in tail.split(",") if d.strip())

          actual_set = resolve_hybrid() if EXP_ID == "hybrid_all_domains" else resolve_exp2()
          missing  = EXPECTED - actual_set
          extra    = actual_set - EXPECTED

          if missing or extra:
              registry_name = "HYBRID_ALL_DOMAINS_IDS" if EXP_ID == "hybrid_all_domains" else "EXP2_DOMAINS"
              print(f"DOMAIN LIST MISMATCH for exp_id='{EXP_ID}' - "
                    f"runtime protocol does not match {registry_name}!")
              if missing: print(f"  In CI registry but NOT resolved at runtime : {sorted(missing)}")
              if extra:   print(f"  Resolved at runtime but NOT in CI registry : {sorted(extra)}")
              if EXP_ID == "exp2":
                  print("  This probe now calls --protocol all_domains (the real switch to "
                        "ExperimentProtocolAll — see run_comparative_suite_benchmark_v2.py's "
                        "own 'NOTE ON ROOT CAUSE' comment above its protocol-loading branch, "
                        "and the matching fix in run_all.sh's exp2 step). If you're seeing "
                        "this failure now, --benchmark both is not the cause anymore — check "
                        "whether ExperimentProtocolAll.get_all_domains() itself changed, or "
                        "whether --protocol all_domains regressed back to loading "
                        "BenchmarkProtocol, before editing EXPECTED above.")
              sys.exit(1)

          print(f"Domain-list validation OK for exp_id='{EXP_ID}': {sorted(actual_set)}")
          PYEOF

      # -- suppB_sc: smoke-test that run_sample_complexity_benchmark.py accepts
      # the flags the runner will pass (--samples, --pysr-timeout, --method-timeout).
      # This surfaces argparse "unrecognized arguments" errors BEFORE the 5h run
      # starts, giving a clear failure message rather than "produced NO output files".
      - name: Smoke-test suppB_sc script flag acceptance
        if: ${{ needs.plan.outputs.exp_id == 'suppB_sc' }}
        run: |
          set -euo pipefail
          SCRIPT="hypatiax/experiments/benchmarks/run_sample_complexity_benchmark.py"
          echo "=== suppB_sc flag smoke-test ==="
          echo "  Testing: python3 ${SCRIPT} --help"
          python3 "${SCRIPT}" --help > /dev/null
          echo "  Testing: python3 ${SCRIPT} --samples 200 --pysr-timeout 1100 --method-timeout 900 --help"
          python3 "${SCRIPT}" --samples 200 --pysr-timeout 1100 --method-timeout 900 --help > /dev/null
          echo "  OK — all suppB_sc CLI flags accepted."

      - name: Run experiment tasks
        if: ${{ steps.resolve_ids.outputs.has_work == 'true' }}
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          PENDING_IDS:       ${{ steps.resolve_ids.outputs.pending_ids }}
          SHARD_CKPT:        checkpoint_worker_shard${{ matrix.shard }}.json
          RESULTS_DIR:       ${{ github.workspace }}/${{ env.OUT_BASE }}
          REPRO_CFG:         ${{ env.REPRO_CFG }}
          RESUME:            ${{ github.event.inputs.resume || 'true' }}
          DRY_RUN:           ${{ github.event.inputs.dry_run || 'false' }}
          SHARD:             ${{ matrix.shard }}
        run: |
          set -euo pipefail

          export ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}"
          [[ -n "${ANTHROPIC_API_KEY}" ]] || { echo "ERROR: ANTHROPIC_API_KEY secret is empty"; exit 1; }
          echo "ANTHROPIC_API_KEY: enforced (${#ANTHROPIC_API_KEY} chars)"

          if [[ "${DRY_RUN}" == "true" ]]; then
            echo "=== DRY RUN - shard ${SHARD} | experiment: ${EXP} ==="
            echo "${PENDING_IDS}" | python3 -c "import json,sys; [print(' ',t) for t in json.load(sys.stdin)]"
            echo "FEYNMAN_TIMEOUT=${FEYNMAN_TIMEOUT}  FEYNMAN_SAMPLES=${FEYNMAN_SAMPLES}"
            echo "PYSR_POPULATIONS=${PYSR_POPULATIONS}  PYSR_GENERATIONS=${PYSR_GENERATIONS}"
            echo "REPRO_CFG=${REPRO_CFG}  JOB_DEADLINE=${JOB_DEADLINE}  RESUME=${RESUME}"
            exit 0
          fi

          mkdir -p "${RESULTS_DIR}/${RESULT_SUBDIR}"

          # RUN-START MARKER FIX: record the time this shard's experiment step
          # started, so the later "Store results in canonical RESULT_SUBDIR"
          # step can distinguish files that are genuinely stale (written by a
          # prior CI run, before this marker existed) from files this run just
          # wrote into an already git-tracked canonical path (e.g. exp1b's
          # hypatiax_defi_benchmark_v3_results.json). Only mtime, not git
          # tracked-status, can tell those apart.
          RUN_START_MARKER="${RESULTS_DIR}/.run_start_marker_shard${SHARD_INDEX}"
          touch "${RUN_START_MARKER}"
          echo "Run start marker created: ${RUN_START_MARKER}"

          python3 -c "import json,os; print('\n'.join(json.loads(os.environ['PENDING_IDS'])))" \
            > /tmp/pending_ids.txt

          echo "=== Shard ${SHARD_INDEX} | Experiment: ${EXP} ==="
          cat /tmp/pending_ids.txt

          if [[ "${EXP}" == "exp3" || "${EXP}" == "exp3b" ]]; then
            # FIX-EXP3-SEED-SUFFIX: registry IDs carry a "_seed<N>" suffix for
            # checkpoint/shard bookkeeping (e.g. "N1_seed42"), but
            # exp3_nguyen12_hybrid50v_02.py matches task IDs against bare
            # meta['nguyen_id'] values ("N1".."N12") — seed is supplied
            # separately via EXPERIMENT_SEED/SEED. Without stripping the
            # suffix here, TASK_IDS/DOMAIN_FILTER never match any nguyen_id,
            # the script silently processes 0/12 tasks and exits 0, and the
            # failure only surfaces several steps later when no
            # exp3_nguyen12_seed*.json files are found to commit.
            TASK_IDS="$(cat /tmp/pending_ids.txt | sed -E 's/_seed[0-9]+$//' | tr '\n' ' ' | sed 's/[[:space:]]*$//')"

            # FIX-EXP3-SHARD-SEED: derive this shard's actual seed(s) from the
            # UN-stripped pending_ids (e.g. "N1_seed99" -> "99") BEFORE the
            # suffix is thrown away above. exp3b fans out across 4 shards, one
            # per seed (99/123/777/2024); exp3 is a single shard at seed=42.
            # Previously this value was discarded entirely and every shard's
            # "Run experiment tasks" step fell back to the workflow-level
            # PYSR_SEED="42" a few lines below — silently pinning every
            # exp3b shard to seed 42 regardless of which seed it was actually
            # assigned, which collides with exp3's pre-existing seed42 output
            # and causes the step to no-op via the script's skip-if-exists guard.
            SHARD_SEEDS="$(cat /tmp/pending_ids.txt | grep -oE '_seed[0-9]+$' | sed -E 's/_seed//' | sort -u | paste -sd, -)"
            if [[ -z "${SHARD_SEEDS}" ]]; then
              echo "  [exp3/exp3b] No _seedNN suffix found on pending_ids — falling back to PYSR_SEED (${PYSR_SEED})."
              SHARD_SEEDS="${PYSR_SEED}"
            fi
            echo "  [exp3/exp3b] SHARD_INDEX=${SHARD_INDEX} -> SHARD_SEEDS=${SHARD_SEEDS}"
          elif [[ "${EXP}" == "exp1b" ]]; then
            # FIX-EXP1B-SHARD-SEED: mirrors FIX-EXP3-SHARD-SEED above. exp1b's
            # pending_ids are "portfolio_seed<N>" (e.g. "portfolio_seed123"),
            # but this used to fall through to the else-branch default of
            # "${PYSR_SEED}" — the GLOBAL workflow-level env var, hardcoded to
            # "42" — regardless of which seed this shard was actually
            # assigned. Every exp1b shard therefore computed seed 42's
            # portfolio, not its own assigned seed. Shard 0 (whose real
            # assignment happens to BE portfolio_seed42) masked the bug,
            # while e.g. shard 2 (assigned portfolio_seed123) silently ALSO
            # produced seed42's results alongside its own, causing shard 0
            # and shard 2 to collide when both tried to commit
            # hypatiax_defi_benchmark_v3_results_seed42.json (run 29824228663
            # and 29826566459).
            TASK_IDS="$(cat /tmp/pending_ids.txt | tr '\n' ' ' | sed 's/[[:space:]]*$//')"
            SHARD_SEEDS="$(cat /tmp/pending_ids.txt | grep -oE 'seed[0-9]+$' | sed -E 's/seed//' | sort -u | paste -sd, -)"
            if [[ -z "${SHARD_SEEDS}" ]]; then
              echo "  [exp1b] No portfolio_seedNN pattern found in pending_ids — falling back to PYSR_SEED (${PYSR_SEED})."
              SHARD_SEEDS="${PYSR_SEED}"
            fi
            echo "  [exp1b] SHARD_INDEX=${SHARD_INDEX} -> SHARD_SEEDS=${SHARD_SEEDS}"
          else
            TASK_IDS="$(cat /tmp/pending_ids.txt | tr '\n' ' ' | sed 's/[[:space:]]*$//')"
            SHARD_SEEDS="${PYSR_SEED}"
          fi
          echo "TASK_IDS=${TASK_IDS}"

          # FIX-INSTABILITY-PREFLIGHT: run_instability_suite.py reads its K-run
          # cases from exp1's DeFi benchmark JSONs. If exp1 hasn't been run yet
          # (or its output was never committed), the suite still exits 0 but
          # with "Loaded 0 cases" and mean_stab=nan for every model class —
          # see 2026-06-26 CI run 28252247591. Fail loudly here instead of
          # letting that pass silently through to a degenerate output.
          if [[ "${EXP}" == "instability" ]]; then
            _DEFI_DIR="${RESULTS_DIR}/comparison_results/noise-noiseless/noiseless/defi"
            _DEFI_COUNT=$(find "${_DEFI_DIR}" -name "hypatiax_defi_benchmark_*results*.json" 2>/dev/null | wc -l)
            echo "=== instability pre-flight: exp1 DeFi benchmark data ==="
            echo "  Source dir : ${_DEFI_DIR}"
            echo "  JSON count : ${_DEFI_COUNT}"
            if [[ "${_DEFI_COUNT}" -eq 0 ]]; then
              echo "::error::instability requires exp1 DeFi benchmark JSONs in ${_DEFI_DIR} — none found."
              echo "  Run ci_runner_repro.yml with experiment=exp1 first, then re-run instability."
              exit 1
            fi
            echo "  OK: ${_DEFI_COUNT} exp1 benchmark JSON(s) found."
          fi

          # Ensure log dir exists before run_all.sh tries to tee into it.
          mkdir -p "${OUT_BASE}"

          # Delegate to run_all.sh which contains the full per-experiment logic.
          # Environment variables are already set in the step env block above;
          # we additionally export TASK_IDS, SHARD_IDS, and SHARD as aliases
          # that run_all.sh and its sub-scripts expect.
          # FIX-EXP3-SHARD-SEED (cont.): EXPERIMENT_SEED (and PYSR_SEED, which
          # _resolve_seed() in exp3_nguyen12_hybrid50v_02.py checks FIRST,
          # ahead of EXPERIMENT_SEED/NN_SEED and ahead of --seed) must both be
          # overridden to SHARD_SEEDS here for exp3/exp3b. Previously
          # EXPERIMENT_SEED="${PYSR_SEED}" always resolved to the workflow's
          # global "42", and PYSR_SEED itself was never overridden at all here
          # (it stayed inherited from the workflow-level env: block) — so both
          # seed-resolution env vars silently outranked whatever --seed
          # run_all.sh's exp3b loop passed on the command line.
          TASK_IDS="${TASK_IDS}" \
          SHARD_IDS="${TASK_IDS}" \
          SHARD="${SHARD_INDEX}" \
          RESULTS_DIR="${RESULTS_DIR}" \
          OUT_BASE="${RESULTS_DIR}" \
          REPO_ROOT="${{ github.workspace }}" \
          DEFI_SEEDS="${EFFECTIVE_SEEDS}" \
          SHARD_SEEDS="${SHARD_SEEDS}" \
          PYSR_SEED="${SHARD_SEEDS}" \
          EXPERIMENT_SEED="${SHARD_SEEDS}" \
          DOMAIN_FILTER="${TASK_IDS}" \
          NUMERICAL_ONLY="true" \
            bash run_all.sh --step "${EXP}"

      # -- FIX-EXP1ABL-SHARD-CLOBBER --------------------------------------------
      # exp1_ablation.py writes its primary output to fixed filenames
      # (exp1_ablation_results.json / exp1_ablation_checkpoint.json) directly
      # inside RESULT_SUBDIR, with no shard index in the name, even though this
      # experiment always runs as 4 parallel matrix shards (one per DOMAIN_FILTER
      # subset). Each shard's "Store results in canonical RESULT_SUBDIR" step
      # prunes the previously-committed copy of that same fixed filename before
      # its own commit, so whichever shard commits last silently overwrites
      # every earlier shard's domain results in git — merge_shards.py then only
      # ever sees the final shard's data (root cause of the 2026-07-02
      # 3-record/0%-success _merged.json incident: all 4 _checkpoint_shardN.json
      # files were 0-row CI bookkeeping stubs, and the real per-domain results
      # were overwritten shard-by-shard because they shared one filename).
      #
      # Fix: snapshot this shard's copy of the primary output under a
      # shard-suffixed name immediately after it's written, so each shard's
      # contribution survives independently of commit ordering. merge_shards.py
      # must also be updated to read exp1_ablation_results_shard*.json /
      # exp1_ablation_checkpoint_shard*.json (glob) for this experiment instead
      # of assuming a single combined file — that change is out of scope here
      # since merge_shards.py wasn't provided.
      - name: Preserve shard-specific exp1_ablation output
        if: always() && env.EXP == 'exp1_ablation'
        run: |
          DEST="${OUT_BASE}/${RESULT_SUBDIR}"
          for base in exp1_ablation_results.json exp1_ablation_checkpoint.json; do
            SRC="${DEST}/${base}"
            if [[ -f "${SRC}" ]]; then
              shard_dest="${DEST}/${base%.json}_shard${SHARD_INDEX}.json"
              # FIX-EXP1ABL-SHARD-CLOBBER (mv, not cp): a copy leaves the
              # fixed-name file on disk, which still collides with every other
              # shard's already-committed copy of the same fixed name at
              # "Store results in canonical RESULT_SUBDIR" / commit time —
              # whichever shard commits last silently overwrites the others'
              # domain results. Moving removes the fixed-name file so only the
              # shard-suffixed snapshot remains, matching how exp1b keeps each
              # shard's output under a distinct filename.
              mv "${SRC}" "${shard_dest}"
              echo "Preserved ${SRC} → ${shard_dest}"
            else
              echo "::warning::Expected exp1_ablation output not found at ${SRC} — nothing to preserve for shard ${SHARD_INDEX}."
            fi
          done

      - name: Diagnostic - locate result files on disk
        if: always()
        run: |
          echo "=== CWD ===" && pwd
          echo "=== github.workspace ===" && echo "${GITHUB_WORKSPACE}"
          echo "=== OUT_BASE ===" && echo "${OUT_BASE}"
          echo "=== OUT_BASE resolved ===" && realpath "${OUT_BASE}" 2>/dev/null || true
          echo "=== RESULTS_DIR env (from Run experiment tasks step) ==="
          echo "  RESULTS_DIR in env: ${{ github.workspace }}/${OUT_BASE}"
          echo "=== OUT_BASE vs RESULTS_DIR equivalence check ==="
          WS_OUT="${GITHUB_WORKSPACE}/${OUT_BASE}"
          echo "  Expected RESULTS_DIR: ${WS_OUT}"
          echo "  Same? $([ "${WS_OUT}" = "${{ github.workspace }}/${{ env.OUT_BASE }}" ] && echo YES || echo NO)"
          echo "=== ALL *.json files anywhere under GITHUB_WORKSPACE (first 60) ==="
          find "${GITHUB_WORKSPACE}" -maxdepth 12 \
            -name "*.json" \
            ! -path "*/.git/*" \
            ! -path "*/node_modules/*" \
            2>/dev/null | sort | head -60 || echo "(none)"
          echo "=== ALL hypatiax_defi_benchmark_v3*results*.json in workspace ==="
          find "${GITHUB_WORKSPACE}" -maxdepth 12 -name "hypatiax_defi_benchmark_v3*results*.json" 2>/dev/null | sort || echo "(none)"
          echo "=== ALL protocol_core_noiseless_*.json in workspace ==="
          find "${GITHUB_WORKSPACE}" -maxdepth 12 -name "protocol_core_noiseless_*.json" 2>/dev/null | sort || echo "(none)"
          echo "=== OUT_BASE full tree ==="
          find "${OUT_BASE}" -type f 2>/dev/null | sort || echo "(empty or missing)"
          echo "=== RESULT_SUBDIR target ==="
          find "${OUT_BASE}/${RESULT_SUBDIR}" -type f 2>/dev/null | sort || echo "(empty or missing)"

      # -- FIX-G5: Safety-net extraction ----------------------------------------
      # Rescues computed results from the per-shard checkpoint into RESULTS_DIR
      # when the experiment script crashes after writing checkpoint entries but
      # before writing its final JSON/CSV outputs.  Runs unconditionally (always())
      # so it fires even if "Run experiment tasks" exits non-zero.
      # Strategy: iterate every task ID in the shard checkpoint's "completed" list;
      # for each one, glob for any matching JSON/CSV in the workspace root and move
      # it into the canonical RESULTS_DIR path so the artifact upload step finds it.
      - name: Safety-net - rescue results from shard checkpoint (FIX-G5)
        if: always()
        env:
          EXP:           ${{ needs.plan.outputs.exp_id }}
          RESULT_SUBDIR: ${{ needs.plan.outputs.result_subdir }}
        run: |
          python3 - <<'PYEOF'
          import glob, json, os, shutil

          shard_idx  = os.environ["SHARD_INDEX"]
          ckpt_path  = f"checkpoint_worker_shard{shard_idx}.json"
          result_dir = os.path.join(os.environ["OUT_BASE"], os.environ["RESULT_SUBDIR"])
          os.makedirs(result_dir, exist_ok=True)

          if not os.path.exists(ckpt_path):
              print(f"No shard checkpoint found at {ckpt_path} - nothing to rescue.")
          else:
              try:
                  completed = json.load(open(ckpt_path)).get("completed", [])
              except Exception as e:
                  print(f"Could not read checkpoint: {e}")
                  completed = []

              rescued = 0
              EXP = os.environ.get("EXP", "")
              # Experiments that write ONE combined output file per shard rather
              # than one file per task ID.  For these, checkpoint.completed is
              # empty until "Save shard checkpoint" runs (which comes AFTER this
              # step), so rescue by filename pattern instead of task ID.
              #
              # suppB  writes one noise_sweep_noise{NL}_*.json per shard
              #        (one file covering all 11 Feynman domains for a single
              #        noise level).  Task IDs are "noise{NL}__{domain}" — the
              #        dot in the noise level (e.g. 0.0) is replaced to "_" for
              #        safe globbing, but the output filename uses the raw NL
              #        value, making per-task-ID globs unreliable.
              # suppB_sc writes one sample_complexity_n{N}_*.json per shard
              #          (one file covering all 11 domains for a single sample
              #          size).  Task IDs are "sc_n{N}__{domain}"; same issue.
              # exp1/exp1b: one aggregated JSON for all tasks (see FIX-G5-EXP1).
              COMBINED_OUTPUT_EXPS = {"exp1", "exp1b", "suppB", "suppB_sc"}
              # FIX-SHARD-IDS-SCOPE: assign shard_ids BEFORE the if/else so that
              # the else branch (non-combined experiments) can reference it without
              # a NameError.  Previously shard_ids was only assigned inside the
              # if-block, causing "NameError: name 'shard_ids' is not defined" for
              # any experiment not in COMBINED_OUTPUT_EXPS.
              shard_ids = json.loads(os.environ.get("SHARD_IDS") or "[]")

              if EXP in COMBINED_OUTPUT_EXPS:
                  # FIX-SHARD-SCOPE: mirror the same shard-keyed glob logic used
                  # in "Save shard checkpoint" so we rescue only THIS shard's
                  # output files, not other shards' files that land in the shared
                  # result_dir before this step runs.
                  if EXP == "suppB":
                      first_id = shard_ids[0] if shard_ids else ""
                      nl_raw   = first_id.split("__")[0][len("noise"):] if first_id else ""
                      nl_safe  = nl_raw.replace(".", "_")
                      combined_globs = [
                          f"noise_sweep_noise{nl_safe}_*.json",
                          f"noise_sweep_noise{nl_safe}_*.csv",
                          f"noise_sweep_noise{nl_raw}_*.json",
                          f"noise_sweep_noise{nl_raw}_*.csv",
                      ]
                  elif EXP == "suppB_sc":
                      first_id = shard_ids[0] if shard_ids else ""
                      n_val    = first_id.split("__")[0][len("sc_n"):] if first_id else ""
                      combined_globs = [
                          f"sample_complexity_n{n_val}_*.json",
                          f"sample_complexity_n{n_val}_*.csv",
                      ]
                  elif EXP == "exp1b":
                      shard_ids_local = json.loads(os.environ.get("SHARD_IDS") or "[]")
                      seeds_this_shard = [
                          tid[len("portfolio_seed"):] for tid in shard_ids_local
                      ]
                      # FIX-PVA (corrected): confirmed by reading
                      # hypatiax_defi_benchmark_v3c.py directly —
                      # comparison_FIXED_*seed{s}* is NOT a filename this
                      # script ever produces. Its only outputs are the fixed,
                      # UNsuffixed names FINAL_OUTPUT/CHECKPOINT_FILE =
                      # hypatiax_defi_benchmark_v3_results.json /
                      # hypatiax_defi_benchmark_v3_checkpoint.json (no seed
                      # or task ID embedded) — per-shard isolation is meant
                      # to happen via a shard-specific RESULT_SUBDIR/OUT_BASE
                      # set by the caller, not via the filename. If that
                      # subdir wiring points at the wrong place for a given
                      # shard (e.g. a stray "portfolio_variance_audit/" dir
                      # instead of the canonical comparison_results/
                      # noise-noiseless/15/), the file still lands somewhere
                      # under hypatiax/data/results/ — just not where the
                      # canonical RESULT_SUBDIR-scoped search below looks.
                      # Keep the comparison_FIXED_*seed{s}* patterns as a
                      # harmless no-op in case a future script variant uses
                      # them, but the patterns that actually matter are the
                      # real filenames, searched recursively under OUT_BASE
                      # root (not just the one known stray dir name, since
                      # the wrong-subdir bug can point anywhere).
                      PVA_DIR = "hypatiax/data/results/portfolio_variance_audit"
                      REAL_NAMES = [
                          "hypatiax_defi_benchmark_v3*results*.json",
                          "hypatiax_defi_benchmark_v3*checkpoint*.json",
                      ]
                      combined_globs = []
                      for s in seeds_this_shard:
                          combined_globs += [
                              f"*comparison_FIXED_*seed{s}*.json",
                              f"*comparison_FIXED_*seed{s}*.csv",
                              f"{PVA_DIR}/*seed{s}*.json",
                              f"{PVA_DIR}/*seed{s}*.csv",
                              f"{PVA_DIR}/**/*seed{s}*.json",
                              f"{PVA_DIR}/**/*seed{s}*.csv",
                          ]
                      for pat in REAL_NAMES:
                          combined_globs += [
                              pat,                      # CWD root
                              f"{PVA_DIR}/{pat}",        # known stray dir, flat
                              f"{PVA_DIR}/**/{pat}",     # known stray dir, nested
                              f"hypatiax/data/results/**/{pat}",  # anywhere under OUT_BASE
                          ]
                      if not combined_globs:
                          combined_globs = ["*comparison_FIXED_*.json",
                                            "*comparison_FIXED_*.csv",
                                            f"{PVA_DIR}/*.json",
                                            f"{PVA_DIR}/*.csv",
                                            f"{PVA_DIR}/**/*.json",
                                            f"{PVA_DIR}/**/*.csv"]
                  else:
                      # exp1: single shard — broad globs are safe.
                      combined_globs = [
                          "*hypatiax_defi_benchmark*results*.json",
                          "*defi_benchmark*results*.json",
                      ]

                  for pat in combined_globs:
                      # recursive=True is required for the exp1b "**" patterns
                      # above; it is a no-op for patterns without "**" so this
                      # does not change behavior for suppB/suppB_sc/exp1.
                      for src in glob.glob(pat, recursive=True):
                          dst = os.path.join(result_dir, os.path.basename(src))
                          if os.path.abspath(src) == os.path.abspath(dst):
                              continue
                          if not os.path.exists(dst):
                              shutil.move(src, dst)
                              print(f"  rescued [{EXP}]: {src}  ->  {dst}")
                              rescued += 1
              else:
                  for tid in completed:
                      safe = tid.replace("/", "_").replace(".", "_")
                      for pattern in (f"*{safe}*.json", f"*{safe}*.csv"):
                          for src in glob.glob(pattern):
                              dst = os.path.join(result_dir, os.path.basename(src))
                              if src == dst or os.path.abspath(src) == os.path.abspath(dst):
                                  continue
                              if not os.path.exists(dst):
                                  shutil.move(src, dst)
                                  print(f"  rescued: {src}  ->  {dst}")
                                  rescued += 1
              print(f"Safety-net rescue complete: {rescued} file(s) moved for shard {shard_idx}")
          PYEOF

      # -- Store results in canonical RESULT_SUBDIR (all experiments) -----------
      # Some experiment scripts write their primary output to the OUT_BASE root
      # (e.g. hypatiax_defi_benchmark_v3c.py → OUT_BASE/hypatiax_defi_benchmark_v3_results.json)
      # rather than to the canonical RESULT_SUBDIR.  The move_matching function
      # in "Move results to RESULTS_DIR" excludes files already inside OUT_BASE
      # (-not -path "./${RESULTS_DIR}/*"), so those root-level files are never
      # relocated into the subdir.
      #
      # This step fixes that gap for every experiment: it scans OUT_BASE root
      # (one level deep, non-recursive) for any JSON/CSV that is NOT a
      # merge_shards.py meta-file (_merged / _stats / _checkpoint) and copies
      # it into OUT_BASE/RESULT_SUBDIR/ so the artifact upload, ci_consolidate,
      # and ci_all_checkpoint.yml all find results at the canonical path.
      #
      # cp is used (not mv) so the original file remains reachable during this
      # run in case another step still needs it; duplicates are harmless.
      - name: Store results in canonical RESULT_SUBDIR
        if: always()
        env:
          RESULTS_DIR:   ${{ github.workspace }}/${{ env.OUT_BASE }}
          RESULT_SUBDIR: ${{ needs.plan.outputs.result_subdir }}
          EXP:           ${{ needs.plan.outputs.exp_id }}
        run: |
          set -euo pipefail
          SRC="${RESULTS_DIR}"
          DEST="${RESULTS_DIR}/${RESULT_SUBDIR}"
          mkdir -p "${DEST}"

          # STALE-FILE FIX: remove previously-committed (git-tracked) JSON/CSV
          # files from DEST before copying in the current run's outputs.
          # Without this, every run appends its fresh timestamp-named files on
          # top of those already committed by prior runs, causing the directory
          # to grow unboundedly.  Only git-tracked files are removed (files
          # written earlier in this run but not yet committed are preserved).
          #
          # EXCEPTION: skip store-prune entirely for exp2_feynman_extrap's
          # feynman_tests/exp2_extrap directory.  protocol_core_extrap_*.json
          # and benchmark_results_extrap.json are written directly into TARGET
          # (and therefore DEST) before this step runs; pruning them here
          # deletes the current run's primary outputs before the artifact
          # upload and git commit can pick them up.
          _extrap_dest="${RESULTS_DIR}/comparison_results/feynman-tests/exp2_extrap"
          if [[ "$(realpath "${DEST}" 2>/dev/null || echo "${DEST}")" != "$(realpath "${_extrap_dest}" 2>/dev/null || echo "${_extrap_dest}")" ]]; then
            # RUN-START MARKER FIX: git-tracked status alone can't tell a
            # genuinely stale committed file (from a prior run) apart from a
            # file this run just wrote into a path that happens to already be
            # git-tracked (e.g. exp1b writing straight into its canonical,
            # previously-committed RESULT_SUBDIR). Use the marker touched at
            # the start of "Run experiment tasks" as the cutoff: anything
            # written at or after that time belongs to THIS run and must never
            # be pruned, tracked or not.
            RUN_START_MARKER="${RESULTS_DIR}/.run_start_marker_shard${SHARD_INDEX}"
            if [[ -f "${RUN_START_MARKER}" ]]; then
              RUN_START_EPOCH=$(stat -c %Y "${RUN_START_MARKER}" 2>/dev/null || stat -f %m "${RUN_START_MARKER}" 2>/dev/null || echo 0)
            else
              echo "  store prune: WARNING - run start marker not found (${RUN_START_MARKER}); treating all files as prunable by git status only."
              RUN_START_EPOCH=0
            fi
            pruned_store=0
            while IFS= read -r f; do
              [[ -f "$f" ]] || continue
              fname=$(basename "$f")
              # Never prune merge_shards meta-files — they are intentionally stable.
              # Also never prune shard-suffixed snapshots (e.g. *_shard0.json)
              # such as exp1_ablation_results_shard${SHARD_INDEX}.json written by
              # "Preserve shard-specific exp1_ablation output" above — each one
              # belongs to a different shard and must not be clobbered by a
              # later shard's prune-then-overwrite pass (FIX-EXP1ABL-SHARD-CLOBBER).
              [[ "$fname" == _merged* || "$fname" == _stats* || "$fname" == _checkpoint* ]] && continue
              [[ "$fname" =~ _shard[0-9]+\.(json|csv)$ ]] && continue
              f_mtime=$(stat -c %Y "$f" 2>/dev/null || stat -f %m "$f" 2>/dev/null || echo 0)
              if [[ "$f_mtime" -ge "$RUN_START_EPOCH" ]]; then
                echo "  store prune: SKIP (written this run, mtime >= run-start marker): $f"
                continue
              fi
              if git ls-files --error-unmatch "$f" >/dev/null 2>&1; then
                echo "  store prune: removing stale committed file: $f"
                git rm --cached --quiet "$f" 2>/dev/null || true
                rm -f "$f"
                pruned_store=$((pruned_store + 1))
              fi
            done < <(find "${DEST}" -maxdepth 1 -type f \( -name "*.json" -o -name "*.csv" \) 2>/dev/null)
            [[ $pruned_store -gt 0 ]] && echo "Store results: pruned ${pruned_store} stale committed file(s) from ${DEST}" || true
          else
            echo "Store results: skipping store-prune for exp2_extrap dir (protocol_core_extrap_* and benchmark_results_extrap.json must not be pruned)."
          fi

          copied=0
          # One-level scan of OUT_BASE root: pick up any JSON/CSV not already
          # inside a subdirectory (maxdepth 1 excludes all subdir contents).
          while IFS= read -r f; do
            [[ -e "$f" ]] || continue
            fname=$(basename "$f")
            # Skip merge_shards.py meta-files — these belong in root by design
            [[ "$fname" == _merged* || "$fname" == _stats* || "$fname" == _checkpoint* ]] && continue
            # Skip if src is already inside DEST (already in subdir)
            [[ "$(realpath "$f")" == "$(realpath "${DEST}")"/* ]] && continue
            dest_f="${DEST}/${fname}"
            # FIX-EXP1B-RACE: hypatiax_defi_benchmark_v3c.py writes
            # contradiction_audit_report.json and fixc3_baseline.json under a
            # fixed, non-seed-scoped name on every run. exp1b's shards are
            # fully parallel, independent runners all writing into the SAME
            # RESULT_SUBDIR — the collision check below only sees THIS
            # runner's own local disk, which never has the file yet on a
            # shard's first write, so no shard gets suffixed and two shards
            # race to push the identical remote filename. The loser's
            # `git pull --rebase` hits an untracked-file conflict and the
            # follow-up `git stash pop` fails, silently losing that shard's
            # real results (confirmed run 29824228663, shards 0/1/3/4 lost
            # to shard 2). Suffix these known-racy filenames unconditionally
            # instead of relying on a same-runner collision check that can't
            # see other shards.
            if [[ "${EXP:-}" == "exp1b" && ( "$fname" == "contradiction_audit_report.json" || "$fname" == "fixc3_baseline.json" ) ]]; then
              stem="${fname%.*}"; ext="${fname##*.}"
              dest_f="${DEST}/${stem}_shard${SHARD_INDEX}.${ext}"
            fi
            if [[ -e "$dest_f" ]]; then
              # If the colliding file is already git-tracked it is a committed
              # result from a prior run, not a stray output from this run.
              # Renaming it produces a double-suffixed corrupted file on re-run.
              # Skip it; the move block gave this run's output a unique name.
              if git ls-files --error-unmatch "${dest_f}" >/dev/null 2>&1; then
                echo "  SKIP: ${fname} is git-tracked in dest — committed prior result, skipping."
                continue
              fi
              # BUG B FIX: do NOT silently skip — a file with the same name from a
              # different shard or run already exists.  Disambiguate by inserting
              # _shard<N>_run<run_id> before the extension so no data is lost.
              stem="${fname%.*}"; ext="${fname##*.}"
              if [[ "$stem" == "$fname" ]]; then
                # no extension
                dest_f="${DEST}/${fname}_shard${SHARD_INDEX}_run${{ github.run_id }}"
              else
                dest_f="${DEST}/${stem}_shard${SHARD_INDEX}_run${{ github.run_id }}.${ext}"
              fi
              echo "  COLLISION: ${fname} already in dest — storing as $(basename "$dest_f")"
            fi
            cp -v "$f" "${dest_f}"
            copied=$((copied + 1))
          done < <(find "${SRC}" -maxdepth 1 -type f \( -name "*.json" -o -name "*.csv" \))

          if [[ $copied -gt 0 ]]; then
            echo "Store results: ${copied} file(s) copied from OUT_BASE root → ${DEST}"
          else
            echo "Store results: no stray root-level files found (all outputs already in subdir)."
          fi

          # FIX-PVA: hypatiax_defi_benchmark_v3c.py (portfolio mode, exp1b) writes
          # its per-seed audit output into a NESTED subdirectory,
          # ${RESULTS_DIR}/portfolio_variance_audit/, one level below OUT_BASE
          # root. The root scan above is "maxdepth 1" by design and never
          # descends into it, so this data was previously left stranded there —
          # never copied into DEST, never staged/committed, and never counted
          # by the checkpoint or ci_pipeline_check.yml's completion gate.
          # Recurse into it explicitly and copy (not move, matching the
          # cp-not-mv policy above) everything into DEST.
          if [[ "${EXP:-}" == "exp1b" ]]; then
            PVA_DIR="${RESULTS_DIR}/portfolio_variance_audit"
            if [[ -d "${PVA_DIR}" ]]; then
              pva_copied=0
              while IFS= read -r f; do
                [[ -e "$f" ]] || continue
                fname=$(basename "$f")
                [[ "$fname" == _merged* || "$fname" == _stats* || "$fname" == _checkpoint* ]] && continue
                dest_f="${DEST}/${fname}"
                # FIX-EXP1B-RACE: see matching comment in the root-scan loop
                # above — suffix these known non-seed-scoped filenames
                # unconditionally so parallel shards can never race to push
                # the identical remote filename.
                if [[ "$fname" == "contradiction_audit_report.json" || "$fname" == "fixc3_baseline.json" ]]; then
                  stem="${fname%.*}"; ext="${fname##*.}"
                  dest_f="${DEST}/${stem}_shard${SHARD_INDEX}.${ext}"
                fi
                if [[ -e "$dest_f" ]]; then
                  if git ls-files --error-unmatch "${dest_f}" >/dev/null 2>&1; then
                    echo "  SKIP: ${fname} is git-tracked in dest — committed prior result, skipping."
                    continue
                  fi
                  stem="${fname%.*}"; ext="${fname##*.}"
                  if [[ "$stem" == "$fname" ]]; then
                    dest_f="${DEST}/${fname}_shard${SHARD_INDEX}_run${{ github.run_id }}"
                  else
                    dest_f="${DEST}/${stem}_shard${SHARD_INDEX}_run${{ github.run_id }}.${ext}"
                  fi
                  echo "  COLLISION: ${fname} already in dest — storing as $(basename "$dest_f")"
                fi
                cp -v "$f" "${dest_f}"
                pva_copied=$((pva_copied + 1))
              done < <(find "${PVA_DIR}" -type f \( -name "*.json" -o -name "*.csv" \))
              if [[ $pva_copied -gt 0 ]]; then
                echo "Store results: ${pva_copied} file(s) rescued from portfolio_variance_audit/ → ${DEST}"
              else
                echo "Store results: portfolio_variance_audit/ exists but contained no JSON/CSV files."
              fi
            fi
          fi

          # FIX-EXP2-FLATFILE: run_comparative_suite_benchmark_v2.py always writes
          # benchmark_results.json to _FLAT_OUTPUT_DIR, a fixed path one level below
          # OUT_BASE root (${RESULTS_DIR}/comparison_results/benchmark_results.json),
          # deliberately never nested under --output-dir so concurrent noise-sweep /
          # sample-complexity runs can't bury or clobber it (see run_comparative_suite_
          # benchmark_v2.py's _FLAT_OUTPUT_DIR / _checkpoint_path()). The root scan
          # above is "maxdepth 1" against OUT_BASE itself and never descends into
          # comparison_results/, so this file was previously left stranded one level
          # too deep for that scan to find it — never copied into DEST, never staged
          # by "git add -f ${TARGET}" below, and therefore never committed. It only
          # ever existed on the runner that produced it and was lost when that runner
          # was torn down, leaving downstream consumers (merge_extrap_into_benchmark.py
          # via exp2_feynman_extrap, which requires benchmark_results.json under
          # --benchmark-dir) with nothing to find on a later, separate job's fresh
          # checkout. "Verify exp2_feynman output files exist" didn't catch this
          # because its check is an OR against protocol_core_*.json, which IS present.
          #
          # Fix: explicitly copy (not move — other experiments read the same flat
          # file) benchmark_results.json into DEST if present, so the existing
          # commit step picks it up like any other exp2_feynman output.
          if [[ "${EXP:-}" == "exp2_feynman" ]]; then
            FLAT_BENCH="${RESULTS_DIR}/comparison_results/benchmark_results.json"
            if [[ -f "${FLAT_BENCH}" ]]; then
              dest_f="${DEST}/benchmark_results.json"
              if [[ -e "${dest_f}" ]] && git ls-files --error-unmatch "${dest_f}" >/dev/null 2>&1; then
                echo "  SKIP: benchmark_results.json is git-tracked in dest — committed prior result, skipping."
              else
                cp -v "${FLAT_BENCH}" "${dest_f}"
                echo "Store results: benchmark_results.json rescued from flat ${RESULTS_DIR}/comparison_results/ → ${DEST}"
              fi
            else
              echo "::warning::Store results: benchmark_results.json not found at ${FLAT_BENCH} for exp2_feynman — merge_extrap_into_benchmark.py will fail to find it later."
            fi
          fi

          find "${DEST}" -type f | sort || true

      # -- Verify exp1 output files exist before upload -------------------------
      # hypatiax_defi_benchmark_v3c.py writes hypatiax_defi_benchmark_v3*results*.json.
      # If none are found, the artifact upload will be empty and consolidate will abort.
      - name: Verify exp1 output files exist
        if: ${{ needs.plan.outputs.exp_id == 'exp1' && steps.resolve_ids.outputs.has_work == 'true' }}
        env:
          RESULTS_ROOT: ${{ github.workspace }}/hypatiax/data/results
        run: |
          set -euo pipefail

          TARGET="${RESULTS_ROOT}/comparison_results/noise-noiseless/noiseless/defi"

          echo "PWD=$(pwd)"
          echo "TARGET=${TARGET}"

          if [[ ! -d "${TARGET}" ]]; then
            echo "::error::Target directory does not exist: ${TARGET}"
            exit 1
          fi

          COUNT_PRIMARY=$(find "${TARGET}" -name "hypatiax_defi_benchmark_v3*results*.json" 2>/dev/null | wc -l)
          COUNT_LEGACY=$(find  "${TARGET}" -name "protocol_core_noiseless_*.json" 2>/dev/null | wc -l)
          COUNT_TOTAL=$((COUNT_PRIMARY + COUNT_LEGACY))

          echo "=== exp1 output verification ==="
          echo "  Primary files : ${COUNT_PRIMARY}"
          echo "  Legacy files  : ${COUNT_LEGACY}"
          echo "  Total files   : ${COUNT_TOTAL}"
          find "${TARGET}" -type f | sort || true

          if [[ "${COUNT_TOTAL}" -eq 0 ]]; then
            echo "::error::exp1 produced NO output files in '${TARGET}'."
            echo "  Expected: hypatiax_defi_benchmark_v3*results*.json or protocol_core_noiseless_*.json"
            echo "  The experiment script may have written files under a different name."
            echo "  Check the 'Run experiment tasks' log for errors and actual output filenames."
            exit 1
          fi

          echo "OK exp1 output files present."

      # -- Verify exp1b output files exist before upload ------------------------
      # ITEM 3 FIX: exp1b had no verification step — path mismatches were invisible.
      # hypatiax_defi_benchmark_v3c.py (portfolio mode) writes:
      #   hypatiax_defi_benchmark_v3_results.json  <- primary output (always present)
      #   comparison_FIXED_*.json                  <- secondary (may be absent on first run)
      # After move_matching they must land in:
      #   hypatiax/data/results/comparison_results/noise-noiseless/15/
      # If none are found, the artifact upload will be empty and the repo commit
      # will contain nothing — silent data loss.
      - name: Verify exp1b output files exist
        if: ${{ needs.plan.outputs.exp_id == 'exp1b' && steps.resolve_ids.outputs.has_work == 'true' }}
        env:
          RESULTS_ROOT: ${{ github.workspace }}/hypatiax/data/results
        run: |
          set -euo pipefail
          TARGET="${RESULTS_ROOT}/comparison_results/noise-noiseless/15"
          COUNT_BENCHMARK=$(find "${TARGET}" -name "hypatiax_defi_benchmark_v3*results*.json" 2>/dev/null | wc -l)
          COUNT_FIXED=$(find "${TARGET}" -name "comparison_FIXED_*.json" 2>/dev/null | wc -l)
          COUNT_DEFI=$(find  "${TARGET}" -name "defi_v3_*.json"          2>/dev/null | wc -l)
          COUNT_PORT=$(find  "${TARGET}" -name "*portfolio*variance*.json" 2>/dev/null | wc -l)
          COUNT_TOTAL=$(( COUNT_BENCHMARK + COUNT_FIXED + COUNT_DEFI + COUNT_PORT ))
          echo "=== exp1b output verification ==="
          echo "  Target dir                              : ${TARGET}"
          echo "  hypatiax_defi_benchmark_v3*results*.json: ${COUNT_BENCHMARK}"
          echo "  comparison_FIXED_*.json                 : ${COUNT_FIXED}"
          echo "  defi_v3_*.json                          : ${COUNT_DEFI}"
          echo "  *portfolio*variance*.json               : ${COUNT_PORT}"
          echo "  Total                                   : ${COUNT_TOTAL}"
          echo "--- Directory listing ---"
          find "${TARGET}" -type f 2>/dev/null | sort || true
          if [[ "${COUNT_TOTAL}" -eq 0 ]]; then
            echo "::error::exp1b produced NO output files in '${TARGET}'."
            echo "  Expected: hypatiax_defi_benchmark_v3*results*.json, comparison_FIXED_*.json,"
            echo "            defi_v3_*.json, or *portfolio*variance*.json"
            echo "  The script may have written to a different path.  Check:"
            echo "    1. 'exp1b post-run file scan' in the Run experiment tasks log"
            echo "    2. 'Move results to RESULTS_DIR' step log for exp1b"
            echo "  Also confirm RESULTS_DIR env was set to $(pwd)/${OUT_BASE} (absolute)."
            exit 1
          fi
          echo "  OK exp1b output files present in canonical path."

      # -- Verify output files exist for ALL remaining experiments ------------
      # ITEM 4 (ALL EXPERIMENTS): ensures every experiment's result files land
      # in the canonical RESULT_SUBDIR before the artifact upload step.
      # Each experiment verifies at least one file exists matching its primary
      # output glob; fails loudly so path/naming mismatches surface immediately.
      - name: Verify exp2_feynman output files exist
        if: ${{ needs.plan.outputs.exp_id == 'exp2_feynman' && steps.resolve_ids.outputs.has_work == 'true' }}
        env:
          RESULT_SUBDIR: ${{ needs.plan.outputs.result_subdir }}
        run: |
          TARGET="${{ github.workspace }}/${OUT_BASE}/${RESULT_SUBDIR}"
          COUNT=$(find "${TARGET}" \( -name "protocol_core_*.json" -o -name "benchmark_results.json" \) 2>/dev/null | wc -l)
          echo "=== exp2_feynman output verification ==="
          echo "  Target dir       : ${TARGET}"
          echo "  protocol_core_* / benchmark_results: ${COUNT}"
          find "${TARGET}" -type f 2>/dev/null | sort || true
          if [[ "${COUNT}" -eq 0 ]]; then
            echo "::error::exp2_feynman produced NO output files in '${TARGET}'."
            echo "  Expected: protocol_core_*.json or benchmark_results.json"
            exit 1
          fi
          echo "  OK exp2_feynman output files present."

      - name: Verify exp2 output files exist
        if: ${{ needs.plan.outputs.exp_id == 'exp2' && steps.resolve_ids.outputs.has_work == 'true' }}
        env:
          RESULT_SUBDIR: ${{ needs.plan.outputs.result_subdir }}
        run: |
          TARGET="${{ github.workspace }}/${OUT_BASE}/${RESULT_SUBDIR}"
          COUNT=$(find "${TARGET}" \( -name "protocol_core_*.json" -o -name "benchmark_results.json" \) 2>/dev/null | wc -l)
          echo "=== exp2 output verification ==="
          echo "  Target dir   : ${TARGET}"
          echo "  File count   : ${COUNT}"
          find "${TARGET}" -type f 2>/dev/null | sort || true
          if [[ "${COUNT}" -eq 0 ]]; then
            echo "::error::exp2 produced NO output files in '${TARGET}'."
            exit 1
          fi
          echo "  OK exp2 output files present."

      # -- Verify exp2_feynman_extrap output files ----------------------------------
      # Checks that both the detailed protocol JSONs AND benchmark_results_extrap.json
      # landed in feynman-tests/exp2_extrap after the extrap run.
      # benchmark_results_extrap.json is specifically required by
      # merge_extrap_into_benchmark.py --extrap-benchmark-dir; its absence means
      # ablation_paired.json will be empty and the Mann-Whitney test will emit
      # TOO_FEW_MW_PAIRS.
      - name: Verify exp2_feynman_extrap output files exist
        if: ${{ needs.plan.outputs.exp_id == 'exp2_feynman_extrap' && steps.resolve_ids.outputs.has_work == 'true' }}
        env:
          RESULT_SUBDIR: ${{ needs.plan.outputs.result_subdir }}
        run: |
          TARGET="${{ github.workspace }}/${OUT_BASE}/${RESULT_SUBDIR}"
          COUNT_PROTO=$(find "${TARGET}" -name "protocol_core_extrap_*.json" 2>/dev/null | wc -l)
          # FIX-E6: benchmark_results_extrap.json is renamed to
          # benchmark_results_extrap_shard<N>_run<run_id>.json by the move block.
          # Match the renamed glob; also accept the bare name for backwards-compat.
          COUNT_BENCH=$(find "${TARGET}" \( -name "benchmark_results_extrap_shard*.json" -o -name "benchmark_results_extrap.json" \) 2>/dev/null | wc -l)
          echo "=== exp2_feynman_extrap output verification ==="
          echo "  Target dir                                    : ${TARGET}"
          echo "  protocol_core_extrap_*.json                   : ${COUNT_PROTO}"
          echo "  benchmark_results_extrap[_shard*].json        : ${COUNT_BENCH}"
          find "${TARGET}" -type f 2>/dev/null | sort || true
          if [[ "${COUNT_PROTO}" -eq 0 ]]; then
            echo "::error::exp2_feynman_extrap produced NO protocol_core_extrap_*.json in '${TARGET}'."
            echo "  The --extrap run may have crashed before writing results."
            echo "  Check the 'Run experiment tasks' log for errors."
            exit 1
          fi
          if [[ "${COUNT_BENCH}" -eq 0 ]]; then
            echo "::warning::benchmark_results_extrap[_shard*].json not found in '${TARGET}'."
            echo "  This file is required by merge_extrap_into_benchmark.py --extrap-benchmark-dir."
            echo "  Ensure run_comparative_suite_benchmark_v2.py v2.2+ is being used (--extrap support)."
            echo "  The merge step will fall back to --extrap-dir (extrap_results_*.json) if present."
          else
            echo "  OK benchmark_results_extrap[_shard*].json present — merge step has primary extrap source."
          fi
          echo "  OK exp2_feynman_extrap protocol files present (${COUNT_PROTO} file(s))."

      - name: Verify exp3/exp3b output files exist
        if: ${{ (needs.plan.outputs.exp_id == 'exp3' || needs.plan.outputs.exp_id == 'exp3b') && steps.resolve_ids.outputs.has_work == 'true' }}
        run: |
          EXP="${{ needs.plan.outputs.exp_id }}"
          TARGET="${{ github.workspace }}/${OUT_BASE}/${RESULT_SUBDIR}"
          COUNT=$(find "${TARGET}" -name "*.json" 2>/dev/null | wc -l)
          echo "=== ${EXP} output verification ==="
          echo "  Target dir  : ${TARGET}"
          echo "  JSON count  : ${COUNT}"
          find "${TARGET}" -type f 2>/dev/null | sort || true
          if [[ "${COUNT}" -eq 0 ]]; then
            echo "::error::${EXP} produced NO output files in '${TARGET}'."
            exit 1
          fi

          # FIX-SEED-CHECK: the generic *.json count above is also satisfied
          # by files that exist regardless of whether exp3/exp3b actually
          # ran (e.g. _checkpoint_shard*.json, fixc3_baseline.json), so a
          # completely failed experiment script (e.g. a missing dependency
          # causing an ImportError before any result is written) still
          # passed this check. exp3/exp3b's real output is
          # exp3_nguyen12_seed*.json — require it explicitly so a failed
          # run is caught here instead of three jobs downstream in
          # ci_analysis.yml's symbolic equivalence check.
          SEED_COUNT=$(find "${TARGET}" -maxdepth 1 -name "exp3_nguyen12_seed*.json" 2>/dev/null | wc -l)
          echo "  Seed-file count (exp3_nguyen12_seed*.json): ${SEED_COUNT}"
          if [[ "${SEED_COUNT}" -eq 0 ]]; then
            echo "::error::${EXP} produced no exp3_nguyen12_seed*.json files in '${TARGET}' — the experiment script likely failed (check the 'Run experiment tasks' log for a traceback) even though other JSON files (checkpoint/baseline) are present."
            exit 1
          fi

          echo "  OK ${EXP} output files present (${SEED_COUNT} seed file(s))."

      - name: Verify suppA output files exist
        if: ${{ needs.plan.outputs.exp_id == 'suppA' && steps.resolve_ids.outputs.has_work == 'true' }}
        run: |
          TARGET="${{ github.workspace }}/${OUT_BASE}/${RESULT_SUBDIR}"
          COUNT=$(find "${TARGET}" -name "*.json" 2>/dev/null | wc -l)
          echo "=== suppA output verification ==="
          echo "  Target dir: ${TARGET}  JSON files: ${COUNT}"
          find "${TARGET}" -type f 2>/dev/null | sort || true
          if [[ "${COUNT}" -eq 0 ]]; then
            echo "::error::suppA produced NO output files in '${TARGET}'."
            exit 1
          fi
          echo "  OK suppA output files present."

      - name: Verify hybrid_all_domains output files exist
        if: ${{ needs.plan.outputs.exp_id == 'hybrid_all_domains' && steps.resolve_ids.outputs.has_work == 'true' }}
        env:
          RESULT_SUBDIR: ${{ needs.plan.outputs.result_subdir }}
        run: |
          TARGET="${{ github.workspace }}/${OUT_BASE}/${RESULT_SUBDIR}"
          COUNT=$(find "${TARGET}" -name "hybrid_llm_nn_all_domains_*.json" 2>/dev/null | wc -l)
          echo "=== hybrid_all_domains output verification ==="
          echo "  Target dir: ${TARGET}"
          echo "  hybrid_llm_nn_all_domains_*.json: ${COUNT}"
          find "${TARGET}" -type f 2>/dev/null | sort || true
          if [[ "${COUNT}" -eq 0 ]]; then
            echo "::error::hybrid_all_domains produced NO output files in '${TARGET}'."
            echo "  Expected: hybrid_llm_nn_all_domains_*.json"
            exit 1
          fi
          echo "  OK hybrid_all_domains output files present."

      - name: Verify instability output files exist
        if: ${{ needs.plan.outputs.exp_id == 'instability' && steps.resolve_ids.outputs.has_work == 'true' }}
        env:
          RESULT_SUBDIR: ${{ needs.plan.outputs.result_subdir }}
        run: |
          TARGET="${{ github.workspace }}/${OUT_BASE}/${RESULT_SUBDIR}"
          COUNT_CSV=$(find "${TARGET}" -name "instability_analysis.csv" 2>/dev/null | wc -l)
          echo "=== instability output verification ==="
          echo "  Target dir               : ${TARGET}"
          echo "  instability_analysis.csv : ${COUNT_CSV}"
          find "${TARGET}" -type f 2>/dev/null | sort || true
          # FIX-INSTABILITY-CSV-RESCUE (CI-side mirror): run_all.sh's instability
          # step already attempts to rescue a misplaced instability_analysis.csv
          # into TARGET, but as a second line of defense (e.g. if run_all.sh was
          # invoked with an older revision, or the rescue's `find` missed it for
          # some reason), retry the same rescue here before failing the gate.
          # See 2026-06-26 CI run 28252247591: run_instability_suite.py exited 0,
          # wrote all 46 figures correctly under TARGET, but the CSV landed at
          # github.workspace/figures/instability_analysis.csv instead of TARGET.
          if [[ "${COUNT_CSV}" -eq 0 ]]; then
            echo "=== locating instability_analysis.csv ==="
            STRAY_CSV=$(find "${{ github.workspace }}" -name "instability_analysis.csv" 2>/dev/null | xargs -r ls -t 2>/dev/null | head -1 || true)
            echo "  Stray CSV found: ${STRAY_CSV:-<none>}"
            if [[ -n "${STRAY_CSV}" && -s "${STRAY_CSV}" ]]; then
              echo "  Rescuing into canonical location: ${TARGET}/instability_analysis.csv"
              mkdir -p "${TARGET}"
              cp "${STRAY_CSV}" "${TARGET}/instability_analysis.csv"
              COUNT_CSV=1
            fi
          fi
          if [[ "${COUNT_CSV}" -eq 0 ]]; then
            echo "::error::instability produced NO instability_analysis.csv in '${TARGET}' (and no stray copy found anywhere in the workspace)."
            exit 1
          fi
          # FIX-INSTABILITY-ZEROROWS: the file existing is not sufficient — a
          # run with no exp1 DeFi data still writes a valid but empty CSV
          # ("Loaded 0 cases", mean_stab=nan for Hybrid/NN/LLM) and passes this
          # check as written. Count rows to catch that case explicitly.
          # See 2026-06-26 CI run 28252247591 for the failure this guards against.
          COUNT_ROWS=$(python3 -c "
          import csv, pathlib
          f = pathlib.Path('${TARGET}/instability_analysis.csv')
          print(sum(1 for _ in csv.DictReader(f.open())) if f.exists() else 0)
          " 2>/dev/null || echo 0)
          echo "  instability_analysis.csv rows: ${COUNT_ROWS}"
          if [[ "${COUNT_ROWS}" -eq 0 ]]; then
            echo "::error::instability_analysis.csv exists but has 0 data rows — exp1 DeFi benchmark JSONs were missing or empty when the suite ran."
            exit 1
          fi
          echo "  OK instability output files present."

      - name: Verify extrap output files exist
        if: ${{ needs.plan.outputs.exp_id == 'extrap' && steps.resolve_ids.outputs.has_work == 'true' }}
        run: |
          TARGET="${{ github.workspace }}/${OUT_BASE}/${RESULT_SUBDIR}"
          COUNT=$(find "${TARGET}" \( -name "all_domains_extrap_v4_*.json" -o -name "protocol_core_*.json" \) 2>/dev/null | wc -l)
          echo "=== extrap output verification ==="
          echo "  Target dir   : ${TARGET}"
          echo "  File count   : ${COUNT}"
          find "${TARGET}" -type f 2>/dev/null | sort || true
          if [[ "${COUNT}" -eq 0 ]]; then
            echo "::error::extrap produced NO output files in '${TARGET}'."
            echo "  Expected: all_domains_extrap_v4_*.json or protocol_core_*.json"
            exit 1
          fi
          echo "  OK extrap output files present."

      # -- CRITICAL 4: verify suppB / suppB_sc output filename format ----------
      # sample_complexity_*.json (suppB_sc) under their respective result dirs.
      # If the benchmark scripts write files with a different prefix, all
      # generated tables will contain placeholder text.  This step surfaces
      # the mismatch immediately after the run as a workflow warning so it
      # can be corrected before the consolidate job.
      - name: Verify suppB/suppB_sc output filename format (CRITICAL 4)
        if: ${{ (needs.plan.outputs.exp_id == 'suppB' || needs.plan.outputs.exp_id == 'suppB_sc') && steps.resolve_ids.outputs.has_work == 'true' }}
        run: |
          WORKSPACE="${{ github.workspace }}"
          if [[ "${{ needs.plan.outputs.exp_id }}" == "suppB" ]]; then
            OUT_DIR="${WORKSPACE}/${OUT_BASE}/${{ needs.plan.outputs.result_subdir }}"
            GLOB_PATTERN="noise_sweep_*.json"
            LABEL="suppB"
          else
            OUT_DIR="${WORKSPACE}/${OUT_BASE}/comparison_results/feynman-tests/sample-complexity"
            GLOB_PATTERN="sample_complexity_*.json"
            LABEL="suppB_sc"
          fi
          ALL=$(find "${OUT_DIR}" -maxdepth 1 -name "*.json" 2>/dev/null | wc -l)
          MATCH=$(find "${OUT_DIR}" -maxdepth 1 -name "${GLOB_PATTERN}" 2>/dev/null | wc -l)
          echo "${LABEL}: ${OUT_DIR}"
          echo "  Total JSON files  : ${ALL}"
          echo "  Matching ${GLOB_PATTERN}: ${MATCH}"
          if [[ "${ALL}" -gt 0 && "${MATCH}" -eq 0 ]]; then
            LABEL_LC=$(echo "${LABEL}" | tr '[:upper:]' '[:lower:]')
            echo "::warning::CRITICAL 4 - ${LABEL} wrote ${ALL} JSON file(s) but NONE match '${GLOB_PATTERN}'. tables-generator will produce placeholder tables. Reconcile run_${LABEL_LC}_benchmark.py output prefix with the glob in tables-generator.py."
          elif [[ "${MATCH}" -gt 0 ]]; then
            echo "  OK Filename format OK - tables-generator glob will match."
          else
            echo "  WARN No output files yet (shard may have had no pending tasks)."
          fi

      - name: Verify suppB output files exist
        if: ${{ needs.plan.outputs.exp_id == 'suppB' && steps.resolve_ids.outputs.has_work == 'true' }}
        run: |
          TARGET="${{ github.workspace }}/${OUT_BASE}/${{ needs.plan.outputs.result_subdir }}"
          COUNT=$(find "${TARGET}" \( -name "noise_sweep_*.json" -o -name "noise_sweep_*.csv" \) 2>/dev/null | wc -l)
          echo "=== suppB output verification ==="
          echo "  Target dir : ${TARGET}"
          echo "  File count : ${COUNT}"
          find "${TARGET}" -type f 2>/dev/null | sort || true
          if [[ "${COUNT}" -eq 0 ]]; then
            echo "::error::suppB produced NO output files in '${TARGET}'."
            echo "  Expected: noise_sweep_*.json or noise_sweep_*.csv"
            exit 1
          fi
          echo "  OK suppB output files present."

      - name: Verify suppB_sc output files exist
        if: ${{ needs.plan.outputs.exp_id == 'suppB_sc' && steps.resolve_ids.outputs.has_work == 'true' }}
        run: |
          TARGET="${{ github.workspace }}/${OUT_BASE}/comparison_results/feynman-tests/sample-complexity"
          COUNT=$(find "${TARGET}" \( -name "sample_complexity_*.json" -o -name "sample_complexity_*.csv" \) 2>/dev/null | wc -l)
          echo "=== suppB_sc output verification ==="
          echo "  Target dir : ${TARGET}"
          echo "  File count : ${COUNT}"
          find "${TARGET}" -type f 2>/dev/null | sort || true
          if [[ "${COUNT}" -eq 0 ]]; then
            echo "::error::suppB_sc produced NO output files in '${TARGET}'."
            echo "  Expected: sample_complexity_*.json or sample_complexity_*.csv"
            exit 1
          fi
          echo "  OK suppB_sc output files present."

      - name: Save shard checkpoint
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, os, glob

          ckpt_path  = f"checkpoint_worker_shard{os.environ['SHARD_INDEX']}.json"
          result_dir = os.path.join(os.environ["OUT_BASE"],
                                    os.environ["RESULT_SUBDIR"])
          shard_ids  = json.loads(os.environ["SHARD_IDS"])
          # run_ids mirrors shard_ids positionally: run_ids[i] is the stable
          # unique ID for shard_ids[i], e.g. "exp1-3" for DEFI_TASKS[3].
          shard_run_ids = json.loads(os.environ.get("SHARD_RUN_IDS") or "[]")
          id_to_run_id  = dict(zip(shard_ids, shard_run_ids))

          completed = []
          if os.path.exists(ckpt_path):
              try:
                  with open(ckpt_path) as f:
                      completed = json.load(f).get("completed", [])

              except Exception:
                  pass

          done_set = set(completed)

          EXP = os.environ.get("EXP", "")
          # FIX-CKPT-EXP1/suppB/suppB_sc: experiments that write ONE combined
          # result file per shard rather than one file per task ID.  The per-
          # task-ID glob below never matches these filenames, so without this
          # branch the checkpoint always records 0 completed tasks and every
          # resume re-runs the full shard.
          #
          # Strategy: if any known combined output file is found in result_dir
          # or CWD, mark EVERY task in the shard as done — the combined file
          # implicitly covers all of them.
          #
          # Experiments in this set:
          #   exp1     — hypatiax_defi_benchmark_v3c.py writes one aggregated
          #              JSON "hypatiax_defi_benchmark_v3_results.json"; task IDs
          #              ("amm", "risk_var", …) never appear in the filename.
          #   exp1b    — same script in portfolio mode; writes
          #              comparison_FIXED_*.json (timestamp in name, not task ID).
          #   suppB    — run_noise_sweep_benchmark.py writes one
          #              noise_sweep_noise{NL}_*.json per shard (one noise level,
          #              all 11 Feynman domains).  Task IDs are
          #              "noise{NL}__{domain}" — the raw NL value (e.g. "0.0")
          #              appears in the output filename but the dot is replaced
          #              with "_" for safe-key globbing, making per-task-ID
          #              pattern matches unreliable across all runs.
          #   suppB_sc — run_sample_complexity_benchmark.py writes one
          #              sample_complexity_n{N}_*.json per shard (one sample
          #              size n, all 11 domains).  Task IDs "sc_n{N}__{domain}"
          #              have the same per-shard-combined-file property.
          COMBINED_OUTPUT_EXPS = {"exp1", "exp1b", "suppB", "suppB_sc"}
          search_dirs = [result_dir, "."]

          if EXP in COMBINED_OUTPUT_EXPS:
              # FIX-SHARD-SCOPE: use shard-specific globs rather than broad
              # wildcards so that this shard's checkpoint step cannot match
              # another shard's already-committed output file and incorrectly
              # mark this shard's tasks as done.
              #
              # Each combined-output experiment encodes the discriminating key
              # (noise level, sample size, or seed) in its output filename:
              #   suppB    → noise_sweep_noise{NL}_*.json  (NL = "0_0", "0_5", …)
              #   suppB_sc → sample_complexity_n{N}_*.json (N = "50", "100", …)
              #   exp1b    → comparison_FIXED_*_seed{S}_*.json  (S per shard)
              #   exp1     → single shard, no collision risk; broad glob is safe.
              #
              # The discriminating key is derived from the FIRST task ID in
              # shard_ids (the list is stable from plan-time partitioning).
              if EXP == "suppB":
                  first_id = shard_ids[0]   # "noise{NL}__{domain}"
                  nl_raw   = first_id.split("__")[0][len("noise"):]  # e.g. "0.0"
                  nl_safe  = nl_raw.replace(".", "_")                 # e.g. "0_0"
                  combined_globs = [
                      f"noise_sweep_noise{nl_safe}_*.json",
                      f"noise_sweep_noise{nl_safe}_*.csv",
                      f"noise_sweep_noise{nl_raw}_*.json",  # raw dot variant
                      f"noise_sweep_noise{nl_raw}_*.csv",
                  ]
              elif EXP == "suppB_sc":
                  first_id = shard_ids[0]   # "sc_n{N}__{domain}"
                  n_val    = first_id.split("__")[0][len("sc_n"):]    # e.g. "50"
                  combined_globs = [
                      f"sample_complexity_n{n_val}_*.json",
                      f"sample_complexity_n{n_val}_*.csv",
                  ]
              elif EXP == "exp1b":
                  # Task IDs are "portfolio_seed{S}"; each shard owns 1-2 seeds.
                  seeds_this_shard = [tid[len("portfolio_seed"):] for tid in shard_ids]
                  # FIX-PVA: hypatiax_defi_benchmark_v3c.py (portfolio mode)
                  # writes its per-seed audit output into a NESTED subdir,
                  # hypatiax/data/results/portfolio_variance_audit/, which the
                  # comparison_FIXED_* patterns below never match. Without this,
                  # found_combined stays False for every exp1b shard whose output
                  # lands there, so done_set is never updated and the checkpoint
                  # (and downstream ci_pipeline_check.yml) reports those seeds as
                  # never completed even though the script ran successfully.
                  PVA_DIR = "hypatiax/data/results/portfolio_variance_audit"
                  # FIX-SEEDFILE (2026-07-11): neither pattern family above ever
                  # matches this script's actual multi-seed output. run_benchmark()'s
                  # multi-seed branch (hypatiax_defi_benchmark_v3c.py ~line 1311-1312)
                  # writes FINAL_OUTPUT directly into RESULTS_DIR (== result_dir),
                  # NOT into PVA_DIR, as:
                  #     hypatiax_defi_benchmark_v3_results_seed{S}.json
                  # — neither "comparison_FIXED_*" nor under portfolio_variance_audit/.
                  # Confirmed against a live shard 0 run: _checkpoint_shard0.json
                  # still recorded "completed": [] (41-byte empty stub) despite
                  # hypatiax_defi_benchmark_v3_results_seed42.json and _seed99.json
                  # existing on disk in result_dir (17001 / 16999 bytes) — shard 0
                  # genuinely succeeded but was recorded as 0/2 done, which is why
                  # the qualification gate flagged ALL 5 seeds (not just the 3 that
                  # never ran) as incomplete. Add the real filename pattern so a
                  # shard's true output gets credited.
                  combined_globs = []
                  for s in seeds_this_shard:
                      combined_globs += [
                          f"*hypatiax_defi_benchmark_v3_results_seed{s}*.json",
                          f"*_results_seed{s}*.json",
                          f"*comparison_FIXED_*seed{s}*.json",
                          f"*comparison_FIXED_*seed{s}*.csv",
                          f"{PVA_DIR}/*seed{s}*.json",
                          f"{PVA_DIR}/*seed{s}*.csv",
                          f"{PVA_DIR}/**/*seed{s}*.json",
                          f"{PVA_DIR}/**/*seed{s}*.csv",
                      ]
                  # Fallback: if the script doesn't embed the seed in the filename,
                  # accept any comparison_FIXED file (or any file in the audit
                  # dir) only when result_dir contains NO files from other shards
                  # yet (detected by absence of _checkpoint_shard files for other
                  # shard indices). This is a best-effort guard; the seed-in-
                  # filename fix in run_all.sh is the definitive solution.
                  if not combined_globs:
                      combined_globs = ["*comparison_FIXED_*.json",
                                        "*comparison_FIXED_*.csv",
                                        f"{PVA_DIR}/*.json",
                                        f"{PVA_DIR}/*.csv",
                                        f"{PVA_DIR}/**/*.json",
                                        f"{PVA_DIR}/**/*.csv"]
              else:
                  # exp1: single shard — broad globs are safe (no concurrent shards).
                  combined_globs = [
                      "*hypatiax_defi_benchmark*results*.json",
                      "*defi_benchmark*results*.json",
                  ]

              found_combined = False
              for d in search_dirs:
                  for pat in combined_globs:
                      # recursive=True is required for the exp1b "**" patterns
                      # above (PVA_DIR); it is a no-op for patterns without "**"
                      # so this does not change matching behavior for
                      # suppB/suppB_sc/exp1, which still effectively stay
                      # single-directory (non-recursive) matches.
                      hits = glob.glob(os.path.join(d, pat), recursive=True)
                      if hits:
                          print(f"  [{EXP}] Combined result file detected: {hits[0]}")
                          found_combined = True
                          break
                  if found_combined:
                      break
              if found_combined:
                  done_set.update(shard_ids)
                  print(f"  [{EXP}] Marking all {len(shard_ids)} shard task(s) done"
                        f" (combined-output mode).")
              else:
                  print(f"  [{EXP}] WARNING: combined result file NOT found in"
                        f" {search_dirs} — 0 tasks marked done.")
                  print(f"  [{EXP}]   Patterns searched: {combined_globs}")
          else:
              # FIX: scan both the canonical RESULT_SUBDIR *and* the workspace root
              # (CWD) so tasks are marked done even when the crash happened before
              # move_matching relocated the files into RESULT_SUBDIR.
              for tid in shard_ids:
                  safe = tid.replace("/", "_").replace(".", "_")
                  matches = []
                  for d in search_dirs:
                      matches += (
                          glob.glob(f"{d}/**/*{safe}*.json", recursive=True) +
                          glob.glob(f"{d}/**/*{safe}*.csv",  recursive=True)
                      )
                  if matches:
                      done_set.add(tid)

          with open(ckpt_path, "w") as f:
              json.dump({
                  "completed": sorted(done_set),
                  # run_id_map lets consolidate look up the stable run_id by task ID
                  # without re-parsing the entire shard matrix from the plan job output.
                  "run_id_map": {tid: id_to_run_id[tid]
                                 for tid in sorted(done_set)
                                 if tid in id_to_run_id},
              }, f, indent=2)

          print(f"Checkpoint saved: {len(done_set)} completed tasks in shard {os.environ['SHARD_INDEX']}")
          PYEOF

      - name: Persist shard checkpoint to cache
        if: always()
        uses: actions/cache/save@v4.2.3
        with:
          path: checkpoint_worker_shard${{ matrix.shard }}.json
          key: checkpoint-worker-${{ github.event.inputs.experiment }}-shard${{ matrix.shard }}-${{ github.ref_name }}-${{ github.run_id }}

      # -- Copy shard checkpoint into RESULT_SUBDIR so qualify / complete can read it -----
      # checkpoint_worker_shard{N}.json is written to the workspace root (not RESULT_SUBDIR)
      # and is therefore absent from the repo checkout that ci_pipeline_check.yml uses.
      # qualify dim① checks for _checkpoint.json in RESULT_SUBDIR; the complete job
      # unions in _checkpoint.json from the same path.  For exp1b in particular the
      # task-ID done_set file-scanning heuristic fails because filenames contain a
      # timestamp+shard suffix (comparison_FIXED_*_shard{N}_run{ID}.json) not the
      # seed-based task ID ("portfolio_seed42"), so the checkpoint union is the only
      # reliable done-set source.
      #
      # Fix: copy checkpoint_worker_shard{N}.json → RESULT_SUBDIR/_checkpoint_shard{N}.json
      # (per-shard name avoids races when 4 shards commit concurrently).
      # The "Commit and push shard results" step already stages all files under TARGET,
      # so no additional git add is needed.
      - name: Copy shard checkpoint into result subdir
        if: always()
        env:
          RESULT_SUBDIR: ${{ needs.plan.outputs.result_subdir }}
          SHARD:         ${{ matrix.shard }}
        run: |
          CKPT_SRC="checkpoint_worker_shard${SHARD}.json"
          CKPT_DEST="${OUT_BASE}/${RESULT_SUBDIR}/_checkpoint_shard${SHARD}.json"
          if [[ -f "${CKPT_SRC}" ]]; then
            cp "${CKPT_SRC}" "${CKPT_DEST}"
            echo "Copied ${CKPT_SRC} → ${CKPT_DEST}"
          else
            echo "::warning::Shard checkpoint not found at ${CKPT_SRC} — skipping copy."
          fi

      - name: Pre-upload artifact file count check
        if: always()
        env:
          RESULT_SUBDIR: ${{ needs.plan.outputs.result_subdir }}
          EXP:           ${{ needs.plan.outputs.exp_id }}
        run: |
          UPLOAD_DIR="${OUT_BASE}/${RESULT_SUBDIR}"
          COUNT=$(find "${UPLOAD_DIR}" -type f 2>/dev/null | wc -l || echo 0)
          echo "=== Artifact upload check: ${UPLOAD_DIR} ==="
          echo "  Files found: ${COUNT}"
          find "${UPLOAD_DIR}" -type f 2>/dev/null | sort || true
          if [[ "${COUNT}" -eq 0 ]]; then
            echo "::error::Shard ${{ matrix.shard }} (${EXP}): upload directory '${UPLOAD_DIR}' is EMPTY."
            echo "  Possible causes:"
            echo "    1. Experiment script wrote output files with an unexpected filename prefix"
            echo "    2. Experiment script exited non-zero before writing any files"
            echo "    3. 'Move results to RESULTS_DIR' step has a glob mismatch for ${EXP}"
            echo "  Check 'Run experiment tasks' and 'Move results to RESULTS_DIR' step logs above."
            # Emit a non-fatal warning here; the upload step itself will fail with
            # if-no-files-found: error which provides the definitive failure signal.
          fi

      - name: Upload shard results artifact
        if: always()
        uses: actions/upload-artifact@v4.3.6
        with:
          # FIX: removed -${{ github.run_id }} suffix.
          # ci_consolidate_experiment.yml downloads with pattern "results-{exp}-shard*"
          # from a different run.  The run_id suffix caused zero matches because
          # download-artifact@v4 matches artifact names, not file paths - the pattern
          # "results-exp1-shard*" never matched "results-exp1-shard0-25791073646".
          # Stable name "results-{exp}-shard{N}" matches the pattern correctly.
          # CHANGED: if-no-files-found: warn -> error so an empty upload is a loud
          # failure rather than a silent one that propagates to n_merged=0 in consolidate.
          name: results-${{ github.event.inputs.experiment }}-shard${{ matrix.shard }}
          path: ${{ env.OUT_BASE }}/${{ needs.plan.outputs.result_subdir }}/
          if-no-files-found: error
          retention-days: 30

      # ── Commit and push shard results directly to the repo ───────────────────
      # The consolidate job is disabled, so each worker shard must persist its
      # own outputs here.  Without this step, results live only in GitHub Actions
      # artifacts (30-day TTL) and are invisible in the repository tree.
      #
      # Design:
      #   1. git pull --rebase  — absorbs concurrent shard commits before staging.
      #   2. git add TARGET/    — stages every file written by this shard.
      #   3. diff --cached      — skips commit when nothing changed (idempotent).
      #   4. push --force-with-lease — detected conflicts trigger one retry.
      #
      # if: always() — runs even when soft-failures occurred earlier (e.g. exp1
      # produced protocol_core_noiseless_*.json but 0 primary benchmark JSONs —
      # still a valid partial result that must be persisted in the repo).
      - name: Commit and push shard results to repo
        if: always()
        env:
          EXP:           ${{ needs.plan.outputs.exp_id }}
          RESULT_SUBDIR: ${{ needs.plan.outputs.result_subdir }}
          SHARD:         ${{ matrix.shard }}
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TARGET="${{ github.workspace }}/${OUT_BASE}/${RESULT_SUBDIR}"
          FILE_COUNT=$(find "${TARGET}" -type f 2>/dev/null | wc -l || echo 0)
          echo "Files in ${TARGET}: ${FILE_COUNT}"
          if [[ "${FILE_COUNT}" -eq 0 ]]; then
            echo "No files in ${TARGET} — skipping commit for shard ${SHARD}."
            exit 0
          fi

          echo "--- Files to stage ---"
          find "${TARGET}" -type f | sort

          # FIX NO-TABLES-FIGURES: hard-delete backstop. run_all.sh now purges
          # .tex/.png/.pdf byproducts itself (exp1_ablation, instability), but
          # this deletes any that might still land under TARGET before staging,
          # so no table/figure artifact can ever be committed by this workflow.
          _PURGED=$(find "${TARGET}" -type f \( -name '*.tex' -o -name '*.png' -o -name '*.pdf' \) 2>/dev/null | wc -l)
          find "${TARGET}" -type f \( -name '*.tex' -o -name '*.png' -o -name '*.pdf' \) -delete 2>/dev/null || true
          echo "Purged ${_PURGED} .tex/.png/.pdf file(s) from ${TARGET} before staging (table/figure generation disabled)."

          commit_and_push() {
            # Rebase on any concurrent shard commits before staging.
            # --autostash saves/restores untracked+modified files around the
            # rebase.  If the remote has committed a file that also exists
            # untracked locally (e.g. fixc3_baseline.json written by a gate
            # job between our checkout and this pull), git reset --hard will
            # refuse to overwrite it and abort.  Detect that case and stash
            # the conflicting untracked file aside before retrying.
            if ! git pull --rebase --autostash origin "${{ github.ref_name }}" 2>&1; then
              echo "::warning::git pull --rebase failed (possibly untracked file conflict) — stashing untracked files and retrying"
              git stash --include-untracked --quiet || true
              git pull --rebase --autostash origin "${{ github.ref_name }}" 2>&1 || true
              # FIX-STASH-POP-SILENT-LOSS: `git stash pop --quiet 2>/dev/null
              # || true` previously swallowed a failed pop with no trace. A
              # pop fails here when the file this shard just produced
              # collides, path-for-path, with a file the remote already
              # committed (e.g. another concurrent/overlapping run of the
              # same experiment landed a push for the same deterministic
              # seed->path mapping in between this shard's checkout and this
              # push). When that happens, THIS shard's own real results stay
              # stashed and unstaged, `git add -f "${TARGET}"` finds nothing
              # of theirs to add, and the shard silently pushes only its
              # checkpoint file — while "Repo commit verification" a few
              # steps later reports a false "OK" because it only checks file
              # *presence* under TARGET, not which run actually produced the
              # file that's there. Confirmed via run 29697091994 shard 0
              # (exp1b, portfolio_seed42): exactly this sequence caused
              # seed42 to be reported as a missing task downstream even
              # though shard 0 had genuinely completed it. Hard-fail here
              # instead, so the loss is visible at the point it happens.
              if ! git stash pop --quiet 2>&1; then
                echo "::error::git stash pop FAILED for shard ${SHARD} (${EXP}) after the pull-rebase retry."
                echo "  This shard's own computed result(s) collided path-for-path with something"
                echo "  the remote already had and are now stuck unstaged in 'git stash list' on"
                echo "  this runner (they will be lost when the runner is torn down) instead of"
                echo "  being committed. Likely cause: another concurrent/overlapping run of"
                echo "  ${EXP} pushed a commit touching the same output path between this shard's"
                echo "  checkout and this push — exp1b/exp1_ablation/exp3b/suppB/suppB_sc write to"
                echo "  a fixed canonical path with no run-id scoping, so two overlapping runs can"
                echo "  race on the exact same file. Re-run this shard once the other run finishes,"
                echo "  or scope ${TARGET} by run id if concurrent runs of ${EXP} are expected."
                exit 1
              fi
            fi

            # Stage every result file produced by this shard.
            # -f overrides any .gitignore rules that might exclude data/results/**
            # without -f, git add silently no-ops on ignored paths.
            git add -f "${TARGET}"

            echo "--- git status after add ---"
            git status --short || true

            if git diff --cached --quiet; then
              echo "Shard ${SHARD}: no new files staged — nothing to commit."
              echo "  Possible causes:"
              echo "    1. Files are already committed from a previous run (idempotent — OK)"
              echo "    2. .gitignore excludes ${TARGET} and -f did not override (check .gitignore)"
              return 0
            fi

            # Detect any MODIFIED (M) tracked files — means this shard would overwrite
            # a result from a previous shard or run (silent data loss).
            # EXCEPTION: _checkpoint_shard*.json files are intentionally re-written
            # every run (they accumulate completed task IDs across resumptions) — a
            # modified M status for these is expected and must NOT trigger the
            # isolation guard.
            OVERWRITTEN=$(git diff --cached --name-status \
              | grep '^M' \
              | awk '{print $2}' \
              | grep -v '_checkpoint_shard[0-9].*\.json$' \
              || true)
            if [[ -n "$OVERWRITTEN" ]]; then
              # ISOLATION-GUARD: exp1b/exp1_ablation/exp3b/suppB/suppB_sc each carry
              # a documented per-shard isolation suffix (HYPATIAX_NSHARDS_SUFFIX /
              # _shard${SHARD_INDEX} tag — see run_all.sh STEP 2/8b/10/10b, and for
              # exp1_ablation the "Preserve shard-specific exp1_ablation output" mv
              # above) whose entire purpose is to make this overwrite impossible.
              # For those five, a modified tracked file here means the suffix
              # mechanism itself failed (e.g. SHARD_INDEX missing/blank, or a code
              # path that bypassed the rename) — that is a real bug, not an
              # expected re-run overwrite, so it hard-fails instead of warning.
              case "${EXP}" in
                exp1b|exp1_ablation|exp3b|suppB|suppB_sc)
                  echo "::error::ISOLATION GUARD FAILED — shard ${SHARD} (${EXP}) is overwriting "
                  echo "  committed result file(s); the per-shard isolation suffix should have "
                  echo "  prevented this:"
                  echo "$OVERWRITTEN" | while read -r f; do echo "    $f"; done
                  echo "  Check that SHARD_INDEX/HYPATIAX_NSHARDS_SUFFIX is actually set and"
                  echo "  non-empty for this shard, and that the move/rename step in run_all.sh"
                  echo "  ran before this commit step."
                  exit 1
                  ;;
                *)
                  echo "::warning::OVERWRITE DETECTED — shard ${SHARD} is overwriting committed result file(s):"
                  echo "$OVERWRITTEN" | while read -r f; do echo "    $f"; done
                  echo "  The move_matching collision-guard should have disambiguated filenames."
                  echo "  Proceeding with push so results are not lost — investigate filename uniqueness."
                  ;;
              esac
            fi

            STAGED=$(git diff --cached --name-only | wc -l)
            git commit -m "ci: ${EXP} shard${SHARD} results (${STAGED} file(s)) — run ${{ github.run_id }} — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push --force-with-lease origin "${{ github.ref_name }}"
            echo "Pushed shard ${SHARD}: ${STAGED} file(s) → ${{ github.ref_name }}"
          }

          # First attempt; retry once after a pause on concurrent-shard conflict.
          if ! commit_and_push; then
            echo "Push conflict — waiting 20 s then retrying ..."
            sleep 20
            commit_and_push
          fi

      # -- Verify results are visible in the repo after push (ITEM 4) ----------
      # Checks that the files committed by this shard are actually present in the
      # repo tree (not just in the local workspace).  A missing file here means
      # the push silently failed or the file landed in the wrong path — downstream
      # consumers (SEP, ci_consolidate, paper build) would find nothing.
      - name: Verify results committed to repo
        if: always()
        env:
          EXP:           ${{ needs.plan.outputs.exp_id }}
          RESULT_SUBDIR: ${{ needs.plan.outputs.result_subdir }}
          SHARD:         ${{ matrix.shard }}
        run: |
          set -euo pipefail
          TARGET="${{ github.workspace }}/${OUT_BASE}/${RESULT_SUBDIR}"

          # git ls-files needs a path relative to the repo root (or an absolute
          # path inside the worktree).  Use --full-name to be explicit.
          REL_TARGET="${OUT_BASE}/${RESULT_SUBDIR}"
          TRACKED=$(git ls-files --full-name "${REL_TARGET}" 2>/dev/null | wc -l || echo 0)
          # Count files present on disk under TARGET.
          ON_DISK=$(find "${TARGET}" -type f 2>/dev/null | wc -l || echo 0)

          echo "=== Repo commit verification: shard ${SHARD} | ${EXP} ==="
          echo "  Path       : ${TARGET}"
          echo "  Git-tracked: ${TRACKED} file(s)"
          echo "  On disk    : ${ON_DISK} file(s)"
          git ls-files --full-name "${REL_TARGET}" 2>/dev/null | sort || true

          if [[ "${TRACKED}" -eq 0 ]]; then
            echo "::error::shard ${SHARD} (${EXP}): NO files are git-tracked under '${TARGET}'."
            echo "  This means the commit-and-push step either skipped (nothing staged)"
            echo "  or the files were written to a path that does not match RESULT_SUBDIR."
            echo "  SEP and downstream builds will find no results for this shard."
            echo "  Check: 'Move results to RESULTS_DIR' and 'Commit and push' step logs."
            exit 1
          else
            echo "  OK ${TRACKED} file(s) committed and visible in repo under ${TARGET}."
          fi

          # FIX-SEED-CHECK: mirrors the same fix in "Verify exp3/exp3b output
          # files exist" — TRACKED above counts any *.json under RESULT_SUBDIR,
          # which is satisfied by unrelated files (_checkpoint_shard*.json,
          # fixc3_baseline.json) even when exp3/exp3b's own output was never
          # generated. Without this, a fully failed exp3/exp3b run reports
          # "OK" here too, and the failure only surfaces three jobs downstream
          # in ci_analysis.yml's symbolic equivalence check.
          if [[ "${EXP}" == "exp3" || "${EXP}" == "exp3b" ]]; then
            SEED_TRACKED=$(git ls-files --full-name "${REL_TARGET}" 2>/dev/null | grep -c 'exp3_nguyen12_seed.*\.json$' || true)
            echo "  exp3/exp3b seed files committed: ${SEED_TRACKED}"
            if [[ "${SEED_TRACKED}" -eq 0 ]]; then
              echo "::error::shard ${SHARD} (${EXP}): no exp3_nguyen12_seed*.json files are git-tracked under '${TARGET}' — the experiment likely failed to produce results. Check the 'Run experiment tasks' and 'Verify exp3/exp3b output files exist' logs for the underlying error."
              exit 1
            fi
          fi





# ==============================================================================
#  JOBS 3a-3c — PCA experiment run jobs
#  (formerly run_exp2_feynman_pca_4060 / run_exp1_pca / run_exp1b_pca
#   in ci_runner_disclosure.yml — merged here so ci_runner_disclosure.yml
#   can be removed from the pipeline entirely)
#
#  Job order:
#    pca_run_exp2_feynman  ─┐  parallel
#    pca_run_exp1          ─┤  parallel
#    pca_run_exp1b           │  depends on pca_run_exp1
#                          ─┘
#  All three: if: pca_runner.outputs.is_pca == 'true'
#  Gates A/B/C depend on all three and fire with if: always()
# ==============================================================================

  # ── C5c-0: exp2_feynman_pca (Feynman PCA 40/60) ────────────────────────────
  pca_run_exp2_feynman:
    name: "C5c-0 · Run exp2_feynman_pca (Feynman PCA 40/60)"
    needs: pca_runner
    if: needs.pca_runner.outputs.is_pca == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 340
    outputs:
      already_done: ${{ steps.check_exp2.outputs.already_done }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 1

      - name: Check if exp2_feynman_pca results already exist
        id: check_exp2
        env:
          RESULTS_DIR: ${{ github.event.inputs.results_dir || 'hypatiax/data/results' }}
          EXP: ${{ github.event.inputs.experiment }}
          FORCE_RERUN: ${{ github.event.inputs.force_rerun || 'false' }}
        run: |
          if [[ "$EXP" != "exp2_feynman_pca" ]]; then
            echo "already_done=true" >> "$GITHUB_OUTPUT"
            echo "[skip] Not exp2_feynman_pca — skipping this job."
            exit 0
          fi
          PCA_DIR="${RESULTS_DIR}/comparison_results/feynman-tests/exp2_pca_4060"
          # FIX (Bug #2, §10.7 investigation, 2026-06-30): force_rerun=true
          # clears stale result JSONs (everything except the disclosure file,
          # which is regenerated fresh anyway) before the already-done check,
          # so a clean exp2_pca_4060_summary.json can be regenerated under
          # the fixed aggregation logic instead of silently no-oping because
          # leftover files from a prior (possibly buggy-environment) run are
          # still present.
          if [[ "$FORCE_RERUN" == "true" ]]; then
            if [ -d "${PCA_DIR}" ]; then
              echo "[force_rerun] Clearing stale outputs in ${PCA_DIR} before rerun."
              find "${PCA_DIR}" -maxdepth 1 -name '*.json' -delete
            fi
          fi
          if [ -d "${PCA_DIR}" ] && [ -n "$(ls -A "${PCA_DIR}"/*.json 2>/dev/null)" ]; then
            echo "already_done=true" >> "$GITHUB_OUTPUT"
            echo "[skip] Results already present in ${PCA_DIR}."
          else
            echo "already_done=false" >> "$GITHUB_OUTPUT"
            echo "[run] No results found in ${PCA_DIR} — will run."
          fi

      - name: Set up Python
        if: steps.check_exp2.outputs.already_done != 'true'
        uses: actions/setup-python@v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION || '3.12' }}

      # FIX (Bug #1, §10.7 investigation): this job previously had no Julia
      # setup at all, and its install step omitted `pint` — both required by
      # _probe_pysr_method() in run_comparative_suite_benchmark_pca.py. This
      # silently forced HYBRID_V50_2_AVAILABLE=False for the entire job,
      # making every HybridDiscoverySystem (HypatiaX) row report
      # "not available" regardless of actual code correctness. Mirrors the
      # main worker job's Julia setup (see "Set up Julia 1.11" /
      # "Precompile Julia / SymbolicRegression" steps above).
      - name: Set up Julia 1.11
        if: steps.check_exp2.outputs.already_done != 'true'
        uses: julia-actions/setup-julia@v2.6.1
        with:
          version: "1.11"

      - name: Cache Julia depot
        if: steps.check_exp2.outputs.already_done != 'true'
        uses: actions/cache@v4
        with:
          path: ~/.julia
          key: julia-depot-${{ runner.os }}-${{ hashFiles('**/Project.toml', '**/Manifest.toml') }}
          restore-keys: |
            julia-depot-${{ runner.os }}-

      - name: Install dependencies
        if: steps.check_exp2.outputs.already_done != 'true'
        run: |
          pip install --upgrade pip
          if [[ -f requirements.txt ]]; then pip install -r requirements.txt; fi
          # FIX: anthropic + torch required by run_comparative_suite_benchmark_pca.py
          # (LLM methods 1/3/4 use anthropic; methods 2/3/4 use torch).
          # python-dotenv needed for .env loading; psutil needed by subprocess worker.
          pip install numpy scipy scikit-learn pysr juliacall pint \
              anthropic torch --index-url https://download.pytorch.org/whl/cpu \
              python-dotenv psutil

      - name: Install Julia / SymbolicRegression
        if: steps.check_exp2.outputs.already_done != 'true'
        run: |
          python3 -c "import pysr; pysr.install()"

      - name: Precompile Julia / SymbolicRegression
        if: steps.check_exp2.outputs.already_done != 'true'
        run: |
          python3 - <<'PYEOF'
          import subprocess, sys

          warmup = """
          import numpy as np
          import pysr
          X = np.random.randn(20, 1)
          y = X[:, 0] * 2.0 + 1.0
          model = pysr.PySRRegressor(
              niterations=5,
              populations=1,
              verbosity=0,
              progress=False,
              tempdir="/tmp/pysr_warmup",
          )
          model.fit(X, y)
          print("Julia/PySR precompile warmup OK")
          """
          result = subprocess.run(
              [sys.executable, "-c", warmup],
              timeout=300,
              capture_output=True,
              text=True,
          )
          print(result.stdout or "")
          if result.returncode != 0:
              print("WARNING: Julia precompile warmup failed (HypatiaX/HDS may be N/A):")
              print(result.stderr[-3000:] if result.stderr else "(no stderr)")
          PYEOF

      - name: Run exp2_feynman_pca via run_all.sh
        if: steps.check_exp2.outputs.already_done != 'true'
        env:
          RESULTS_DIR:       ${{ github.event.inputs.results_dir || 'hypatiax/data/results' }}
          FEYNMAN_SAMPLES:   ${{ github.event.inputs.n_samples || '200' }}
          DRY_RUN:           ${{ github.event.inputs.dry_run || 'false' }}
          JOB_DEADLINE:      "19800"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
        run: |
          set -euo pipefail
          if [[ "${DRY_RUN}" == "true" ]]; then
            echo "[dry-run] Would execute: bash run_all.sh --step exp2_feynman_pca_4060"
            exit 0
          fi
          bash run_all.sh --step exp2_feynman_pca_4060

      # FIX (CI-PCA-1): this step previously had no always(), so a failure or
      # timeout in "Run exp2_feynman_pca via run_all.sh" (5h40m deadline,
      # crash, network blip) caused GitHub Actions to skip this step entirely
      # by default — silently dropping every domain result computed before
      # the failure, since exp2_feynman_pca has no equivalent of the generic
      # worker job's "Store results" step (which runs if: always()). always()
      # here lets partial results still get committed; the inner git logic
      # already no-ops cleanly via "git diff --cached --quiet" if nothing was
      # produced at all.
      - name: Commit and push results
        if: |
          always() &&
          github.event.inputs.dry_run != 'true' &&
          steps.check_exp2.outputs.already_done != 'true'
        env:
          RESULTS_DIR: ${{ github.event.inputs.results_dir || 'hypatiax/data/results' }}
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          PCA_DIR="${RESULTS_DIR}/comparison_results/feynman-tests/exp2_pca_4060"
          BASELINE="${RESULTS_DIR}/fixc3_baseline.json"
          git add "${PCA_DIR}"/ 2>/dev/null || true
          git add "${BASELINE}"  2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            git commit -m "ci: exp2_feynman_pca results (PCA 40/60) [skip ci]"
            # FIX: stash any *other* unstaged changes left in the tree before
            # rebasing — otherwise "git pull --rebase" refuses outright with
            # "cannot pull with rebase: you have unstaged changes" on every
            # retry, since sleep 5 doesn't clean the tree. Also: the loop could
            # previously exhaust all 3 attempts, never push, and still print
            # "Results committed and pushed." (the echo was unconditional).
            # PUSHED now tracks the real outcome and the job fails loudly if a
            # push never succeeds.
            PUSHED=false
            for i in 1 2 3; do
              git stash --include-untracked --quiet || true
              if git pull --rebase origin "${{ github.ref_name }}" && \
                 git push origin HEAD:"${{ github.ref_name }}"; then
                git stash pop --quiet 2>/dev/null || true
                PUSHED=true
                break
              fi
              git stash pop --quiet 2>/dev/null || true
              sleep 5
            done
            if [[ "${PUSHED}" == "true" ]]; then
              echo "Results committed and pushed."
            else
              echo "::error::Failed to push exp2_feynman_pca results after 3 attempts."
              exit 1
            fi
          fi


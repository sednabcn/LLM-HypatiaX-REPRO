# ==============================================================================
#  ci_pipeline_check.yml
#  HypatiaX · Full pipeline checkpoint, completion & qualification
#
#  PURPOSE
#  -------
#  This workflow does NOT re-run expensive experiment workers.  It operates
#  entirely on *committed* artifacts already in the repo / Actions artifact
#  store and answers three questions for every experiment:
#
#    1. CHECK    — Is each experiment's committed output present and valid?
#                  Reads _merged.json, _merged.csv, _checkpoint.json from the
#                  canonical result sub-directory for every experiment.
#
#    2. COMPLETE — Are there any incomplete tasks?  Compares the task IDs
#                  recorded in _merged.json against the full task registry
#                  from ci_runner.yml (mirrored here).  Emits a per-exp
#                  table of missing task IDs so the operator knows exactly
#                  what to re-dispatch.
#
#    3. QUALIFY  — Does each experiment pass all 5 qualification dimensions?
#                  (checkpoint=pass | result files | _merged.json | _merged.csv
#                   | committed to git)
#                  Mirrors qualify_experiment() from run_all_checkpoint.py.
#                  FIX NO-TABLES-FIGURES: figures/tables dimensions removed —
#                  no table or figure generation occurs anywhere in this pipeline.
#
#  NOTE: the paper-audit step (cross-checking paper_targets.json against
#  result values) has been removed from this workflow.
#
#  TRIGGER STRATEGY
#  ----------------
#  Auto:   Fires after ci_runner.yml (any experiment) completes.
#          Reads the experiment that triggered it and runs all three phases
#          for that experiment only, then runs the cross-experiment qualify
#          gate on the full set.
#
#  Manual: workflow_dispatch lets you choose a single experiment or "all".
#          "all" runs all three phases for every experiment sequentially.
#
#  BUGS FIXED (from run_all_checkpoint.py)
#  ----------------------------------------
#  BUG 1 — EXP_RESULT_SUBDIR: three wrong paths (CRITICAL)
#    Used by qualify_experiment() to locate _merged.json.  Wrong paths cause
#    exp1 / exp1b / exp2 to always fail qualification → audit-paper permanently
#    blocked for those experiments.
#    Wrong (run_all_checkpoint.py):
#      exp1  → "comparison_results/extrapolation"
#      exp1b → "comparison_results/extrapolation"
#      exp2  → "comparison_results/feynman-tests/exp2"
#    Fixed (matches ci_runner.yml plan meta):
#      exp1  → comparison_results/noise-noiseless/noiseless
#      exp1b → comparison_results/noise-noiseless/15
#      exp2  → comparison_results/feynman-tests/exp2_multi
#    This file uses the correct values throughout (see SUBDIR dicts in jobs 1 & 3).
#
#  BUG 2 — exp3 / exp3b / suppA PostMove source = EXPERIMENTS_DIR (CRITICAL)
#    run_all.sh comment: "FIX-DIR: script writes to RESULTS_DIR root — search
#    must use RESULTS_DIR, not EXPERIMENTS_DIR."  All three PostMove entries in
#    run_all_checkpoint.py use EXPERIMENTS_DIR as source.  The glob finds nothing
#    → files are never moved → result subdirs stay empty → qualify fails.
#    Fix (run_all_checkpoint.py):
#      PostMove(EXPERIMENTS_DIR, "*nguyen*seed42*.json", ...)  →
#      PostMove(RESULTS_DIR,     "*nguyen*seed42*.json", ...)
#    Same fix applies to exp3b and suppA.
#
#  BUG 3 — extrap step: hardcoded wrong OOD parameters (CRITICAL)
#    Wrong (non-paper values):
#      "--extrap-multiplier", "3.0"
#      "--extrap-train-frac", "0.4"
#    Fixed (paper values, matches CI and run_all.sh defaults):
#      "--extrap-multiplier", "2.0"
#      "--extrap-train-frac", "0.8"
#
#  BUG 4 — exp1 / exp1b result_glob point to wrong directory
#    step_already_complete() uses result_glob to decide whether to skip; wrong
#    path means the step always reruns even when results exist.
#    Wrong:
#      exp1  result_glob="comparison_results/extrapolation/*.json"
#      exp1b result_glob="comparison_results/extrapolation/*seed*.json"
#    Fixed:
#      exp1  result_glob="comparison_results/noise-noiseless/noiseless/*.json"
#      exp1b result_glob="comparison_results/noise-noiseless/15/*.json"
#
#  BUG 5 — exp2 step: --protocol all30 and missing --output-dir
#    Same --benchmark both fix applies (replaces --protocol all30).
#    exp2 also passes no --output-dir, so results land in the script's default
#    path rather than feynman-tests/exp2_multi/.
#    Fix: add "--benchmark", "both" and "--output-dir", "<RESULTS_DIR>/feynman-tests/exp2_multi"
#
#  BUG 6 — exp2_feynman: missing --output-dir and --method-timeout
#    No --output-dir (results may go to a wrong default).
#    No --method-timeout (should be 120 given --skip-pysr).
#    Both flags are present in the CI worker case; run_all_checkpoint.py omits them.
#    Fix: add "--output-dir", "<RESULTS_DIR>/feynman-tests/exp2"
#         and "--method-timeout", "120"
#
#  TIMEOUT CONTRACT
#  ----------------
#  check job   :  10 min  (pure read + JSON comparison — no Python deps)
#  complete job:  10 min  (task-registry diff — pure Python, no pip)
#  qualify job :  10 min  (file checks + git ls-files)
#  All three fit comfortably within GitHub's 360-min hard cap.
# ==============================================================================

name: "HypatiaX - checkpoint"
run-name: >-
  HypatiaX ckpt·complete·qualify —
  ${{ github.event.inputs.experiment || 'manual' }}

on:
  # -- Standalone: triggered manually or dispatched by ci_pipeline.yml (C3) --
  # Not auto-triggered by any other workflow.
  workflow_dispatch:
    inputs:
      experiment:
        description: "Experiment to check (or 'all' for every experiment)"
        required: false
        type: choice
        options:
          - all
          - exp1
          - exp1b
          - exp1_ablation
          - exp1_pca
          - exp1b_pca
          - exp2_feynman
          - exp2_feynman_extrap
          - exp2_feynman_pca
          - exp2
          - exp3
          - exp3b
          - suppA
          - suppB
          - suppB_sc
          - hybrid_all_domains
          - instability
          - extrap
        default: all

      seeds:
        description: "Seeds used (required for exp1b, exp3b; comma-separated)"
        required: false
        default: "42,99,123,777,2024"

      noise_levels:
        description: "Noise levels used (required for suppB; comma-separated)"
        required: false
        default: "0.0,0.5,1.0,5.0,10.0"

      fail_on_incomplete:
        description: "Fail the job if any experiment has missing tasks"
        required: false
        default: "false"

permissions:
  contents: write  # write needed by qualify job to commit moved figures/tables
  actions:  read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  OUT_BASE: "hypatiax/data/results"
  # Default seeds / noise levels — overridden by workflow_dispatch inputs.
  SEEDS:        ${{ github.event.inputs.seeds        || '42,99,123,777,2024' }}
  NOISE_LEVELS: ${{ github.event.inputs.noise_levels || '0.0,0.5,1.0,5.0,10.0' }}


# ==============================================================================
#  JOB 1 — check: verify committed outputs exist and are valid JSON
# ==============================================================================
jobs:
  check:
    name: "Check committed outputs"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      # JSON object: {exp_id: {present: bool, valid: bool, n_tasks: int, subdir: str}}
      check_report: ${{ steps.check.outputs.check_report }}
      all_present:  ${{ steps.check.outputs.all_present }}

    steps:
      - name: Checkout master
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"

      - name: Check committed outputs for every experiment
        id: check
        env:
          EXPERIMENT:   ${{ github.event.inputs.experiment || 'all' }}
          SEEDS:        ${{ env.SEEDS }}
          NOISE_LEVELS: ${{ env.NOISE_LEVELS }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          from pathlib import Path

          OUT_BASE     = Path(os.environ["OUT_BASE"])
          SEEDS        = [s.strip() for s in os.environ["SEEDS"].split(",") if s.strip()]
          NOISE_LEVELS = [l.strip() for l in os.environ["NOISE_LEVELS"].split(",") if l.strip()]

          # ── Canonical subdir map (source of truth: ci_runner.yml plan job)
          # BUG 1 FIX: exp1 and exp1b were mapped to "comparison_results/extrapolation"
          # and exp2 was mapped to "comparison_results/feynman-tests/exp2"
          # in run_all_checkpoint.py.  All three are wrong; correct values are below.
          SUBDIR = {
              "exp1":              "comparison_results/noise-noiseless/noiseless/defi",
              "exp1b":             "comparison_results/noise-noiseless/15",
              "exp1_ablation":     "ablation/exp1_ablation",
              "exp1_pca":          "comparison_results/noise-noiseless/noiseless/defi_pca",
              "exp1b_pca":         "comparison_results/noise-noiseless/15_pca",
              "exp2_feynman":      "comparison_results/feynman-tests/exp2",
              "exp2_feynman_extrap": "comparison_results/feynman-tests/exp2_extrap",
              "exp2_feynman_pca":   "comparison_results/feynman-tests/exp2_pca_4060",
              "exp2":              "comparison_results/feynman-tests/exp2_multi",
              "exp3":              "extrapolation",
              "exp3b":             "extrapolation/multi_seed",
              "suppA":             "hybrid_pysr/defi",
              "suppB":             "comparison_results/feynman-tests/noise-sweep",
              "suppB_sc":          "comparison_results/feynman-tests/sample-complexity",
              "hybrid_all_domains": "hybrid_llm_nn/all_domains",
              "instability":       "figures",
              "extrap":            "comparison_results/extrapolation",
          }

          # Resolve which experiments to check
          EXPERIMENT = os.environ["EXPERIMENT"].strip()

          if EXPERIMENT in ("all", ""):
              target_exps = list(SUBDIR.keys())
          elif EXPERIMENT in SUBDIR:
              target_exps = [EXPERIMENT]
          else:
              print(f"::error::Unknown experiment '{EXPERIMENT}' — not in SUBDIR map.")
              sys.exit(1)

          # FIX check-PRESENCE: the consolidate job is disabled in
          # ci_runner.yml — each worker shard commits its own
          # result files directly.  _merged.json / _merged.csv / _checkpoint.json
          # are NEVER written, so checking for them always reports MISSING.
          #
          # Instead, presence is determined by scanning the canonical RESULT_SUBDIR
          # for non-meta data files (*.json / *.csv not starting with "_").
          # This is consistent with the "Verify output files exist" steps in the
          # worker job and with what ci_analysis.yml uses as its readiness signal.
          #
          # Per-experiment result file globs (primary output patterns):
          RESULT_GLOBS = {
              "exp1":              ["hypatiax_defi_benchmark_v3*results*.json",
                                    "protocol_core_noiseless_*.json"],
              "exp1b":             ["comparison_FIXED_*.json", "defi_v3_*.json",
                                    "*portfolio*variance*.json",
                                    "hypatiax_defi_benchmark_v3*results*.json"],
              "exp2_feynman":      ["protocol_core_*.json", "benchmark_results.json"],
              "exp2_feynman_extrap": ["merged_extrap_*.json", "protocol_core_extrap_*.json",
                                      "ablation_paired.json"],
              "exp2_feynman_pca":   ["fixc3_baseline.json", "exp2_pca_4060_summary.json",
                                    "protocol_core_*.json", "benchmark_results.json"],
              "exp2":              ["protocol_core_*.json", "benchmark_results.json"],
              "exp3":              ["full_run_*.json", "report_hybrid_*.json",
                                    "hybrid_defi_*.json",
                                    "exp3_nguyen12_*.json", "*nguyen*seed*.json"],
              "exp3b":             ["full_run_*.json", "report_hybrid_*.json",
                                    "hybrid_defi_*.json",
                                    "exp3_nguyen12_*.json", "*nguyen*seed*.json"],
              "suppA":             ["consolidated_hybrid_*.json", "hybrid_system*.json",
                                    "extrapolation_73cases*.json", "*73cases*.json"],
              # suppB: all 5 shards commit flat to the canonical dir as
              # noise_sweep_<timestamp>_nshardsNN.json/.csv (NN = 01..05) — there is
              # no noise_sweep_saved/ subdir and no sig-format filename in practice
              # (see FIX-suppB-SENTINEL below). The broad noise_sweep_*.json/.csv
              # patterns below already match these via the "**/" recursive glob
              # applied at use-site, so no per-shard pattern is needed here.
              "suppB":             ["noise_sweep_*.json", "noise_sweep_*.csv"],
              "suppB_sc":          ["sample_complexity_*.json", "sample_complexity_*.csv"],
              "hybrid_all_domains": ["hybrid_llm_nn_all_domains_*.json"],
              "instability":       ["instability_analysis.csv", "instability_extrapolation.csv"],
              "extrap":            ["all_domains_extrap_v4_*.json",
                                    "protocol_core_*.json"],
          }

          import glob as _glob

          report = {}
          all_present = True

          print(f"{'Experiment':<25} {'Subdir':<50} {'Result files':>14} {'_merged.json':>14}")
          print("-" * 110)

          for exp_id in target_exps:
              subdir     = SUBDIR[exp_id]
              result_dir = OUT_BASE / subdir
              globs      = RESULT_GLOBS.get(exp_id, ["*.json"])

              # Count non-meta result files matching any primary glob
              # FIX-RECURSE: prefix each pattern with "**/" so pathlib's glob
              # searches result_dir recursively, not just its direct children.
              # A plain "*portfolio*variance*.json" pattern only matched files
              # sitting straight in result_dir; anything nested one level
              # deeper (as exp1b's portfolio_variance_audit/ output was,
              # before ci_runner.yml's FIX-PVA patch) was invisible here.
              # "**/" still matches result_dir's own top level too, so this
              # is purely additive — no previously-found files stop matching.
              data_files = []
              if result_dir.exists():
                  for pattern in globs:
                      data_files.extend(
                          f for f in result_dir.glob(f"**/{pattern}")
                          if not f.name.startswith("_")
                      )
              data_files = list(set(data_files))  # deduplicate

              present = len(data_files) > 0
              valid   = present
              n_tasks = len(data_files)

              # _merged.json is optional (written only when consolidate ran manually)
              merged_json = result_dir / "_merged.json"
              merged_ok   = False
              if merged_json.exists():
                  try:
                      mdata   = json.loads(merged_json.read_text())
                      merged_ok = True
                      # If merged is present, prefer its task count
                      n_tasks = len([k for k in mdata if not k.startswith("_")])
                  except Exception as e:
                      print(f"  !! {exp_id}: _merged.json parse error: {e}")

              status_r = f"✓ {n_tasks} file(s)" if present else "✗ MISSING"
              status_m = "✓" if merged_ok else "— (not consolidated)"

              print(f"  {exp_id:<23} {subdir:<50} {status_r:>14} {status_m:>14}")

              report[exp_id] = {
                  "present":     present,
                  "valid":       valid,
                  "n_tasks":     n_tasks,
                  "subdir":      subdir,
                  "has_csv":     any((result_dir / "_merged.csv").exists()
                                     for _ in [1]),
                  "has_ckpt":    (result_dir / "_checkpoint.json").exists(),
                  "has_merged":  merged_ok,
              }
              if not present:
                  all_present = False

          print()
          n_ok      = sum(1 for v in report.values() if v["present"])
          n_missing = sum(1 for v in report.values() if not v["present"])
          print(f"  {n_ok}/{len(report)} experiments have committed result files")
          if n_missing:
              print(f"  ⚠  {n_missing} experiment(s) missing output: "
                    + ", ".join(e for e, v in report.items() if not v["present"]))

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"check_report={json.dumps(report)}\n")
              fh.write(f"all_present={'true' if all_present else 'false'}\n")
          PYEOF


# ==============================================================================
#  JOB 2 — complete: diff task registry vs committed results; list missing tasks
# ==============================================================================
  complete:
    name: "Complete — identify remaining tasks"
    needs: check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      # JSON: {exp_id: {total: int, done: int, missing: [task_id, ...]}}
      completion_report: ${{ steps.complete.outputs.completion_report }}
      all_complete:      ${{ steps.complete.outputs.all_complete }}

    steps:
      - name: Checkout master
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"

      - name: Compute completion gaps
        id: complete
        env:
          CHECK_REPORT:      ${{ needs.check.outputs.check_report }}
          EXPERIMENT:        ${{ github.event.inputs.experiment || 'all' }}
          SEEDS:             ${{ env.SEEDS }}
          NOISE_LEVELS:      ${{ env.NOISE_LEVELS }}
          FAIL_ON_INCOMPLETE: ${{ github.event.inputs.fail_on_incomplete || 'false' }}
          OUT_BASE:          ${{ env.OUT_BASE }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys
          from pathlib import Path

          OUT_BASE     = Path(os.environ["OUT_BASE"])
          SEEDS        = [s.strip() for s in os.environ["SEEDS"].split(",") if s.strip()]
          NOISE_LEVELS = [l.strip() for l in os.environ["NOISE_LEVELS"].split(",") if l.strip()]
          CHECK_REPORT = json.loads(os.environ["CHECK_REPORT"])
          FAIL         = os.environ.get("FAIL_ON_INCOMPLETE", "false").lower() == "true"

          # BUG 1 FIX: complete job must apply the same EXPERIMENT filter that
          # job 1 (check) applies, so completion_report only contains the
          # experiment(s) actually in scope for this run.
          #
          # Without this filter, when ci_pipeline.yml dispatches for a single
          # experiment (e.g. exp1b), CHECK_REPORT contains only {exp1b: ...}.
          # The dispatch job (job 6) iterates a hardcoded ORDER of 10 experiments
          # and calls report.get(exp_id, {}) for each.  For every experiment NOT
          # in the single-experiment completion_report, info={} → done=0, total=0,
          # total>0 is False → falls to the "0 done / never launched" branch →
          # fires a fresh runner for every experiment in the queue.
          #
          # Fix: restrict the loop to the same target_exps set job 1 built.
          # When EXPERIMENT is a known single experiment, iterate only that.
          # When EXPERIMENT is "all" or blank, iterate everything in CHECK_REPORT.
          _KNOWN_EXPS = [
              "exp1", "exp1b", "exp1_ablation", "exp1_pca", "exp1b_pca",
              "exp2_feynman", "exp2_feynman_extrap", "exp2_feynman_pca",
              "exp2", "exp3", "exp3b",
              "suppA", "suppB", "suppB_sc", "hybrid_all_domains", "instability", "extrap",
          ]
          _exp_input = os.environ.get("EXPERIMENT", "all").strip()
          if _exp_input in ("all", ""):
              _target_exps = list(CHECK_REPORT.keys())
          elif _exp_input in _KNOWN_EXPS:
              _target_exps = [_exp_input] if _exp_input in CHECK_REPORT else []
              if not _target_exps:
                  print(f"::error::Experiment '{_exp_input}' not in CHECK_REPORT — check job may have failed.")
                  sys.exit(1)
          else:
              print(f"::error::Unknown experiment '{_exp_input}' — not in known experiment list.")
              sys.exit(1)

          # ── Task registries (mirrors ci_runner.yml plan job + split step)
          FEYNMAN_DOMAINS = [
              "feynman_biology", "feynman_chemistry", "feynman_electrochemistry",
              "feynman_electromagnetism", "feynman_electrostatics", "feynman_magnetism",
              "feynman_mechanics", "feynman_optics", "feynman_probability",
              "feynman_quantum", "feynman_thermodynamics",
          ]
          EXP2_DOMAINS = [
              "mechanics", "thermodynamics", "electromagnetism", "fluid_dynamics",
              "optics", "quantum", "chemistry", "biology", "mathematics", "economics",
          ]
          NGUYEN12  = [f"N{i}" for i in range(1, 13)]
          DEFI      = [
              "amm", "risk_var", "liquidity", "expected_shortfall",
              "liquidation", "risk", "lending", "staking", "trading", "derivatives",
          ]
          REGISTRY = {
              # exp1 committed a single hypatiax_defi_benchmark_v3_results.json
              # (not per-task files). Use filename-stem sentinel — same pattern as exp1b.
              "exp1":              ["hypatiax_defi_benchmark_v3_results"],
              # exp1_pca / exp1b_pca committed hypatiax_defi_benchmark_pca_results.json
              # (PCA split variant — filename uses "_pca_results" not "_v3_results").
              "exp1_pca":          ["hypatiax_defi_benchmark_pca_results"],
              "exp1b_pca":         ["hypatiax_defi_benchmark_pca_results"],
              # FIX-exp1b-SENTINEL: task IDs in the runner are
              # [f"portfolio_seed{s}" for s in SEEDS], but that string never
              # appears in what's actually committed. The committed filename
              # is hypatiax_defi_benchmark_v3_results_seed{s}.json — confirmed
              # against a real committed run (comparison_results/noise-noiseless/15/)
              # — not the comparison_FIXED_*_shard{N}_
              # run{ID}.json pattern this sentinel list previously assumed.
              # "portfolio_seed{s}" therefore never substring-matched any
              # committed file, and done-set detection relied *entirely* on
              # the _checkpoint_shard{N}.json union below. When a checkpoint
              # file is absent for any reason (e.g. a shard's result file was
              # manually recovered from a GitHub Actions artifact and
              # recommitted without also recreating its _checkpoint_shard{N}
              # .json — exactly what happened for exp1b shard 0 / seed42 on
              # run 29697091994), that seed is reported "missing" even though
              # its result file is genuinely present and committed. Matching
              # "results_seed{s}" directly against the real filename removes
              # that fragile single point of failure; the checkpoint union
              # remains below as a redundant secondary source, not the only
              # one. NOTE: this substring match assumes no seed value is a
              # numeric prefix of another (true for the current default set
              # 42,99,123,777,2024) — revisit if a future seed list violates
              # that (e.g. adding both 42 and 420).
              "exp1b":             [f"results_seed{s}" for s in SEEDS],
              "exp2_feynman":      FEYNMAN_DOMAINS,
              "exp2_feynman_extrap": FEYNMAN_DOMAINS,
              "exp2_feynman_pca":  FEYNMAN_DOMAINS,
              "exp2":              EXP2_DOMAINS,
              # exp3 committed a single exp3_nguyen12_seed42.json covering all 12 Nguyen eqs.
              "exp3":              ["nguyen12_seed42"],
              # exp3b committed per-seed files: exp3_nguyen12_seed{s}.json.
              # Use seed sentinels that are substrings of those filenames.
              "exp3b":             [f"nguyen12_seed{s}" for s in SEEDS if s != "42"],
              # suppA committed extrapolation_73cases_enhanced.json (all domains combined).
              "suppA":             ["73cases_enhanced"],
              # suppB: result files are noise_sweep_*.json / noise_sweep_*.csv.
              # FIX-suppB-SENTINEL: the filenames do NOT encode noise level as a
              # sigma string (there is no "sig0000"/"sig0050"/... substring anywhere
              # in what the runner actually commits — confirmed via
              # `git ls-tree -r origin/master -- .../noise-sweep/`). Each of the 5
              # EXP_SHARD_TABLE workers instead writes one noise_sweep_<timestamp>_
              # nshardsNN.json/.csv pair (NN = 01..05, one per shard/noise level),
              # plus a _checkpoint_shard{N}.json (N = 0..4). Use the shard-index
              # substrings as sentinels so they actually match committed filenames.
              "suppB":             ["nshards01", "nshards02", "nshards03", "nshards04", "nshards05"],
              # suppB_sc done-set: result files are sample_complexity_n{N}.json / *.csv.
              # FIX-suppB_sc-SENTINEL: same class of bug as suppB above — confirmed via
              # `git ls-tree -r origin/master -- .../sample-complexity/` that no filename
              # contains a sample-count substring like "50"/"100"/etc. Each of the 6
              # EXP_SHARD_TABLE workers instead writes one sample_complexity_<timestamp>_
              # nshardsNN.json/.csv pair (NN = 01..06), plus _checkpoint_shard{N}.json
              # (N = 0..5). Use the shard-index substrings as sentinels.
              "suppB_sc":          ["nshards01", "nshards02", "nshards03", "nshards04", "nshards05", "nshards06"],
              # hybrid_all_domains committed a single hybrid_llm_nn_all_domains_*.json.
              "hybrid_all_domains": ["all_domains"],
              # instability is a single post-processing job, not 10 per-domain shards.
              # Use the output filename stem as the task sentinel: done when
              # instability_analysis.csv exists in figures/.
              "instability":       ["instability_analysis"],
              "extrap":            FEYNMAN_DOMAINS,
          }

          # FIX complete-DONESET: consolidate is disabled — _merged.json is never
          # written by the worker.  The old code read _merged.json to build done_set,
          # so done_set was always empty and every task showed as missing.
          #
          # Fix: build done_set by scanning the result subdir for committed files
          # and matching their filenames against task IDs.  A task ID is considered
          # done if any file in the subdir contains the sanitised task ID as a
          # substring (the same heuristic used by the worker's Save shard checkpoint
          # step).  If _merged.json is present (manual consolidation), it is used
          # as an additional source and unioned in.
          def _done_set_from_files(result_dir, all_ids):
              """Return set of task IDs whose output file is present in result_dir."""
              import glob as _g
              done = set()
              # FIX-RECURSE: scan result_dir recursively rather than top-level +
              # one subdir level. The previous one-level-deep scan (top-level
              # files, plus one iterdir() pass into immediate subdirectories)
              # was tuned for known cases like suppB's noise_sweep_saved/, but
              # would silently miss anything nested two or more levels down —
              # exactly the class of bug that made exp1b report "0 done" before
              # ci_runner.yml's FIX-PVA patch (portfolio_variance_audit/ output
              # that never even reached this subdir). This is a defensive
              # generalisation so a similarly-nested output from any future
              # experiment doesn't reproduce that failure mode here too.
              # Hidden dirs/files (leading ".") and meta-files (leading "_")
              # are still excluded at every depth.
              files = [
                  f.name for f in result_dir.rglob("*")
                  if f.is_file()
                  and not f.name.startswith("_")
                  and not any(part.startswith(".")
                              for part in f.relative_to(result_dir).parts)
              ] if result_dir.exists() else []
              for tid in all_ids:
                  safe = tid.replace("/", "_").replace(".", "_")
                  if any(safe in fname for fname in files):
                      done.add(tid)
              # Checkpoint union: previously the *only* done-set source for
              # exp1b (see FIX-exp1b-SENTINEL above — that's now fixed via a
              # filename-matching sentinel, so the primary loop above already
              # catches exp1b in the common case). Kept here as a redundant
              # secondary source for exp1b and as the primary source for any
              # other experiment whose committed filenames don't embed a
              # matchable task-ID substring — cheap insurance, and it also
              # still catches tasks whose result file failed to commit but
              # whose checkpoint did (the inverse of the seed42 scenario).
              for ckpt_file in result_dir.glob("_checkpoint_shard*.json"):
                  try:
                      cd = json.loads(ckpt_file.read_text())
                      done |= set(cd.get("completed", []))
                  except Exception:
                      pass
              return done

          completion = {}
          any_incomplete = False

          print(f"\n{'Experiment':<25} {'Total':>7} {'Done':>7} {'Missing':>9}")
          print("-" * 55)

          for exp_id in _target_exps:
              info    = CHECK_REPORT.get(exp_id, {"present": False, "subdir": ""})
              all_ids = REGISTRY.get(exp_id, [])
              total   = len(all_ids)

              if exp_id not in REGISTRY:
                  # A missing REGISTRY entry makes total=0, which would
                  # otherwise silently report "0/0 done" as trivially
                  # complete — masking the fact that we simply don't know
                  # this experiment's task list yet (this is what let
                  # exp1_pca crash before it and exp1_ablation is in the
                  # same state now: real committed data exists but this
                  # script has no sentinel list to check it against).
                  print(f"  ::warning:: '{exp_id}' has no REGISTRY task-sentinel entry — "
                        f"completion cannot be verified for this experiment (reporting "
                        f"0/0 is NOT a confirmation that it is actually complete).")

              if not info["present"]:
                  missing = all_ids
                  done    = 0
              else:
                  subdir     = info["subdir"]
                  result_dir = OUT_BASE / subdir
                  done_set   = _done_set_from_files(result_dir, all_ids)

                  # Union with _merged.json keys when consolidation ran manually
                  merged = result_dir / "_merged.json"
                  if merged.exists():
                      try:
                          mdata    = json.loads(merged.read_text())
                          done_set |= {k for k in mdata if not k.startswith("_")}
                      except Exception:
                          pass

                  # Union with per-subdir _checkpoint.json completed list
                  ckpt = result_dir / "_checkpoint.json"
                  if ckpt.exists():
                      try:
                          cd = json.loads(ckpt.read_text())
                          done_set |= set(cd.get("completed", []))
                      except Exception:
                          pass

                  missing = [t for t in all_ids if t not in done_set]
                  done    = total - len(missing)

              if missing:
                  any_incomplete = True

              icon = "✓" if not missing else "⚠"
              print(f"  {icon} {exp_id:<23} {total:>7} {done:>7} {len(missing):>9}")
              if missing:
                  shown = missing[:10]
                  print(f"      Missing: {shown}"
                        + (f" ... +{len(missing)-10} more" if len(missing) > 10 else ""))

              completion[exp_id] = {
                  "total":   total,
                  "done":    done,
                  "missing": missing,
              }

          print()
          if not any_incomplete:
              print("  ✅  All experiments complete — no missing tasks.")
          else:
              incomplete = [e for e, v in completion.items() if v["missing"]]
              print(f"  ⚠  {len(incomplete)} experiment(s) have missing tasks: "
                    + ", ".join(incomplete))
              print()
              print("  To resume, re-dispatch ci_pipeline.yml from the first")
              print("  incomplete slot (experiment_index=N), or use ci_runner.yml")
              print("  with task_ids_override for targeted task recovery.")

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"completion_report={json.dumps(completion)}\n")
              fh.write(f"all_complete={'true' if not any_incomplete else 'false'}\n")

          if FAIL and any_incomplete:
              sys.exit(1)
          PYEOF


# ==============================================================================
#  JOB 3 — qualify: 7-dimension gate per experiment
#
#  Mirrors qualify_experiment() from run_all_checkpoint.py v8.0.
#  Dimensions (FIX NO-TABLES-FIGURES: figures_present/tables_present dims
#  removed — no table or figure generation occurs anywhere in this pipeline):
#    1. checkpoint=pass    — _checkpoint.json records success
#    2. result_files       — ≥1 non-meta JSON/CSV in result subdir
#    3. _merged.json       — consolidation ran
#    4. _merged.csv        — CSV present
#    5. committed_to_git   — _merged.json tracked + clean in HEAD
# ==============================================================================
  qualify:
    name: "Qualify all experiments"
    needs: [check, complete]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Always run qualify so the report is available even when experiments are incomplete.
    if: always()

    outputs:
      # JSON: {exp_id: {passed: bool, checks: [[name, ok, detail], ...]}}
      qualify_report:  ${{ steps.qualify.outputs.qualify_report }}
      all_qualified:   ${{ steps.qualify.outputs.all_qualified }}
      qualified_exps:  ${{ steps.qualify.outputs.qualified_exps }}

    steps:
      - name: Checkout master
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python 3.12
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"

      - name: Qualify experiments (5-dimension gate)
        id: qualify
        env:
          OUT_BASE:          ${{ env.OUT_BASE }}
          COMPLETION_REPORT: ${{ needs.complete.outputs.completion_report }}
          CHECK_REPORT:      ${{ needs.check.outputs.check_report }}
          EXPERIMENT_INPUT:  ${{ github.event.inputs.experiment || 'all' }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, sys
          from pathlib import Path

          REPO_ROOT    = Path(".")
          OUT_BASE     = Path(os.environ["OUT_BASE"])
          COMPLETION   = json.loads(os.environ.get("COMPLETION_REPORT") or "{}")
          CHECK        = json.loads(os.environ.get("CHECK_REPORT")      or "{}")

          # BUG 1 FIX: matches ci_runner.yml and job 1 above (exp1, exp1b, exp2 corrected)
          SUBDIR = {
              "exp1":              "comparison_results/noise-noiseless/noiseless/defi",
              "exp1b":             "comparison_results/noise-noiseless/15",
              "exp1_ablation":     "ablation/exp1_ablation",
              "exp1_pca":          "comparison_results/noise-noiseless/noiseless/defi_pca",
              "exp1b_pca":         "comparison_results/noise-noiseless/15_pca",
              "exp2_feynman":      "comparison_results/feynman-tests/exp2",
              "exp2_feynman_extrap": "comparison_results/feynman-tests/exp2_extrap",
              "exp2_feynman_pca":   "comparison_results/feynman-tests/exp2_pca_4060",
              "exp2":              "comparison_results/feynman-tests/exp2_multi",
              "exp3":              "extrapolation",
              "exp3b":             "extrapolation/multi_seed",
              "suppA":             "hybrid_pysr/defi",
              "suppB":             "comparison_results/feynman-tests/noise-sweep",
              "suppB_sc":          "comparison_results/feynman-tests/sample-complexity",
              "hybrid_all_domains": "hybrid_llm_nn/all_domains",
              "instability":       "figures",
              "extrap":            "comparison_results/extrapolation",
          }

          # Respect the EXPERIMENT input: when a single experiment is specified,
          # qualify only that experiment. "all" or blank qualifies everything.
          # This prevents unrelated experiments (e.g. suppB) from blocking the
          # gate when ci_pipeline.yml calls this workflow for a specific slot.
          EXPERIMENT_INPUT = os.environ.get("EXPERIMENT_INPUT", "all").strip()
          if EXPERIMENT_INPUT in ("all", ""):
              QUALIFIABLE = list(SUBDIR.keys())
          elif EXPERIMENT_INPUT in SUBDIR:
              QUALIFIABLE = [EXPERIMENT_INPUT]
          else:
              print(f"::error::Unknown experiment '{EXPERIMENT_INPUT}' — not in SUBDIR map.")
              sys.exit(1)

          # Per-experiment primary result file globs — mirrors Job 1 RESULT_GLOBS.
          # Used by qualify dim 2 and dim 3 so CSV-only experiments (suppB, suppB_sc,
          # instability) are not penalised for having no *.json result files.
          RESULT_GLOBS = {
              "exp1":              ["hypatiax_defi_benchmark_v3*results*.json",
                                    "protocol_core_noiseless_*.json"],
              "exp1b":             ["comparison_FIXED_*.json", "defi_v3_*.json",
                                    "*portfolio*variance*.json",
                                    "hypatiax_defi_benchmark_v3*results*.json"],
              # exp1_pca / exp1b_pca use _pca_results filename pattern
              "exp1_pca":          ["hypatiax_defi_benchmark_pca_results*.json"],
              "exp1b_pca":         ["hypatiax_defi_benchmark_pca_results*.json"],
              "exp2_feynman":      ["protocol_core_*.json", "benchmark_results.json"],
              "exp2_feynman_extrap": ["merged_extrap_*.json", "protocol_core_extrap_*.json",
                                      "ablation_paired.json"],
              "exp2_feynman_pca":   ["fixc3_baseline.json", "exp2_pca_4060_summary.json",
                                    "protocol_core_*.json", "benchmark_results.json"],
              "exp2":              ["protocol_core_*.json", "benchmark_results.json"],
              "exp3":              ["full_run_*.json", "report_hybrid_*.json",
                                    "exp3_nguyen12_*.json", "*nguyen*seed*.json"],
              "exp3b":             ["full_run_*.json", "report_hybrid_*.json",
                                    "exp3_nguyen12_*.json", "*nguyen*seed*.json"],
              "suppA":             ["consolidated_hybrid_*.json", "hybrid_system*.json",
                                    "extrapolation_73cases*.json", "*73cases*.json"],
              # suppB: top-level dir has one file; saved/ subdir holds all sigma shards.
              # Include saved/ glob so qualify dim2 detects presence correctly.
              "suppB":             ["noise_sweep_*.json", "noise_sweep_*.csv",
                                    "noise_sweep_saved/noise_sweep_*.json",
                                    "noise_sweep_saved/noise_sweep_sig*.json"],
              "suppB_sc":          ["sample_complexity_*.json", "sample_complexity_*.csv"],
              "hybrid_all_domains": ["hybrid_llm_nn_all_domains_*.json"],
              "instability":       ["instability_analysis.csv", "instability_extrapolation.csv"],
              "extrap":            ["all_domains_extrap_v4_*.json", "protocol_core_*.json"],
          }

          def qualify_experiment(exp_id: str) -> dict:
              checks = []
              subdir_rel = SUBDIR.get(exp_id, "")
              result_dir = OUT_BASE / subdir_rel if subdir_rel else OUT_BASE

              # 1. Checkpoint pass
              ckpt_path  = result_dir / "_checkpoint.json"
              ckpt_ok    = False
              ckpt_detail = "missing"
              if ckpt_path.exists():
                  try:
                      cd = json.loads(ckpt_path.read_text())
                      # Accept if any of: status=success, completed list non-empty,
                      # or run_id present (merge_shards.py always writes one).
                      ckpt_ok = (
                          cd.get("status") in ("success", "merged", "ok")
                          or bool(cd.get("completed"))
                          or bool(cd.get("run_id"))
                      )
                      ckpt_detail = f"status={cd.get('status','?')} completed={len(cd.get('completed',[]))}"
                  except Exception as e:
                      ckpt_detail = f"parse error: {e}"
              if not ckpt_ok:
                  # FIX qualify-DIM1: consolidate is disabled and _checkpoint.json is never
                  # written by the worker.  exp1b (and any multi-shard experiment) writes
                  # _checkpoint_shard{N}.json files (copied into RESULT_SUBDIR by the runner's
                  # "Copy shard checkpoint into result subdir" step).  Accept dim① as passing
                  # if any per-shard checkpoint records at least one completed task.
                  shard_ckpts = list(result_dir.glob("_checkpoint_shard*.json")) if result_dir.exists() else []
                  if shard_ckpts:
                      total_completed = 0
                      for sc in shard_ckpts:
                          try:
                              scd = json.loads(sc.read_text())
                              total_completed += len(scd.get("completed", []))
                          except Exception:
                              pass
                      if total_completed > 0:
                          ckpt_ok = True
                          ckpt_detail = f"per-shard checkpoints: {len(shard_ckpts)} file(s), {total_completed} task(s) completed"
                      else:
                          ckpt_detail = f"per-shard checkpoints present ({len(shard_ckpts)}) but 0 tasks completed"
              checks.append(["checkpoint=pass", ckpt_ok, ckpt_detail])

              # 2. Result files — use per-experiment RESULT_GLOBS for accuracy.
              # Generic *.json + *.csv would miss CSV-only experiments (suppB_sc, instability)
              # if the glob pattern doesn't match any *.json but there ARE *.csv files.
              # FIX-RECURSE: same "**/" prefix as job 1's check — searches
              # result_dir recursively so nested output (e.g. a subdir like
              # portfolio_variance_audit/) isn't invisible to qualification
              # either. Additive only; top-level matches still match.
              data_files = []
              if result_dir.exists():
                  exp_globs = RESULT_GLOBS.get(exp_id, ["*.json", "*.csv"])
                  for pattern in exp_globs:
                      data_files.extend(
                          f for f in result_dir.glob(f"**/{pattern}")
                          if not f.name.startswith("_")
                      )
              data_files = list(set(data_files))
              checks.append(["result_files", len(data_files) > 0,
                             f"{len(data_files)} data file(s) in {subdir_rel or 'results/'}"])

              # 3. Result files valid — at least one result file is valid JSON or is a CSV.
              # _merged.json is accepted when present (manual consolidation ran).
              # For CSV-only experiments (suppB, suppB_sc, instability): CSV presence = valid.
              merged_json = result_dir / "_merged.json"
              if merged_json.exists():
                  merged_ok     = True
                  merged_detail = str(merged_json)
              else:
                  json_files = [f for f in data_files if f.suffix == ".json"]
                  csv_files  = [f for f in data_files if f.suffix == ".csv"]
                  valid_json = False
                  for jf in json_files[:3]:
                      try:
                          json.loads(jf.read_text()); valid_json = True; break
                      except Exception:
                          pass
                  if not valid_json and csv_files:
                      valid_json = True   # CSV output counts (suppB, suppB_sc, instability)
                  merged_ok     = valid_json
                  merged_detail = (f"{len(json_files)} result JSON(s) — per-shard commit mode"
                                   if json_files else (f"{len(csv_files)} CSV result(s)"
                                   if csv_files else "no result files found"))
              checks.append(["result_json_valid", merged_ok, merged_detail])

              # 4. _merged.csv (optional — generated by consolidate or tables step)
              # FIX qualify-DIM4: _merged.csv is never written without consolidate.
              # Gate changed to: CSV present in subdir OR instability_analysis.csv
              # present in figures/ (for instability experiment).
              merged_csv = result_dir / "_merged.csv"
              csv_ok     = merged_csv.exists()
              csv_detail = str(merged_csv) if csv_ok else ""
              if not csv_ok:
                  # Accept any *.csv in the result dir (noise_sweep_*.csv, sample_complexity_*.csv, etc.)
                  # FIX-RECURSE: "**/*.csv" so a CSV nested one level down
                  # (e.g. inside a subdir like portfolio_variance_audit/) is
                  # still picked up instead of silently failing this gate.
                  csv_files = list(result_dir.glob("**/*.csv")) if result_dir.exists() else []
                  csv_ok     = len(csv_files) > 0
                  csv_detail = (f"{len(csv_files)} CSV(s) in {subdir_rel}"
                                if csv_ok else f"no CSV files in {subdir_rel} (tables not yet generated)")
              checks.append(["csv_or_tables", csv_ok, csv_detail])

              # 5. Committed to git (tracked + clean in HEAD)
              # Probe the first result file from data_files (already populated by dim 2).
              # _merged.json is used when present; otherwise the first data file is probed.
              git_ok = False
              git_detail = "git unavailable"
              probe_file = (merged_json if merged_json.exists()
                            else (data_files[0] if data_files else None))
              if probe_file:
                  rel = str(probe_file)
                  try:
                      r1 = subprocess.run(
                          ["git", "ls-files", "--error-unmatch", rel],
                          capture_output=True, text=True, cwd=REPO_ROOT
                      )
                      if r1.returncode == 0:
                          r2 = subprocess.run(
                              ["git", "diff", "--name-only", "HEAD", "--", rel],
                              capture_output=True, text=True, cwd=REPO_ROOT
                          )
                          git_ok     = r2.returncode == 0 and r2.stdout.strip() == ""
                          git_detail = "clean in HEAD" if git_ok else "modified/not committed"
                      else:
                          git_detail = "not tracked by git"
                  except FileNotFoundError:
                      git_detail = "git not found"
              else:
                  git_detail = "no result file to probe"
              checks.append(["committed_to_git", git_ok, git_detail])

              # FIX NO-TABLES-FIGURES: dims 6 (figures_present) and 7
              # (tables_present) removed — no table or figure generation
              # occurs anywhere in this pipeline any more.

              # Core gates: result files exist, are valid JSON, and are committed to git.
              # checkpoint=pass, csv_or_tables are informational only — they depend
              # on downstream steps not yet run.
              core_gates = {"result_files", "result_json_valid", "committed_to_git"}
              passed = all(ok for name, ok, _ in checks if name in core_gates)
              return {"passed": passed, "checks": checks}

          # ── Run all experiments ──────────────────────────────────────────────
          print(f"\n{'Experiment':<25} Status")
          print("-" * 80)

          report        = {}
          all_qualified = True
          qualified_exps = []

          for exp_id in QUALIFIABLE:
              qr = qualify_experiment(exp_id)
              report[exp_id] = qr
              icon = "✅" if qr["passed"] else "❌"
              fails = [c[0] for c in qr["checks"] if not c[1]]
              tail  = "" if qr["passed"] else f"  FAILED: {', '.join(fails)}"
              print(f"  {icon}  {exp_id:<23}{tail}")
              for name, ok, detail in qr["checks"]:
                  ico = "    ✓" if ok else "    ✗"
                  print(f"      {ico}  {name:<25}  {detail}")
              if qr["passed"]:
                  qualified_exps.append(exp_id)
              else:
                  all_qualified = False

          n_pass = len(qualified_exps)
          n_fail = len(QUALIFIABLE) - n_pass
          print()
          print(f"  Qualification: {n_pass}/{len(QUALIFIABLE)} experiments fully qualified")
          if not all_qualified:
              incomplete = [e for e in QUALIFIABLE if not report[e]["passed"]]
              print(f"  ❌  {n_fail} unqualified: {', '.join(incomplete)}")
              print("  Fix incomplete experiments, then re-trigger this workflow.")
          else:
              print("  ✅  All experiments qualified.")

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"qualify_report={json.dumps(report)}\n")
              fh.write(f"all_qualified={'true' if all_qualified else 'false'}\n")
              fh.write(f"qualified_exps={json.dumps(qualified_exps)}\n")
          PYEOF


# ==============================================================================
#  JOB 5 — summary: print a consolidated pipeline health table and set exit code
# ==============================================================================
  summary:
    name: "Pipeline health summary"
    needs: [check, complete, qualify]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()

    steps:
      - name: Print consolidated summary and set exit code
        env:
          ALL_PRESENT:  ${{ needs.check.outputs.all_present }}
          ALL_COMPLETE: ${{ needs.complete.outputs.all_complete }}
          ALL_QUAL:     ${{ needs.qualify.outputs.all_qualified }}
          COMPLETION_REPORT: ${{ needs.complete.outputs.completion_report }}
          QUALIFY_REPORT:    ${{ needs.qualify.outputs.qualify_report }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys

          def b(v): return v == "true" or v is True

          present  = b(os.environ.get("ALL_PRESENT",  "false"))
          complete = b(os.environ.get("ALL_COMPLETE", "false"))
          qual     = b(os.environ.get("ALL_QUAL",     "false"))

          completion = json.loads(os.environ.get("COMPLETION_REPORT") or "{}")
          qreport    = json.loads(os.environ.get("QUALIFY_REPORT")    or "{}")

          # P8 FIX: `complete` (gate 2 — task completion) was computed and
          # displayed but silently excluded from overall_ok, so a pipeline
          # with experiments stuck at 0/N done tasks (e.g. suppB_sc) could
          # still report "PIPELINE HEALTHY" as long as gates 1/3 passed.
          # Gate 2 now participates in the final verdict like the other two.
          overall_ok = present and complete and qual

          # ---- console output -------------------------------------------------
          SEP = "=" * 70
          print(f"\n{SEP}")
          print(f"  HypatiaX Pipeline Health")
          print(SEP)
          print(f"  {'Gate':<30}  {'Status'}")
          print(f"  {'-'*30}  {'------'}")
          print(f"  {'1. Outputs committed':<30}  {'✅ ALL PRESENT' if present  else '❌ SOME MISSING'}")
          print(f"  {'2. Task completion':<30}  {'✅ ALL COMPLETE' if complete else '⚠  GAPS EXIST'}")
          print(f"  {'3. Qualification (7-dim)':<30}  {'✅ ALL QUALIFIED' if qual    else '❌ UNQUALIFIED EXPS'}")
          print(SEP)

          # Summarise incomplete experiments
          if not complete:
              print("\n  Experiments with missing tasks:")
              for exp, info in completion.items():
                  if info.get("missing"):
                      n_m = len(info["missing"])
                      tot = info.get("total", "?")
                      done = info.get("done", "?")
                      print(f"    {exp:<25} {done}/{tot} done  ({n_m} task(s) missing)")
                      shown = info["missing"][:5]
                      remaining = n_m - len(shown)
                      tail = f"  ... and {remaining} more" if remaining > 0 else ""
                      print(f"      First missing: {shown}{tail}")

          # Summarise unqualified experiments
          if not qual:
              print("\n  Unqualified experiments:")
              for exp, qr in qreport.items():
                  if not qr.get("passed"):
                      fails = [c[0] for c in qr.get("checks", []) if not c[1]]
                      print(f"    {exp:<25} FAILED: {', '.join(fails)}")

          print()
          if overall_ok:
              print("  ✅  Overall: PIPELINE HEALTHY — ready for submission.")
          else:
              print("  ❌  Overall: PIPELINE NEEDS ATTENTION (see above).")
          print(SEP)

          # ---- GitHub Step Summary (renders in the Actions run UI) ------------
          step_summary_path = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary_path:
              lines = []
              lines.append("## HypatiaX Pipeline Health\n")
              lines.append("| Gate | Status |")
              lines.append("|---|---|")
              lines.append(f"| 1. Outputs committed | {'✅ ALL PRESENT' if present else '❌ SOME MISSING'} |")
              lines.append(f"| 2. Task completion | {'✅ ALL COMPLETE' if complete else '⚠️ GAPS EXIST'} |")
              lines.append(f"| 3. Qualification (7-dim) | {'✅ ALL QUALIFIED' if qual else '❌ UNQUALIFIED EXPS'} |")
              lines.append("")
              if not complete:
                  incomplete = {e: i for e, i in completion.items() if i.get("missing")}
                  if incomplete:
                      lines.append("### Experiments with missing tasks\n")
                      lines.append("| Experiment | Done/Total | Missing |")
                      lines.append("|---|---|---|")
                      for exp, info in incomplete.items():
                          tot = info.get("total", "?")
                          done = info.get("done", "?")
                          n_m = len(info["missing"])
                          lines.append(f"| {exp} | {done}/{tot} | {n_m} task(s) |")
                      lines.append("")
              if not qual:
                  unqualified = {e: q for e, q in qreport.items() if not q.get("passed")}
                  if unqualified:
                      lines.append("### Unqualified experiments\n")
                      for exp, qr in unqualified.items():
                          fails = [c[0] for c in qr.get("checks", []) if not c[1]]
                          lines.append(f"- **{exp}**: failed `{', '.join(fails)}`")
                      lines.append("")
              lines.append("---")
              lines.append("**✅ PIPELINE HEALTHY — ready for submission.**" if overall_ok
                            else "**❌ PIPELINE NEEDS ATTENTION — see gates above.**")
              try:
                  with open(step_summary_path, "a") as fh:
                      fh.write("\n".join(lines) + "\n")
              except Exception as e:
                  print(f"  (could not write GITHUB_STEP_SUMMARY: {e})")

          sys.exit(0 if overall_ok else 1)
          PYEOF


# ==============================================================================
#  JOB 6 — dispatch: launch missing experiments via gh workflow run
#
#  Reads the completion_report from JOB 2 and dispatches ci_runner.yml
#  for every experiment that has 0 done tasks (never launched).
#  Experiments with partial results are skipped — use task_ids_override to resume.
#  instability is skipped here — it depends on exp1 and is dispatched separately.
#  Requires: gh CLI (pre-installed on ubuntu-latest) + GITHUB_TOKEN with Actions: write.
# ==============================================================================
  dispatch:
    name: "Dispatch missing experiments"
    needs: [complete, summary]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # P6 FIX: The original condition had an operator-precedence bug:
    #   always() && exp=='all' || event=='workflow_dispatch'
    # evaluates as (always() && exp=='all') || (event=='workflow_dispatch'),
    # which is ALWAYS true on workflow_dispatch — causing the dispatch job
    # to fire on every ci_pipeline.yml C3 call, potentially launching
    # duplicate runners.  Fix: restrict to experiment=='all' only.
    if: always() && github.event.inputs.experiment == 'all'
    permissions:
      actions: write
      contents: read

    steps:
      - name: Dispatch experiments with 0 done tasks
        env:
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          COMPLETION_REPORT: ${{ needs.complete.outputs.completion_report }}
          WORKFLOW_FILE:     ci_runner.yml
          # Pass through repro params so dispatched runs use the same config
          PYSR_GENERATIONS:  ${{ github.event.inputs.pysr_generations || '10000' }}
          PYSR_POPULATIONS:  ${{ github.event.inputs.pysr_populations || '30' }}
          N_SAMPLES:         ${{ github.event.inputs.n_samples        || '200' }}
          NOISE_LEVELS:      ${{ env.NOISE_LEVELS }}
          SEEDS:             ${{ env.SEEDS }}
        run: |
          python3 - <<'PYEOF'
          import json, os, subprocess, sys, time

          report   = json.loads(os.environ["COMPLETION_REPORT"])
          wf       = os.environ["WORKFLOW_FILE"]
          gh       = "gh"

          # Experiments that cannot be auto-dispatched here:
          #   instability — needs exp1 results first; launched manually after exp1.
          SKIP = {"instability"}

          # Dispatch order matters for dependency: exp1 before instability.
          ORDER = ["exp1", "exp1b", "exp2_feynman", "exp2_feynman_extrap", "exp2_feynman_pca",
                   "exp2", "exp3", "exp3b",
                   "suppA", "suppB", "suppB_sc", "hybrid_all_domains", "extrap"]

          dispatched = []
          skipped    = []

          for exp_id in ORDER:
              info = report.get(exp_id, {})
              done    = info.get("done",  0)
              total   = info.get("total", 0)
              missing = info.get("missing", [])

              if exp_id in SKIP:
                  print(f"  ⏭  {exp_id:<25} skipped (dependency: run after exp1)")
                  skipped.append(exp_id)
                  continue

              if done == total and total > 0:
                  print(f"  ✅ {exp_id:<25} complete ({done}/{total}) — not dispatching")
                  continue

              if done > 0:
                  print(f"  ⚠  {exp_id:<25} partial ({done}/{total} done) — skipping auto-dispatch; use task_ids_override to resume")
                  skipped.append(exp_id)
                  continue

              # 0 done — never launched, safe to dispatch fresh
              print(f"  🚀 {exp_id:<25} dispatching ({total} tasks) ...")
              cmd = [
                  gh, "workflow", "run", wf,
                  "--field", f"experiment={exp_id}",
                  "--field", f"n_shards=1",
                  "--field", f"pysr_generations={os.environ['PYSR_GENERATIONS']}",
                  "--field", f"pysr_populations={os.environ['PYSR_POPULATIONS']}",
                  "--field", f"n_samples={os.environ['N_SAMPLES']}",
                  "--field", f"noise_levels={os.environ['NOISE_LEVELS']}",
                  "--field", f"seeds={os.environ['SEEDS']}",
                  "--field", "resume=true",
                  "--field", "dry_run=false",
              ]
              result = subprocess.run(cmd, capture_output=True, text=True)
              if result.returncode == 0:
                  print(f"       ✓ dispatched")
                  dispatched.append(exp_id)
              else:
                  print(f"       ✗ FAILED: {result.stderr.strip()[:200]}")
              time.sleep(3)   # avoid GitHub API rate limits

          print()
          print(f"  Dispatched : {dispatched}")
          print(f"  Skipped    : {skipped}")
          if not dispatched:
              print("  Nothing dispatched — all experiments either complete or partial.")
          PYEOF

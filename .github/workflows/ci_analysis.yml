# ==============================================================================
#  ci_analysis.yml - HypatiaX post-consolidation statistical analysis
#
#  Architecture contract (read before editing):
#    This workflow runs AFTER ci_runner.yml has completed and
#    committed result files to the repository.  It is the ONLY stage that may
#    perform statistical analysis.  Workers MUST NOT run statistical tests;
#    see ci_runner.yml for the architectural rationale.
#
#  NOTE: ci_runner.yml has NO consolidate job — each worker shard
#    commits its own result files directly to the repo.  _merged.json is NOT
#    automatically produced for most experiments; for exp1b and exp3b it is
#    produced inline by the "Merge shards" step in this workflow (see below).
#    ci_consolidate_experiment.yml does not exist; no manual consolidation
#    step is required.
#
#  Input modes (set by "Locate analysis input" → $INPUT_MODE env var):
#
#    MERGED  (exp1b, exp3b only):
#      Reads _merged.json produced inline by the "Merge shards" step, which
#      calls merge_shards.py against the committed shard files in RESULT_DIR.
#      Hard-fails if _merged.json is absent after the merge step.
#      run_analysis.py flag: --input-json <path>
#
#    DIRECT  (NSHARDS=1 / single-file experiments — exp1 and any other
#             experiment whose worker commits exactly one result JSON):
#      Reads the single committed result file directly.
#      No shard_manifest.txt is written; no merge step needed.
#      Covers two sub-cases:
#        • benchmark-format (tests[] array) — in-memory merge to
#          _merged_benchmark.json, then --input-json.
#        • flat/list JSON — --input-json on the single file directly.
#      run_analysis.py flag: --input-json <path>
#
#    SHARDS  (multi-shard, non-benchmark-format experiments):
#      Reads multiple committed shard *.json files listed in shard_manifest.txt.
#      Hard-fails if no shard files are found.
#      run_analysis.py flag: --shard-manifest shard_manifest.txt
#
#  Responsibilities:
#    - Mann-Whitney U tests (per-method, cross-method)
#    - R² distribution analysis and per-method success rates
#    - Method summary tables (coverage, median R², rank)
#    - Coverage gap detection
#    - Instability / domain-consistency metrics (exp: instability, hybrid_all_domains)
#    - Extrapolation checks (exp: extrap)
#    - Publication-quality table generation
#    - Markdown report (_report.md) and structured output (_analysis.json)
#    - Fatal-condition abort (exits non-zero; PR merge blocked by branch protection)
#
#  Outputs committed to master:
#    hypatiax/data/results/{result_subdir}/_report.md
#    hypatiax/data/results/{result_subdir}/_analysis.json
#    hypatiax/data/results/{result_subdir}/ablation_paired.json  (exp2_feynman_extrap only)
#      Committed immediately after merge_extrap_into_benchmark.py so that manual
#      re-runs of ci_analysis.yml find it via locate_analysis_input.sh without
#      needing source_run_id or re-running the merge step.
#
#  Triggering modes:
#    1. Scheduled chain (workflow_dispatch from ci_pipeline.yml): called
#       automatically after ci_runner.yml completes.  Passes
#       experiment and source_run_id; result_subdir is derived from the
#       checkpoint.
#    2. Manual (workflow_dispatch): re-runs analysis on already-committed
#       result files.  Requires experiment; result_subdir is optional (derived
#       from experiment name if omitted); source_run_id optional.
#
#  WHY ci_analysis.yml IS A STANDALONE WORKFLOW (not workflow_run):
#    GitHub does NOT fire the workflow_run event when the triggering workflow
#    was itself started by another workflow via gh workflow run / workflow_dispatch
#    (chained dispatch).  Because ci_pipeline.yml dispatches
#    ci_runner.yml programmatically, a workflow_run trigger on
#    ci_runner.yml would never fire in the normal scheduled
#    pipeline.  ci_pipeline.yml therefore dispatches ci_analysis.yml
#    explicitly from its run-finalize job after ci_runner.yml
#    completes.  The standalone design also allows manual reruns without
#    re-running the expensive experiment workers.
#
#  PURGE RESILIENCE:
#    purge_old_runs in ci_runner.yml and ci_pipeline.yml can
#    delete a completed ci_runner.yml run (and its shard artifact)
#    before a queued ci_analysis.yml job has had a chance to start and download
#    it.  To handle this, the "Download merged artifact" step uses
#    continue-on-error: true.  The "Locate analysis input" step falls back to
#    the committed copy in the repository, which is always present because
#    ci_runner.yml worker shards commit their result files to
#    master directly before ci_analysis.yml is ever dispatched.
#    In manual mode, omit source_run_id entirely to use the committed files
#    directly (the download step is skipped when source_run_id is blank).
# ==============================================================================

name: "HypatiaX - analysis"

run-name: >-
  HypatiaX analysis ::
  ${{ github.event.inputs.experiment }}

# -- Triggers ------------------------------------------------------------------
on:

  # Dispatched explicitly by ci_pipeline.yml after ci_runner.yml
  # completes, or run manually to re-analyse committed result files.
  workflow_dispatch:
    inputs:

      experiment:
        description: "Experiment identifier"
        required: true
        type: string

      result_subdir:
        description: "Optional explicit result subdirectory"
        required: false
        default: ""
        type: string

      source_run_id:
        description: "Optional workflow run id"
        required: false
        default: ""
        type: string

# -- Permissions ---------------------------------------------------------------
permissions:
  contents: write   # commit report + analysis outputs
  actions:  read    # download artifacts from triggering workflow run

# -- Concurrency ---------------------------------------------------------------
concurrency:
  group: ci-analysis-${{ github.event.inputs.experiment }}
  cancel-in-progress: false

# ==============================================================================
#  JOB: analyze
# ==============================================================================
jobs:

  analyze:
    runs-on: ubuntu-latest

    timeout-minutes: 120

    env:
      EXPERIMENT:          ${{ github.event.inputs.experiment }}
      INPUT_RESULT_SUBDIR: ${{ github.event.inputs.result_subdir }}
      SOURCE_RUN_ID:       ${{ github.event.inputs.source_run_id }}

    steps:

      # -----------------------------------------------------------------------
      # Checkout
      # -----------------------------------------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # Python
      # -----------------------------------------------------------------------

      - name: Setup Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip

          if [[ -f requirements.txt ]]; then
            pip install -r requirements.txt
          fi

          pip install "numpy>=1.26" "scipy>=1.11" "pandas>=2.0" "tabulate>=0.9"

      # -----------------------------------------------------------------------
      # Resolve result directory
      # -----------------------------------------------------------------------

      - name: Resolve result directory
        id: resolve
        shell: bash
        run: |
          set -euo pipefail

          # FIX: replaced nested heredoc (caused PYEOF indentation error when bash
          # stripped only the minimum common YAML indent, leaving PYEOF with residual
          # leading spaces that bash never recognised as the closing delimiter).
          # python3 -c avoids all heredoc/YAML indentation interactions entirely.
          RESULT_SUBDIR=$(python3 -c "
          import os, sys
          inp = os.environ.get('INPUT_RESULT_SUBDIR', '').strip()
          if inp:
              print(inp)
              sys.exit(0)
          MAPPING = {
              'exp1':                'comparison_results/noise-noiseless/noiseless/defi',
              'exp1b':               'comparison_results/noise-noiseless/15',
              'exp1_pca':            'comparison_results/noise-noiseless/noiseless/defi_pca',
              'exp1b_pca':           'comparison_results/noise-noiseless/15_pca',
              'exp2_feynman':        'comparison_results/feynman-tests/exp2',
              'exp2_feynman_extrap': 'comparison_results/feynman-tests/exp2_extrap',
              'exp2_feynman_pca':    'comparison_results/feynman-tests/exp2_pca_4060',
              'exp2':                'comparison_results/feynman-tests/exp2_multi',
              'exp3':                'extrapolation',
              'exp3b':               'extrapolation/multi_seed',
              'suppA':               'hybrid_pysr/defi',
              'suppB':               'comparison_results/feynman-tests/noise-sweep/noise-sweep',
              'suppB_sc':            'comparison_results/feynman-tests/sample-complexity',
              'hybrid_all_domains':  'hybrid_llm_nn/all_domains',
              'instability':         'figures',
              'extrap':              'comparison_results/extrapolation',
          }
          exp = os.environ['EXPERIMENT']
          result = MAPPING.get(exp, exp)
          if result == exp:
              print(f'::warning::No canonical subdir mapping for \"{exp}\" — using experiment name as subdir.', file=sys.stderr)
          print(result)
          ")

          RESULT_DIR="hypatiax/data/results/${RESULT_SUBDIR}"

          echo "RESULT_SUBDIR=${RESULT_SUBDIR}" >> "$GITHUB_ENV"
          echo "RESULT_DIR=${RESULT_DIR}"       >> "$GITHUB_ENV"

          echo "Resolved: experiment=${EXPERIMENT}  subdir=${RESULT_SUBDIR}"
          echo "          RESULT_DIR=${RESULT_DIR}"
          echo "          source=pipeline-forwarded (${INPUT_RESULT_SUBDIR:+yes}${INPUT_RESULT_SUBDIR:-no, used fallback MAPPING})"

      # -----------------------------------------------------------------------
      # Optional artifact download
      # -----------------------------------------------------------------------

      # Download consolidated artifact from a ci_consolidate_experiment.yml run.
      # source_run_id is provided by ci_pipeline.yml; omit when
      # re-running analysis manually against already-committed files.
      #
      # MERGE-REQUIRED GATE: exp1b and exp3b are multi-shard experiments.
      # Their _merged.json is now produced inline by the "Merge shards" step
      # below rather than by a separate consolidation workflow.  This download
      # step is therefore a no-op for exp1b/exp3b in the normal pipeline
      # (no consolidated artifact is ever uploaded), but is kept so that a
      # future ci_consolidate_experiment.yml can slot in without YAML changes:
      # if the artifact IS present it is downloaded and the merge step below
      # will find _merged.json already in place and skip re-merging.
      #
      # PURGE RESILIENCE: continue-on-error: true prevents hard-failing when
      # the referenced run has been deleted by purge_old_runs.  The inline
      # "Merge shards" step reads directly from the committed repo files.
      - name: Download merged artifact (exp1b / exp3b only)
        if: |
          github.event.inputs.source_run_id != '' &&
          (
            github.event.inputs.experiment == 'exp1b' ||
            github.event.inputs.experiment == 'exp3b'
          )
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          run-id:         ${{ github.event.inputs.source_run_id }}
          github-token:   ${{ secrets.GITHUB_TOKEN }}
          path:           consolidated_artifact
          pattern:        "consolidated-${{ github.event.inputs.experiment }}-*"
          merge-multiple: true

      # -----------------------------------------------------------------------
      # Locate analysis input
      # -----------------------------------------------------------------------

      - name: Locate analysis input
        id: locate
        shell: bash
        run: |
          set -euo pipefail
          OUTPUT_TARGET=env \
          bash .github/scripts/locate_analysis_input.sh

      # -----------------------------------------------------------------------
      # Validate input data
      # -----------------------------------------------------------------------

      - name: Validate input data
        shell: bash
        run: |
          set -euo pipefail
          # Pre-flight guard: INPUT_MODE must be set by the locate step.
          if [[ -z "${INPUT_MODE:-}" ]]; then
            echo "::error::INPUT_MODE is not set — 'Locate analysis input' step may have failed."
            exit 1
          fi
          # Full validation (path checks + record counting) delegated to script.
          python3 .github/scripts/validate_analysis_input.py

      # -----------------------------------------------------------------------
      # Merge shards (MERGE_REQUIRED_EXPERIMENTS only)
      # -----------------------------------------------------------------------
      # ci_consolidate_experiment.yml does not exist.  For multi-shard
      # experiments the shards are committed directly to the repo by each
      # worker; no artifact is ever uploaded for download.
      # merge_shards.py is therefore called inline here, reading from and
      # writing to RESULT_DIR (the already-checked-out shard files).
      #
      # Which experiments require merging is controlled solely by
      # MERGE_REQUIRED_EXPERIMENTS in merge_shards.py — the YAML does not
      # maintain a separate list.  Adding a new multi-shard experiment only
      # requires updating that set in merge_shards.py.
      #
      # merge_shards.py --input-root == --output-dir == RESULT_DIR:
      #   · _find_shard_files() globs for shard files in RESULT_DIR
      #     recursively.  The _merged.json / _merged.csv / _stats.json /
      #     _checkpoint.json outputs are skipped by _find_shard_files() via
      #     its _SKIP_NAMES guard.
      #   · On success INPUT_MODE is overridden to "merged" and INPUT_JSON is
      #     pointed at _merged.json so run_analysis.py reads the unified file.
      #   · On failure the step exits non-zero and the workflow aborts here
      #     rather than silently passing an empty dataset to run_analysis.py.
      #
      # PURGE RESILIENCE: shard files are committed to master by the workers
      # before this workflow is dispatched, so they are always present in the
      # checkout regardless of artifact retention.
      # -----------------------------------------------------------------------

      - name: Merge shards
        if: github.event.inputs.experiment != ''
        shell: bash
        run: |
          set -euo pipefail

          # MERGE_REQUIRED_EXPERIMENTS in merge_shards.py is the single source
          # of truth for which experiments need shard merging.  No hardcoded
          # list here — adding an experiment to that set is the only change
          # needed when a new multi-shard experiment is introduced.
          NEEDS_MERGE=$(python3 -c "
          import sys
          sys.path.insert(0, '.github/scripts')
          from merge_shards import MERGE_REQUIRED_EXPERIMENTS
          print('true' if '${{ github.event.inputs.experiment }}' in MERGE_REQUIRED_EXPERIMENTS else 'false')
          ")

          if [[ "$NEEDS_MERGE" != "true" ]]; then
            echo "Experiment '${EXPERIMENT}' not in MERGE_REQUIRED_EXPERIMENTS — skipping."
            exit 0
          fi

          # locate_analysis_input.sh may have already run merge_shards.py
          # (its REQUIRE_MERGE fallback path) and set INPUT_MODE=merged.
          # If _merged.json is already present, skip to avoid a double merge.
          MERGED_JSON="${RESULT_DIR}/_merged.json"
          if [[ -f "$MERGED_JSON" && "${INPUT_MODE:-}" == "merged" ]]; then
            echo "  _merged.json already produced by locate step — skipping re-merge."
            exit 0
          fi

          python3 .github/scripts/merge_shards.py \
            --experiment    "$EXPERIMENT" \
            --input-root    "$RESULT_DIR" \
            --output-dir    "$RESULT_DIR" \
            --result-subdir "$RESULT_SUBDIR"

          MERGED_JSON="${RESULT_DIR}/_merged.json"
          if [[ ! -f "$MERGED_JSON" ]]; then
            echo "::error::merge_shards.py did not produce ${MERGED_JSON}"
            exit 1
          fi

          N_MERGED=$(python3 -c "import json; d=json.load(open('${MERGED_JSON}')); print(len(d))")
          echo "  _merged.json: ${N_MERGED} unique task record(s)"

          echo "INPUT_MODE=merged"          >> "$GITHUB_ENV"
          echo "INPUT_JSON=${MERGED_JSON}"  >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # Symbolic equivalence check (exp3 / exp3b only)
      # -----------------------------------------------------------------------
      # Runs check_symbolic_equivalence.py against all exp3_nguyen12_seed*.json
      # files in RESULT_DIR and commits two outputs:
      #   symbolic_equivalence_report.csv    (machine-readable, per-seed rows)
      #   symbolic_equivalence_summary.txt   (paper-ready summary)
      # Must run AFTER Merge shards so exp3b has its full seed set committed.
      #
      # FIX: The glob expansion must happen AFTER cd into RESULT_DIR.
      # Previously SEED_FILES was expanded before the cd using absolute paths,
      # but check_symbolic_equivalence.py resolved those paths relative to the
      # post-cd working directory, producing double-rooted paths that did not
      # exist on disk (FALSE POSITIVE file-not-found errors).  Expanding the
      # glob after the cd ensures the paths passed to the script are relative
      # to the same directory the script uses for all file I/O and output
      # writing, which is RESULT_DIR.
      # -----------------------------------------------------------------------

      - name: Install symbolic-equivalence dependencies (exp3 / exp3b)
        if: |
          github.event.inputs.experiment == 'exp3' ||
          github.event.inputs.experiment == 'exp3b'
        shell: bash
        run: |
          pip install "sympy>=1.12"

      - name: Run symbolic equivalence check (exp3 / exp3b)
        if: |
          github.event.inputs.experiment == 'exp3' ||
          github.event.inputs.experiment == 'exp3b'
        shell: bash
        run: |
          set -euo pipefail

          # cd FIRST so that the glob expansion below and all relative-path
          # output writes by check_symbolic_equivalence.py are anchored to the
          # same directory.  This is the fix for the FALSE POSITIVE
          # "No such file or directory" errors seen when SEED_FILES was
          # expanded before the cd using absolute paths.
          cd "$RESULT_DIR"

          # Collect all seed files (exp3: one file; exp3b: four or more).
          # Glob is evaluated after cd so paths are relative — no double-root.
          # Do not hardcode seed numbers; new seeds added to multi_seed/ are
          # picked up automatically without YAML changes.
          SEED_FILES=( exp3_nguyen12_seed*.json )

          if [[ ${#SEED_FILES[@]} -eq 0 || ! -f "${SEED_FILES[0]}" ]]; then
            echo "::error::No exp3_nguyen12_seed*.json files found in ${RESULT_DIR}"
            exit 1
          fi

          echo "Found ${#SEED_FILES[@]} seed file(s): ${SEED_FILES[*]}"

          python3 "${GITHUB_WORKSPACE}/.github/scripts/check_symbolic_equivalence.py" \
            "${SEED_FILES[@]}"

          # Verify both outputs were produced (paths relative to RESULT_DIR,
          # which is still the working directory after the cd above).
          [[ -f symbolic_equivalence_report.csv ]] || {
            echo "::error::check_symbolic_equivalence.py did not produce symbolic_equivalence_report.csv"
            exit 1
          }
          [[ -f symbolic_equivalence_summary.txt ]] || {
            echo "::error::check_symbolic_equivalence.py did not produce symbolic_equivalence_summary.txt"
            exit 1
          }

          echo "Symbolic equivalence outputs:"
          ls -lh symbolic_equivalence_report.csv symbolic_equivalence_summary.txt

      # -----------------------------------------------------------------------
      # Generate Nguyen-12 symbolic equivalence table (exp3 / exp3b)
      # -----------------------------------------------------------------------
      # Reads symbolic_equivalence_report.csv from RESULT_DIR (written by the
      # prior step) and produces tables/nguyen12_symequiv.tex alongside the
      # other per-experiment tables.
      # -----------------------------------------------------------------------

      - name: Generate Nguyen-12 symbolic equivalence table (exp3 / exp3b)
        if: |
          github.event.inputs.experiment == 'exp3' ||
          github.event.inputs.experiment == 'exp3b'
        shell: bash
        run: |
          set -euo pipefail

          TABLES_DIR="${RESULT_DIR}/tables"
          mkdir -p "${TABLES_DIR}"

          python3 scripts/patches/generate_nguyen12_symequiv_table.py \
            --results-dir "${RESULT_DIR}" \
            --output-dir  "${TABLES_DIR}"

          [[ -f "${TABLES_DIR}/nguyen12_symequiv.tex" ]] || {
            echo "::error::generate_nguyen12_symequiv_table.py did not produce nguyen12_symequiv.tex"
            exit 1
          }

          echo "nguyen12_symequiv.tex written to ${TABLES_DIR}."

      - name: Commit Nguyen-12 symequiv table (exp3 / exp3b)
        if: |
          github.event.inputs.experiment == 'exp3' ||
          github.event.inputs.experiment == 'exp3b'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stash any unstaged changes written by the previous step so that
          # git pull --rebase does not refuse with "You have unstaged changes."
          git stash --include-untracked || true
          git pull --rebase origin ${{ github.ref_name }}
          git stash pop || true

          git add -f "${RESULT_DIR}/tables/nguyen12_symequiv.tex"

          if git diff --cached --quiet; then
            echo "nguyen12_symequiv.tex unchanged — nothing to commit."
          else
            git commit -m "data: nguyen12 symequiv table ${EXPERIMENT} - run ${{ github.run_id }} - $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD:${{ github.ref_name }}
            echo "Pushed nguyen12_symequiv.tex to master."
          fi

      - name: Commit symbolic equivalence outputs (exp3 / exp3b)
        if: |
          github.event.inputs.experiment == 'exp3' ||
          github.event.inputs.experiment == 'exp3b'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git stash --include-untracked || true
          git pull --rebase origin ${{ github.ref_name }}
          git stash pop || true

          git add -f \
            "${RESULT_DIR}/symbolic_equivalence_report.csv" \
            "${RESULT_DIR}/symbolic_equivalence_summary.txt"

          if git diff --cached --quiet; then
            echo "Symbolic equivalence outputs unchanged — nothing to commit."
          else
            git commit -m "data: symbolic equivalence ${EXPERIMENT} - run ${{ github.run_id }} - $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD:${{ github.ref_name }}
            echo "Pushed symbolic equivalence outputs."
          fi

      # -----------------------------------------------------------------------
      # Merge extrap into benchmark (exp2_feynman_extrap only)
      # -----------------------------------------------------------------------
      # merge_extrap_into_benchmark.py joins benchmark_results.json (train r2)
      # with benchmark_results_extrap.json (extrap_r2_far / extrap_r2_near) into
      # ablation_paired.json -- the schema that analyse_ablation() in run_analysis.py
      # requires.  After the merge, INPUT_JSON and INPUT_MODE are overridden so the
      # analysis step reads the paired file rather than the raw benchmark JSON.
      #
      # Primary source  : benchmark_results_extrap.json  (v2.2+ runner --extrap flag)
      # Legacy fallback : extrap_results_*.json           (passed via --extrap-dir)
      # Both live in RESULT_DIR; the script picks extrap_benchmark_dir first per-eq.
      # -----------------------------------------------------------------------

      - name: Merge extrap into benchmark (exp2_feynman_extrap)
        if: github.event.inputs.experiment == 'exp2_feynman_extrap'
        shell: bash
        run: |
          set -euo pipefail

          # Confirm RESULT_DIR resolves to exp2_extrap — this is where
          # benchmark_results_extrap.json lives and where ablation_paired.json
          # will be written and committed.
          EXPECTED_SUFFIX="comparison_results/feynman-tests/exp2_extrap"
          if [[ "${RESULT_DIR}" != *"${EXPECTED_SUFFIX}" ]]; then
            echo "::error::RESULT_DIR='${RESULT_DIR}' does not end with '${EXPECTED_SUFFIX}'"
            echo "  The subdir mapping for exp2_feynman_extrap must be ${EXPECTED_SUFFIX}"
            exit 1
          fi

          PAIRED="${RESULT_DIR}/ablation_paired.json"
          # benchmark_results.json (noiseless train r2) lives in exp2, not exp2_extrap.
          # benchmark_results_extrap.json (extrap_r2_far) lives in RESULT_DIR (exp2_extrap).
          BENCHMARK_DIR="hypatiax/data/results/comparison_results/feynman-tests/exp2"

          python3 .github/scripts/merge_extrap_into_benchmark.py \
            --benchmark-dir        "${BENCHMARK_DIR}" \
            --extrap-benchmark-dir "${RESULT_DIR}" \
            --extrap-dir           "${RESULT_DIR}" \
            --output               "${PAIRED}"

          if [[ ! -f "${PAIRED}" ]]; then
            echo "::error::merge_extrap_into_benchmark.py did not produce ${PAIRED}"
            exit 1
          fi

          N_RECORDS=$(python3 -c "import json; print(len(json.load(open('${PAIRED}'))))")
          echo "  ablation_paired.json: ${N_RECORDS} paired record(s) -> ${PAIRED}"

          # Override INPUT_JSON / INPUT_MODE so the analysis step reads the merged file.
          # INPUT_MODE stays 'direct' -- ablation_paired.json is a single flat list.
          echo "INPUT_JSON=${PAIRED}" >> "$GITHUB_ENV"
          echo "INPUT_MODE=direct"    >> "$GITHUB_ENV"

      # -----------------------------------------------------------------------
      # Commit ablation_paired.json (exp2_feynman_extrap only)
      #
      # Persists the merged input to the repo so that:
      #   1. Manual re-runs of ci_analysis.yml find it via locate_analysis_input.sh
      #      without needing source_run_id or re-running the merge step.
      #   2. The file is auditable alongside _report.md and _analysis.json.
      #
      # Committed BEFORE "Run analysis" so that any immediate manual re-run
      # dispatched after a failed analysis step also reads the correct file.
      #
      # git pull --rebase guards against concurrent pushes from other workflows
      # that may have landed on master since checkout.
      # git add -f mirrors the flag used in "Commit analysis outputs" to bypass
      # any .gitignore patterns that exclude generated JSON files.
      # -----------------------------------------------------------------------
      - name: Commit ablation_paired.json (exp2_feynman_extrap)
        if: github.event.inputs.experiment == 'exp2_feynman_extrap'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Pull any commits that landed since checkout (other shards, racing workflows).
          # Stash first so unstaged files written by the prior step do not block rebase.
          git stash --include-untracked || true
          git pull --rebase origin ${{ github.ref_name }}
          git stash pop || true

          git add -f "${RESULT_DIR}/ablation_paired.json"

          if git diff --cached --quiet; then
            echo "ablation_paired.json unchanged — nothing to commit."
          else
            git commit -m "data: ablation_paired.json ${EXPERIMENT} - run ${{ github.run_id }} - $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD:${{ github.ref_name }}
            echo "Pushed ablation_paired.json to master."
          fi

      # -----------------------------------------------------------------------
      # Generate PCA comparison table (exp2_feynman_pca only)
      # -----------------------------------------------------------------------
      # Runs generate_exp2_pca_comparison_table.py to produce a side-by-side
      # LaTeX/CSV/Markdown comparison of exp2-feynman (random_state=42, 80/20)
      # vs exp2_feynman_pca (PCA-directed 40/60 split).  The script reads both
      # result subtrees from the committed repo so it works in both scheduled
      # and manual re-run modes with no source_run_id required.

      - name: Generate PCA comparison table (exp2_feynman_pca)
        if: github.event.inputs.experiment == 'exp2_feynman_pca'
        shell: bash
        env:
          SUB: ${{ env.RESULT_SUBDIR }}
        run: |
          set -euo pipefail

          RESULTS_ROOT="hypatiax/data/results"
          OUTPUT_DIR="${RESULTS_ROOT}/comparison_results/feynman-tests/exp2_pca_4060"

          echo "Running generate_exp2_pca_comparison_table.py ..."
          python3 scripts/patches/generate_exp2_pca_comparison_table.py \
            --results-dir "${RESULTS_ROOT}" \
            --output-dir  "${OUTPUT_DIR}" \
            --formats     "tex,csv,md"

          echo "PCA comparison table written to ${OUTPUT_DIR}."

      - name: Commit PCA comparison table (exp2_feynman_pca)
        if: github.event.inputs.experiment == 'exp2_feynman_pca'
        shell: bash
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stash unstaged files written by the prior Generate step, pull to
          # pick up any concurrent commits, then restore the generated files.
          git stash --include-untracked || true
          git pull --rebase origin ${{ github.ref_name }}
          git stash pop || true

          OUTPUT_DIR="hypatiax/data/results/comparison_results/feynman-tests/exp2_pca_4060"
          git add -f \
            "${OUTPUT_DIR}/exp2_pca_comparison.tex" \
            "${OUTPUT_DIR}/exp2_pca_comparison.csv" \
            "${OUTPUT_DIR}/exp2_pca_comparison.md"

          if git diff --cached --quiet; then
            echo "PCA comparison table unchanged — nothing to commit."
          else
            git commit -m "data: exp2 PCA comparison table (FIX-C3) - run ${{ github.run_id }} - $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin HEAD:${{ github.ref_name }}
            echo "Pushed PCA comparison table to master."
          fi

      # -----------------------------------------------------------------------
      # Run analysis
      # -----------------------------------------------------------------------

      - name: Run statistical analysis
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p "$RESULT_DIR"

          # Build the input-source flag without any subshell quoting.
          # The old "$(...) echo '--flag \'$VAR\''" pattern passed literal
          # single-quote characters to Python (bash does NOT strip quotes from
          # command-substitution output), causing Path("'shard_manifest.txt'")
          # to fail with "not found".  A case statement with bare variable
          # references is unambiguous and covers all three INPUT_MODE values.
          #
          #   merged  — _merged.json from ci_consolidate, or _merged_benchmark.json
          #             assembled in-memory from benchmark-format shards
          #   direct  — single committed result file (NSHARDS=1, e.g. exp1)
          #   shards  — multiple flat/list-format shard files via manifest
          INPUT_FLAG=()
          case "$INPUT_MODE" in
            merged|direct)
              INPUT_FLAG=(--input-json "$INPUT_JSON")
              ;;
            shards)
              INPUT_FLAG=(--shard-manifest "$SHARD_MANIFEST")
              ;;
            *)
              echo "::error::Unknown INPUT_MODE='${INPUT_MODE}'. Expected merged, direct, or shards."
              exit 1
              ;;
          esac

          echo "INPUT_MODE  : ${INPUT_MODE}"
          echo "INPUT_FLAG  : ${INPUT_FLAG[*]}"
          echo "RESULT_DIR  : ${RESULT_DIR}"

          python3 .github/scripts/run_analysis.py \
            --experiment "$EXPERIMENT" \
            --result-dir "$RESULT_DIR" \
            "${INPUT_FLAG[@]}"

      # -----------------------------------------------------------------------
      # Verify outputs
      # -----------------------------------------------------------------------

      - name: Verify outputs
        shell: bash
        run: |
          set -euo pipefail

          REPORT_MD="$RESULT_DIR/_report.md"
          ANALYSIS_JSON="$RESULT_DIR/_analysis.json"

          [[ -f "$REPORT_MD" ]] || {
            echo "::error::Missing report markdown: $REPORT_MD"
            exit 1
          }

          [[ -f "$ANALYSIS_JSON" ]] || {
            echo "::error::Missing analysis json: $ANALYSIS_JSON"
            exit 1
          }

          # Verify _analysis.json is valid JSON and contains required top-level keys.
          # FIX: use printf to write checker script (avoids heredoc/multiline python3 -c,
          # both of which produce unindented lines that YAML parses as mapping keys).
          printf '%s\n' \
            'import json, os, sys' \
            'path = os.environ["RESULT_DIR"] + "/_analysis.json"' \
            'try:' \
            '    d = json.load(open(path))' \
            'except Exception as e:' \
            '    print("::error::_analysis.json is not valid JSON: " + str(e)); sys.exit(1)' \
            'required = ("experiment","experiment_mode","n_total","fatal_conditions")' \
            'missing = [k for k in required if k not in d]' \
            'if missing:' \
            '    print("::error::_analysis.json missing required keys: " + str(missing)); sys.exit(1)' \
            'hard = [c for c in d["fatal_conditions"] if not (c.startswith("INFO_") or c.startswith("WARN_"))]' \
            'soft = len(d["fatal_conditions"]) - len(hard)' \
            'exp,mode,n,nf = d["experiment"],d["experiment_mode"],d["n_total"],len(d["fatal_conditions"])' \
            'print(f"_analysis.json OK: experiment={exp}, mode={mode}, n_total={n}, fatal_conditions={nf} ({len(hard)} hard, {soft} soft)")' \
            > /tmp/_verify_analysis.py
          python3 /tmp/_verify_analysis.py
          echo
          echo "=== OUTPUTS ==="
          ls -lh "$REPORT_MD" "$ANALYSIS_JSON"

      # -----------------------------------------------------------------------
      # Commit outputs
      # -----------------------------------------------------------------------

      - name: Commit analysis outputs
        shell: bash
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f \
            "$RESULT_DIR/_report.md" \
            "$RESULT_DIR/_analysis.json"

          # Commit _merged.json for merge-required experiments (exp1b, exp3b) so
          # that ci_postprocess.yml can read it without re-running ci_analysis.yml.
          # merge_shards.py produces _merged.json in RESULT_DIR; it is never
          # staged elsewhere, so this is the only place it reaches the repo.
          NEEDS_MERGE=$(python3 -c "
          import sys
          sys.path.insert(0, '.github/scripts')
          from merge_shards import MERGE_REQUIRED_EXPERIMENTS
          print('true' if '${EXPERIMENT}' in MERGE_REQUIRED_EXPERIMENTS else 'false')
          ")
          if [[ "$NEEDS_MERGE" == "true" && -f "$RESULT_DIR/_merged.json" ]]; then
            git add -f "$RESULT_DIR/_merged.json"
          fi

          if git diff --cached --quiet; then
            echo "No analysis changes to commit"
            exit 0
          fi

          git commit -m "analysis: ${EXPERIMENT} - run ${{ github.run_id }} - $(date -u +%Y-%m-%dT%H:%M:%SZ)"

          git push origin HEAD:${{ github.ref_name }}
          echo "Pushed analysis outputs to master."

      # -----------------------------------------------------------------------
      # Upload outputs
      # -----------------------------------------------------------------------

      - name: Upload analysis outputs
        uses: actions/upload-artifact@v4.3.6
        with:
          name: analysis-${{ github.event.inputs.experiment }}-${{ github.run_id }}
          path: |
            ${{ env.RESULT_DIR }}/_report.md
            ${{ env.RESULT_DIR }}/_analysis.json
            ${{ env.RESULT_DIR }}/symbolic_equivalence_report.csv
            ${{ env.RESULT_DIR }}/symbolic_equivalence_summary.txt
          if-no-files-found: warn        # warn not error: non-exp3 runs won't have these
          retention-days: 30

      # -----------------------------------------------------------------------
      # Abort on fatal conditions flagged by run_analysis.py.
      # _analysis.json["fatal_conditions"] is a list of strings (empty = OK).
      # Non-zero exit here fails the workflow, which can block PR merges via
      # branch protection rules.  This step runs AFTER the commit so the
      # report is always available even when the run is aborted.
      # -----------------------------------------------------------------------

      - name: Abort on fatal conditions
        shell: bash
        run: |
          python3 -c '
          import json, os, sys
          path = os.environ["RESULT_DIR"] + "/_analysis.json"
          if not os.path.exists(path):
              print("No _analysis.json found; skipping fatal-condition check.")
              sys.exit(0)
          analysis  = json.load(open(path))
          fatal     = analysis.get("fatal_conditions", [])
          hard      = [c for c in fatal if not (c.startswith("INFO_") or c.startswith("WARN_"))]
          if not hard:
              if fatal:
                  print(f"Soft conditions only ({len(fatal)}):")
                  for i, c in enumerate(fatal, 1):
                      print(f"  {i}. {c}")
              print("No fatal conditions detected. Analysis complete.")
              sys.exit(0)
          print(f"::error::Fatal conditions detected ({len(hard)}):")
          for i, c in enumerate(hard, 1):
              print(f"  {i}. {c}")
          print()
          print("Review _report.md for full diagnostic details.")
          print("To re-run analysis after fixes: use workflow_dispatch with the same experiment.")
          sys.exit(1)
          '

            echo "[skip] Results already present in ${PCA_DIR}."
          else
            echo "already_done=false" >> "$GITHUB_OUTPUT"
            echo "[run] No results found in ${PCA_DIR} — will run."
          fi

      - name: Set up Python
        if: steps.check_exp2.outputs.already_done != 'true'
        uses: actions/setup-python@v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION || '3.12' }}

      - name: Install dependencies
        if: steps.check_exp2.outputs.already_done != 'true'
        run: |
          pip install --upgrade pip
          if [[ -f requirements.txt ]]; then pip install -r requirements.txt; fi
          pip install numpy scipy scikit-learn pysr juliacall

      - name: Run exp2_feynman_pca via run_all.sh
        if: steps.check_exp2.outputs.already_done != 'true'
        env:
          RESULTS_DIR:       ${{ github.event.inputs.results_dir || 'hypatiax/data/results' }}
          FEYNMAN_SAMPLES:   ${{ github.event.inputs.n_samples || '200' }}

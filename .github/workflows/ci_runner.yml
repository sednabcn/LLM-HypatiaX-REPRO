    needs: pca_runner
    if: needs.pca_runner.outputs.is_pca == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 340
    outputs:
      already_done: ${{ steps.check_exp2.outputs.already_done }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 1

      - name: Check if exp2_feynman_pca results already exist
        id: check_exp2
        env:
          RESULTS_DIR: ${{ github.event.inputs.results_dir || 'hypatiax/data/results' }}
          EXP: ${{ github.event.inputs.experiment }}
        run: |
          if [[ "$EXP" != "exp2_feynman_pca" ]]; then
            echo "already_done=true" >> "$GITHUB_OUTPUT"
            echo "[skip] Not exp2_feynman_pca — skipping this job."
            exit 0
          fi
          PCA_DIR="${RESULTS_DIR}/comparison_results/feynman-tests/exp2_pca_4060"
          if [ -d "${PCA_DIR}" ] && [ -n "$(ls -A "${PCA_DIR}"/*.json 2>/dev/null)" ]; then

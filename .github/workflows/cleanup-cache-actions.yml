name: Delete all caches

on:
  workflow_dispatch:  # run manually from GitHub UI

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest  # missing
    steps:                   # missing
      - name: Delete all caches
        run: gh cache delete --all -R sednabcn/LLM-HypatiaX-PAPERS-Public || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}


# ==============================================================================
#  ci_paper_audit.yml  —  HypatiaX · Paper audit gate
#
#  TRIGGER
#  -------
#  Fires automatically when ci_pipeline.yml completes for slot 12 (extrap),
#  which is the last experiment in the queue.  Gated on:
#    slot == '12'  AND  run_full == 'true'
#
#  ALL logic lives in scripts/patches/run_audit.sh — this file only wires CI plumbing.
#  Steps call: bash scripts/patches/run_audit.sh <step_name>
#
#  JOBS (sequential)
#  -----------------
#  Job 0 — guard
#    bash scripts/patches/run_audit.sh audit_guard
#    Sets should_run=true/false based on slot + conclusion.
#
#  Job 0b — collect-figures-tables  (needs: guard)
#    Scans $OUT_BASE recursively for all *.pdf/*.png (figures) and
#    *.tex (tables) and copies them into the canonical flat dirs:
#      $OUT_BASE/figures/   — expected by dimension (6) gate
#      $OUT_BASE/tables/    — expected by dimension (7) gate
#    If both source pools are empty after scanning, the job prints a
#    clear error and exits non-zero (pipeline stops here).
#    Falls back to running generate_figures.py / generate_tables.py
#    (repo root) when the scanned pools are empty.
#
#  Job 0c — preflight-check  (needs: collect-figures-tables)
#    Hard-checks that $OUT_BASE/figures/ and $OUT_BASE/tables/ each
#    contain at least one file before any quality gate runs.
#    Exits non-zero with a descriptive message if either dir is absent
#    or empty — prevents misleading FAIL output from downstream jobs.
#
#  Job 1 — numerical-verify  (needs: preflight-check)
#    bash scripts/patches/run_audit.sh qualify
#    Numerical spot-checks + 7-dimension per-experiment gate.
#    Writes logs/verify_report.json.  Exits non-zero on any FAIL.
#
#  Job 2 — paper-audit  (needs: numerical-verify)
#    bash scripts/patches/run_audit.sh audit_paper
#    Loads scripts/patches/paper_targets.json, cross-checks all claims
#    against _merged.json files, emits logs/paper_audit_findings.json.
#    Includes Nguyen-12 dual-threshold check (91.7% vs 33.3%).
#    Exits non-zero on any FAIL or MISSING.
#    NOTE: NB-06 Step 4 API key scan confirmed CLEAN — no exposed keys
#    in any notebook.  FIX-C4 in the original fix recipe was a false positive
#    and has been removed.  ANTHROPIC_API_KEY is correctly injected via
#    ${{ secrets.ANTHROPIC_API_KEY }} in this pipeline (Jobs 1 & 2) and
#    must never be hardcoded in notebook cells.
#
#  Job 3 — figures-tables-validate  (needs: numerical-verify)
#    bash scripts/patches/run_audit.sh audit_figures_tables
#    Validates that all expected figures (PDF/PNG) and tables (TeX) are
#    present in RESULTS_DIR/figures/ and RESULTS_DIR/tables/.
#    Exits non-zero on any missing file.
#
#  Job 4 — final-gate
#    bash scripts/patches/run_audit.sh audit_final_gate
#    Aggregates results and sets the workflow conclusion.
#
#  TIMEOUT CONTRACT
#  ----------------
#  guard                   :  5 min
#  collect-figures-tables  : 10 min  (scan + copy or generate)
#  preflight-check         :  5 min  (existence assertion only)
#  numerical-verify        : 15 min  (bash scripts/patches/run_audit.sh qualify)
#  paper-audit             : 15 min  (bash scripts/patches/run_audit.sh audit_paper)
#  figures-tables-validate : 10 min  (bash scripts/patches/run_audit.sh audit_figures_tables)
#  final-gate              :  5 min  (bash scripts/patches/run_audit.sh audit_final_gate)
#
#  ARTIFACTS
#  ---------
#  logs/verify_report.json         → verify-report-<run_id>
#  logs/paper_audit_findings.json  → paper-audit-findings-<run_id>
#  logs/figures_tables_report.json → figures-tables-report-<run_id>
#
#  AUDIT FIX STATUS (20 actionable fixes — FIX-C4 removed as false positive)
#  --------------------------------------------------------------------------
#  NB-01  FIX-B1  OPEN  koza1994genetic undefined (lines 327, 1888)
#  NB-01  FIX-B2  OPEN  Alias collision cranmer2023pysr / cranmer2023interpretable
#  NB-01  FIX-B3  OPEN  Alias collision udrescu2020ai / udrescu2020aifeynman
#  NB-02  FIX-XR1 OPEN  Duplicate section labels sec:llm_limitations / sec:llm_domain
#  NB-02  FIX-XR2 OPEN  \label{sec:r2_bugfix} inside \item block
#  NB-02  FIX-XR3 OPEN  Supp A references Section 7.3 — should be 7.4
#  NB-02  FIX-XR4 OPEN  Supp A filename jmlr_paper_main.tex → jmlr-hypatiax-paper-final.tex
#  NB-03  FIX-S1  OPEN  All 12 top-level \section commands missing \label
#  NB-03  FIX-S2  OPEN  All subsections missing \label
#  NB-04  FIX-N1  OPEN  71 cases → 70 tasks in instability section (line 1637)
#  NB-04  FIX-N2  OPEN  Terminology: five-stage vs Five-Layer Architecture (§8.3)
#  NB-04  FIX-N3  OPEN  Verify Nguyen-12 numbers after seed=123 rerun
#  NB-05  FIX-F1  OPEN  hypatiaX_three_systems MISSING — replace \fbox placeholder
#  NB-05  FIX-F2  OPEN  fig18_r2_heatmap_improved MISSING
#  NB-05  FIX-F3  OPEN  fig09_r2_heatmap_regimes MISSING
#  NB-05  FIX-F4  OPEN  fig1_seed_sweep MISSING
#  NB-05  FIX-F5  OPEN  Verify hypatiaX_algorithm1_routing_cascade_v2 compiles
#  NB-06  FIX-C1  OPEN  Duplicate case names in benchmark catalogue
#  NB-06  FIX-C2  OPEN  Stale hybrid_system_v40 imports (lines 29, 266, 2070, 2404)
#  NB-06  FIX-C3  OPEN  Feynman split protocol mismatch: random 80/20 ≠ PCA 40/60
#  NB-06  FIX-C4  FALSE POSITIVE — REMOVED
#          NB-06 Step 4 scan result: "OK - no exposed API keys found in notebooks"
# ==============================================================================

name: "HypatiaX - paper audit"
run-name: >-
  HypatiaX paper audit — slot 12 (extrap) — run ${{ github.run_id }}

on:
  # ── Auto: fired by ci_pipeline.yml completing for slot 12 ──────────────────
  workflow_run:
    workflows:
      - "HypatiaX - pipeline"
    types:
      - completed

  # ── Manual: run at any time (useful for ad-hoc audits) ─────────────────────
  workflow_dispatch:
    inputs:
      skip_verify:
        description: "Skip numerical-verify and go straight to paper-audit (true/false)"
        required: false
        default: "false"
      fail_on_warn:
        description: "Treat WARN as FAIL in the audit (true/false)"
        required: false
        default: "false"
      paper_audit_only:
        description: "Skip ALL jobs except paper-audit — use when upstream jobs already passed (true/false)"
        required: false
        default: "false"

permissions:
  contents: read
  actions:  read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  OUT_BASE: "hypatiax/data/results"
  PYTHON_VERSION: "3.12"
  REGISTRY_PATH: "scripts/patches/issue_registry.json"

jobs:

  # ============================================================================
  #  JOB 0 — guard
  #  bash scripts/patches/run_audit.sh audit_guard
  #  Outputs: should_run — "true" if workflow should proceed, "false" to skip.
  # ============================================================================
  guard:
    name: "Check trigger conditions"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      should_run:       ${{ steps.check.outputs.should_run }}
      jobs_already_done: ${{ steps.check.outputs.jobs_already_done }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Evaluate trigger
        id: check
        env:
          EVENT_NAME:         ${{ github.event_name }}
          TRIGGER_NAME:       ${{ github.event.workflow_run.name || '' }}
          TRIGGER_TITLE:      ${{ github.event.workflow_run.display_title || '' }}
          TRIGGER_CONCLUSION: ${{ github.event.workflow_run.conclusion || '' }}
          PAPER_AUDIT_ONLY:   ${{ github.event.inputs.paper_audit_only || 'false' }}
        run: |
          bash scripts/patches/run_audit.sh audit_guard
          # If caller set paper_audit_only=true, signal that all upstream jobs
          # are already done so they can be skipped by downstream job conditions.
          if [[ "${PAPER_AUDIT_ONLY}" == "true" ]]; then
            echo "jobs_already_done=true" >> "$GITHUB_OUTPUT"
            echo "Upstream jobs flagged as already done — only paper-audit will run."
          else
            echo "jobs_already_done=false" >> "$GITHUB_OUTPUT"
          fi


  # ============================================================================
  #  JOB 0b — collect-figures-tables  (needs: guard)
  #
  #  Scans $OUT_BASE recursively for figures (*.pdf, *.png) and tables
  #  (*.tex) that live inside any experiment sub-directory, then copies
  #  them into the two canonical flat directories expected by the audit:
  #
  #    $OUT_BASE/figures/   ← dimension (6) gate
  #    $OUT_BASE/tables/    ← dimension (7) gate
  #
  #  Source-pool logic (per asset type):
  #    1. Find all matching files anywhere under $OUT_BASE, skipping the
  #       canonical destination dirs themselves to avoid re-copying.
  #    2. If the pool is empty → try to generate by running the
  #       corresponding script at the repo root:
  #         figures : python3 figures/generate_figures.py
  #         tables  : python3 tables/generate_tables.py
  #    3. If the pool is still empty after the generation attempt →
  #       print a descriptive error and exit 1 (pipeline stops).
  #
  #  Duplicate filenames: last writer wins (matches behaviour of the
  #  existing audit_figures_tables step which uses a flat manifest).
  # ============================================================================
  collect-figures-tables:
    name: "Job 0b · Collect figures & tables into canonical dirs"
    needs: guard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      needs.guard.outputs.should_run == 'true' &&
      needs.guard.outputs.jobs_already_done != 'true'

    outputs:
      # 'true' when the restore-keys cache hit — canonical dirs were already
      # built on a previous run with the same source content.  Downstream
      # jobs use this to skip redundant work and go straight to download.
      assets-cache-hit: ${{ steps.asset-cache.outputs.cache-hit }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          token:               ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth:         1

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ── Cache key strategy ──────────────────────────────────────────────────
      # Key   : hash of every source .tex and figure file under the repo.
      #         Changes only when source content actually changes.
      # Paths : the two canonical dirs.  On a hit the dirs are restored
      #         from cache and the collection steps are skipped entirely.
      #         On a miss the steps run, populate the dirs, and the cache
      #         is saved for the next run.
      - name: Restore canonical assets cache
        id: asset-cache
        uses: actions/cache@v4.2.0
        with:
          path: |
            ${{ env.OUT_BASE }}/figures
            ${{ env.OUT_BASE }}/tables
          key: canonical-assets-${{ hashFiles('**/*.tex', '**/*.pdf', '**/*.png') }}
          restore-keys: |
            canonical-assets-

      - name: Free disk space
        if: steps.asset-cache.outputs.cache-hit != 'true'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h

      - name: Cache pip packages
        if: steps.asset-cache.outputs.cache-hit != 'true'
        uses: actions/cache@v4.2.0
        with:
          path: ~/.cache/pip
          key: pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        if: steps.asset-cache.outputs.cache-hit != 'true'
        run: |
          python3 -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then
            pip install --no-cache-dir -r requirements.txt
          else
            pip install --no-cache-dir numpy scipy matplotlib sympy
          fi

      - name: Collect figures (PDF/PNG) into $OUT_BASE/figures/
        if: steps.asset-cache.outputs.cache-hit != 'true'
        env:
          OUT_BASE: ${{ env.OUT_BASE }}
        run: |
          set -euo pipefail
          FIGURES_DIR="${OUT_BASE}/figures"
          mkdir -p "${FIGURES_DIR}"

          # Helper: scan the entire workspace for pdf/png, excluding:
          #   - the canonical destination dir (avoid re-copying)
          #   - .git
          # We scan the full workspace (not just $OUT_BASE) because
          # generate_figures.py writes to hypatiax/tools/figures/, which
          # is outside $OUT_BASE.
          scan_figures() {
            find . \
              -path "./.git" -prune -o \
              -path "./${FIGURES_DIR}/*" -prune -o \
              \( -name "*.pdf" -o -name "*.png" \) -print \
            | sort
          }

          echo "=== Scanning workspace for figures ==="
          mapfile -t FOUND < <(scan_figures)

          if [[ ${#FOUND[@]} -eq 0 ]]; then
            echo "::warning::No figures found anywhere in workspace — attempting generation via figures/generate_figures.py"
            if [[ -f figures/generate_figures.py ]]; then
              python3 figures/generate_figures.py
            else
              echo "::error::figures/generate_figures.py not found and no figures exist in workspace."
              echo "         Commit figure outputs or ensure generate_figures.py is present."
              exit 1
            fi
            # Re-scan the full workspace after generation
            mapfile -t FOUND < <(scan_figures)
          fi

          if [[ ${#FOUND[@]} -eq 0 ]]; then
            echo "::error::Figure pool is still empty after running generate_figures.py."
            echo "         Script reported success but wrote no pdf/png files detectable by scan."
            echo "         Check that generate_figures.py saves files with .pdf or .png extensions"
            echo "         somewhere under the workspace (current dir: $(pwd))."
            exit 1
          fi

          echo "Found ${#FOUND[@]} figure file(s) — copying into ${FIGURES_DIR}/"
          for f in "${FOUND[@]}"; do
            DEST="${FIGURES_DIR}/$(basename "${f}")"
            if [[ ! -e "${DEST}" ]]; then
              cp "${f}" "${DEST}"
            else
              # Collision: prefix with the immediate parent dir name.
              PARENT="$(basename "$(dirname "${f}")")"
              EXT="${f##*.}"
              STEM="$(basename "${f%.*}")"
              cp "${f}" "${FIGURES_DIR}/${PARENT}__${STEM}.${EXT}"
              echo "  ⚠ collision: $(basename "${f}") — saved as ${PARENT}__${STEM}.${EXT}"
            fi
          done
          echo "Figures directory now contains $(ls "${FIGURES_DIR}" | wc -l) file(s)."

      - name: Collect tables (TeX) into $OUT_BASE/tables/
        if: steps.asset-cache.outputs.cache-hit != 'true'
        env:
          OUT_BASE: ${{ env.OUT_BASE }}
        run: |
          set -euo pipefail
          TABLES_DIR="${OUT_BASE}/tables"
          mkdir -p "${TABLES_DIR}"

          echo "=== Scanning workspace for .tex tables ==="
          # Tables DO share names across experiments (feynman.tex, ablation.tex,
          # etc. appear under every experiment's tables/ subdir with different
          # content).  Strategy: ALWAYS prefix with the immediate parent of the
          # tables/ subdir (the experiment directory name) so every file gets
          # a unique, traceable name in the canonical flat dir.
          #
          # Naming rule:
          #   <OUT_BASE>/comparison_results/feynman-tests/exp2/tables/feynman.tex
          #   → <TABLES_DIR>/exp2__feynman.tex          (parent of tables/ = exp2)
          #
          #   <OUT_BASE>/extrapolation/tables/feynman.tex
          #   → <TABLES_DIR>/extrapolation__feynman.tex
          #
          # If two experiments share the same immediate parent name (unlikely
          # given the tree, but guarded), we fall back to the grandparent:
          #   exp2__feynman.tex already exists
          #   → feynman-tests__exp2__feynman.tex
          #
          # The canonical names written here are the ones audit_figures_tables
          # must reference in its manifest / paper_targets.json.
          #
          # Scan scope: entire workspace (not just $OUT_BASE) so that tables
          # written by generate_tables.py outside $OUT_BASE are also captured.

          scan_tables() {
            find . \
              -path "./.git" -prune -o \
              -path "./${TABLES_DIR}/*" -prune -o \
              -name "*.tex" -print \
            | sort
          }

          mapfile -t FOUND < <(scan_tables)

          if [[ ${#FOUND[@]} -eq 0 ]]; then
            echo "::warning::No .tex tables found anywhere in workspace — attempting generation via tables/generate_tables.py"
            if [[ -f tables/generate_tables.py ]]; then
              python3 tables/generate_tables.py
            else
              echo "::error::tables/generate_tables.py not found and no .tex files exist in workspace."
              echo "         Commit table outputs or ensure generate_tables.py is present."
              exit 1
            fi
            mapfile -t FOUND < <(scan_tables)
          fi

          if [[ ${#FOUND[@]} -eq 0 ]]; then
            echo "::error::Tables pool is still empty after running generate_tables.py."
            echo "         Script reported success but wrote no .tex files detectable by scan."
            echo "         Check that generate_tables.py saves files with .tex extension"
            echo "         somewhere under the workspace (current dir: $(pwd))."
            exit 1
          fi

          echo "Found ${#FOUND[@]} table file(s) — copying into ${TABLES_DIR}/ with experiment prefix"
          for f in "${FOUND[@]}"; do
            STEM="$(basename "${f}" .tex)"
            # The immediate parent of the file is the tables/ subdir itself.
            # One level up from that is the experiment directory.
            EXPERIMENT="$(basename "$(dirname "$(dirname "${f}")")")"
            DEST="${TABLES_DIR}/${EXPERIMENT}__${STEM}.tex"

            if [[ ! -e "${DEST}" ]]; then
              cp "${f}" "${DEST}"
            else
              # Two source paths share the same experiment dir name — use
              # the grandparent to break the tie.
              GRANDPARENT="$(basename "$(dirname "$(dirname "$(dirname "${f}")")")")"
              DEST="${TABLES_DIR}/${GRANDPARENT}__${EXPERIMENT}__${STEM}.tex"
              cp "${f}" "${DEST}"
              echo "  ⚠ experiment-name collision: used grandparent prefix → $(basename "${DEST}")"
            fi
            echo "  ✅  $(basename "${f}") from ${EXPERIMENT} → $(basename "${DEST}")"
          done
          echo "Tables directory now contains $(ls "${TABLES_DIR}" | wc -l) file(s)."

      - name: Generate tables manifest (logs/tables_manifest.json)
        if: steps.asset-cache.outputs.cache-hit != 'true'
        env:
          OUT_BASE: ${{ env.OUT_BASE }}
        run: |
          set -euo pipefail
          mkdir -p logs
          TABLES_DIR="${OUT_BASE}/tables"
          # Emit a JSON array of every prefixed filename now in the canonical
          # tables/ dir.  audit_figures_tables and paper_targets.json should
          # reference these exact names.
          python3 - <<'EOF'
          import os, json, pathlib
          tables_dir = pathlib.Path(os.environ["OUT_BASE"]) / "tables"
          names = sorted(f.name for f in tables_dir.iterdir() if f.suffix == ".tex")
          manifest = {"tables_dir": str(tables_dir), "count": len(names), "files": names}
          out = pathlib.Path("logs/tables_manifest.json")
          out.write_text(json.dumps(manifest, indent=2))
          print(f"Manifest written: {out}  ({len(names)} entries)")
          for n in names:
              print(f"  {n}")
          EOF

      - name: Upload tables manifest
        if: steps.asset-cache.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v4.3.6
        with:
          name:              tables-manifest-${{ github.run_id }}
          path:              logs/tables_manifest.json
          if-no-files-found: warn
          retention-days:    30

      - name: Upload canonical figures/ and tables/ as artifact
        uses: actions/upload-artifact@v4.3.6
        with:
          name:              canonical-assets-${{ github.run_id }}
          path:              |
            ${{ env.OUT_BASE }}/figures/
            ${{ env.OUT_BASE }}/tables/
          if-no-files-found: error
          retention-days:    3

      - name: Summary
        env:
          OUT_BASE: ${{ env.OUT_BASE }}
        run: |
          CACHE_HIT="${{ steps.asset-cache.outputs.cache-hit }}"
          echo "=== collect-figures-tables summary ==="
          if [[ "${CACHE_HIT}" == 'true' ]]; then
            echo "  ⚡ Cache hit — canonical dirs restored from cache, collection skipped."
          else
            echo "  🔨 Cache miss — dirs collected fresh and saved to cache."
          fi
          echo "  figures : $(ls "${OUT_BASE}/figures" 2>/dev/null | wc -l) file(s)"
          echo "  tables  : $(ls "${OUT_BASE}/tables"  2>/dev/null | wc -l) file(s)"


  # ============================================================================
  #  JOB 0c — preflight-check  (needs: collect-figures-tables)
  #
  #  Hard assertion: both canonical dirs must exist AND be non-empty.
  #  Runs before any quality gate so failures are immediately actionable
  #  rather than buried inside the 7-dimension gate output.
  #
  #  Exit codes:
  #    0  — both dirs present and non-empty → downstream jobs proceed
  #    1  — either dir absent or empty      → pipeline stops with a clear
  #           error message pointing to the collection job
  # ============================================================================
  preflight-check:
    name: "Job 0c · Preflight — verify canonical figures/ and tables/ exist"
    needs: [guard, collect-figures-tables]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: |
      needs.guard.outputs.should_run == 'true' &&
      needs.guard.outputs.jobs_already_done != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Download canonical assets from collect-figures-tables
        uses: actions/download-artifact@v4.1.8
        with:
          name:          canonical-assets-${{ github.run_id }}
          path:          ${{ env.OUT_BASE }}

      - name: Assert figures dir is non-empty
        env:
          OUT_BASE: ${{ env.OUT_BASE }}
        run: |
          set -euo pipefail
          FIGURES_DIR="${OUT_BASE}/figures"
          if [[ ! -d "${FIGURES_DIR}" ]]; then
            echo "::error::${FIGURES_DIR} does not exist after download — upload may have failed in collect-figures-tables."
            exit 1
          fi
          COUNT=$(ls "${FIGURES_DIR}" | wc -l)
          if [[ "${COUNT}" -eq 0 ]]; then
            echo "::error::${FIGURES_DIR} is empty after download."
            exit 1
          fi
          echo "✅  figures OK — ${COUNT} file(s) in ${FIGURES_DIR}"

      - name: Assert tables dir is non-empty
        env:
          OUT_BASE: ${{ env.OUT_BASE }}
        run: |
          set -euo pipefail
          TABLES_DIR="${OUT_BASE}/tables"
          if [[ ! -d "${TABLES_DIR}" ]]; then
            echo "::error::${TABLES_DIR} does not exist after download — upload may have failed in collect-figures-tables."
            exit 1
          fi
          COUNT=$(ls "${TABLES_DIR}" | wc -l)
          if [[ "${COUNT}" -eq 0 ]]; then
            echo "::error::${TABLES_DIR} is empty after download."
            exit 1
          fi
          echo "✅  tables OK — ${COUNT} file(s) in ${TABLES_DIR}"

      - name: Preflight passed
        env:
          OUT_BASE: ${{ env.OUT_BASE }}
        run: |
          echo "=== preflight-check PASSED ==="
          echo "  ${OUT_BASE}/figures/ : $(ls "${OUT_BASE}/figures" | wc -l) file(s)"
          echo "  ${OUT_BASE}/tables/  : $(ls "${OUT_BASE}/tables"  | wc -l) file(s)"
          echo "Proceeding to numerical-verify."


  # ============================================================================
  #  JOB 1 — numerical-verify
  #  bash scripts/patches/run_audit.sh qualify
  #  Numerical spot-checks + 7-dimension per-experiment gate.
  #  Writes logs/verify_report.json.
  # ============================================================================
  numerical-verify:
    name: "Job 1 · Numerical verify"
    needs: [guard, preflight-check]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      needs.guard.outputs.should_run == 'true' &&
      needs.guard.outputs.jobs_already_done != 'true' &&
      needs.preflight-check.result == 'success' &&
      github.event.inputs.skip_verify != 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          token:               ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth:         1

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download canonical assets from collect-figures-tables
        uses: actions/download-artifact@v4.1.8
        with:
          name: canonical-assets-${{ github.run_id }}
          path: ${{ env.OUT_BASE }}

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h

      - name: Cache pip packages
        uses: actions/cache@v4.2.0
        with:
          path: ~/.cache/pip
          key: pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then
            pip install --no-cache-dir -r requirements.txt
          else
            pip install --no-cache-dir numpy scipy sympy
          fi

      - name: Create logs directory
        run: mkdir -p logs

      - name: Run qualify step
        id: verify
        env:
          RESULTS_DIR:        ${{ env.OUT_BASE }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -euo pipefail
          echo "=== numerical-verify (qualify) ==="
          echo "Results base: ${RESULTS_DIR}"
          bash scripts/patches/run_audit.sh qualify 2>&1 | tee logs/verify_run.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo "verify_exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          exit ${EXIT_CODE}

      - name: Print verify summary
        if: always()
        env:
          RESULTS_DIR: ${{ env.OUT_BASE }}
        run: bash scripts/patches/run_audit.sh audit_print_verify

      - name: Upload verify report
        if: always()
        uses: actions/upload-artifact@v4.3.6
        with:
          name:              verify-report-${{ github.run_id }}
          path:              |
            logs/verify_report.json
            logs/verify_run.log
          if-no-files-found: warn
          retention-days:    30


  # ============================================================================
  #  JOB 2 — paper-audit  (needs: numerical-verify)
  #  bash scripts/patches/run_audit.sh audit_paper
  #  Loads scripts/patches/paper_targets.json.
  #  Emits logs/paper_audit_findings.json.
  #  Includes Nguyen-12 dual-threshold check (91.7% vs 33.3%).
  #  Exits non-zero on any FAIL or MISSING.
  # ============================================================================
  paper-audit:
    name: "Job 2 · Paper audit"
    needs: [guard, numerical-verify]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      always() &&
      needs.guard.outputs.should_run == 'true' &&
      (
        needs.guard.outputs.jobs_already_done == 'true' ||
        needs.numerical-verify.result == 'success' ||
        needs.numerical-verify.result == 'skipped'
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          token:               ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth:         1

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download canonical assets from collect-figures-tables
        if: needs.guard.outputs.jobs_already_done != 'true'
        uses: actions/download-artifact@v4.1.8
        with:
          name: canonical-assets-${{ github.run_id }}
          path: ${{ env.OUT_BASE }}

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/share/boost "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h

      - name: Cache pip packages
        uses: actions/cache@v4.2.0
        with:
          path: ~/.cache/pip
          key: pip-${{ env.PYTHON_VERSION }}-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          if [[ -f requirements.txt ]]; then
            pip install --no-cache-dir -r requirements.txt
          else
            pip install --no-cache-dir numpy scipy sympy pyyaml
          fi

      - name: Create logs directory
        run: mkdir -p logs

      - name: Confirm paper_targets.json exists
        run: |
          if [[ ! -f scripts/patches/paper_targets.json ]]; then
            echo "::error::scripts/patches/paper_targets.json not found — commit it before running this audit."
            exit 1
          fi
          N=$(python3 -c "import json; d=json.load(open('scripts/patches/paper_targets.json')); print(len(d))")
          echo "paper_targets.json: ${N} claim(s)"

      # ── Run hypatia_inspector.py (dry-run) before paper-audit ──────────────
      # Produces findings.json with current fix statuses without modifying files.
      # (apply mode already ran in audit-setup / apply-fixes in ci_paper_notebooks.yml)
      - name: Run hypatia_inspector.py (dry-run report)
        run: |
          if [ -f hypatia_inspector.py ]; then
            python hypatia_inspector.py \
              --repo . \
              --registry "${{ env.REGISTRY_PATH }}" \
              --json-out findings.json \
              --severity critical,high,medium
          else
            echo "::warning::hypatia_inspector.py not found at repo root — skipping inspector step"
          fi
        continue-on-error: true

      - name: Upload inspector findings artifact
        if: always()
        uses: actions/upload-artifact@v4.3.6
        with:
          name: hypatia-findings-audit-${{ github.run_id }}
          path: findings.json
          if-no-files-found: warn
          retention-days: 30

      - name: Assert no API keys hardcoded in notebooks
        # NB-06 Step 4 confirmed CLEAN (scan result: "OK - no exposed API keys found").
        # FIX-C4 in the original audit fix recipe was a false positive and has been removed.
        # This step re-runs the same pattern scan on every push so the clean status
        # is continuously verified rather than assumed.
        #
        # FALSE POSITIVE FIX: grep is restricted to code cells only (outputs excluded)
        # and NB-06 itself is excluded from the scan — it contains the regex pattern
        # string "sk-ant-api\d+" as source code (not a real key) which caused a
        # spurious failure.  Any other notebook that contains a live key will still fail.
        run: |
          set -euo pipefail
          echo "=== API key scan (NB-06 Step 4 equivalent) ==="
          # Extract only source cells from notebooks and scan for real sk-ant-api keys.
          # NB-06 is excluded because it contains the detection regex as its own source code.
          # The pattern anchors on a concrete key prefix (sk-ant-api) followed by digits
          # and word chars — it will not match a regex string that uses \d or [A-Za-z0-9].
          python3 - <<'PYSCAN'
          import json, sys
          from pathlib import Path

          KEY_RE_STR = r'sk-ant-api[0-9]{2}-[A-Za-z0-9_-]{90,}'
          import re
          KEY_RE = re.compile(KEY_RE_STR)

          # Notebooks to exclude (contain the detection pattern as source code, not a key)
          EXCLUDE = {"NB-06_Code_Quality_Pipeline_Integrity.ipynb"}

          found_any = False
          for nb_path in sorted(Path(".").rglob("*.ipynb")):
              if nb_path.name in EXCLUDE:
                  print(f"  [SKIP] {nb_path.relative_to('.')} (excluded — contains detection regex)")
                  continue
              try:
                  nb = json.loads(nb_path.read_text(encoding="utf-8"))
              except Exception as exc:
                  print(f"  [WARN] Could not read {nb_path}: {exc}")
                  continue
              for cell in nb.get("cells", []):
                  src = "".join(cell.get("source", []))
                  hits = KEY_RE.findall(src)
                  if hits:
                      found_any = True
                      print(f"  [CRITICAL] EXPOSED API KEY in {nb_path.relative_to('.')}")
                      for m in hits:
                          print(f"    Key prefix: {m[:30]}...")
          if not found_any:
              print("  OK - no exposed API keys found in notebooks")
          else:
              print("")
              print("  ACTION: Rotate the key at console.anthropic.com IMMEDIATELY.")
              print("  Remove the key from the notebook before any git commit or sharing.")
              sys.exit(1)
          PYSCAN

      - name: Run audit-paper step
        id: audit
        env:
          RESULTS_DIR:        ${{ env.OUT_BASE }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          FAIL_ON_WARN:       ${{ github.event.inputs.fail_on_warn || 'false' }}
        run: |
          set -euo pipefail
          echo "=== paper-audit ==="
          echo "Invoking: bash scripts/patches/run_audit.sh audit_paper"
          bash scripts/patches/run_audit.sh audit_paper 2>&1 | tee logs/paper_audit_run.log
          EXIT_CODE=${PIPESTATUS[0]}
          echo ""
          echo "=== Nguyen-12 dual-threshold caveat ==="
          echo "  Paper abstract : 11/12 (91.7%)  — 4-decimal rounding (Uy et al. benchmark)"
          echo "  Strict R2>=0.9999: 4/12 (33.3%) — both figures must appear in SS10.8"
          echo "audit_exit_code=${EXIT_CODE}" >> "$GITHUB_OUTPUT"
          exit ${EXIT_CODE}

      - name: Print audit summary
        if: always()
        env:
          RESULTS_DIR: ${{ env.OUT_BASE }}
        run: bash scripts/patches/run_audit.sh audit_print_findings

      - name: Upload audit findings
        if: always()
        uses: actions/upload-artifact@v4.3.6
        with:
          name:              paper-audit-findings-${{ github.run_id }}
          path:              |
            logs/paper_audit_findings.json
            logs/paper_audit_run.log
          if-no-files-found: warn
          retention-days:    30

      # ── Normalised summary for ci_report dynamic conclusions ─────────────────
      # Converts logs/paper_audit_findings.json into the shared audit_summary
      # schema consumed by ci_report.yml's generate-conclusions step.
      # Schema: { "source": str, "run_id": str, "generated_at": str,
      #           "findings": [ { "id", "severity", "status",
      #                           "description", "action", "nb" } ] }
      - name: Write audit-paper summary JSON
        if: always()
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          python3 - <<'PYEOF'
          import json, os, datetime
          from pathlib import Path

          run_id = os.environ["RUN_ID"]
          findings_path = Path("logs/paper_audit_findings.json")

          # Build findings list from paper_audit_findings.json if it exists,
          # otherwise emit an empty list so ci_report always gets valid JSON.
          findings = []
          if findings_path.exists():
              try:
                  raw = json.loads(findings_path.read_text())
                  # paper_audit_findings.json may be a list or a dict with a
                  # "findings" key — normalise either shape.
                  items = raw if isinstance(raw, list) else raw.get("findings", [])
                  for item in items:
                      findings.append({
                          "id":          item.get("id", item.get("fix_id", "UNKNOWN")),
                          "severity":    item.get("severity", item.get("level", "UNKNOWN")).upper(),
                          "status":      item.get("status", "OPEN").upper(),
                          "description": item.get("description", item.get("message", "")),
                          "action":      item.get("action", item.get("fix", "")),
                          "nb":          item.get("nb", item.get("notebook", "paper-audit")),
                      })
              except Exception as exc:
                  print(f"  WARN: could not parse paper_audit_findings.json: {exc}")

          summary = {
              "source":       "ci_paper_audit",
              "run_id":       run_id,
              "generated_at": datetime.datetime.utcnow().isoformat() + "Z",
              "findings":     findings,
          }
          out = Path("logs/audit_paper_summary.json")
          out.write_text(json.dumps(summary, indent=2))
          print(f"Wrote {out} — {len(findings)} finding(s)")
          PYEOF

      - name: Upload audit-paper summary
        if: always()
        uses: actions/upload-artifact@v4.3.6
        with:
          name:              audit-paper-summary-${{ github.run_id }}
          path:              logs/audit_paper_summary.json
          if-no-files-found: warn
          retention-days:    30


  # ============================================================================
  #  JOB 3 — figures-tables-validate  (needs: numerical-verify)
  #  bash scripts/patches/run_audit.sh audit_figures_tables
  #  Validates expected figures (PDF/PNG) and LaTeX tables (TeX) are present.
  #  Exits non-zero on any missing file.
  #  Writes logs/figures_tables_report.json.
  # ============================================================================
  figures-tables-validate:
    name: "Job 3 · Figures & tables validate"
    needs: [guard, numerical-verify]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: |
      always() &&
      needs.guard.outputs.should_run == 'true' &&
      needs.guard.outputs.jobs_already_done != 'true' &&
      (needs.numerical-verify.result == 'success' ||
       needs.numerical-verify.result == 'skipped')

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2
        with:
          token:               ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth:         1

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Download canonical assets from collect-figures-tables
        uses: actions/download-artifact@v4.1.8
        with:
          name: canonical-assets-${{ github.run_id }}
          path: ${{ env.OUT_BASE }}

      - name: Create logs directory
        run: mkdir -p logs

      - name: Validate figures and tables
        id: validate
        env:
          OUT_BASE: ${{ env.OUT_BASE }}
        run: bash scripts/patches/run_audit.sh audit_figures_tables

      - name: Upload figures/tables report
        if: always()
        uses: actions/upload-artifact@v4.3.6
        with:
          name:              figures-tables-report-${{ github.run_id }}
          path:              logs/figures_tables_report.json
          if-no-files-found: warn
          retention-days:    30


  # ============================================================================
  #  JOB 4 — final-gate
  #  bash scripts/patches/run_audit.sh audit_final_gate
  #  Aggregates outcomes, prints consolidated health table.
  # ============================================================================
  final-gate:
    name: "Final gate"
    needs: [guard, collect-figures-tables, preflight-check, numerical-verify, paper-audit, figures-tables-validate]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always() && needs.guard.outputs.should_run == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Print consolidated summary and set exit code
        env:
          VERIFY_RESULT: ${{ needs.numerical-verify.result }}
          AUDIT_RESULT:  ${{ needs.paper-audit.result }}
          FIGS_RESULT:   ${{ needs.figures-tables-validate.result }}
        run: bash scripts/patches/run_audit.sh audit_final_gate

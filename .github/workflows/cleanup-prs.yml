# ══════════════════════════════════════════════════════════════════════════════
#  cleanup-prs.yml — close ALL open pull requests in this repository
#
#  ⚠  DESTRUCTIVE — this cannot be undone automatically.
#     Closed PRs can be manually re-opened one by one, but there is no bulk
#     undo.  Run --dry-run first to see what would be closed.
#
#  Triggers:
#    Manual only (workflow_dispatch).
#
#  Inputs:
#    dry_run   — "true" (default) prints what would be closed without touching
#                anything.  Set to "false" to actually close PRs.
#    reason    — optional comment posted on every PR before it is closed.
# ══════════════════════════════════════════════════════════════════════════════

name: "Wipe — close all open pull requests"

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — list PRs without closing them (true/false)"
        required: false
        default: "true"
      reason:
        description: "Comment to post on each PR before closing (blank = no comment)"
        required: false
        default: "Closing as part of a bulk cleanup. Please re-open or re-submit if still relevant."

permissions:
  pull-requests: write   # close PRs + post comments
  contents:      read

jobs:
  wipe-prs:
    name: "Close all open PRs${{ github.event.inputs.dry_run == 'true' && ' [DRY RUN]' || '' }}"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Close all open pull requests
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO:     ${{ github.repository }}
          DRY_RUN:  ${{ github.event.inputs.dry_run }}
          REASON:   ${{ github.event.inputs.reason }}
        run: |
          set -euo pipefail

          echo "══════════════════════════════════════════════════"
          echo " Repo     : $REPO"
          echo " Dry run  : $DRY_RUN"
          echo "══════════════════════════════════════════════════"

          # Fetch all open PR numbers (paginate until empty)
          PAGE=1
          ALL_PR_NUMBERS=()

          while true; do
            BATCH=$(gh api \
              "/repos/${REPO}/pulls?state=open&per_page=100&page=${PAGE}" \
              --jq '.[].number')

            [[ -z "$BATCH" ]] && break

            while IFS= read -r num; do
              ALL_PR_NUMBERS+=("$num")
            done <<< "$BATCH"

            (( PAGE++ ))
          done

          TOTAL=${#ALL_PR_NUMBERS[@]}

          if [[ $TOTAL -eq 0 ]]; then
            echo "No open pull requests found — nothing to do."
            exit 0
          fi

          echo "Found $TOTAL open pull request(s):"
          for num in "${ALL_PR_NUMBERS[@]}"; do
            TITLE=$(gh api "/repos/${REPO}/pulls/${num}" --jq '.title')
            echo "  #${num}  ${TITLE}"
          done
          echo ""

          if [[ "$DRY_RUN" == "true" ]]; then
            echo "DRY RUN — no PRs were closed."
            echo "Set dry_run=false to close the ${TOTAL} PR(s) listed above."
            exit 0
          fi

          # ── Actually close each PR ────────────────────────────────────────
          CLOSED=0
          FAILED=0

          for num in "${ALL_PR_NUMBERS[@]}"; do
            echo -n "  Closing #${num} … "

            # Post comment if reason is provided
            if [[ -n "$REASON" ]]; then
              gh api \
                --method POST \
                "/repos/${REPO}/issues/${num}/comments" \
                --field body="$REASON" \
                > /dev/null 2>&1 || true
            fi

            # Close the PR
            if gh api \
                --method PATCH \
                "/repos/${REPO}/pulls/${num}" \
                --field state=closed \
                > /dev/null 2>&1; then
              echo "✓ closed"
              (( CLOSED++ )) || true
            else
              echo "✗ FAILED"
              (( FAILED++ )) || true
            fi
          done

          echo ""
          echo "══════════════════════════════════════════════════"
          echo " Closed : $CLOSED / $TOTAL"
          [[ $FAILED -gt 0 ]] && echo " Failed : $FAILED"
          echo "══════════════════════════════════════════════════"

          [[ $FAILED -gt 0 ]] && exit 1 || exit 0

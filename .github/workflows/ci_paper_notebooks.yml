name: "HypatiaX - paper notebooks"
run-name: >-
  HypatiaX paper notebooks — run ${{ github.run_id }}

on:
  # Fires when ci_paper_audit.yml (name: "HypatiaX - paper audit") completes.
  # The ci_pipeline.yml C5 job also dispatches this via workflow_dispatch.
  # NOTE: workflow_run triggers only when the workflow file is on the default branch.
  workflow_run:
    workflows: ["HypatiaX - paper audit"]
    types:
      - completed

  # Allow manual trigger for debugging / re-runs, and for dispatch from ci_pipeline.yml C5
  workflow_dispatch:
    inputs:
      apply_fixes_only:
        description: "Run hypatia_inspector.py only — skip all notebook execution (true/false)"
        required: false
        default: "false"

permissions:
  contents: write   # apply-fixes job needs write; workflow_run overrides per-job write with top-level read if set lower
  actions:  read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  PYTHON_VERSION: "3.12"
  # Single canonical path for the registry used by hypatia_inspector.py
  REGISTRY_PATH: "scripts/patches/issue_registry.json"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 0 — apply-fixes  (standalone, workflow_dispatch only)
  #
  # Runs hypatia_inspector.py --apply --update-registry directly against
  # the checked-out sources without executing any notebook.
  # Triggered by setting apply_fixes_only=true.
  #
  # Commits the patched files AND the updated registry back to the branch.
  # ──────────────────────────────────────────────────────────────────────────
  apply-fixes:
    name: "Apply non-numerical paper fixes (standalone)"
    runs-on: ubuntu-latest
    if: github.event.inputs.apply_fixes_only == 'true'

    permissions:
      contents: write   # needed to push patched files + registry back

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # ── Run hypatia_inspector.py in apply + update-registry mode ───────────
      # --apply           : write real file changes (not a dry-run)
      # --update-registry : mark applied fixes as 'resolved' in the registry
      # --json-out        : emit findings.json for artifact upload
      - name: Run hypatia_inspector.py (apply + update-registry)
        run: |
          python hypatia_inspector.py \
            --repo . \
            --registry "${{ env.REGISTRY_PATH }}" \
            --apply \
            --update-registry \
            --json-out findings.json
        # Exit 1 means open issues remain; that's expected on first run.
        # We still want the commit step to capture whatever was applied.
        continue-on-error: true

      - name: Upload findings artifact
        if: always()
        uses: actions/upload-artifact@v4.3.6
        with:
          name: hypatia-findings-${{ github.run_id }}
          path: findings.json
          if-no-files-found: warn
          retention-days: 30

      # ── Deploy figures and aggregate tables in standalone apply-fixes mode ──
      # FIX: The apply-fixes job ran hypatia_inspector --apply (which copies
      # FIX-F2/F3/F4 source files) but then committed with "git add -A" which
      # stages everything — including any inspector-written files — only if
      # inspector itself physically copied them.  The deploy + aggregate steps
      # below mirror audit-setup so the standalone job also lands figures/tables
      # at $ROOT even when no notebook jobs are run.
      - name: "FIX-F2/F3/F4: Deploy figures to $ROOT/figures/ (standalone)"
        run: |
          set -euo pipefail
          mkdir -p figures

          deploy_fig() {
            local src="$1"
            if [[ -f "$src" ]]; then cp -v "$src" "figures/$(basename "$src")"; fi
          }

          deploy_fig "Figures/figures-cosmetic-last/fig18_r2_heatmap_improved.pdf"
          deploy_fig "Figures/figures-cosmetic-last/fig09_r2_heatmap_regimes.pdf"
          if [[ -f "Figures/figures-portfolio-variance/fig1_seed_sweep.pdf" ]]; then
            deploy_fig "Figures/figures-portfolio-variance/fig1_seed_sweep.pdf"
          elif [[ -f "Figures/figures-portfolio-variance/fig1_seed_sweep.png" ]]; then
            deploy_fig "Figures/figures-portfolio-variance/fig1_seed_sweep.png"
          fi
          for ext in pdf png jpg eps svg; do
            candidate="Figures/architecture_figures/hypatiaX_three_systems.${ext}"
            [[ -f "$candidate" ]] && deploy_fig "$candidate" && break
          done

          echo "--- figures/ ---"; ls -lh figures/ 2>/dev/null || echo "(empty)"

      - name: "Aggregate experiment tables to $ROOT/tables/ (standalone)"
        run: |
          set -euo pipefail
          mkdir -p tables
          N=0
          while IFS= read -r -d '' tex_file; do
            cp "$tex_file" "tables/$(basename "$tex_file")"
            N=$((N+1))
          done < <(find hypatiax/data/results -path "*/tables/*.tex" -type f -print0 2>/dev/null)
          echo "Aggregated ${N} .tex file(s) into tables/"
          ls -lh tables/ 2>/dev/null || echo "(empty)"

      - name: Commit patched files and updated registry
        id: commit
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit — all fixes already applied."
            echo "patches_applied=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "ci: apply paper fixes via hypatia_inspector.py [skip ci]"
            git push
            echo "Patched files and registry committed and pushed."
            echo "patches_applied=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch ci_report
        if: success()
        env:
          GH_TOKEN: ${{ secrets.PAT_WORKFLOW }}
          REPO:     ${{ github.repository }}
          BRANCH:   ${{ github.ref_name }}
          PATCHES:  ${{ steps.commit.outputs.patches_applied }}
        run: |
          if [[ -z "$GH_TOKEN" ]]; then
            echo "ERROR: PAT_WORKFLOW secret is not set."
            echo "Create a PAT with 'workflow' scope and add it as PAT_WORKFLOW."
            exit 1
          fi
          gh workflow run ci_report.yml \
            --repo "$REPO" \
            --ref  "$BRANCH" \
            --field no_notebooks=true
          if [[ "$PATCHES" == "true" ]]; then
            echo "ci_report.yml dispatched — report will rebuild with patched sources."
          else
            echo "ci_report.yml dispatched — sources were already clean."
          fi

  # ──────────────────────────────────────────────
  # Job 1 — audit-setup
  # Checks out the repo, sets up Python/Jupyter,
  # copies .tex source files into notebooks/, and
  # runs hypatia_inspector.py to auto-patch all
  # non-numerical issues before any notebook runs.
  # Skipped when apply_fixes_only=true.
  # ──────────────────────────────────────────────
  audit-setup:
    name: "audit-setup: copy .tex files + apply non-numerical fixes"
    runs-on: ubuntu-latest

    if: >
      github.event.inputs.apply_fixes_only != 'true' &&
      (github.event_name == 'workflow_dispatch' ||
       github.event.workflow_run.conclusion == 'success')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install jupyter nbconvert ipykernel
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f notebooks/requirements.txt ]; then pip install -r notebooks/requirements.txt; fi

      - name: Register IPython kernel
        run: python -m ipykernel install --user --name python3

      - name: Copy .tex files into notebooks/
        run: |
          mkdir -p notebooks
          find . -maxdepth 2 -name "*.tex" \
            ! -path "./notebooks/*" \
            ! -path "./.git/*" \
            -exec cp -v {} notebooks/ \;
          # Explicitly copy the main paper tex to notebooks/ so notebook cells
          # that open it relative to their working directory always find it,
          # regardless of whether find's maxdepth captured it or not.
          if [[ -f "jmlr-hypatiax-paper-final.tex" ]]; then
            cp -v jmlr-hypatiax-paper-final.tex notebooks/
            echo "  [OK] jmlr-hypatiax-paper-final.tex → notebooks/"
          else
            echo "::error::jmlr-hypatiax-paper-final.tex not found at repo root"
            exit 1
          fi

      # ── Apply all automatable non-numerical fixes ──────────────────────────
      # Uses hypatia_inspector.py as the single source of truth.
      # --apply           : write real changes
      # --update-registry : mark resolved fixes in the registry JSON
      # --json-out        : write findings.json for downstream artifact upload
      #
      # Fixes applied (auto_fixable=true, status=open in registry):
      #   FIX-B1, FIX-B2, FIX-B3,
      #   FIX-XR1, FIX-XR2, FIX-XR3, FIX-XR4,
      #   FIX-N1, FIX-N2, FIX-C2,
      #   FIX-F2, FIX-F3, FIX-F4  (when source files are present)
      - name: Apply non-numerical paper fixes (hypatia_inspector)
        run: |
          if [ -f hypatia_inspector.py ]; then
            python hypatia_inspector.py \
              --repo . \
              --registry "${{ env.REGISTRY_PATH }}" \
              --apply \
              --update-registry \
              --json-out findings.json
          else
            echo "::warning::hypatia_inspector.py not found — skipping auto-fix step"
          fi
        # continue-on-error so open issues don't block notebook execution
        continue-on-error: true

      - name: Upload findings artifact (audit-setup)
        if: always()
        uses: actions/upload-artifact@v4.3.6
        with:
          name: hypatia-findings-setup-${{ github.run_id }}
          path: findings.json
          if-no-files-found: warn
          retention-days: 30

      # ── Deploy figures to $ROOT/figures/ ──────────────────────────────────
      # FIX: Previously this step did not exist.  hypatia_inspector.py detected
      # FIX-F2/F3/F4 and printed fix recipes, but nothing ever acted on them.
      # The source files (Figures/figures-cosmetic-last/, etc.) exist in the
      # checked-out repo here in audit-setup but were never included in the
      # notebooks-workspace artifact, so NB-05's SEARCH_DIRS always resolved
      # against an empty figures/ stub.  This step performs the actual copies.
      #
      # FIX-F1 (hypatiaX_three_systems / \fbox placeholder) is auto_fixable=false
      # and requires a human-produced PDF; it is logged as a warning, not an error.
      - name: "FIX-F2/F3/F4: Deploy figures to $ROOT/figures/"
        run: |
          set -euo pipefail
          mkdir -p figures

          deploy_fig() {
            local src="$1" dest="figures/$(basename "$1")"
            if [[ -f "$src" ]]; then
              cp -v "$src" "$dest"
              echo "  [OK]  Deployed: $dest"
            else
              echo "::warning::FIX source not found — skipping: $src"
            fi
          }

          # FIX-F2: R² heatmap clipped
          deploy_fig "Figures/figures-cosmetic-last/fig18_r2_heatmap_improved.pdf"
          # FIX-F3: R² heatmap raw
          deploy_fig "Figures/figures-cosmetic-last/fig09_r2_heatmap_regimes.pdf"
          # FIX-F4: Portfolio Variance seed sweep (prefer PDF, fall back to PNG)
          if [[ -f "Figures/figures-portfolio-variance/fig1_seed_sweep.pdf" ]]; then
            deploy_fig "Figures/figures-portfolio-variance/fig1_seed_sweep.pdf"
          elif [[ -f "Figures/figures-portfolio-variance/fig1_seed_sweep.png" ]]; then
            deploy_fig "Figures/figures-portfolio-variance/fig1_seed_sweep.png"
          else
            echo "::warning::FIX-F4: neither fig1_seed_sweep.pdf nor .png found"
          fi

          # FIX-F1 guard: check for the architecture figure; warn if still missing
          ARCH_FOUND=false
          for ext in pdf png jpg eps svg; do
            candidate="Figures/architecture_figures/hypatiaX_three_systems.${ext}"
            if [[ -f "$candidate" ]]; then
              deploy_fig "$candidate"
              ARCH_FOUND=true
              break
            fi
          done
          if [[ "$ARCH_FOUND" == "false" ]]; then
            echo "::warning::FIX-F1 (MANUAL): hypatiaX_three_systems not found in Figures/architecture_figures/ — \\fbox placeholder remains in §7.1"
          fi

          echo "--- figures/ after deploy ---"
          ls -lh figures/ 2>/dev/null || echo "(empty)"

      # ── Aggregate tables from all experiment subdirs to $ROOT/tables/ ──────
      # FIX: generate_tables.py writes into per-experiment subdirs
      # (hypatiax/data/results/{sub}/tables/) but the paper's \input{tables/…}
      # directives resolve against $ROOT/tables/.  Nothing bridged the two.
      # This step collects every final .tex table file from all experiment
      # subdirectories into the single $ROOT/tables/ directory the paper expects.
      - name: "Aggregate experiment tables to $ROOT/tables/"
        run: |
          set -euo pipefail
          mkdir -p tables
          RESULTS_BASE="hypatiax/data/results"

          N=0
          while IFS= read -r -d '' tex_file; do
            dest="tables/$(basename "$tex_file")"
            if [[ -f "$dest" ]]; then
              echo "  [COLLISION] $(basename "$tex_file") — overwriting with: $tex_file"
            fi
            cp "$tex_file" "$dest"
            N=$((N+1))
          done < <(find "$RESULTS_BASE" -path "*/tables/*.tex" -type f -print0 2>/dev/null)

          echo "Aggregated ${N} .tex file(s) into tables/"
          ls -lh tables/ 2>/dev/null || echo "(empty — no experiment tables committed yet)"

      # ── Commit $ROOT/figures/ and $ROOT/tables/ back to the branch ─────────
      # FIX: Without this commit, the deployed figures and aggregated tables
      # exist only on this runner for the duration of this job.  The LaTeX build
      # and any downstream workflow that checks out the repo would find neither
      # figures/ nor tables/ at the root.  Committing here makes them permanent.
      - name: "Commit $ROOT/figures/ and $ROOT/tables/ to repo"
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase --autostash origin "${{ github.ref_name }}" 2>/dev/null || true

          # -f overrides any .gitignore rules that exclude *.pdf or data dirs
          [[ -d figures ]] && git add -f figures/ || true
          [[ -d tables  ]] && git add -f tables/  || true

          if git diff --cached --quiet; then
            echo "figures/ and tables/ unchanged — nothing to commit."
          else
            STAGED=$(git diff --cached --name-only | wc -l)
            git commit -m "ci: deploy paper figures+tables to repo root (${STAGED} file(s)) — run ${{ github.run_id }}"
            git push origin HEAD:${{ github.ref_name }}
            echo "Pushed ${STAGED} figure/table file(s) to repo root."
          fi

      # Upload the prepared notebooks/ directory so downstream jobs can use it.
      # FIX: now includes figures/ and tables/ so NB-05's SEARCH_DIRS resolves
      # correctly inside the notebooks/ workspace (paths: figures/, ../figures/).
      - name: Upload notebooks workspace
        uses: actions/upload-artifact@v4.3.6
        with:
          name: notebooks-workspace
          path: |
            notebooks/
            figures/
            tables/
            jmlr-hypatiax-paper-final.tex
          retention-days: 3

  # ──────────────────────────────────────────────────────────────────────────
  # NOTE ON DEPENDENCY STRUCTURE
  # Each NB job fans out from audit-setup (not from the previous NB job).
  # This prevents a failing NB-01 from cascading to NB-02…NB-06.
  #
  #   audit-setup → NB-01
  #              → NB-02
  #              → NB-03
  #              → NB-04
  #              → NB-05
  #              → NB-06
  #              → bundle-artifacts (needs: all six, if: always())
  # ──────────────────────────────────────────────────────────────────────────

  # ──────────────────────────────────────────────
  # Job 2 — nb-01-citations
  # ──────────────────────────────────────────────
  nb-01-citations:
    name: "NB-01: Citation & Bibliography Audit"
    runs-on: ubuntu-latest
    needs: audit-setup
    if: always() && needs.audit-setup.result != 'skipped'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install jupyter nbconvert ipykernel
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f notebooks/requirements.txt ]; then pip install -r notebooks/requirements.txt; fi
          python -m ipykernel install --user --name python3

      - name: Download notebooks workspace
        uses: actions/download-artifact@v8
        with:
          name: notebooks-workspace
          path: .

      - name: Execute NB-01
        run: |
          jupyter nbconvert --to notebook --execute --inplace \
            --ExecutePreprocessor.timeout=300 \
            notebooks/NB-01_Citation_Bibliography_Audit.ipynb

      - name: Upload executed notebook
        if: always()
        uses: actions/upload-artifact@v4.3.6
        with:
          name: NB-01_Citation_Bibliography_Audit
          path: notebooks/NB-01_Citation_Bibliography_Audit.ipynb
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 3 — nb-02-crossref
  # ──────────────────────────────────────────────
  nb-02-crossref:
    name: "NB-02: Cross-Reference & Label Integrity"
    runs-on: ubuntu-latest
    needs: audit-setup
    if: always() && needs.audit-setup.result != 'skipped'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install jupyter nbconvert ipykernel
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f notebooks/requirements.txt ]; then pip install -r notebooks/requirements.txt; fi
          python -m ipykernel install --user --name python3

      - name: Download notebooks workspace
        uses: actions/download-artifact@v8
        with:
          name: notebooks-workspace
          path: .

      - name: Execute NB-02
        run: |
          jupyter nbconvert --to notebook --execute --inplace \
            --ExecutePreprocessor.timeout=300 \
            notebooks/NB-02_CrossReference_Label_Audit.ipynb

      - name: Upload executed notebook
        if: always()
        uses: actions/upload-artifact@v4.3.6
        with:
          name: NB-02_CrossReference_Label_Audit
          path: notebooks/NB-02_CrossReference_Label_Audit.ipynb
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 4 — nb-03-structure
  # ──────────────────────────────────────────────
  nb-03-structure:
    name: "NB-03: Section Structure & Numbering"
    runs-on: ubuntu-latest
    needs: audit-setup
    if: always() && needs.audit-setup.result != 'skipped'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install jupyter nbconvert ipykernel
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f notebooks/requirements.txt ]; then pip install -r notebooks/requirements.txt; fi
          python -m ipykernel install --user --name python3

      - name: Download notebooks workspace
        uses: actions/download-artifact@v8
        with:
          name: notebooks-workspace
          path: .

      - name: Execute NB-03
        run: |
          jupyter nbconvert --to notebook --execute --inplace \
            --ExecutePreprocessor.timeout=300 \
            notebooks/NB-03_Section_Structure_Numbering.ipynb

      - name: Upload executed notebook
        if: always()
        uses: actions/upload-artifact@v4.3.6
        with:
          name: NB-03_Section_Structure_Numbering
          path: notebooks/NB-03_Section_Structure_Numbering.ipynb
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 5 — nb-04-numerical
  # ──────────────────────────────────────────────
  nb-04-numerical:
    name: "NB-04: Numerical Consistency & Abstract Claims"
    runs-on: ubuntu-latest
    needs: audit-setup
    if: always() && needs.audit-setup.result != 'skipped'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install jupyter nbconvert ipykernel
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f notebooks/requirements.txt ]; then pip install -r notebooks/requirements.txt; fi
          python -m ipykernel install --user --name python3

      - name: Download notebooks workspace
        uses: actions/download-artifact@v8
        with:
          name: notebooks-workspace
          path: .

      - name: Execute NB-04
        run: |
          jupyter nbconvert --to notebook --execute --inplace \
            --ExecutePreprocessor.timeout=300 \
            notebooks/NB-04_Numerical_Consistency_Checker.ipynb

      - name: Upload executed notebook
        if: always()
        uses: actions/upload-artifact@v4.3.6
        with:
          name: NB-04_Numerical_Consistency_Checker
          path: notebooks/NB-04_Numerical_Consistency_Checker.ipynb
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 6 — nb-05-figures
  # ──────────────────────────────────────────────
  nb-05-figures:
    name: "NB-05: Figure Files & Environment Audit"
    runs-on: ubuntu-latest
    needs: audit-setup
    if: always() && needs.audit-setup.result != 'skipped'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install jupyter nbconvert ipykernel
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f notebooks/requirements.txt ]; then pip install -r notebooks/requirements.txt; fi
          python -m ipykernel install --user --name python3

      - name: Download notebooks workspace
        uses: actions/download-artifact@v8
        with:
          name: notebooks-workspace
          path: .

      # FIX: the notebooks-workspace artifact now contains figures/ and tables/
      # alongside notebooks/.  Restore them to the paths NB-05 SEARCH_DIRS uses:
      #   Path("figures")      → ./figures/      (cwd = repo root during nbconvert)
      #   Path("../figures")   → ../figures/     (fallback)
      # Both are satisfied by placing figures/ at the runner workspace root.
      - name: Restore figures/ and tables/ for NB-05 SEARCH_DIRS
        run: |
          mkdir -p figures tables
          # The artifact lands everything under notebooks/; lift subdirs to root.
          if [[ -d notebooks/figures ]]; then
            cp -r notebooks/figures/. figures/
            echo "Restored $(ls figures/ | wc -l) file(s) to figures/"
          else
            echo "::warning::figures/ not present in notebooks-workspace artifact"
          fi
          if [[ -d notebooks/tables ]]; then
            cp -r notebooks/tables/. tables/
            echo "Restored $(ls tables/ | wc -l) file(s) to tables/"
          fi

      - name: Execute NB-05
        run: |
          jupyter nbconvert --to notebook --execute --inplace \
            --ExecutePreprocessor.timeout=300 \
            notebooks/NB-05_Figure_Image_Dependency_Checker.ipynb

      - name: Upload executed notebook
        if: always()
        uses: actions/upload-artifact@v4.3.6
        with:
          name: NB-05_Figure_Image_Dependency_Checker
          path: notebooks/NB-05_Figure_Image_Dependency_Checker.ipynb
          retention-days: 7

  # ──────────────────────────────────────────────
  # Job 7 — nb-06-integrity
  # ──────────────────────────────────────────────
  nb-06-integrity:
    name: "NB-06: Code Quality & Pipeline Integrity"
    runs-on: ubuntu-latest
    needs: audit-setup
    if: always() && needs.audit-setup.result != 'skipped'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install jupyter nbconvert ipykernel
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f notebooks/requirements.txt ]; then pip install -r notebooks/requirements.txt; fi
          python -m ipykernel install --user --name python3

      - name: Download notebooks workspace
        uses: actions/download-artifact@v8
        with:
          name: notebooks-workspace
          path: .

      - name: Execute NB-06
        run: |
          jupyter nbconvert --to notebook --execute --inplace \
            --ExecutePreprocessor.timeout=300 \
            notebooks/NB-06_Code_Quality_Pipeline_Integrity.ipynb

      - name: Upload executed notebook
        if: always()
        uses: actions/upload-artifact@v4.3.6
        with:
          name: NB-06_Code_Quality_Pipeline_Integrity
          path: notebooks/NB-06_Code_Quality_Pipeline_Integrity.ipynb
          retention-days: 7

  bundle-artifacts:
    name: "Bundle Notebook Artifacts"
    runs-on: ubuntu-latest

    needs:
      - nb-01-citations
      - nb-02-crossref
      - nb-03-structure
      - nb-04-numerical
      - nb-05-figures
      - nb-06-integrity

    if: >
      always() &&
      github.event.inputs.apply_fixes_only != 'true'

    steps:

      - name: Download all notebook artifacts
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          path: notebooks

      - name: Show contents
        run: |
          if [ -d notebooks ] && [ -n "$(ls -A notebooks 2>/dev/null)" ]; then
            find notebooks -type f
          else
            echo "notebooks/ is empty or does not exist — no artifacts to list."
          fi

      - name: Upload combined artifact
        uses: actions/upload-artifact@v4.3.6
        with:
          name: paper-audit-notebooks
          path: notebooks/
          retention-days: 30

      # ── Persist $ROOT/figures/ and $ROOT/tables/ from the workspace artifact ─
      # FIX: audit-setup committed figures/tables from ITS runner, but the
      # bundle-artifacts job runs on a fresh runner with a clean checkout.
      # We re-download the workspace artifact (already downloaded above into
      # notebooks/) and copy figures/ + tables/ back out, then commit again
      # in case any NB job added or modified files during execution.
      - name: Checkout repository (for commit)
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: true
          fetch-depth: 1

      - name: "Re-commit $ROOT/figures/ and $ROOT/tables/ (bundle step)"
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git pull --rebase --autostash origin "${{ github.ref_name }}" 2>/dev/null || true

          mkdir -p figures tables

          # Lift figures and tables from the downloaded workspace artifact.
          if [[ -d notebooks/figures ]]; then
            cp -r notebooks/figures/. figures/
          fi
          if [[ -d notebooks/tables ]]; then
            cp -r notebooks/tables/. tables/
          fi

          # Also re-sweep for any tables written since audit-setup ran.
          RESULTS_BASE="hypatiax/data/results"
          while IFS= read -r -d '' tex_file; do
            dest="tables/$(basename "$tex_file")"
            [[ -f "$dest" ]] && echo "  [COLLISION] $(basename "$tex_file")"
            cp "$tex_file" "$dest"
          done < <(find "$RESULTS_BASE" -path "*/tables/*.tex" -type f -print0 2>/dev/null)

          [[ -d figures ]] && git add -f figures/ || true
          [[ -d tables  ]] && git add -f tables/  || true

          if git diff --cached --quiet; then
            echo "figures/ and tables/ already up-to-date in repo — nothing to commit."
          else
            STAGED=$(git diff --cached --name-only | wc -l)
            git commit -m "ci: re-sync paper figures+tables to repo root (${STAGED} file(s)) — run ${{ github.run_id }}"
            git push origin HEAD:${{ github.ref_name }}
            echo "Pushed ${STAGED} file(s) → ${{ github.ref_name }}"
          fi

      # ── Normalised summary for ci_report dynamic conclusions ─────────────────
      # Reads findings.json produced by hypatia_inspector.py (from the
      # hypatia-findings-setup-* artifact) plus live notebook outputs, and
      # writes a merged notebooks_audit_summary.json in the shared schema.
      - name: Download hypatia findings artifact
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: hypatia-findings-setup-${{ github.run_id }}
          path: /tmp/hypatia_findings

      - name: Write notebooks audit summary JSON
        if: always()
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          pip install --quiet jupyter nbconvert ipykernel 2>/dev/null || true
          python3 - <<'PYEOF'
          import json, os, re, datetime
          from pathlib import Path

          run_id = os.environ["RUN_ID"]

          # ── Load hypatia_inspector findings.json if available ─────────────────
          hypatia_findings = {}
          for candidate in [
              "/tmp/hypatia_findings/findings.json",
          ]:
              try:
                  raw = json.loads(Path(candidate).read_text())
                  for f in raw:
                      fid = f.get("fix_id") or f.get("id", "")
                      if fid:
                          hypatia_findings[fid] = {
                              "id":          fid,
                              "severity":    f.get("severity", "MEDIUM").upper(),
                              "status":      ("RESOLVED" if f.get("status") == "fixed"
                                              else "OPEN"   if f.get("status") in ("detected","manual")
                                              else f.get("status", "OPEN").upper()),
                              "description": f.get("summary", ""),
                              "action":      "",
                              "nb":          "hypatia_inspector",
                              "auto_fixable": f.get("auto_fixable", False),
                          }
                  print(f"Loaded {len(hypatia_findings)} findings from hypatia_inspector")
                  break
              except Exception as exc:
                  print(f"Could not load hypatia findings: {exc}")

          STATIC_FIXES = [
              {"id":"FIX-B1",  "severity":"CRITICAL","status":"OPEN",    "nb":"NB-01",
               "description":"koza1994genetic cited but no \\bibitem — will produce [?] in PDF.",
               "action":"Add \\bibitem{koza1994genetic} or redirect \\cite calls to koza1992gp."},
              {"id":"FIX-B2",  "severity":"HIGH",    "status":"OPEN",    "nb":"NB-01",
               "description":"cranmer2023pysr and cranmer2023interpretable are the same arXiv paper (2305.01582).",
               "action":"Remove cranmer2023interpretable; replace all \\cite calls with cranmer2023pysr."},
              {"id":"FIX-B3",  "severity":"HIGH",    "status":"OPEN",    "nb":"NB-01",
               "description":"udrescu2020ai and udrescu2020aifeynman are the same paper.",
               "action":"Remove udrescu2020aifeynman; replace all uses with udrescu2020ai."},
              {"id":"FIX-XR1","severity":"MEDIUM",  "status":"OPEN",    "nb":"NB-02",
               "description":"sec:llm_limitations and sec:llm_domain both defined on Section 3 — duplicate labels.",
               "action":"Remove \\label{sec:llm_domain}; update \\ref call sites."},
              {"id":"FIX-XR2","severity":"MEDIUM",  "status":"OPEN",    "nb":"NB-02",
               "description":"\\label{sec:r2_bugfix} sits inside \\item block — garbled \\ref output.",
               "action":"Move label to \\subsection heading."},
              {"id":"FIX-XR3","severity":"MEDIUM",  "status":"OPEN",    "nb":"NB-02",
               "description":"Supp A references Section 7.3 for Proposition 1; main paper places Component 3 in §7.4.",
               "action":"Change 7.3 → 7.4 in supp_routing_improvements.tex."},
              {"id":"FIX-XR4","severity":"MEDIUM",  "status":"OPEN",    "nb":"NB-02",
               "description":"Supp A references filename jmlr_paper_main.tex; actual file is jmlr-hypatiax-paper-final.tex.",
               "action":"Update all filename strings in Supp A."},
              {"id":"FIX-N1", "severity":"MEDIUM",  "status":"OPEN",    "nb":"NB-04",
               "description":"Spearman footnote says '71 cases'; table caption correctly says '70 tasks'.",
               "action":"Change '71 cases' → '70 tasks' in instability section body (line 1637)."},
              {"id":"FIX-N2", "severity":"MEDIUM",  "status":"OPEN",    "nb":"NB-04",
               "description":"§8.3 heading reads 'Five-Layer Architecture Overview'; rest of paper uses 'five-stage routing'.",
               "action":"Rename §8.3 to 'Five-Stage Routing Architecture Overview'."},
              {"id":"FIX-N3", "severity":"MEDIUM",  "status":"OPEN",    "nb":"NB-04",
               "description":"Nguyen-12 numbers need verification after seed=123 rerun.",
               "action":"Rerun Nguyen-12 with seed=123 and update paper figures."},
              {"id":"FIX-F1", "severity":"MEDIUM",  "status":"OPEN",    "nb":"NB-05",
               "description":"hypatiaX_three_systems MISSING — \\fbox placeholder in §7.1.",
               "action":"Replace \\fbox placeholder with final PDF/PNG from Figures/architecture_figures/."},
              {"id":"FIX-F2", "severity":"MEDIUM",  "status":"OPEN",    "nb":"NB-05",
               "description":"fig18_r2_heatmap_improved.pdf missing from figures/.",
               "action":"Copy from Figures/figures-cosmetic-last/ → figures/."},
              {"id":"FIX-F3", "severity":"MEDIUM",  "status":"OPEN",    "nb":"NB-05",
               "description":"fig09_r2_heatmap_regimes.pdf missing from figures/.",
               "action":"Copy from Figures/figures-cosmetic-last/ → figures/."},
              {"id":"FIX-F4", "severity":"MEDIUM",  "status":"OPEN",    "nb":"NB-05",
               "description":"fig1_seed_sweep.pdf missing from figures/.",
               "action":"Copy from Figures/figures-portfolio-variance/ → figures/."},
              {"id":"FIX-C1", "severity":"MEDIUM",  "status":"OPEN",    "nb":"NB-06",
               "description":"Three duplicate case names in hypatiax_defi_benchmark_v3c.py.",
               "action":"Rename duplicates (e.g. add (basic)/(extended) suffixes) and rerun checkpoint."},
              {"id":"FIX-C2", "severity":"MEDIUM",  "status":"OPEN",    "nb":"NB-06",
               "description":"Four stale hybrid_system_v40 imports in run_comparative_suite_benchmark_v2.py.",
               "action":"Replace with hybrid_system_v50_2 throughout."},
              {"id":"FIX-C3", "severity":"MEDIUM",  "status":"RESOLVED","nb":"NB-06 / ci_runner_disclosure",
               "description":"Feynman split-protocol corrected: PCA 40/60 run in exp2_pca_4060/; Gates A/B/C passed.",
               "action":"Report corrected result from exp2_pca_4060/ in §10.7 or add explicit disclosure of random 80/20 baseline.",
               "status":"RESOLVED"},
          ]

          # Merge: hypatia_inspector status takes precedence over static fallback
          merged = []
          for f in STATIC_FIXES:
              live = hypatia_findings.get(f["id"])
              if live:
                  merged.append({**f, "status": live["status"]})
              else:
                  merged.append(f)
          static_ids = {f["id"] for f in STATIC_FIXES}
          for fid, f in hypatia_findings.items():
              if fid not in static_ids:
                  merged.append(f)

          # Also scan live notebook outputs for any findings cells
          nb_findings = {}
          for nb_path in sorted(Path("notebooks").rglob("*.ipynb")):
              try:
                  nb = json.loads(nb_path.read_text(encoding="utf-8"))
              except Exception:
                  continue
              for cell in nb.get("cells", []):
                  tags = cell.get("metadata", {}).get("tags", [])
                  outputs = cell.get("outputs", [])
                  is_findings_cell = "audit_findings" in tags
                  for out in outputs:
                      text = ""
                      if out.get("output_type") in ("stream", "execute_result", "display_data"):
                          raw = out.get("text", out.get("data", {}).get("text/plain", ""))
                          text = "".join(raw) if isinstance(raw, list) else str(raw)
                      text = re.sub(r"^```json\s*", "", text.strip(), flags=re.MULTILINE)
                      text = re.sub(r"```\s*$", "", text.strip(), flags=re.MULTILINE)
                      if is_findings_cell or (text.startswith("{") and '"findings"' in text):
                          try:
                              data = json.loads(text)
                              for f in data.get("findings", []):
                                  fid = f.get("id", "")
                                  if fid:
                                      nb_findings[fid] = {
                                          "id":          fid,
                                          "severity":    f.get("severity", "UNKNOWN").upper(),
                                          "status":      f.get("status", "OPEN").upper(),
                                          "description": f.get("description", ""),
                                          "action":      f.get("action", ""),
                                          "nb":          f.get("nb", nb_path.stem),
                                      }
                          except Exception:
                              pass

          # Layer live notebook findings on top
          merged_ids = {f["id"] for f in merged}
          for fid, f in nb_findings.items():
              if fid not in merged_ids:
                  merged.append(f)

          summary = {
              "source":       "ci_paper_notebooks",
              "run_id":       run_id,
              "generated_at": datetime.datetime.utcnow().isoformat() + "Z",
              "findings":     merged,
          }
          out = Path("notebooks/notebooks_audit_summary.json")
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(summary, indent=2))
          print(f"Wrote {out} — {len(merged)} finding(s) "
                f"({len(hypatia_findings)} from hypatia_inspector, "
                f"{len(nb_findings)} from live notebooks)")
          PYEOF

      - name: Upload notebooks audit summary
        if: always()
        uses: actions/upload-artifact@v4.3.6
        with:
          name: notebooks-audit-summary-${{ github.run_id }}
          path: notebooks/notebooks_audit_summary.json
          if-no-files-found: warn
          retention-days: 30

  # Job 8 (report) lives in ci_report.yml.

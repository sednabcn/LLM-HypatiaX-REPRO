      # ════════════════════════════════════════════════════════════════════════
      #  SECTION C: Post-run overwrite summary
      # ════════════════════════════════════════════════════════════════════════

      - name: Post-run overwrite summary
        # Run on success AND failure so partial runs are still summarised
        # accurately.  Prior-step failure is surfaced via a STATUS row in the
        # summary table so readers understand why After < Before.
        if: always()
        env:
          SUB:             ${{ steps.meta.outputs.result_subdir }}
          N_EXISTING_FIGS: ${{ steps.overwrite_audit.outputs.n_existing_figs }}
          N_EXISTING_TABS: ${{ steps.overwrite_audit.outputs.n_existing_tabs }}
          EXPERIMENT:      ${{ github.event.inputs.experiment }}
          JOB_STATUS:      ${{ job.status }}
        shell: bash
        run: |
          set -euo pipefail
          FIGS="${OUT_BASE}/${SUB}/figures"
          TABS="${OUT_BASE}/${SUB}/tables"

          diff_dir() {
            local label="$1" before="$2" dir="$3" ext="$4"
            local after="/tmp/postprocess_audit/${label}_after.txt"
            # Snapshot the current state (may be identical to before if the
            # generation step failed and wrote nothing).
            find "$dir" -maxdepth 1 -type f -name "$ext" 2>/dev/null | sort > "$after" || touch "$after"
            local n_after n_over n_new n_del
            n_after=$(wc -l < "$after")
            n_over=$(comm -12 "$before" "$after" | wc -l)
            n_new=$(comm  -13 "$before" "$after" | wc -l)
            n_del=$(comm  -23 "$before" "$after" | wc -l)
            # Log to stderr so these lines are not captured by the eval below.
            echo "${label}: ${n_after} total | ${n_over} overwritten | ${n_new} new | ${n_del} deleted" >&2
            [[ $n_over -gt 0 ]] && comm -12 "$before" "$after" | while IFS= read -r f; do
              printf "  ✏  %s\n" "$(basename "$f")" >&2
            done
            [[ $n_new -gt 0 ]] && comm -13 "$before" "$after" | while IFS= read -r f; do
              printf "  ✚  %s\n" "$(basename "$f")" >&2
            done
            # Print key=value pairs to stdout so the caller can eval them into
            # the outer shell scope.  $GITHUB_ENV is only visible to subsequent
            # steps, not within the same step, so we cannot rely on it here.
            printf "n_after_%s=%s\nn_over_%s=%s\nn_new_%s=%s\nn_del_%s=%s\n" \
              "$label" "$n_after" \
              "$label" "$n_over"  \
              "$label" "$n_new"   \
              "$label" "$n_del"
          }

          echo "--- Post-run overwrite summary ---"
          # Guard: before-snapshots may be absent if the overwrite_audit step
          # itself failed.  Touch empty files so diff_dir always has a baseline.
          mkdir -p /tmp/postprocess_audit
          touch \
            /tmp/postprocess_audit/figs_before.txt \
            /tmp/postprocess_audit/tabs_before.txt \
            2>/dev/null || true

          eval "$(diff_dir "figs" /tmp/postprocess_audit/figs_before.txt "$FIGS" "*.pdf")"
          eval "$(diff_dir "tabs" /tmp/postprocess_audit/tabs_before.txt "$TABS" "*.tex")"

          # ── Verify suppB tables were NOT touched by non-suppB runs ──────────
          # Only enforce the guard when the job is otherwise succeeding — a
          # failed table-generation step cannot have modified suppB tables.
          EXP="${EXPERIMENT}"
          if [[ "$EXP" != "suppB" && "$EXP" != "suppB_sc" && "${JOB_STATUS}" == "success" ]]; then
            GUARD_OK=true
            for DIR in \
              "${OUT_BASE}/${SUPPB_SUBDIR}/figures" \
              "${OUT_BASE}/${SUPPB_SUBDIR}/tables" \
              "${OUT_BASE}/${SUPPB_SC_SUBDIR}/figures" \
              "${OUT_BASE}/${SUPPB_SC_SUBDIR}/tables"; do
              SNAP="/tmp/postprocess_audit/$(echo "$DIR" | tr '/' '_')_snap.txt"
              CURR="/tmp/postprocess_audit/$(echo "$DIR" | tr '/' '_')_curr.txt"
              find "$DIR" -maxdepth 1 -type f \( -name "*.tex" -o -name "*.pdf" -o -name "*.png" \) \
                2>/dev/null | sort > "$CURR" || touch "$CURR"
              if ! diff -q "$SNAP" "$CURR" > /dev/null 2>&1; then
                echo "::error::GUARD VIOLATION — suppB outputs in '${DIR}' were modified by ${EXP} run!"
                echo "  Before:"
                cat "$SNAP"
                echo "  After:"
                cat "$CURR"
                GUARD_OK=false
              else
                echo "Guard OK: suppB outputs in '${DIR}' unchanged."
              fi
            done
            [[ "$GUARD_OK" == "true" ]] || exit 1
          fi

          # ── Write step summary ───────────────────────────────────────────────
          # STATUS row makes clear whether counts reflect a complete run or a
          # partial one (e.g. table-generation step failed early).
          STATUS_ICON="✅"
          STATUS_NOTE="complete"
          if [[ "${JOB_STATUS}" != "success" ]]; then
            STATUS_ICON="❌"
            STATUS_NOTE="FAILED — table-generation step did not complete; file counts may not reflect a full run. Check earlier steps for the root cause (e.g. missing _merged.json requires ci_analysis.yml to run first)."
          fi
          {
            echo "## Post-process output summary — ${{ github.event.inputs.experiment }}"
            echo "| Dir | Before | After | Overwritten | New | Deleted |"
            echo "|-----|-------:|------:|------------:|----:|--------:|"
            echo "| figures | ${N_EXISTING_FIGS:-?} | ${n_after_figs:-?} | ${n_over_figs:-?} | ${n_new_figs:-?} | ${n_del_figs:-?} |"
            echo "| tables  | ${N_EXISTING_TABS:-?} | ${n_after_tabs:-?} | ${n_over_tabs:-?} | ${n_new_tabs:-?} | ${n_del_tabs:-?} |"
            echo ""
            echo "**Status:** ${STATUS_ICON} ${STATUS_NOTE}"
          } >> "$GITHUB_STEP_SUMMARY"

      # ════════════════════════════════════════════════════════════════════════
      #  SECTION D: Commit
      #
      #  Stages only the directories that the CURRENT experiment is authorised
      #  to write into.  suppB canonical dirs are ONLY staged when the
      #  experiment is suppB or suppB_sc.
      # ════════════════════════════════════════════════════════════════════════

      - name: Commit outputs
        env:
          SUB:        ${{ steps.meta.outputs.result_subdir }}
          EXPERIMENT: ${{ github.event.inputs.experiment }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git reset HEAD 2>/dev/null || true
          git pull --rebase --autostash origin "${{ github.ref_name }}"

          FIGS="${OUT_BASE}/${SUB}/figures"
          TABS="${OUT_BASE}/${SUB}/tables"

          # Always stage the experiment's own figures + tables.
          stage_if_nonempty() {
            local dir="$1"
            if [[ -d "$dir" ]] && [[ -n "$(ls -A "$dir" 2>/dev/null)" ]]; then
              git add -f "$dir/" 2>/dev/null || true
            else
              echo "::warning::directory empty or missing — skipping git add: ${dir}"
            fi
          }

          stage_if_nonempty "$FIGS"
          stage_if_nonempty "$TABS"

          # ── exp2_feynman_pca: also stage the cross-experiment comparison table ──
          if [[ "${EXPERIMENT}" == "exp2_feynman_pca" ]]; then
            PCA_DIR="${OUT_BASE}/${EXP2_PCA_SUBDIR}"
            for f in \
              "${PCA_DIR}/exp2_pca_comparison.tex" \
              "${PCA_DIR}/exp2_pca_comparison.csv" \
              "${PCA_DIR}/exp2_pca_comparison.md"; do
              [[ -f "$f" ]] && git add -f "$f" 2>/dev/null || true
            done
          fi

          # ── suppB: stage the canonical noise-sweep figures + tables directory ──
          if [[ "${EXPERIMENT}" == "suppB" ]]; then
            stage_if_nonempty "${OUT_BASE}/${SUPPB_SUBDIR}/figures"
            stage_if_nonempty "${OUT_BASE}/${SUPPB_SUBDIR}/tables"
          fi

          # ── suppB_sc: stage the canonical sample-complexity figures + tables ─
          if [[ "${EXPERIMENT}" == "suppB_sc" ]]; then
            stage_if_nonempty "${OUT_BASE}/${SUPPB_SC_SUBDIR}/figures"
            stage_if_nonempty "${OUT_BASE}/${SUPPB_SC_SUBDIR}/tables"
          fi

          if git diff --cached --quiet; then
            echo "No changes to post-process outputs — results unchanged from previous run."
          else
            git commit -m "ci: figures+tables for ${EXPERIMENT} — run ${{ github.run_id }}"
            git push origin HEAD:${{ github.ref_name }}
            echo "Pushed figures+tables for ${EXPERIMENT}."
          fi

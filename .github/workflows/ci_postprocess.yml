name: "HypatiaX - post-process (figures + tables)"

# ==============================================================================
#  ci_postprocess.yml — per-experiment figures + tables
#
#  ROOT CAUSE OF PRIOR BUGS (all fixed here):
#
#    BUG-A  ALL EXPERIMENTS GOT THE SAME TABLE LIST
#           generate_tables.py was called once with --results-dir pointing at
#           each experiment's own subdirectory, but that script unconditionally
#           generated EVERY table type (including suppB noise-sweep tables) for
#           every experiment. When the required source data was absent the
#           script either crashed silently or emitted zero-row placeholders that
#           overwrote real tables committed by a prior suppB run.
#
#    BUG-B  WRONG SOURCE DIRECTORY FOR suppB / suppB_sc TABLES
#           suppB tables require noise_sweep_*.json files under
#           noise-sweep/noise-sweep/. When postprocess ran for ANY other
#           experiment (e.g. instability, exp3b) it called generate_tables.py
#           with --results-dir pointing at THAT experiment's dir, found no
#           noise_sweep_*.json, and wrote empty suppb_*.tex placeholders into
#           the wrong location, destroying previously committed suppB data.
#
#    BUG-C  MANY EXPERIMENTS PRODUCED ZERO TABLES
#           exp1, exp1b, exp2_feynman, exp2, suppA, hybrid_all_domains, extrap,
#           exp2_feynman_extrap, exp2_feynman_pca had no dedicated table step
#           and relied on the single generic generate_tables.py call which
#           silently no-op'd because the expected data keys were absent.
#
#    BUG-D  MISSING --experiment FLAG ON generate_tables.py
#           generate_tables.py was never told which experiment was running;
#           it fell back to generating every table it knew about, using
#           whatever data happened to be present in --results-dir.
#
#    BUG-E  SINGLE GENERIC FIGURES STEP WRITES TO WRONG PATH
#           generate_figures.py ignored --repo-root and --figures-dir, instead
#           hardcoding output to hypatiax/tools/figures/results.pdf (a tools-
#           level path).  The experiment's own figures/ directory was always
#           left empty, causing the Commit step to skip staging it entirely.
#           plot_results.py (called as a subprocess) reported success but wrote
#           nothing observable to the experiment's figures dir either.
#
#  FIX STRATEGY:
#    1. Every experiment has its own NAMED step that:
#         a. Passes --experiment <id> to generate_tables.py so it only
#            generates tables relevant to that experiment.
#         b. Points --results-dir at the CANONICAL source for that experiment.
#         c. Is gated with `if:` so it only runs for the matching experiment.
#    2. suppB and suppB_sc tables are always written to THEIR OWN canonical
#       subdirectories; other experiments never touch those directories.
#    3. A GUARD step runs BEFORE any table generation for non-suppB experiments
#       to verify that existing suppB tables will not be touched.
#    4. FIGURES now mirror the same per-experiment gated-step pattern as tables
#       (BUG-E fix): each experiment has its own named "Figures: <exp>" step
#       that passes --experiment, --results-dir (canonical source), and
#       --figures-dir (canonical output) explicitly.  suppB/suppB_sc figures
#       point at their canonical subdirectory, not at $SUB.  The old single
#       generic "Generate figures" step is removed.
#    5. The Commit step stages ALL directories that may have been written,
#       including cross-experiment canonical dirs for exp2_feynman_pca and
#       the suppB/suppB_sc figures directories when those experiments run.
# ==============================================================================

on:
  workflow_dispatch:
    inputs:
      experiment:
        description: "Experiment ID"
        required: true
        type: choice
        options:
          - exp1
          - exp1b
          - exp1_pca
          - exp1b_pca
          - exp2_feynman
          - exp2_feynman_extrap
          - exp2_feynman_pca
          - exp2
          - exp3
          - exp3b
          - suppA
          - suppB
          - suppB_sc
          - hybrid_all_domains
          - instability
          - extrap
      result_subdir:
        description: "Result subdirectory (derived from experiment if blank)"
        required: false
        type: string
        default: ""

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OUT_BASE: "hypatiax/data/results"

  # ── Canonical subdirs for cross-experiment outputs ────────────────────────
  # These are referenced both in per-experiment steps and in the Commit step.
  SUPPB_SUBDIR:    "comparison_results/feynman-tests/noise-sweep/noise-sweep"
  SUPPB_SC_SUBDIR: "comparison_results/feynman-tests/sample-complexity"
  EXP2_PCA_SUBDIR: "comparison_results/feynman-tests/exp2_pca_4060"
  EXP2_SUBDIR:     "comparison_results/feynman-tests/exp2"

jobs:
  postprocess:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:

      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5.3.0
        with: { python-version: "3.12" }

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install \
            "numpy>=1.26" \
            "scipy>=1.11" \
            "pandas>=2.0" \
            "matplotlib" \
            "seaborn" \
            "sympy>=1.12" \
            "tabulate>=0.9"

      # ── 2. Resolve result_subdir ─────────────────────────────────────────────
      # Single canonical mapping — kept in sync with ci_runner.yml and
      # ci_analysis.yml.  If a new experiment is added update all three files.
      - name: Resolve result_subdir
        id: meta
        env:
          DISPATCH_EXP: ${{ github.event.inputs.experiment }}
          DISPATCH_SUB: ${{ github.event.inputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          SUB="${DISPATCH_SUB}"
          if [[ -z "$SUB" ]]; then
            SUB=$(EXP_ID="$DISPATCH_EXP" python3 -c "
          import os
          MAPPING = {
              'exp1':                'comparison_results/noise-noiseless/noiseless/defi',
              'exp1b':               'comparison_results/noise-noiseless/15',
              'exp1_pca':            'comparison_results/noise-noiseless/noiseless/defi_pca',
              'exp1b_pca':           'comparison_results/noise-noiseless/15_pca',
              'exp2_feynman':        'comparison_results/feynman-tests/exp2',
              'exp2_feynman_extrap': 'comparison_results/feynman-tests/exp2_extrap',
              'exp2_feynman_pca':    'comparison_results/feynman-tests/exp2_pca_4060',
              'exp2':                'comparison_results/feynman-tests/exp2_multi',
              'exp3':                'extrapolation',
              'exp3b':               'extrapolation/multi_seed',
              'suppA':               'hybrid_pysr/defi',
              'suppB':               'comparison_results/feynman-tests/noise-sweep/noise-sweep',
              'suppB_sc':            'comparison_results/feynman-tests/sample-complexity',
              'hybrid_all_domains':  'hybrid_llm_nn/all_domains',
              'instability':         'figures',
              'extrap':              'comparison_results/extrapolation',
          }
          exp = os.environ['EXP_ID']
          sub = MAPPING.get(exp)
          if sub is None:
              import sys
              print(f'::error::No subdir mapping for experiment \"{exp}\"', file=sys.stderr)
              sys.exit(1)
          print(sub)
          ")
          fi
          echo "result_subdir=${SUB}" >> "$GITHUB_OUTPUT"
          echo "Resolved: experiment=${DISPATCH_EXP} → result_subdir=${SUB}"

      # ── 3. Pre-run overwrite audit ──────────────────────────────────────────
      - name: Overwrite audit (pre-run snapshot)
        id: overwrite_audit
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          FIGS="${OUT_BASE}/${SUB}/figures"
          TABS="${OUT_BASE}/${SUB}/tables"
          mkdir -p /tmp/postprocess_audit

          snapshot_dir() {
            local label="$1" dir="$2" ext="$3" out="$4"
            if [[ -d "$dir" ]]; then
              find "$dir" -maxdepth 1 -type f -name "$ext" 2>/dev/null | sort > "$out" || true
              local n; n=$(wc -l < "$out")
              echo "${label} dir  : $dir"
              echo "  Existing   : ${n} file(s)"
              if [[ $n -gt 0 ]]; then
                while IFS= read -r f; do
                  printf "    [WILL OVERWRITE] %s  (%s)\n" "$(basename "$f")" "$(du -sh "$f" | cut -f1)"
                done < "$out"
              fi
            else
              touch "$out"
              echo "${label} dir  : $dir  (does not exist yet)"
            fi
          }

          echo "--- Pre-run snapshot ---"
          snapshot_dir "Figures" "$FIGS" "*.pdf" /tmp/postprocess_audit/figs_before.txt
          snapshot_dir "Figures" "$FIGS" "*.png" /tmp/postprocess_audit/figs_png_before.txt
          snapshot_dir "Tables"  "$TABS" "*.tex" /tmp/postprocess_audit/tabs_before.txt

          N_FIGS=$(wc -l < /tmp/postprocess_audit/figs_before.txt)
          N_TABS=$(wc -l < /tmp/postprocess_audit/tabs_before.txt)
          echo "n_existing_figs=${N_FIGS}" >> "$GITHUB_OUTPUT"
          echo "n_existing_tabs=${N_TABS}" >> "$GITHUB_OUTPUT"

      # ── 4. Guard: protect suppB tables from non-suppB runs ─────────────────
      # If this is NOT a suppB/suppB_sc run, verify the suppB table directories
      # are NOT touched by any subsequent step.  We record their current state;
      # the Commit step will verify nothing changed in those paths.
      - name: "Guard: snapshot suppB table dirs (non-suppB runs)"
        if: |
          github.event.inputs.experiment != 'suppB' &&
          github.event.inputs.experiment != 'suppB_sc'
        shell: bash
        run: |
          set -euo pipefail
          for DIR in \
            "${OUT_BASE}/${SUPPB_SUBDIR}/figures" \
            "${OUT_BASE}/${SUPPB_SUBDIR}/tables" \
            "${OUT_BASE}/${SUPPB_SC_SUBDIR}/figures" \
            "${OUT_BASE}/${SUPPB_SC_SUBDIR}/tables"; do
            SNAP="/tmp/postprocess_audit/$(echo "$DIR" | tr '/' '_')_snap.txt"
            find "$DIR" -maxdepth 1 -type f \( -name "*.tex" -o -name "*.pdf" -o -name "*.png" \) \
              2>/dev/null | sort > "$SNAP" || touch "$SNAP"
            echo "Guard snapshot: $(wc -l < "$SNAP") file(s) in ${DIR}"
          done

      # ── 5. Pre-create output directories ────────────────────────────────────
      - name: Create output directories
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          mkdir -p \
            "${OUT_BASE}/${SUB}/figures" \
            "${OUT_BASE}/${SUB}/tables"

      # ════════════════════════════════════════════════════════════════════════
      #  SECTION A: FIGURES  (per-experiment, scoped via --experiment)
      #
      #  WHY SEPARATED (BUG-E fix):
      #    The previous single generic step called generate_figures.py with
      #    --repo-root and --figures-dir pointing at the experiment's subdir,
      #    but the script ignored those flags and hardcoded its output to
      #    hypatiax/tools/figures/results.pdf.  The experiment's figures/ dir
      #    was always left empty, causing the Commit step to skip staging it.
      #
      #    Each step below explicitly passes:
      #      --experiment  <id>         → scopes which figures are generated
      #      --results-dir <canonical>  → canonical JSON source for that exp
      #      --figures-dir <canonical>  → canonical output directory
      #    suppB/suppB_sc point at their own canonical subdirs, not at $SUB.
      # ════════════════════════════════════════════════════════════════════════

      # ── A1: exp1 ────────────────────────────────────────────────────────────
      - name: "Figures: exp1 — noiseless DeFi"
        if: github.event.inputs.experiment == 'exp1'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_figures.py \
            --experiment  exp1 \
            --results-dir "${OUT_BASE}/${SUB}" \
            --figures-dir "${OUT_BASE}/${SUB}/figures" \
            --source      auto

      # ── A2: exp1b ───────────────────────────────────────────────────────────
      - name: "Figures: exp1b — noise-robust DeFi (multi-seed)"
        if: github.event.inputs.experiment == 'exp1b'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_figures.py \
            --experiment  exp1b \
            --results-dir "${OUT_BASE}/${SUB}" \
            --figures-dir "${OUT_BASE}/${SUB}/figures" \
            --source      auto

      # ── A3: exp2_feynman ────────────────────────────────────────────────────
      - name: "Figures: exp2_feynman — Feynman benchmark"
        if: github.event.inputs.experiment == 'exp2_feynman'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_figures.py \
            --experiment  exp2_feynman \
            --results-dir "${OUT_BASE}/${SUB}" \
            --figures-dir "${OUT_BASE}/${SUB}/figures" \
            --source      auto

      # ── A4: exp2_feynman_extrap ──────────────────────────────────────────────
      - name: "Figures: exp2_feynman_extrap — extrapolation comparison"
        if: github.event.inputs.experiment == 'exp2_feynman_extrap'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_figures.py \
            --experiment  exp2_feynman_extrap \
            --results-dir "${OUT_BASE}/${SUB}" \
            --figures-dir "${OUT_BASE}/${SUB}/figures" \
            --source      auto

      # ── A5: exp2_feynman_pca ─────────────────────────────────────────────────
      - name: "Figures: exp2_feynman_pca — PCA 40/60 vs random 80/20"
        if: github.event.inputs.experiment == 'exp2_feynman_pca'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_figures.py \
            --experiment  exp2_feynman_pca \
            --results-dir "${OUT_BASE}/${SUB}" \
            --figures-dir "${OUT_BASE}/${SUB}/figures" \
            --source      auto

      # ── A6: exp2 ─────────────────────────────────────────────────────────────
      - name: "Figures: exp2 — all-30 multi-domain"
        if: github.event.inputs.experiment == 'exp2'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_figures.py \
            --experiment  exp2 \
            --results-dir "${OUT_BASE}/${SUB}" \
            --figures-dir "${OUT_BASE}/${SUB}/figures" \
            --source      auto

      # ── A7: exp3 ─────────────────────────────────────────────────────────────
      - name: "Figures: exp3 — Nguyen-12 symbolic equivalence"
        if: github.event.inputs.experiment == 'exp3'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_figures.py \
            --experiment  exp3 \
            --results-dir "${OUT_BASE}/${SUB}" \
            --figures-dir "${OUT_BASE}/${SUB}/figures" \
            --source      auto

      # ── A8: exp3b ────────────────────────────────────────────────────────────
      - name: "Figures: exp3b — multi-seed Nguyen-12"
        if: github.event.inputs.experiment == 'exp3b'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_figures.py \
            --experiment  exp3b \
            --results-dir "${OUT_BASE}/${SUB}" \
            --figures-dir "${OUT_BASE}/${SUB}/figures" \
            --source      auto

      # ── A9: suppA ────────────────────────────────────────────────────────────
      - name: "Figures: suppA — hybrid PySR + DeFi"
        if: github.event.inputs.experiment == 'suppA'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_figures.py \
            --experiment  suppA \
            --results-dir "${OUT_BASE}/${SUB}" \
            --figures-dir "${OUT_BASE}/${SUB}/figures" \
            --source      auto

      # ── A10: suppB — noise-sweep figures (canonical source) ──────────────────
      # CRITICAL: reads from and writes to the CANONICAL suppB subdirectory.
      - name: "Figures: suppB — noise-sweep (canonical source)"
        if: github.event.inputs.experiment == 'suppB'
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_figures.py \
            --experiment  suppB \
            --results-dir "${OUT_BASE}/${SUPPB_SUBDIR}" \
            --figures-dir "${OUT_BASE}/${SUPPB_SUBDIR}/figures" \
            --source      auto

      # ── A11: suppB_sc — sample-complexity figures (canonical source) ──────────
      - name: "Figures: suppB_sc — sample-complexity (canonical source)"
        if: github.event.inputs.experiment == 'suppB_sc'
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_figures.py \
            --experiment  suppB_sc \
            --results-dir "${OUT_BASE}/${SUPPB_SC_SUBDIR}" \
            --figures-dir "${OUT_BASE}/${SUPPB_SC_SUBDIR}/figures" \
            --source      auto

      # ── A12: hybrid_all_domains ───────────────────────────────────────────────
      - name: "Figures: hybrid_all_domains — LLM+NN all-domain"
        if: github.event.inputs.experiment == 'hybrid_all_domains'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_figures.py \
            --experiment  hybrid_all_domains \
            --results-dir "${OUT_BASE}/${SUB}" \
            --figures-dir "${OUT_BASE}/${SUB}/figures" \
            --source      auto

      # ── A13: instability ─────────────────────────────────────────────────────
      - name: "Figures: instability — Instability Index S10.9"
        if: github.event.inputs.experiment == 'instability'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_figures.py \
            --experiment  instability \
            --results-dir "${OUT_BASE}/${SUB}" \
            --figures-dir "${OUT_BASE}/${SUB}/figures" \
            --source      auto

      # ── A14: extrap ───────────────────────────────────────────────────────────
      - name: "Figures: extrap — OOD extrapolation"
        if: github.event.inputs.experiment == 'extrap'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          python scripts/generate_figures.py \
            --experiment  extrap \
            --results-dir "${OUT_BASE}/${SUB}" \
            --figures-dir "${OUT_BASE}/${SUB}/figures" \
            --source      auto


      # ── A15: exp1_pca — DeFi all-74 PCA 40/60 ───────────────────────────────
      - name: "Figures: exp1_pca — DeFi noiseless PCA 40/60"
        if: github.event.inputs.experiment == 'exp1_pca'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${OUT_BASE}/${SUB}/figures"
          python scripts/generate_figures.py \
            --experiment  exp1_pca \
            --results-dir "${OUT_BASE}/${SUB}" \
            --figures-dir "${OUT_BASE}/${SUB}/figures" \
            --source      auto

      # ── A16: exp1b_pca — DeFi portfolio seed sweep PCA 40/60 ────────────────
      - name: "Figures: exp1b_pca — DeFi portfolio seed sweep PCA 40/60"
        if: github.event.inputs.experiment == 'exp1b_pca'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${OUT_BASE}/${SUB}/figures"
          python scripts/generate_figures.py \
            --experiment  exp1b_pca \
            --results-dir "${OUT_BASE}/${SUB}" \
            --figures-dir "${OUT_BASE}/${SUB}/figures" \
            --source      auto

      # ════════════════════════════════════════════════════════════════════════
      #  SECTION B: TABLES — one step per experiment family
      #
      #  WHY SEPARATED:
      #    • Each experiment has different source data files, different table
      #      schemas, and different --results-dir roots.
      #    • Passing --experiment to generate_tables.py prevents it from
      #      attempting to build tables for which no source data exists in SUB.
      #    • suppB tables (noise-sweep and sample-complexity) ALWAYS read from
      #      their canonical subdirectory, never from another experiment's dir.
      # ════════════════════════════════════════════════════════════════════════

      # ── B1: exp1 — noiseless DeFi comparison (Tab 1 / Tab 2) ───────────────
      - name: "Tables: exp1 — noiseless DeFi"
        if: github.event.inputs.experiment == 'exp1'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          # Source: protocol_core_noiseless_*.json in noise-noiseless/noiseless/defi
          # Produces: main_comparison_noiseless.tex, method_summary.tex
          python scripts/generate_tables.py \
            --experiment  exp1 \
            --results-dir "${OUT_BASE}/${SUB}" \
            --output-dir  "${OUT_BASE}/${SUB}/tables"
          N_TABS=$(find "${OUT_BASE}/${SUB}/tables" -maxdepth 1 -name "*.tex" 2>/dev/null | wc -l)
          if [[ $N_TABS -eq 0 ]]; then
            echo "::error::generate_tables.py exited 0 but wrote no .tex files to ${OUT_BASE}/${SUB}/tables"
            exit 1
          fi
          echo "Tables OK: ${N_TABS} .tex file(s) written to ${OUT_BASE}/${SUB}/tables"

      # ── B2: exp1b — noise-robust DeFi (Tab 3, multi-seed) ──────────────────
      - name: "Tables: exp1b — noise-robust DeFi (multi-seed)"
        if: github.event.inputs.experiment == 'exp1b'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          # Source: _merged.json (merged by ci_analysis before postprocess).
          # Guard: if _merged.json is absent, ci_analysis must run first.
          MERGED="${OUT_BASE}/${SUB}/_merged.json"
          if [[ ! -f "$MERGED" ]]; then
            echo "::error::${MERGED} not found. Run ci_analysis.yml for exp1b first."
            exit 1
          fi
          # Produces: noise_robust_comparison.tex, seed_variance_table.tex
          python scripts/generate_tables.py \
            --experiment  exp1b \
            --results-dir "${OUT_BASE}/${SUB}" \
            --output-dir  "${OUT_BASE}/${SUB}/tables"
          N_TABS=$(find "${OUT_BASE}/${SUB}/tables" -maxdepth 1 -name "*.tex" 2>/dev/null | wc -l)
          if [[ $N_TABS -eq 0 ]]; then
            echo "::error::generate_tables.py exited 0 but wrote no .tex files to ${OUT_BASE}/${SUB}/tables"
            exit 1
          fi
          echo "Tables OK: ${N_TABS} .tex file(s) written to ${OUT_BASE}/${SUB}/tables"

      # ── B3: exp2_feynman — Feynman benchmark (Tab 4 / Tab 5, random 80/20) ─
      - name: "Tables: exp2_feynman — Feynman benchmark"
        if: github.event.inputs.experiment == 'exp2_feynman'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          # Source: per-domain protocol_core_feynman_*.json in feynman-tests/exp2
          # Produces: feynman_benchmark_main.tex, method_rank_table.tex
          python scripts/generate_tables.py \
            --experiment  exp2_feynman \
            --results-dir "${OUT_BASE}/${SUB}" \
            --output-dir  "${OUT_BASE}/${SUB}/tables"
          N_TABS=$(find "${OUT_BASE}/${SUB}/tables" -maxdepth 1 -name "*.tex" 2>/dev/null | wc -l)
          if [[ $N_TABS -eq 0 ]]; then
            echo "::error::generate_tables.py exited 0 but wrote no .tex files to ${OUT_BASE}/${SUB}/tables"
            exit 1
          fi
          echo "Tables OK: ${N_TABS} .tex file(s) written to ${OUT_BASE}/${SUB}/tables"

      # ── B4: exp2_feynman_extrap — extrapolation comparison (Tab 6) ──────────
      - name: "Tables: exp2_feynman_extrap — extrapolation comparison"
        if: github.event.inputs.experiment == 'exp2_feynman_extrap'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          # Source: ablation_paired.json committed by ci_analysis merge_extrap step.
          PAIRED="${OUT_BASE}/${SUB}/ablation_paired.json"
          if [[ ! -f "$PAIRED" ]]; then
            echo "::error::${PAIRED} not found."
            echo "  Run ci_analysis.yml for exp2_feynman_extrap first (it generates ablation_paired.json)."
            exit 1
          fi
          # Produces: extrap_comparison.tex
          python scripts/generate_tables.py \

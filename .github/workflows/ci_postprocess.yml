      # ── A11: suppB_sc — sample-complexity figures (canonical source) ──────────
      - name: "Figures: suppB_sc — sample-complexity (canonical source)"
        if: env.EFFECTIVE_EXPERIMENT == 'suppB_sc'
        shell: bash
        run: |

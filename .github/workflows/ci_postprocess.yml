          # FIX FIGS-DEPLOY-SUBDIR: SUB="figures" for instability (see MAPPING
          # in "Resolve result_subdir") — "${SUB}/figures" would double to
          # "${OUT_BASE}/figures/figures", which is not where this experiment's
          # figures actually belong. instability's figures live directly in
          # "${OUT_BASE}/${SUB}" (i.e. "${OUT_BASE}/figures"), matching the
          # generator's actual write location confirmed in CI logs ("Generated
          # N figures in .../hypatiax/data/results/figures/").
          mkdir -p "${OUT_BASE}/${SUB}"
          python scripts/generate_figures.py \
            --experiment  instability \
            --results-dir "${OUT_BASE}/${SUB}" \
            --figures-dir "${OUT_BASE}/${SUB}" \
            --source      auto \
            || echo "::warning::instability figure generation failed — instability — variance JSON may be absent. Run ci_runner.yml for instability first."

      # ── A13b: instability — clean up stale crash-rescue checkpoint ──────────
      # ci_runner.yml's FIX-G5 safety net writes _checkpoint_shard*.json
      # straight into RESULTS_DIR ("${OUT_BASE}/figures" for instability, since
      # RESULT_SUBDIR=figures here) whenever a worker crashes mid-run. Once a
      # later run succeeds and produces the real instability_analysis.csv /
      # instability_extrapolation.csv, that checkpoint is just stale dead
      # weight that nothing ever removed — see clean_stale_checkpoints.py for
      # the full background. Runs after the figure-generation step above so
      # the final CSVs (already required upstream by run_instability_suite.py)
      # are in place by the time this checks for them. --apply quarantines
      # (never deletes) into _stale_checkpoints_removed/ under the same dir,
      # which (like clean_figures_dir.py's quarantine dir) lives on the
      # ephemeral runner filesystem and is never staged by the Commit step.
      - name: "Cleanup: instability — stale crash-rescue checkpoint"
        if: env.EFFECTIVE_EXPERIMENT == 'instability'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          python3 .github/scripts/clean_stale_checkpoints.py \

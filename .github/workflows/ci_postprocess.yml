      # ── A17: figures_deploy — regenerate + deploy non-runner-canonical figures ─
      #
      # WHY THIS STEP EXISTS (NB-05 FIX-F1 through FIX-F5)
      # ---------------------------------------------------------------
      # Five main-paper figures are never written into an experiment's own
      # canonical figures/ dir by the per-experiment steps above (A1–A16):
      #   - 2 are hand-crafted with no generator at all
      #   - 3 ARE generatable by scripts/generate_figures.py --experiment exp1
      #     (previously mis-documented as hand-crafted "Group C")
      # Plus the 13 Group-B Supplementary sweep figures, which ARE produced by
      # scripts/generate_figures.py --experiment suppB / suppB_sc (A10/A11) but
      # land in their own canonical subdirs, not in the LaTeX figures/ target.
      #
      # This step is now self-contained: it (1) RE-RUNS
      # scripts/generate_figures.py for exp1, suppB and suppB_sc so all
      # script-generatable stems are fresh, then (2) copies every stem — both
      # generated and hand-crafted — into the flat Figures/ source directory
      # and on into the LaTeX \graphicspath target (figures/).
      #
      # NOTE: there is NO supplementaries/generate_figures/generate_figures.py
      # script in this repo. The only generator is scripts/generate_figures.py;
      # any prior reference to "generate_figures.py --v2" under
      # supplementaries/ was a stale/incorrect doc reference and has been
      # removed — replaced by the --experiment exp1 / suppB / suppB_sc calls
      # below, which use the v2-corrected JSONs already produced by ci_runner.
      #
      # NB-05 Step 0 FIGURES_INVENTORY defines the authoritative source paths
      # (now flattened to a single Figures/ directory, NB05_FIGURES_DIR):
      #   FIX-F1  hypatiax_three_systems.pdf                      (hand-crafted)
      #             ← Figures/                                (§7.1 fig:architecture)
      #   FIX-F2  hypatiax_algorithm1_routing_cascade_v2.pdf      (hand-crafted)
      #             ← Figures/                                (§7.4 fig:routing_cascade)
      #   FIX-F3  fig18_r2_heatmap_improved.pdf                   (generated, exp1)
      #             ← exp1 figures/, fallback Figures/        (§10.2 fig:r2_heatmap_clipped)
      #   FIX-F4  fig09_r2_heatmap_regimes.pdf                    (generated, exp1)
      #             ← exp1 figures/, fallback Figures/        (§10.2 fig:r2_heatmap_raw)
      #   FIX-F5  fig1_seed_sweep.pdf  (or .png)                  (generated, exp1)
      #             ← exp1 figures/, fallback Figures/        (§10.5 fig:portfolio_seed_sweep)
      #
      # NB-05 Step 6 copies each file from its inventory path to DEST_DIR
      # (ROOT/figures/) via shutil.copy2.  This CI step performs the equivalent
      # operation (after regenerating) so the build artefact matches NB-05's
      # expected state.
      #
      # Step also syncs Group B suppB sweep figures from their canonical
      # per-experiment figures/ subdirs into the top-level figures/ directory
      # that LaTeX reads. NB-05 FIGURES_INVENTORY maps these to Figures/;
      # ci_postprocess generates them into SUPPB_SUBDIR/figures/ and
      # SUPPB_SC_SUBDIR/figures/ — this step bridges the two locations.
      #
      # NB-05 Step 3 search priority honoured:
      #   1. hypatia/data/results/figures/  (runner output — checked first)
      #   2. FIGURES_INVENTORY paths        (Figures/ — this step)
      #   3. Fallback: figures/, Figures/, root
      #
      # Triggered by: experiment == 'figures_deploy'
      # Run this workflow manually after all experiments complete and before
      # the final LaTeX build.
      # ---------------------------------------------------------------
      - name: "Figures: regenerate (exp1, suppB, suppB_sc) + deploy → figures/ (NB-05 FIX-F1–F5)"
        if: env.EFFECTIVE_EXPERIMENT == 'figures_deploy'
        shell: bash
        run: |
          set -euo pipefail

          # ── Destinations ────────────────────────────────────────────────
          # SRC : flat NB-05 inventory directory (hand-crafted + fallback source)
          # DEST: LaTeX \graphicspath target — must match NB-05 Step 0 DEST_DIR
          # RUNNER_FIGS: instability/exp1 runner output — has .png for most stems
          SRC="${OUT_BASE}/${NB05_FIGURES_DIR}"
          DEST="${OUT_BASE}/${NB05_DEST_DIR}"
          RUNNER_FIGS="${OUT_BASE}/figures"
          mkdir -p "${SRC}" "${DEST}" "${RUNNER_FIGS}"
          echo "Inventory source : ${SRC}"
          echo "Runner figures   : ${RUNNER_FIGS}"
          echo "Destination      : ${DEST}"
          echo ""

          # ── Step 0: purge contamination from DEST before writing anything ──
          # The only files that belong in figures/ are the 18 authoritative stems
          # defined in NB-05 Step 0 FIGURES_INVENTORY.  Any other .pdf/.png that
          # accumulated from old bare-glob copy_assets calls (fig_instability_*,
          # figures__*, REPO_AUDIT.md_shard0_run*.pdf, Figures__*, hypatiax_*
          # duplicates, etc.) is removed here so they can never pollute the LaTeX
          # build or bloat commits.
          #
          # Previously this ran an inline bash loop calling `git rm -f --cached`
          # and `rm -f` directly — permanent deletion with no recovery window,
          # and inconsistent with this repo's convention in clean_figures_dir.py
          # and flatten_suppb_doubled_path.py (dry-run by default, --apply to
          # act, QUARANTINE rather than permanently delete).
          #
          # Now delegates to .github/scripts/purge_figures_dest.py --apply, which:
          #   * moves non-allowlist files into a tempdir OUTSIDE the repo (never
          #     accidentally git-add-able) rather than permanently destroying them;
          #   * prints [KEEP] / [QUARANTINE] per file (same format as the other
          #     quarantine scripts) so CI logs are easy to audit;
          #   * exits 0 regardless so figures_deploy is always idempotent.
          echo "=== Step 0: purge non-allowlist files from ${DEST}/ ==="
          python3 .github/scripts/purge_figures_dest.py "${DEST}" --apply \
            --allow \
              hypatiax_three_systems \
              hypatiax_algorithm1_routing_cascade_v2 \
              fig18_r2_heatmap_improved \
              fig09_r2_heatmap_regimes \
              fig1_seed_sweep \
              fig1_r2_vs_noise \
              fig2_rmse_vs_noise \
              fig3_time_vs_noise \
              fig4_r2_vs_n \
              fig5_rmse_vs_n \
              fig6_time_vs_n \
              fig7_recovery_vs_noise \
              fig8_recovery_vs_n \
              fig9_minr2_vs_noise \
              fig10_r2_boxplot_noise \
              fig11_recovery_heatmap \
              fig_runtime_comparison \
              fig_comparative_table
          echo ""

          # ── Step 1: regenerate everything scripts/generate_figures.py CAN
          #            produce, so figures_deploy is self-contained and never
          #            depends on a stale 'supplementaries/...--v2' command.
          #            Each call is non-fatal: if source data is missing for
          #            a given experiment, we fall back to whatever already
          #            exists on disk (regenerated previously, or hand-placed
          #            in ${SRC}).
          echo "=== Regenerate: exp1 (FIX-F3/F4/F5 cosmetic figures) ==="
          mkdir -p "${OUT_BASE}/${EXP1_SUBDIR}/figures"
          python scripts/generate_figures.py \
            --experiment  exp1 \
            --results-dir "${OUT_BASE}/${EXP1_SUBDIR}" \
            --figures-dir "${OUT_BASE}/${EXP1_SUBDIR}/figures" \
            --source      auto \
            || echo "::warning::exp1 figure regeneration failed/skipped — falling back to ${SRC}/ and any existing files"

          echo ""
          echo "=== Regenerate: suppB (Group B noise-sweep figures) ==="
          mkdir -p "${OUT_BASE}/${SUPPB_SUBDIR}/figures"

          # ── Data-sufficiency pre-check ─────────────────────────────────
          # The noise-axis sweep figures (fig1..fig11, noise variants) need
          # MULTIPLE noise_sweep_*.json shards spanning multiple distinct
          # noise_levels (each worker/shard typically covers ONE sigma).
          # ci_analysis.yml does NOT merge suppB shards into _merged.json
          # (MERGE_REQUIRED_EXPERIMENTS only covers exp1b/exp3b), so whatever
          # shard files are committed in SUPPB_SUBDIR are exactly what
          # generate_figures.py --source auto will see. A single shard /
          # single noise level produces a degenerate (1-point) sweep.
          read N_NOISE_FILES N_NOISE_LEVELS N_METHODS_NOISE <<< "$(python3 .github/scripts/check_sweep_coverage.py --dir "${OUT_BASE}/${SUPPB_SUBDIR}" --mode noise 2>/dev/null || echo "0 0 0")"
          echo "  Found ${N_NOISE_FILES} noise_sweep_*.json shard(s), ${N_NOISE_LEVELS} distinct noise level(s), ${N_METHODS_NOISE} method(s)."
          if [[ "${N_NOISE_FILES}" -eq 0 ]]; then
            echo "::warning::No noise_sweep_*.json found in ${OUT_BASE}/${SUPPB_SUBDIR} — fig1..fig11 (noise variants) cannot be generated."
          elif [[ "${N_NOISE_LEVELS}" -lt 2 ]]; then
            echo "::warning::Only ${N_NOISE_LEVELS} distinct noise level(s) across ${N_NOISE_FILES} shard(s) in ${OUT_BASE}/${SUPPB_SUBDIR} — noise-axis sweep figures (fig1_r2_vs_noise, fig2_rmse_vs_noise, fig3_time_vs_noise, fig7_recovery_vs_noise, fig9_minr2_vs_noise, fig10_r2_boxplot_noise, fig11_recovery_heatmap) will be DEGENERATE (single point), not real sweeps. Run/commit additional ci_runner suppB shards covering more noise levels, then re-run figures_deploy."
          fi
          if [[ "${N_METHODS_NOISE}" -gt 0 && "${N_METHODS_NOISE}" -lt 6 ]]; then
            echo "::warning::Only ${N_METHODS_NOISE} method(s) found in suppB noise_sweep_*.json (expected 6 for fig_runtime_comparison / fig_comparative_table). These two figures may be incomplete from suppB data alone — see cross-experiment regeneration pass below."
          fi

          python scripts/generate_figures.py \
            --experiment  suppB \
            --results-dir "${OUT_BASE}/${SUPPB_SUBDIR}" \
            --figures-dir "${OUT_BASE}/${SUPPB_SUBDIR}/figures" \
            --source      auto \
            || echo "::warning::suppB figure regeneration failed/skipped — falling back to ${SRC}/ and any existing files"

          echo ""
          echo "=== Regenerate: suppB_sc (Group B sample-complexity figures) ==="
          mkdir -p "${OUT_BASE}/${SUPPB_SC_SUBDIR}/figures"

          read N_SC_FILES N_SC_SIZES N_METHODS_SC <<< "$(python3 .github/scripts/check_sweep_coverage.py --dir "${OUT_BASE}/${SUPPB_SC_SUBDIR}" --mode sample_complexity 2>/dev/null || echo "0 0 0")"
          echo "  Found ${N_SC_FILES} sample-complexity shard(s), ${N_SC_SIZES} distinct sample size(s), ${N_METHODS_SC} method(s)."
          if [[ "${N_SC_FILES}" -eq 0 ]]; then
            echo "::warning::No sc_n*.json / *sample_complexity*.json found in ${OUT_BASE}/${SUPPB_SC_SUBDIR} — fig4..fig8/fig11 (n variants) cannot be generated."
          elif [[ "${N_SC_SIZES}" -lt 2 ]]; then
            echo "::warning::Only ${N_SC_SIZES} distinct sample size(s) across ${N_SC_FILES} shard(s) in ${OUT_BASE}/${SUPPB_SC_SUBDIR} — sample-size-axis sweep figures (fig4_r2_vs_n, fig5_rmse_vs_n, fig6_time_vs_n, fig8_recovery_vs_n, fig11_recovery_heatmap) will be DEGENERATE (single point), not real sweeps."
          fi
          if [[ "${N_METHODS_SC}" -gt 0 && "${N_METHODS_SC}" -lt 6 ]]; then
            echo "::warning::Only ${N_METHODS_SC} method(s) found in suppB_sc sample-complexity JSONs (expected 6 for fig_runtime_comparison / fig_comparative_table). These two figures may be incomplete from suppB_sc data alone — see cross-experiment regeneration pass below."
          fi

          python scripts/generate_figures.py \
            --experiment  suppB_sc \
            --results-dir "${OUT_BASE}/${SUPPB_SC_SUBDIR}" \
            --figures-dir "${OUT_BASE}/${SUPPB_SC_SUBDIR}/figures" \
            --source      auto \
            || echo "::warning::suppB_sc figure regeneration failed/skipped — falling back to ${SRC}/ and any existing files"

          echo ""
          echo "=== Regenerate: cross-experiment 6-method comparison (fig_runtime_comparison, fig_comparative_table) ==="
          # fig_runtime_comparison and fig_comparative_table compare 6 methods,
          # but suppB / suppB_sc result JSONs only contain 2 ("EnhancedHybridSystemDeFi
          # (core)" and "HybridSystemLLMNN all-domains (core)"). The remaining
          # methods' data lives in OTHER experiments' canonical subdirs
          # (e.g. exp2, suppA, hybrid_all_domains). This best-effort pass points
          # --results-dir at the repo root (mirroring the exp2_feynman_pca
          # cross-experiment pattern in step B5) so generate_figures.py --source
          # auto can locate data from sibling experiment directories.
          # Output goes to a SEPARATE dir so it never clobbers the suppB/suppB_sc
          # canonical figures/ written above; copy_fig checks this dir FIRST for
          # these two stems only.
          ALLEXP_FIGDIR="${OUT_BASE}/${SUPPB_SUBDIR}/figures_allexp"
          mkdir -p "${ALLEXP_FIGDIR}"
          python scripts/generate_figures.py \
            --experiment  suppB \
            --results-dir "${OUT_BASE}" \
            --figures-dir "${ALLEXP_FIGDIR}" \
            --source      auto \
            || echo "::warning::cross-experiment (6-method) figure regeneration failed/skipped — fig_runtime_comparison / fig_comparative_table will fall back to suppB/suppB_sc (2-method) output or ${SRC}/"

          echo ""

          # ── Sanitize: dedupe <dir>__-prefixed duplicates before copy_fig runs ──
          # Defense-in-depth for the figures__figures__figures__fig09_..., Figures__
          # fig09_... duplication pattern (see clean_figures_dir.py header). That
          # pattern was traced to LOCAL manual merging of downloaded CI artifact
          # zips, NOT to anything this workflow writes — copy_fig() below only
          # ever checks exact canonical filenames, so a mangled-prefix duplicate
          # is never mistakenly selected as a source. This step exists purely so
          # that if such files are ever hand-committed into one of these source
          # dirs (e.g. someone pushes a locally-merged figures/ folder), the
          # workflow cleans them up automatically instead of silently ignoring
          # them or letting them accumulate.
          #
          # Mode: --apply only (no --delete-duplicates). Identical-content
          # duplicates are quarantined into _duplicates_removed/ under each dir
          # (not deleted outright); these scratch dirs live on the ephemeral
          # runner filesystem and are never staged by the Commit step below, so
          # nothing extra reaches the repo. Groups with genuinely CONFLICTING
          # content are left untouched and only logged — clean_figures_dir.py
          # never guesses which variant is correct.
          echo "=== Sanitize: strip <dir>__-prefixed duplicates from figure source dirs ==="
          n_sanitize_conflicts=0
          for D in \
            "${SRC}" \
            "${RUNNER_FIGS}" \
            "${OUT_BASE}/${EXP1_SUBDIR}/figures" \
            "${OUT_BASE}/${SUPPB_SUBDIR}/figures" \
            "${OUT_BASE}/${SUPPB_SC_SUBDIR}/figures" \
            "${ALLEXP_FIGDIR}"; do
            [[ -d "$D" ]] || continue
            SANITIZE_LOG="$(python3 .github/scripts/clean_figures_dir.py "$D" --apply 2>&1)" || true
            echo "${SANITIZE_LOG}"
            if grep -q '^\[CONFLICT\]' <<< "${SANITIZE_LOG}"; then
              echo "::warning::clean_figures_dir.py found conflicting-content duplicates in ${D} — left untouched, needs manual review."
              (( n_sanitize_conflicts++ )) || true
            fi
          done
          echo "Sanitize complete (${n_sanitize_conflicts} dir(s) with unresolved conflicts)."
          echo ""

          # ── Helper: copy the first candidate path that exists, else warn ──
          # Priority: explicit candidates (pdf preferred) → RUNNER_FIGS .png → warn.
          # RUNNER_FIGS (hypatiax/data/results/figures/) holds .pdf and .png outputs
          # from the instability/exp1 runner — a reliable fallback for all five
          # embedded stems even before generate_figures.py runs.
          # generate_figures.py now writes both .pdf (vector, for JMLR) and .png
          # (300 dpi, for NB-05 checks) via its _savefig() helper; copy_fig()
          # below prefers .pdf by listing it before .png in every candidates array.
          copy_fig() {
            local stem="$1" label="$2"; shift 2
            local src src_png
            # 1. Try all explicit candidates (pdf then .png sibling)
            for src in "$@"; do
              src_png="${src%.pdf}.png"
              if [[ -f "$src" ]]; then
                cp -v "$src" "${DEST}/$(basename "$src")"
                echo "  [OK] ${label}: $(basename "$src")  ← $(dirname "$src" | sed "s|${OUT_BASE}/||")/"
                return 0
              elif [[ "$src" == *.pdf && -f "$src_png" ]]; then
                cp -v "$src_png" "${DEST}/$(basename "$src_png")"
                echo "  [OK] ${label}: $(basename "$src_png")  (.png sibling)  ← $(dirname "$src_png" | sed "s|${OUT_BASE}/||")/"
                return 0
              fi
            done
            # 2. Fallback: check RUNNER_FIGS (instability/exp1 runner output — .pdf and .png)
            for ext in pdf png jpg eps svg; do
              local runner_src="${RUNNER_FIGS}/${stem}.${ext}"
              if [[ -f "$runner_src" ]]; then
                cp -v "$runner_src" "${DEST}/${stem}.${ext}"
                echo "  [OK] ${label}: ${stem}.${ext}  (runner fallback)  ← figures/"
                return 0
              fi
            done
            echo "  [MISSING] ${label}"
            echo "            Checked: $*"
            echo "            Also checked: ${RUNNER_FIGS}/${stem}.{pdf,png,...}"
            echo "            Place file at ${SRC}/${stem}.pdf (or .png), then re-run figures_deploy"
            return 0
          }

          echo "=== Hand-crafted figures (FIX-F1, FIX-F2) — no generator, source: ${SRC}/ ==="
          echo ""

          # FIX-F1 — §7.1 fig:architecture
          copy_fig "hypatiax_three_systems" \
                   "FIX-F1  hypatiax_three_systems (§7.1 fig:architecture)" \
                   "${SRC}/hypatiax_three_systems.pdf" \
                   "${RUNNER_FIGS}/hypatiax_three_systems.pdf" \
                   "${RUNNER_FIGS}/hypatiax_three_systems.png" || true

          # FIX-F2 — §7.4 fig:routing_cascade
          copy_fig "hypatiax_algorithm1_routing_cascade_v2" \
                   "FIX-F2  hypatiax_algorithm1_routing_cascade_v2 (§7.4 fig:routing_cascade)" \
                   "${SRC}/hypatiax_algorithm1_routing_cascade_v2.pdf" || true

          echo ""
          echo "=== Cosmetic figures (FIX-F3, FIX-F4, FIX-F5) — generated by exp1, fallback: ${SRC}/ ==="
          echo ""

          # FIX-F3 — §10.2 fig:r2_heatmap_clipped
          copy_fig "fig18_r2_heatmap_improved" \
                   "FIX-F3  fig18_r2_heatmap_improved (§10.2 fig:r2_heatmap_clipped)" \
                   "${OUT_BASE}/${EXP1_SUBDIR}/figures/fig18_r2_heatmap_improved.pdf" \
                   "${RUNNER_FIGS}/fig18_r2_heatmap_improved.pdf" \
                   "${RUNNER_FIGS}/fig18_r2_heatmap_improved.png" \
                   "${SRC}/fig18_r2_heatmap_improved.pdf" || true

          # FIX-F4 — §10.2 fig:r2_heatmap_raw
          copy_fig "fig09_r2_heatmap_regimes" \
                   "FIX-F4  fig09_r2_heatmap_regimes (§10.2 fig:r2_heatmap_raw)" \
                   "${OUT_BASE}/${EXP1_SUBDIR}/figures/fig09_r2_heatmap_regimes.pdf" \
                   "${RUNNER_FIGS}/fig09_r2_heatmap_regimes.pdf" \
                   "${RUNNER_FIGS}/fig09_r2_heatmap_regimes.png" \
                   "${SRC}/fig09_r2_heatmap_regimes.pdf" || true

          # FIX-F5 — §10.5 fig:portfolio_seed_sweep  (.pdf preferred, .png fallback)
          copy_fig "fig1_seed_sweep" \
                   "FIX-F5  fig1_seed_sweep (§10.5 fig:portfolio_seed_sweep)" \
                   "${OUT_BASE}/${EXP1_SUBDIR}/figures/fig1_seed_sweep.pdf" \
                   "${RUNNER_FIGS}/fig1_seed_sweep.pdf" \
                   "${RUNNER_FIGS}/fig1_seed_sweep.png" \
                   "${SRC}/fig1_seed_sweep.pdf" || true

          echo ""
          echo "=== Group B: suppB / suppB_sc sweep figures (13 stems) → figures/ ==="
          echo "(generated by scripts/generate_figures.py --experiment suppB / suppB_sc above;"
          echo " fallback: ${SRC}/ for any hand-placed files)"
          echo ""

          # Stems from NB-05 Step 0 FIGURES_INVENTORY (all 13):
          SWEEP_STEMS=(
            "fig1_r2_vs_noise"
            "fig2_rmse_vs_noise"
            "fig3_time_vs_noise"
            "fig4_r2_vs_n"
            "fig5_rmse_vs_n"
            "fig6_time_vs_n"
            "fig7_recovery_vs_noise"
            "fig8_recovery_vs_n"
            "fig9_minr2_vs_noise"
            "fig10_r2_boxplot_noise"
            "fig11_recovery_heatmap"
            "fig_runtime_comparison"
            "fig_comparative_table"
          )

          for stem in "${SWEEP_STEMS[@]}"; do
            candidates=()
            # fig_runtime_comparison / fig_comparative_table compare 6 methods —
            # prefer the cross-experiment (repo-root) regeneration pass above,
            # which is more likely to have all 6 methods than the 2-method
            # suppB/suppB_sc canonical output.
            #
            # fig11_recovery_heatmap needs BOTH noise_rows AND sample_rows in
            # the same generate_figures.py invocation (it's gated on
            # `if _noise_rows and _sample_rows:`). Neither the suppB call
            # (--results-dir=SUPPB_SUBDIR, noise data only) nor the suppB_sc
            # call (--results-dir=SUPPB_SC_SUBDIR, sample data only) can ever
            # satisfy that on its own — only this cross-experiment pass
            # (--results-dir=${OUT_BASE}, recursive) sees both datasets at
            # once, so this stem must also source from ALLEXP_FIGDIR first.
            if [[ "${stem}" == "fig_runtime_comparison" || "${stem}" == "fig_comparative_table" || "${stem}" == "fig11_recovery_heatmap" ]]; then
              for ext in pdf png jpg eps svg; do
                candidates+=( "${ALLEXP_FIGDIR}/${stem}.${ext}" )
              done
            fi
            for ext in pdf png jpg eps svg; do
              candidates+=(
                "${OUT_BASE}/${SUPPB_SUBDIR}/figures/${stem}.${ext}"
                "${OUT_BASE}/${SUPPB_SC_SUBDIR}/figures/${stem}.${ext}"
                "${SRC}/${stem}.${ext}"
              )
            done
            copy_fig "${stem}" "Group-B ${stem}" "${candidates[@]}" || true
          done

          echo ""
          echo "=== NB-05 required-figure status check ==="
          echo "(18 stems: 5 embedded main-paper + 13 Supp-B inventory)"
          echo ""

          # Full 18-stem list from NB-05 Step 0 ALL_STEMS = EMBEDDED_STEMS | INVENTORY_STEMS
          ALL_STEMS=(
            "hypatiax_three_systems"
            "hypatiax_algorithm1_routing_cascade_v2"
            "fig18_r2_heatmap_improved"
            "fig09_r2_heatmap_regimes"
            "fig1_seed_sweep"
            "fig1_r2_vs_noise"
            "fig2_rmse_vs_noise"
            "fig3_time_vs_noise"
            "fig4_r2_vs_n"
            "fig5_rmse_vs_n"
            "fig6_time_vs_n"
            "fig7_recovery_vs_noise"
            "fig8_recovery_vs_n"
            "fig9_minr2_vs_noise"
            "fig10_r2_boxplot_noise"
            "fig11_recovery_heatmap"
            "fig_runtime_comparison"
            "fig_comparative_table"
          )
          n_ok=0; n_miss=0
          for stem in "${ALL_STEMS[@]}"; do
            found=false
            for ext in pdf png jpg eps svg; do
              [[ -f "${DEST}/${stem}.${ext}" ]] && found=true && break
            done
            if [[ "$found" == "true" ]]; then
              echo "  [OK]      ${stem}"
              (( n_ok++ )) || true
            else
              echo "  [MISSING] ${stem}"
              (( n_miss++ )) || true
            fi
          done
          echo ""
          echo "Required figures: ${n_ok} present, ${n_miss} still missing."
          if [[ "${n_miss}" -gt 0 ]]; then
            echo "::error::${n_miss} figure(s) still missing from ${DEST} — LaTeX build will fail."
            echo "  Hand-crafted (FIX-F1/F2): place files in ${SRC}/ and re-run figures_deploy."
            echo "  Cosmetic (FIX-F3/F4/F5): ensure exp1 results data exists, then re-run figures_deploy."
            echo "  Group B: ensure suppB / suppB_sc source JSONs exist, then re-run figures_deploy."
          else
            echo "All 18 required figures present — LaTeX build should succeed."
          fi

      # ════════════════════════════════════════════════════════════════════════
      #  SECTION B: TABLES — one step per experiment family
      #
      #  WHY SEPARATED:
      #    • Each experiment has different source data files, different table
      #      schemas, and different --results-dir roots.
      #    • Passing --experiment to generate_tables.py prevents it from
      #      attempting to build tables for which no source data exists in SUB.
      #    • suppB tables (noise-sweep and sample-complexity) ALWAYS read from
      #      their canonical subdirectory, never from another experiment's dir.
      # ════════════════════════════════════════════════════════════════════════

      # ── B1: exp1 — noiseless DeFi comparison (Tab 1 / Tab 2) ───────────────
      - name: "Tables: exp1 — noiseless DeFi"
        if: env.EFFECTIVE_EXPERIMENT == 'exp1'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          # Source: protocol_core_noiseless_*.json in noise-noiseless/noiseless/defi
          # Produces: main_comparison_noiseless.tex, method_summary.tex
          python scripts/generate_tables.py \
            --experiment  exp1 \
            --results-dir "${OUT_BASE}/${SUB}" \
            --output-dir  "${OUT_BASE}/${SUB}/tables"
          N_TABS=$(find "${OUT_BASE}/${SUB}/tables" -maxdepth 1 -name "*.tex" 2>/dev/null | wc -l)
          if [[ $N_TABS -eq 0 ]]; then
            echo "::error::generate_tables.py exited 0 but wrote no .tex files to ${OUT_BASE}/${SUB}/tables"
            exit 1
          fi
          echo "Tables OK: ${N_TABS} .tex file(s) written to ${OUT_BASE}/${SUB}/tables"

      # ── B2: exp1b — noise-robust DeFi (Tab 3, multi-seed) ──────────────────
      - name: "Tables: exp1b — noise-robust DeFi (multi-seed)"
        if: env.EFFECTIVE_EXPERIMENT == 'exp1b'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          # Source: _merged.json (merged by ci_analysis before postprocess).
          # Guard: if _merged.json is absent, ci_analysis must run first.
          MERGED="${OUT_BASE}/${SUB}/_merged.json"
          if [[ ! -f "$MERGED" ]]; then
            echo "::error::${MERGED} not found. Run ci_analysis.yml for exp1b first."
            exit 1
          fi
          # Produces: noise_robust_comparison.tex, seed_variance_table.tex
          python scripts/generate_tables.py \
            --experiment  exp1b \
            --results-dir "${OUT_BASE}/${SUB}" \
            --output-dir  "${OUT_BASE}/${SUB}/tables"
          N_TABS=$(find "${OUT_BASE}/${SUB}/tables" -maxdepth 1 -name "*.tex" 2>/dev/null | wc -l)
          if [[ $N_TABS -eq 0 ]]; then
            echo "::error::generate_tables.py exited 0 but wrote no .tex files to ${OUT_BASE}/${SUB}/tables"
            exit 1
          fi
          echo "Tables OK: ${N_TABS} .tex file(s) written to ${OUT_BASE}/${SUB}/tables"

      # ── B2b: exp1_ablation — Core-15 ablation (PySR-only vs HypatiaX) ──────
      - name: "Tables: exp1_ablation — Core-15 ablation"
        if: env.EFFECTIVE_EXPERIMENT == 'exp1_ablation'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          # Source: _merged.json (merged by ci_analysis before postprocess).
          # Guard: if _merged.json is absent, ci_analysis must run first.
          MERGED="${OUT_BASE}/${SUB}/_merged.json"
          if [[ ! -f "$MERGED" ]]; then
            echo "::error::${MERGED} not found. Run ci_analysis.yml for exp1_ablation first."
            exit 1
          fi
          python scripts/generate_tables.py \
            --experiment  exp1_ablation \
            --results-dir "${OUT_BASE}/${SUB}" \
            --output-dir  "${OUT_BASE}/${SUB}/tables"
          N_TABS=$(find "${OUT_BASE}/${SUB}/tables" -maxdepth 1 -name "*.tex" 2>/dev/null | wc -l)
          if [[ $N_TABS -eq 0 ]]; then
            echo "::error::generate_tables.py exited 0 but wrote no .tex files to ${OUT_BASE}/${SUB}/tables"
            exit 1
          fi
          echo "Tables OK: ${N_TABS} .tex file(s) written to ${OUT_BASE}/${SUB}/tables"

      # ── B3: exp2_feynman — Feynman benchmark (Tab 4 / Tab 5, random 80/20) ─
      - name: "Tables: exp2_feynman — Feynman benchmark"
        if: env.EFFECTIVE_EXPERIMENT == 'exp2_feynman'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          # Source: per-domain protocol_core_feynman_*.json in feynman-tests/exp2
          # Produces: feynman_benchmark_main.tex, method_rank_table.tex
          python scripts/generate_tables.py \
            --experiment  exp2_feynman \
            --results-dir "${OUT_BASE}/${SUB}" \
            --output-dir  "${OUT_BASE}/${SUB}/tables"
          N_TABS=$(find "${OUT_BASE}/${SUB}/tables" -maxdepth 1 -name "*.tex" 2>/dev/null | wc -l)
          if [[ $N_TABS -eq 0 ]]; then

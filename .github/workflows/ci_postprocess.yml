        run: |
          set -euo pipefail
          mkdir -p "${OUT_BASE}/${SUB}/figures"
          python scripts/generate_figures.py \
            --experiment  exp1b \
            --results-dir "${OUT_BASE}/${SUB}" \
            --figures-dir "${OUT_BASE}/${SUB}/figures" \
            --source      auto \
            || echo "::warning::exp1b figure generation failed — exp1b — _merged.json may be absent. Run ci_analysis.yml for exp1b first."


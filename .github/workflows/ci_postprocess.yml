name: "HypatiaX - post-process (figures + tables)"

# ==============================================================================
#  ci_postprocess.yml — per-experiment figures + tables
#
#  ROOT CAUSE OF PRIOR BUGS (all fixed here):
#
#    BUG-A  ALL EXPERIMENTS GOT THE SAME TABLE LIST
#           generate_tables.py was called once with --results-dir pointing at
#           each experiment's own subdirectory, but that script unconditionally
#           generated EVERY table type (including suppB noise-sweep tables) for
#           every experiment. When the required source data was absent the
#           script either crashed silently or emitted zero-row placeholders that
#           overwrote real tables committed by a prior suppB run.
#
#    BUG-B  WRONG SOURCE DIRECTORY FOR suppB / suppB_sc TABLES
#           suppB tables require noise_sweep_*.json files under
#           comparison_results/feynman-tests/noise-sweep/. When postprocess ran
#           for ANY other experiment (e.g. instability, exp3b) it called
#           generate_tables.py with --results-dir pointing at THAT experiment's
#           dir, found no noise_sweep_*.json, and wrote empty suppb_*.tex
#           placeholders into the wrong location, destroying previously
#           committed suppB data.
#
#    BUG-C  MANY EXPERIMENTS PRODUCED ZERO TABLES
#           exp1, exp1b, exp2_feynman, exp2, suppA, hybrid_all_domains, extrap,
#           exp2_feynman_extrap, exp2_feynman_pca had no dedicated table step
#           and relied on the single generic generate_tables.py call which
#           silently no-op'd because the expected data keys were absent.
#
#    BUG-D  MISSING --experiment FLAG ON generate_tables.py
#           generate_tables.py was never told which experiment was running;
#           it fell back to generating every table it knew about, using
#           whatever data happened to be present in --results-dir.
#
#    BUG-E  SINGLE GENERIC FIGURES STEP WRITES TO WRONG PATH
#           generate_figures.py ignored --repo-root and --figures-dir, instead
#           hardcoding output to hypatiax/tools/figures/results.pdf (a tools-
#           level path).  The experiment's own figures/ directory was always
#           left empty, causing the Commit step to skip staging it entirely.
#           plot_results.py (called as a subprocess) reported success but wrote
#           nothing observable to the experiment's figures dir either.
#
#  FIX STRATEGY:
#    1. Every experiment has its own NAMED step that:
#         a. Passes --experiment <id> to generate_tables.py so it only
#            generates tables relevant to that experiment.
#         b. Points --results-dir at the CANONICAL source for that experiment.
#         c. Is gated with `if:` so it only runs for the matching experiment.
#    2. suppB and suppB_sc tables are always written to THEIR OWN canonical
#       subdirectories; other experiments never touch those directories.
#    3. A GUARD step runs BEFORE any table generation for non-suppB experiments
#       to verify that existing suppB tables will not be touched.
#    4. FIGURES now mirror the same per-experiment gated-step pattern as tables
#       (BUG-E fix): each experiment has its own named "Figures: <exp>" step
#       that passes --experiment, --results-dir (canonical source), and
#       --figures-dir (canonical output) explicitly.  suppB/suppB_sc figures
#       point at their canonical subdirectory, not at $SUB.  The old single
#       generic "Generate figures" step is removed.
#    5. The Commit step stages ALL directories that may have been written,
#       including cross-experiment canonical dirs for exp2_feynman_pca and
#       the suppB/suppB_sc figures directories when those experiments run.
#    6. figures_deploy (A17) runs .github/scripts/clean_figures_dir.py against
#       every figure source dir before copy_fig() reads from them. This is
#       defense-in-depth against the figures__figures__fig09_... duplicate-
#       prefix pattern (caused by local artifact-zip merging, not by this
#       workflow) — it dedupes identical-content copies into a quarantine
#       subfolder and only logs (never auto-resolves) genuine content
#       conflicts. See that script's docstring for full behaviour.
# ==============================================================================

on:
  # ── Auto-trigger: run postprocess whenever result JSONs are pushed ──────────
  # Detects the experiment from the changed file path and launches the correct
  # per-experiment figures + tables steps automatically.
  push:
    branches: [ "main", "master" ]
    paths:
      # exp1 / exp1b / exp1_pca / exp1b_pca
      - "hypatiax/data/results/comparison_results/noise-noiseless/**/*.json"
      # exp1_ablation
      - "hypatiax/data/results/ablation/exp1_ablation/**/*.json"
      # exp2_feynman / exp2_feynman_extrap / exp2_feynman_pca / exp2
      - "hypatiax/data/results/comparison_results/feynman-tests/**/*.json"
      # exp3 / exp3b
      - "hypatiax/data/results/extrapolation/**/*.json"
      # suppA
      - "hypatiax/data/results/hybrid_pysr/**/*.json"
      # suppB / suppB_sc (noise-sweep and sample-complexity)
      - "hypatiax/data/results/comparison_results/feynman-tests/noise-sweep/**/*.json"
      - "hypatiax/data/results/comparison_results/feynman-tests/sample-complexity/**/*.json"
      # hybrid_all_domains
      - "hypatiax/data/results/hybrid_llm_nn/**/*.json"
      # instability / extrap
      - "hypatiax/data/results/figures/**/*.json"
      - "hypatiax/data/results/comparison_results/extrapolation/**/*.json"
      # generate_figures.py itself — re-run instability (broadest figure set)
      - "scripts/generate_figures.py"
      - "generate_figures.py"

  workflow_dispatch:
    inputs:
      experiment:
        description: "Experiment ID"
        required: true
        type: choice
        options:
          - exp1
          - exp1b
          - exp1_pca
          - exp1b_pca
          - exp1_ablation
          - exp2_feynman
          - exp2_feynman_extrap
          - exp2_feynman_pca
          - exp2
          - exp3
          - exp3b
          - suppA
          - suppB
          - suppB_sc
          - hybrid_all_domains
          - instability
          - extrap
          - figures_deploy
      result_subdir:
        description: "Result subdirectory (derived from experiment if blank)"
        required: false
        type: string
        default: ""

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  OUT_BASE: "hypatiax/data/results"

  # ── Canonical subdirs for cross-experiment outputs ────────────────────────
  # These are referenced both in per-experiment steps and in the Commit step.
  SUPPB_SUBDIR:    "comparison_results/feynman-tests/noise-sweep"
  SUPPB_SC_SUBDIR: "comparison_results/feynman-tests/sample-complexity"
  EXP2_PCA_SUBDIR: "comparison_results/feynman-tests/exp2_pca_4060"
  EXP2_SUBDIR:     "comparison_results/feynman-tests/exp2"
  # exp1 canonical subdir — source for the cosmetic figures regenerated below
  # (must match the 'exp1' entry in the result_subdir MAPPING in step "Resolve result_subdir")
  EXP1_SUBDIR:     "comparison_results/noise-noiseless/noiseless/defi"

  # ── NB-05 FIGURES_INVENTORY source paths (flattened, single dir) ─────────
  # Exact path from NB-05 Step 0 FIGURES_INVENTORY.  Must stay in sync with
  # NB-05 when source locations are changed.
  #
  # All NB-05 figures that are not produced directly into an experiment's own
  # canonical figures/ dir are sourced from / staged in this single flat
  # directory (no per-group subfolders) before figures_deploy copies them
  # into NB05_DEST_DIR for the LaTeX build:
  #   - Hand-crafted, no generator (FIX-F1, FIX-F2):
  #       hypatiax_three_systems, hypatiax_algorithm1_routing_cascade_v2
  #   - Generated by `scripts/generate_figures.py --experiment exp1`
  #     (FIX-F3, FIX-F4, FIX-F5):
  #       fig09_r2_heatmap_regimes, fig18_r2_heatmap_improved, fig1_seed_sweep
  #   - Generated by `scripts/generate_figures.py --experiment suppB` /
  #     `--experiment suppB_sc` (Group B, 13 stems):
  #       fig1_r2_vs_noise … fig_comparative_table
  # NB-05 FIX: was "Figures" (capital-F) — the actual on-disk directory is
  # "figures" (lowercase).  "Figures/" does not exist anywhere in the results
  # tree; using it caused every copy_fig() SRC fallback to silently miss files
  # that were correctly placed in "figures/", forcing NB-05 to report
  # [MISSING] for hand-crafted stems (FIX-F1/F2) whenever RUNNER_FIGS also
  # lacked them.  Now matches NB05_DEST_DIR and the tree_r.txt layout.
  NB05_FIGURES_DIR:    "figures"
  # LaTeX \graphicspath target — where all figures must land for the build
  NB05_DEST_DIR:       "figures"

jobs:
  postprocess:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:

      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5.3.0
        with: { python-version: "3.12" }

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install \
            "numpy>=1.26" \
            "scipy>=1.11" \
            "pandas>=2.0" \
            "matplotlib" \
            "seaborn" \
            "sympy>=1.12" \
            "tabulate>=0.9"

      # ── 1b. Auto-detect experiment from changed paths (push trigger only) ────
      # On workflow_dispatch the experiment is already set by the user input.
      # On push we infer it from the first changed JSON path via a priority map.
      # The detected value is written to GITHUB_ENV so every subsequent step
      # sees it as ${{ env.EFFECTIVE_EXPERIMENT }} (overrides the dispatch input
      # only when the push trigger fires).
      - name: "Auto-detect experiment from changed paths (push trigger)"
        if: github.event_name == 'push'
        shell: bash
        run: |
          set -euo pipefail
          # List files changed in this push.
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || \
                    git diff --name-only HEAD    2>/dev/null || echo "")
          echo "Changed files:"
          echo "$CHANGED"

          # Priority-ordered path → experiment mapping.
          # First match wins; more-specific paths come first.
          detect_experiment() {
            local f
            while IFS= read -r f; do
              case "$f" in
                # suppB_sc must come before noise-sweep (both live under feynman-tests)
                *feynman-tests/sample-complexity/*) echo suppB_sc;   return ;;
                *feynman-tests/noise-sweep/*)       echo suppB;       return ;;
                *feynman-tests/exp2_pca_4060/*)     echo exp2_feynman_pca; return ;;
                *feynman-tests/exp2_extrap/*)       echo exp2_feynman_extrap; return ;;
                *feynman-tests/exp2_multi/*)        echo exp2;        return ;;
                *feynman-tests/exp2/*)              echo exp2_feynman; return ;;
                *noise-noiseless/noiseless/defi_pca/*) echo exp1_pca; return ;;
                *noise-noiseless/noiseless/*)       echo exp1;        return ;;
                *noise-noiseless/15_pca/*)          echo exp1b_pca;   return ;;
                *noise-noiseless/15/*)              echo exp1b;       return ;;
                *ablation/exp1_ablation/*)          echo exp1_ablation; return ;;
                *extrapolation/multi_seed/*)        echo exp3b;       return ;;
                *extrapolation/*)                   echo exp3;        return ;;
                *comparison_results/extrapolation/*) echo extrap;     return ;;
                *hybrid_pysr/*)                     echo suppA;       return ;;
                *hybrid_llm_nn/*)                   echo hybrid_all_domains; return ;;
                *results/figures/*)                 echo instability; return ;;
                # Script changes → re-run instability (generates widest figure set)
                *generate_figures.py)               echo instability; return ;;
              esac
            done <<< "$CHANGED"
            echo ""
          }

          DETECTED=$(detect_experiment)
          if [[ -z "$DETECTED" ]]; then
            echo "::warning::Could not detect experiment from changed paths — skipping postprocess."
            echo "EFFECTIVE_EXPERIMENT=SKIP" >> "$GITHUB_ENV"
          else
            echo "Auto-detected experiment: ${DETECTED}"
            echo "EFFECTIVE_EXPERIMENT=${DETECTED}" >> "$GITHUB_ENV"
          fi

      # On workflow_dispatch: forward the user-supplied experiment as-is.
      - name: "Set EFFECTIVE_EXPERIMENT from dispatch input"
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          echo "EFFECTIVE_EXPERIMENT=${{ github.event.inputs.experiment }}" >> "$GITHUB_ENV"

      # ── 2. Resolve result_subdir ─────────────────────────────────────────────
      # Single canonical mapping — kept in sync with ci_runner.yml and
      # ci_analysis.yml.  If a new experiment is added update all three files.
      - name: Resolve result_subdir
        id: meta
        env:
          DISPATCH_EXP: ${{ env.EFFECTIVE_EXPERIMENT }}
          DISPATCH_SUB: ${{ github.event.inputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          # Skip if auto-detect found nothing to postprocess.
          if [[ "${DISPATCH_EXP}" == "SKIP" || -z "${DISPATCH_EXP}" ]]; then
            echo "result_subdir=SKIP" >> "$GITHUB_OUTPUT"
            echo "Skipping — no experiment detected."
            exit 0
          fi
          SUB="${DISPATCH_SUB}"
          if [[ -z "$SUB" ]]; then
            SUB=$(EXP_ID="$DISPATCH_EXP" python3 -c "
          import os
          MAPPING = {
              'exp1':                'comparison_results/noise-noiseless/noiseless/defi',
              'exp1b':               'comparison_results/noise-noiseless/15',
              'exp1_pca':            'comparison_results/noise-noiseless/noiseless/defi_pca',
              'exp1b_pca':           'comparison_results/noise-noiseless/15_pca',
              'exp1_ablation':       'ablation/exp1_ablation',
              'exp2_feynman':        'comparison_results/feynman-tests/exp2',
              'exp2_feynman_extrap': 'comparison_results/feynman-tests/exp2_extrap',
              'exp2_feynman_pca':    'comparison_results/feynman-tests/exp2_pca_4060',
              'exp2_feyman_pca':     'comparison_results/feynman-tests/exp2_pca_4060',    # typo alias (missing 'n')
              'exp2_feyman_extrap':  'comparison_results/feynman-tests/exp2_extrap',      # typo alias (missing 'n')
              'exp2':                'comparison_results/feynman-tests/exp2_multi',
              'exp3':                'extrapolation',
              'exp3b':               'extrapolation/multi_seed',
              'suppA':               'hybrid_pysr/defi',
              'suppB':               'comparison_results/feynman-tests/noise-sweep',
              'suppB_sc':            'comparison_results/feynman-tests/sample-complexity',
              'hybrid_all_domains':  'hybrid_llm_nn/all_domains',
              'instability':         'figures',
              'extrap':              'comparison_results/extrapolation',
              'figures_deploy':      'figures',
          }
          exp = os.environ['EXP_ID']
          sub = MAPPING.get(exp)
          if sub is None:
              import sys
              print(f'::error::No subdir mapping for experiment \"{exp}\"', file=sys.stderr)
              sys.exit(1)
          print(sub)
          ")
          fi
          echo "result_subdir=${SUB}" >> "$GITHUB_OUTPUT"
          echo "Resolved: experiment=${DISPATCH_EXP} → result_subdir=${SUB}"

      # ── 3. Pre-run overwrite audit ──────────────────────────────────────────
      - name: Overwrite audit (pre-run snapshot)
        id: overwrite_audit
        env:
          SUB:        ${{ steps.meta.outputs.result_subdir }}
          EXPERIMENT: ${{ env.EFFECTIVE_EXPERIMENT }}
        shell: bash
        run: |
          set -euo pipefail
          # FIX FIGS-DEPLOY-SUBDIR: figures_deploy AND instability both map
          # SUB="figures" (see the MAPPING dict in "Resolve result_subdir"),
          # which is correct for the purge/guard steps that treat SUB as a
          # label, but WRONG here — it makes FIGS resolve to
          # "${OUT_BASE}/figures/figures", a doubled path that never exists,
          # so every figures_deploy/instability snapshot (before AND after, in
          # the matching "Post-run overwrite summary" step) silently finds
          # nothing and reports all-zero counts even when the run actually
          # wrote/overwrote dozens of files in "${OUT_BASE}/figures". This
          # branch must stay in sync with the identical branch in "Post-run
          # overwrite summary" below, or the before/after comparison breaks.
          if [[ "${EXPERIMENT}" == "figures_deploy" || "${EXPERIMENT}" == "instability" ]]; then
            FIGS="${OUT_BASE}/figures"
          else
            FIGS="${OUT_BASE}/${SUB}/figures"
          fi
          TABS="${OUT_BASE}/${SUB}/tables"
          mkdir -p /tmp/postprocess_audit

          snapshot_dir() {
            local label="$1" dir="$2" ext="$3" out="$4"
            if [[ -d "$dir" ]]; then
              find "$dir" -maxdepth 1 -type f -name "$ext" 2>/dev/null | sort > "$out" || true
              local n; n=$(wc -l < "$out")
              echo "${label} dir  : $dir"
              echo "  Existing   : ${n} file(s)"
              if [[ $n -gt 0 ]]; then
                while IFS= read -r f; do
                  printf "    [WILL OVERWRITE] %s  (%s)\n" "$(basename "$f")" "$(du -sh "$f" | cut -f1)"
                done < "$out"
              fi
            else
              touch "$out"
              echo "${label} dir  : $dir  (does not exist yet)"
            fi
          }

          echo "--- Pre-run snapshot ---"
          snapshot_dir "Figures" "$FIGS" "*.pdf" /tmp/postprocess_audit/figs_before.txt
          snapshot_dir "Figures" "$FIGS" "*.png" /tmp/postprocess_audit/figs_png_before.txt
          snapshot_dir "Tables"  "$TABS" "*.tex" /tmp/postprocess_audit/tabs_before.txt

          # Count both .pdf and .png — generate_figures.py now writes both formats
          # via its _savefig() helper, so figs_before.txt (*.pdf) is no longer
          # always 0 after the first figures_deploy run.
          N_FIGS=$(cat /tmp/postprocess_audit/figs_before.txt \
                       /tmp/postprocess_audit/figs_png_before.txt \
                   | sort -u | wc -l)
          N_TABS=$(wc -l < /tmp/postprocess_audit/tabs_before.txt)
          echo "n_existing_figs=${N_FIGS}" >> "$GITHUB_OUTPUT"
          echo "n_existing_tabs=${N_TABS}" >> "$GITHUB_OUTPUT"

      # ── 4. Guard: protect suppB tables and top-level figures/ ─────────────
      # If this is NOT a suppB/suppB_sc run, verify the suppB table directories
      # are NOT touched by any subsequent step.  We record their current state;
      # the Commit step will verify nothing changed in those paths.
      # If this is NOT a figures_deploy run, also guard the top-level figures/
      # directory so per-experiment runs cannot accidentally overwrite Group C
      # or Group B figures that were deployed by a previous figures_deploy run.
      - name: "Guard: snapshot suppB table dirs and figures/ (non-suppB/figures_deploy runs)"
        if: |
          env.EFFECTIVE_EXPERIMENT != 'suppB' &&
          env.EFFECTIVE_EXPERIMENT != 'suppB_sc' &&
          env.EFFECTIVE_EXPERIMENT != 'figures_deploy' &&
          env.EFFECTIVE_EXPERIMENT != 'SKIP' &&
          env.EFFECTIVE_EXPERIMENT != ''
        shell: bash
        run: |
          set -euo pipefail
          for DIR in \
            "${OUT_BASE}/${SUPPB_SUBDIR}/figures" \
            "${OUT_BASE}/${SUPPB_SUBDIR}/tables" \
            "${OUT_BASE}/${SUPPB_SC_SUBDIR}/figures" \
            "${OUT_BASE}/${SUPPB_SC_SUBDIR}/tables" \
            "${OUT_BASE}/${NB05_DEST_DIR}"; do
            SNAP="/tmp/postprocess_audit/$(echo "$DIR" | tr '/' '_')_snap.txt"
            find "$DIR" -maxdepth 1 -type f \( -name "*.tex" -o -name "*.pdf" -o -name "*.png" \) \
              2>/dev/null | sort > "$SNAP" || touch "$SNAP"
            echo "Guard snapshot: $(wc -l < "$SNAP") file(s) in ${DIR}"
          done

      # ── 5. Pre-create output directories ────────────────────────────────────
      # FIX FIGS-DEPLOY-SUBDIR (instability variant): instability and
      # figures_deploy both map result_subdir="figures" (see MAPPING in
      # "Resolve result_subdir"). For every OTHER experiment, figures/tables
      # live in a subfolder nested under the experiment's own result dir
      # ("${SUB}/figures"). For these two, "figures" IS the result dir itself
      # — generate_figures.py writes straight into "${OUT_BASE}/figures/",
      # not into a nested "${OUT_BASE}/figures/figures/". Pre-creating that
      # nested path here used to leave a permanently-empty
      # hypatiax/data/results/figures/figures/ directory on disk every run,
      # which is what made the later Commit step's stage_if_nonempty warn
      # "directory empty or missing — skipping git add" — there was never
      # any content to stage there in the first place.
      - name: Create output directories
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
          EXPERIMENT: ${{ env.EFFECTIVE_EXPERIMENT }}
        shell: bash
        run: |
          if [[ "${EXPERIMENT}" == "figures_deploy" || "${EXPERIMENT}" == "instability" ]]; then
            mkdir -p "${OUT_BASE}/figures"
          else
            mkdir -p "${OUT_BASE}/${SUB}/figures"
          fi
          mkdir -p "${OUT_BASE}/${SUB}/tables"

      # ── 5b. Purge contamination from canonical dirs ──────────────────────────
      # Each experiment's figures/ and tables/ dirs may contain files committed
      # by prior runs of the old bare-glob copy_assets step (now deleted).
      # Those files — instability PDFs, REPO_AUDIT shards, suppB noise-sweep
      # tables, figures from other experiments — have no business being in this
      # experiment's canonical subdir and will be re-staged verbatim by the
      # Commit step unless removed first.
      #
      # Strategy: keep ONLY files whose stem appears in the experiment's own
      # known-good allowlist.  For figures the allowlist is derived from the
      # --experiment value passed to generate_figures.py (the script owns its
      # own output stems; we whitelist by prefix/pattern rather than exact
      # names so new stems added to generate_figures.py are not silently
      # dropped).  For tables the allowlist uses the exact stems documented in
      # the "Produces:" comments of each Section B step.
      #
      # suppB / suppB_sc: their canonical dirs are ALSO purged here so that
      # cross-contamination committed by prior runs is cleared before new
      # legitimate outputs are written into those dirs by steps A10/A11/B10/B11.
      #
      # figures_deploy: skipped — its purge is handled inside step A17 (the
      # existing allowlist-gated purge block that already runs there).
      #
      # SAFE: purge uses `git rm --cached` (removes from index only) + `rm -f`
      # (removes working-tree copy).  Any file that was never tracked is just
      # rm'd.  A file that IS legitimate and on the allowlist is never touched.
      - name: "Purge: remove non-allowlist files from canonical figures/ and tables/"
        if: |
          env.EFFECTIVE_EXPERIMENT != 'SKIP' &&
          env.EFFECTIVE_EXPERIMENT != '' &&
          env.EFFECTIVE_EXPERIMENT != 'figures_deploy'
        env:
          SUB:        ${{ steps.meta.outputs.result_subdir }}
          EXPERIMENT: ${{ env.EFFECTIVE_EXPERIMENT }}
        shell: bash
        run: |
          set -euo pipefail

          # ── Per-experiment figure stem allowlists (prefix/exact match) ────
          # Each entry is an extended-glob pattern matched against the basename
          # (without extension).  Use '*' suffix for prefix matches.
          # generate_figures.py --experiment <id> owns these stems; update here
          # if the script gains new output stems for a given experiment.
          declare -A FIG_ALLOWLIST
          FIG_ALLOWLIST[exp1]="fig1_seed_sweep fig09_r2_heatmap_regimes fig18_r2_heatmap_improved"
          FIG_ALLOWLIST[exp1b]="fig1_seed_sweep fig_seed_sweep_comparison fig_paper_*"
          FIG_ALLOWLIST[exp1_ablation]="fig_ablation_*"
          FIG_ALLOWLIST[exp1_pca]="fig_pca_* fig1_pca_*"
          FIG_ALLOWLIST[exp1b_pca]="fig_pca_* fig1b_pca_*"
          FIG_ALLOWLIST[exp2_feynman]="fig_feynman_* fig2_* fig_benchmark_*"
          FIG_ALLOWLIST[exp2_feynman_extrap]="fig_extrap_* fig_ablation_paired_*"
          FIG_ALLOWLIST[exp2_feynman_pca]="fig_pca_* fig_exp2_pca_*"
          FIG_ALLOWLIST[exp2]="fig_all30_* fig_multi_*"
          FIG_ALLOWLIST[exp3]="fig_nguyen_* fig3_* fig_symequiv_*"
          FIG_ALLOWLIST[exp3b]="fig_nguyen_* fig3b_* fig_symequiv_*"
          FIG_ALLOWLIST[suppA]="fig_suppa_* fig_hybrid_pysr_*"
          FIG_ALLOWLIST[suppB]="fig1_r2_vs_noise fig2_rmse_vs_noise fig3_time_vs_noise fig7_recovery_vs_noise fig9_minr2_vs_noise fig10_r2_boxplot_noise fig11_recovery_heatmap fig_runtime_comparison fig_comparative_table"
          FIG_ALLOWLIST[suppB_sc]="fig4_r2_vs_n fig5_rmse_vs_n fig6_time_vs_n fig8_recovery_vs_n fig11_recovery_heatmap fig_runtime_comparison fig_comparative_table"
          FIG_ALLOWLIST[hybrid_all_domains]="fig_hybrid_* fig_all_domains_*"
          FIG_ALLOWLIST[instability]="fig_instability_* fig_paper_* fig_seed_sweep_comparison"
          FIG_ALLOWLIST[extrap]="fig_extrap_* fig07_* fig08_* fig09_* fig10_* fig11_* fig12_* fig14_* fig16_* fig17_* fig18_* fig19_* fig20_* fig21_* fig22_*"

          # ── Per-experiment table stem allowlists (exact stems only) ───────
          declare -A TAB_ALLOWLIST
          TAB_ALLOWLIST[exp1]="main_comparison_noiseless method_summary"
          TAB_ALLOWLIST[exp1b]="noise_robust_comparison seed_variance_table"
          TAB_ALLOWLIST[exp1_ablation]="ablation_comparison"
          TAB_ALLOWLIST[exp1_pca]="pca_defi_comparison"
          TAB_ALLOWLIST[exp1b_pca]="pca_portfolio_sweep"
          TAB_ALLOWLIST[exp2_feynman]="feynman_benchmark_main method_rank_table"
          TAB_ALLOWLIST[exp2_feynman_extrap]="extrap_comparison"
          TAB_ALLOWLIST[exp2_feynman_pca]="exp2_pca_comparison feynman_benchmark_main method_rank_table"
          TAB_ALLOWLIST[exp2]="all30_domain_summary multi_domain_rank_table"
          TAB_ALLOWLIST[exp3]="nguyen12_symequiv r2_distribution method_rank_table"
          TAB_ALLOWLIST[exp3b]="nguyen12_symequiv r2_distribution method_rank_table"
          TAB_ALLOWLIST[suppA]="suppa_hybrid_pysr_defi"
          TAB_ALLOWLIST[suppB]="suppb_noiseless suppb_noise_sweep suppb_r2_noise suppb_rr_noise suppb_time_noise suppb_winrate"
          TAB_ALLOWLIST[suppB_sc]="suppb_sc_summary suppb_sc_by_sample suppb_sc_metrics suppb_winrate"
          TAB_ALLOWLIST[hybrid_all_domains]="hybrid_all_domains_summary domain_rank_table"
          TAB_ALLOWLIST[instability]="instability_index_table group_summary_table"
          TAB_ALLOWLIST[extrap]="extrap_ood_table"

          # ── Helper: purge files not on the allowlist ───────────────────────
          purge_dir() {
            local dir="$1" allowlist="$2" label="$3"
            if [[ ! -d "$dir" ]]; then
              echo "  [SKIP] ${label} — dir does not exist yet"
              return 0
            fi
            local n_kept=0 n_purged=0
            while IFS= read -r -d '' f; do
              local base ext stem
              base="$(basename "$f")"
              ext="${base##*.}"
              stem="${base%.*}"
              local allowed=false
              for pattern in $allowlist; do
                # shellcheck disable=SC2254
                case "$stem" in
                  $pattern) allowed=true; break ;;
                esac
              done
              if [[ "$allowed" == true ]]; then
                (( n_kept++ )) || true
              else
                echo "  [PURGE] ${label}: ${base}"
                git rm -f --cached "$f" 2>/dev/null || true
                rm -f "$f"
                (( n_purged++ )) || true
              fi
            done < <(find "$dir" -maxdepth 1 -type f \( -name "*.pdf" -o -name "*.png" -o -name "*.tex" \) -print0 2>/dev/null)
            echo "  [${label}] kept ${n_kept}, purged ${n_purged} non-allowlist file(s) from ${dir}"
          }

          EXP="${EXPERIMENT}"
          FIG_AL="${FIG_ALLOWLIST[$EXP]:-}"
          TAB_AL="${TAB_ALLOWLIST[$EXP]:-}"

          if [[ -z "$FIG_AL" && -z "$TAB_AL" ]]; then
            echo "::warning::No allowlist defined for experiment '${EXP}' — skipping purge. Add entries to the FIG_ALLOWLIST / TAB_ALLOWLIST arrays above."
            exit 0
          fi

          echo "=== Purge canonical dirs for experiment: ${EXP} ==="
          echo "Figure allowlist : ${FIG_AL:-<none>}"
          echo "Table  allowlist : ${TAB_AL:-<none>}"
          echo ""

          # Experiment's own canonical dirs
          purge_dir "${OUT_BASE}/${SUB}/figures" "$FIG_AL" "figures/${SUB}"
          purge_dir "${OUT_BASE}/${SUB}/tables"  "$TAB_AL" "tables/${SUB}"

          # suppB / suppB_sc canonical dirs also need purging on their own runs
          # (their SUB IS their canonical dir, handled above, but double-check
          # that non-suppB experiments never write into the other's canonical dir —
          # the guard step already enforces this, purge is a belt-and-suspenders).

          echo ""
          echo "Purge complete."

      # ════════════════════════════════════════════════════════════════════════
      #  SECTION A: FIGURES  (per-experiment, scoped via --experiment)
      #
      #  WHY SEPARATED (BUG-E fix):
      #    The previous single generic step called generate_figures.py with
      #    --repo-root and --figures-dir pointing at the experiment's subdir,
      #    but the script ignored those flags and hardcoded its output to
      #    hypatiax/tools/figures/results.pdf.  The experiment's figures/ dir
      #    was always left empty, causing the Commit step to skip staging it.
      #
      #    Each step below explicitly passes:
      #      --experiment  <id>         → scopes which figures are generated
      #      --results-dir <canonical>  → canonical JSON source for that exp
      #      --figures-dir <canonical>  → canonical output directory
      #    suppB/suppB_sc point at their own canonical subdirs, not at $SUB.
      # ════════════════════════════════════════════════════════════════════════

      # ── A1: exp1 ────────────────────────────────────────────────────────────
      - name: "Figures: exp1 — noiseless DeFi"
        if: env.EFFECTIVE_EXPERIMENT == 'exp1'
        env:
          SUB: ${{ steps.meta.outputs.result_subdir }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${OUT_BASE}/${SUB}/figures"
          python scripts/generate_figures.py \
            --experiment  exp1 \
            --results-dir "${OUT_BASE}/${SUB}" \
            --figures-dir "${OUT_BASE}/${SUB}/figures" \
            --source      auto \
            || echo "::warning::exp1 figure generation failed — exp1 — source data may not yet exist. Run ci_runner.yml + ci_analysis.yml for exp1 first."

      # ── A2: exp1b ───────────────────────────────────────────────────────────
      - name: "Figures: exp1b — noise-robust DeFi (multi-seed)"

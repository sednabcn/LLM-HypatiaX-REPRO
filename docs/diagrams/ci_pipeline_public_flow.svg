<svg width="680" height="1100" viewBox="0 0 680 1100" xmlns="http://www.w3.org/2000/svg" role="img">
<title>ci_pipeline_public.yml flow</title>
<desc>Flowchart of ci_pipeline_public.yml: workflow_dispatch triggers resolve, diagnose, an optional PCA planning gate that fans out into N shards, then run-analysis, run-postprocess, run-checkpoint, and a self-dispatching next-slot job that loops back to the top.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#5F5E5A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="60" y="20" width="560" height="60" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="44" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">ci_pipeline_public.yml &#183; workflow_dispatch</text>
<text x="340" y="64" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">experiment_index: N / Na / Nf / Nc / Np</text>
<line x1="340" y1="80" x2="340" y2="118" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="60" y="118" width="560" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text x="340" y="140" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53">resolve</text>
<text x="340" y="158" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#185FA5">parse slot + phase from experiment_index</text>
<line x1="340" y1="174" x2="340" y2="212" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="60" y="212" width="560" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text x="340" y="234" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53">diagnose</text>
<text x="340" y="252" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#185FA5">inspect repo state, skip already-done stages</text>
<line x1="340" y1="268" x2="340" y2="306" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="340" y="290" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">gate: phase = full, not skipped</text>

<rect x="60" y="306" width="560" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="328" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">pca_runner &#183; gate</text>
<text x="340" y="346" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">skip_plan for non-PCA experiments</text>
<line x1="340" y1="362" x2="340" y2="400" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="60" y="400" width="560" height="56" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width="0.5"/>
<text x="340" y="422" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#042C53">plan &#183; resolve N_SHARDS</text>
<text x="340" y="440" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#185FA5">EXP_SHARD_TABLE lookup + override rules</text>

<line x1="340" y1="456" x2="340" y2="480" stroke="#888780" stroke-width="0.5"/>
<line x1="150" y1="480" x2="530" y2="480" stroke="#888780" stroke-width="0.5"/>
<line x1="150" y1="480" x2="150" y2="502" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="340" y1="480" x2="340" y2="502" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="530" y1="480" x2="530" y2="502" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="80" y="502" width="140" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="150" y="528" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">shard 0</text>
<rect x="270" y="502" width="140" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="340" y="528" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">shard 1</text>
<rect x="460" y="502" width="140" height="44" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="530" y="528" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">shard N-1</text>

<line x1="150" y1="546" x2="150" y2="568" stroke="#888780" stroke-width="0.5"/>
<line x1="530" y1="546" x2="530" y2="568" stroke="#888780" stroke-width="0.5"/>
<line x1="150" y1="568" x2="530" y2="568" stroke="#888780" stroke-width="0.5"/>
<line x1="340" y1="546" x2="340" y2="568" stroke="#888780" stroke-width="0.5"/>
<line x1="340" y1="568" x2="340" y2="590" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="60" y="590" width="560" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="340" y="612" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">per-shard git commit</text>
<text x="340" y="630" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">consolidate job disabled</text>
<line x1="340" y1="646" x2="340" y2="684" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="60" y="684" width="560" height="56" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width="0.5"/>
<text x="340" y="706" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#04342C">run-analysis &#183; C1</text>
<text x="340" y="724" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#0F6E56">ci_analysis.yml &#183; phase in {full, a}</text>
<line x1="340" y1="740" x2="340" y2="778" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="60" y="778" width="560" height="56" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text x="340" y="800" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">run-postprocess &#183; C2</text>
<text x="340" y="818" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993C1D">ci_postprocess.yml &#183; phase in {full, f, p}</text>
<line x1="340" y1="834" x2="340" y2="872" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="60" y="872" width="560" height="56" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width="0.5"/>
<text x="340" y="894" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#4A1B0C">run-checkpoint &#183; C3</text>
<text x="340" y="912" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#993C1D">ci_pipeline_check.yml &#183; phase in {full, c, p}</text>
<line x1="340" y1="928" x2="340" y2="966" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)"/>

<rect x="60" y="966" width="560" height="56" rx="8" fill="#F1EFE8" stroke="#888780" stroke-width="0.5"/>
<text x="340" y="988" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="500" fill="#2C2C2A">next-slot &#183; C6</text>
<text x="340" y="1006" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">self-dispatch slot+1 of 14</text>

<path d="M620 994 L660 994 L660 50 L620 50" fill="none" stroke="#B4B2A9" stroke-width="0.5" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
<text x="668" y="522" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A" transform="rotate(-90 668 522)">loops to next slot</text>

<text x="340" y="1050" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">C4 (paper audit), C5 (notebook audit), C5b (report deploy), and C5c (runner disclosure)</text>
<text x="340" y="1068" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#5F5E5A">are omitted from this public pipeline until paper acceptance.</text>
</svg>
